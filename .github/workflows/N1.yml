name: Build N1
on:
  workflow_dispatch:

jobs:
  ophub:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget unzip bzip2 python3

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build config
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          EOF
          make oldconfig

      - name: Compile
        run: |
          cd openwrt  # 修复路径：必须进入源码目录执行make
          make -j$(nproc)

      - name: Check firmware
        run: |
          ls -lh openwrt/bin/targets/
          find openwrt/bin/targets -name "*rootfs.tar.gz"

      - name: Copy rootfs
        run: |
          find openwrt/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;

      - name: Make N1 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
          auto_kernel: true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-N1
          path: out/*.img.gz
          retention-days: 30

# ------------------- LEDE 任务 -------------------
  lede:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - name: Clone lede
        run: git clone https://github.com/coolsnowwolf/lede
      - name: Config
        run: |
          cd lede
          ./scripts/feeds update -a && ./scripts/feeds install -a
         cat > .config << EOF
         CONFIG_TARGET_armvirt=y
         CONFIG_TARGET_armvirt_64=y
         CONFIG_TARGET_armvirt_64_Default=y
         CONFIG_PACKAGE_luci=y
         CONFIG_PACKAGE_wpad=y
         EOF
         make oldconfig
      - name: Compile
        run: |
          cd lede  # 修复路径
          make -j$(nproc)
      - name: Copy rootfs
        run: find lede/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;
      - name: Build N1
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Lede-N1
          path: out/*.img.gz

