name: Phicomm N1

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "选择源码分支"
        required: true
        default: "lede_master"
        type: choice
        options:
          - openwrt_main
          - lede_master
          - immortalwrt_master
      openwrt_kernel:
        description: "选择内核版本"
        required: true
        default: "6.6.y"
        type: choice
        options:
          - 6.1.y
          - 6.6.y
          - 6.12.y
      auto_kernel:
        description: "自动使用最新内核"
        required: false
        default: true
        type: boolean
      openwrt_ip:
        description: "固件默认IP"
        required: false
        default: "192.168.1.2"

env:
  TZ: Asia/Shanghai
  UPLOAD_FIRMWARE: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev git wget curl rsync
          sudo swapoff -a
          sudo rm -f /swapfile

      - name: 克隆源码
        run: |
          if [[ "${{ inputs.source_branch }}" == "openwrt_main" ]]; then
              git clone https://github.com/openwrt/openwrt -b main openwrt
          elif [[ "${{ inputs.source_branch }}" == "lede_master" ]]; then
              git clone https://github.com/coolsnowwolf/lede openwrt
          elif [[ "${{ inputs.source_branch }}" == "immortalwrt_master" ]]; then
              git clone https://github.com/immortalwrt/immortalwrt -b master openwrt
          fi

      - name: 更新并安装软件源
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成基础配置
        working-directory: openwrt
        run: |
          cat > .config << EOF
          CONFIG_TARGET_amlogic=y
          CONFIG_TARGET_amlogic_mesongx=y
          CONFIG_TARGET_amlogic_mesongx_DEVICE_phicomm_n1=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_DEVEL=y
          CONFIG_CCACHE=n

          # WiFi 驱动与固件
          CONFIG_PACKAGE_kmod-brcmfmac=y
          CONFIG_BRCMFMAC_SDIO=y
          CONFIG_PACKAGE_kmod-brcmutil=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_brcmfmac-firmware-43455-sdio-phicomm-n1=y
          CONFIG_PACKAGE_wpad-openssl=y
          CONFIG_PACKAGE_iw=y

          # 基础 LuCI
          CONFIG_PACKAGE_luci-app-amlogic=y
          CONFIG_PACKAGE_luci=y

          # USB 支持
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-hid=y
          CONFIG_PACKAGE_kmod-usb-net=y

          # IPv6 支持
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_ip6tables=y

          # 排除不需要的包
          # CONFIG_PACKAGE_wol is not set
          # CONFIG_PACKAGE_luci-app-wol is not set
          # CONFIG_PACKAGE_nlbwmon is not set
          # CONFIG_PACKAGE_luci-app-nlbwmon is not set
          EOF
          make defconfig

      - name: 下载所有依赖
        working-directory: openwrt
        run: make download -j8

      - name: 编译固件
        id: compile
        working-directory: openwrt
        run: |
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          du -h --max-depth=1 . --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir 2>/dev/null || true
          du -h --max-depth=1 ./bin 2>/dev/null || true
          rm -rf ./build_dir
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 打包N1专用固件
        id: package
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/amlogic/mesongx/*rootfs.tar.gz
          openwrt_board: s905d
          openwrt_ip: ${{ inputs.openwrt_ip }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: Phicomm-N1-Firmware
          path: ${{ steps.package.outputs.PACKAGED_OUTPUTPATH }}/*.img.gz
          retention-days: 30
