name: Build Phicomm N1
on:
  workflow_dispatch:

jobs:
  # 1. 编译 OpenWrt 23.05 官方版
  openwrt_official:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget unzip bzip2 python3
      - name: Clone OpenWrt 23.05
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Build Config
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_armsr=y
          CONFIG_TARGET_armsr_armv8=y
          CONFIG_TARGET_armsr_armv8_DEVICE_generic=y
          CONFIG_TARGET_BOARD="armsr"
          CONFIG_TARGET_SUBTARGET="armv8"
          CONFIG_TARGET_PROFILE="DEVICE_generic"
          CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"
          CONFIG_ARCH_arm64=y
          CONFIG_64BIT=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad-mini=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_kmod-bridge=y
          EOF

          # 预置网络配置（静态IP 192.168.1.2，关闭DHCP）
          mkdir -p files/etc/config
          cat > files/etc/config/network << EOF
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
          config interface 'lan'
                  option device 'br-lan'
                  option proto 'static'
                  option ipaddr '192.168.1.2'
                  option netmask '255.255.255.0'
                  option gateway '192.168.1.1'
                  list dns '192.168.1.1'
          config bridge 'br_lan'
                  option name 'br-lan'
                  list ports 'eth0'
          EOF

          cat > files/etc/config/dhcp << EOF
          config dnsmasq
                  option authoritative '1'
                  option localservice '1'
          config dhcp 'lan'
                  option ignore '1'
          EOF

          make defconfig

      - name: Compile
        run: |
          cd openwrt
          make -j$(($(nproc)/2)) || make -j1 V=s

      - name: Copy rootfs
        run: |
          find openwrt/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;

      # ===================== OPHUB 核心打包：自动添加WiFi+EMMC =====================
      - name: Make N1 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d        # N1 专用
          openwrt_kernel: 6.1.y       # 稳定内核（自带WiFi）
          openwrt_ip: 192.168.1.2
          auto_kernel: true           # 自动匹配内核
          add_amlogic: true           # 集成EMMC脚本

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-23.05-N1
          path: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
          retention-days: 30

  # 2. 编译 LEDE (coolsnowwolf) 版
  lede:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - name: Clone LEDE
        run: git clone https://github.com/coolsnowwolf/lede
      - name: Config
        run: |
          cd lede
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cat > .config << EOF
          CONFIG_TARGET_armsr=y
          CONFIG_TARGET_armsr_armv8=y
          CONFIG_TARGET_armsr_armv8_DEVICE_generic=y
          CONFIG_TARGET_BOARD="armsr"
          CONFIG_TARGET_SUBTARGET="armv8"
          CONFIG_TARGET_PROFILE="DEVICE_generic"
          CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"
          CONFIG_ARCH_arm64=y
          CONFIG_64BIT=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad-mini=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_kmod-bridge=y
          EOF

          mkdir -p files/etc/config
          cat > files/etc/config/network << EOF
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
          config interface 'lan'
                  option device 'br-lan'
                  option proto 'static'
                  option ipaddr '192.168.1.2'
                  option netmask '255.255.255.0'
                  option gateway '192.168.1.1'
                  list dns '192.168.1.1'
          config bridge 'br_lan'
                  option name 'br-lan'
                  list ports 'eth0'
          EOF

          cat > files/etc/config/dhcp << EOF
          config dnsmasq
                  option authoritative '1'
          config dhcp 'lan'
                  option ignore '1'
          EOF

          make defconfig

      - name: Compile
        run: |
          cd lede
          make -j$(($(nproc)/2)) || make -j1 V=s

      - name: Copy rootfs
        run: find lede/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;

      # OPHUB 打包
      - name: Make N1 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 6.1.y
          openwrt_ip: 192.168.1.2
          auto_kernel: true
          add_amlogic: true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LEDE-N1
          path: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
          retention-days: 30
