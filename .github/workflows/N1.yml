#============================================================================================
# 斐讯 N1 专用 · 带WiFi + EMMC一键写入 · OpenWrt编译脚本
# 基于 ophub/amlogic-s9xxx-openwrt 官方脚本优化
#============================================================================================

name: Build Phicomm N1

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "选择源码分支"
        required: true
        default: "lede_master"
        type: choice
        options:
          - openwrt_main    # 官方OpenWrt
          - lede_master     # Lean LEDE（推荐）
          - immortalwrt_master  # 不死云
      openwrt_kernel:
        description: "选择内核版本"
        required: true
        default: "6.6.y"
        type: choice
        options:
          - 6.1.y    # 稳定版
          - 6.6.y    # 推荐（WiFi兼容性最好）
          - 6.12.y
      auto_kernel:
        description: "自动使用最新内核"
        required: false
        default: true
        type: boolean
      openwrt_ip:
        description: "固件默认IP"
        required: false
        default: "192.168.1.2"

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 初始化编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev git wget curl rsync
          sudo swapoff -a
          sudo rm -f /swapfile

      - name: 克隆源码
        working-directory: /home/runner
        run: |
          if [[ "${{ inputs.source_branch }}" == "openwrt_main" ]]; then
              git clone https://github.com/openwrt/openwrt -b main openwrt
          elif [[ "${{ inputs.source_branch }}" == "lede_master" ]]; then
              git clone https://github.com/coolsnowwolf/lede openwrt
          elif [[ "${{ inputs.source_branch }}" == "immortalwrt_master" ]]; then
              git clone https://github.com/immortalwrt/immortalwrt -b master openwrt
          fi

      - name: 更新&安装软件源
        working-directory: /home/runner/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 基础配置（ARM64 + 后台）
        working-directory: /home/runner/openwrt
        run: |
          cat > .config << EOF
          CONFIG_TARGET_armsr=y
          CONFIG_TARGET_armsr_armv8=y
          CONFIG_TARGET_armsr_armv8_DEVICE_generic=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad-mini=y
          CONFIG_PACKAGE_iw=y
          EOF
          make defconfig

      - name: 下载依赖包
        working-directory: /home/runner/openwrt
        run: make download -j8

      - name: 编译OpenWrt源码
        working-directory: /home/runner/openwrt
        run: make -j$(nproc) || make -j1 V=s

      - name: 提取rootfs.tar.gz
        working-directory: /home/runner/openwrt
        run: |
          mkdir -p output
          cp bin/targets/armsr/armv8/*rootfs.tar.gz output/

      # ===================== 核心：ophub 打包N1固件（自动加WiFi+EMMC） =====================
      - name: 打包N1专用固件
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: /home/runner/openwrt/output/*rootfs.tar.gz
          openwrt_board: s905d        # 锁定斐讯N1
          openwrt_ip: ${{ inputs.openwrt_ip }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          add_amlogic: true           # 强制集成EMMC安装脚本

      # ===================== 上传最终固件 =====================
      - name: 上传N1固件
        uses: actions/upload-artifact@v4
        with:
          name: Phicomm-N1-Firmware
          path: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
          retention-days: 30
