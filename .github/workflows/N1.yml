name: Build Phicomm N1 Firmware
on:
  workflow_dispatch:

jobs:
  ophub:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget unzip bzip2 python3
      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Build config
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_armsr=y
          CONFIG_TARGET_armsr_armv8=y
          CONFIG_TARGET_armsr_armv8_DEVICE_generic=y
          CONFIG_TARGET_BOARD="armsr"
          CONFIG_TARGET_SUBTARGET="armv8"
          CONFIG_TARGET_PROFILE="DEVICE_generic"
          CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"
          CONFIG_ARCH_arm64=y
          CONFIG_64BIT=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          CONFIG_PACKAGE_kmod-brcmfmac=y
          CONFIG_PACKAGE_brcmfmac-firmware-43455-sdio=y
          CONFIG_PACKAGE_brcmfmac-firmware-43430-sdio=y
          CONFIG_PACKAGE_wireless-tools=y
          CONFIG_PACKAGE_wpa-supplicant=y
          CONFIG_PACKAGE_iw=y
EOF
      - name: Verify Config
        run: |
          cd openwrt
          grep -E "CONFIG_TARGET_armsr|CONFIG_ARCH_arm64|CONFIG_PACKAGE_kmod-brcmfmac" .config
          if grep -q "CONFIG_TARGET_armsr_armv8=y" .config && grep -q "CONFIG_PACKAGE_kmod-brcmfmac=y" .config; then
            echo "✅ Success"
          else
            echo "❌ Failed"
            exit 1
          fi
      - name: Compile
        run: |
          cd openwrt
          make -j$(nproc)
      - name: Check files
        run: |
          ls -lh openwrt/bin/targets/armsr/armv8/
          find openwrt/bin/targets -name "*rootfs.tar.gz"
      - name: Copy rootfs
        run: |
          find openwrt/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;
      - name: Make Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
          auto_kernel: true
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-N1
          path: out/*.img.gz
          retention-days: 30

  lede:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - name: Clone lede
        run: git clone https://github.com/coolsnowwolf/lede
      - name: Config
        run: |
          cd lede
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cat > .config << EOF
          CONFIG_TARGET_armsr=y
          CONFIG_TARGET_armsr_armv8=y
          CONFIG_TARGET_armsr_armv8_DEVICE_generic=y
          CONFIG_TARGET_BOARD="armsr"
          CONFIG_TARGET_SUBTARGET="armv8"
          CONFIG_TARGET_PROFILE="DEVICE_generic"
          CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"
          CONFIG_ARCH_arm64=y
          CONFIG_64BIT=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          CONFIG_PACKAGE_kmod-brcmfmac=y
          CONFIG_PACKAGE_brcmfmac-firmware-43455-sdio=y
          CONFIG_PACKAGE_brcmfmac-firmware-43430-sdio=y
          CONFIG_PACKAGE_wireless-tools=y
          CONFIG_PACKAGE_wpa-supplicant=y
          CONFIG_PACKAGE_iw=y
EOF
      - name: Verify Config
        run: |
          cd lede
          grep -E "CONFIG_TARGET_armsr|CONFIG_PACKAGE_kmod-brcmfmac" .config
          if grep -q "CONFIG_TARGET_armsr_armv8=y" .config && grep -q "CONFIG_PACKAGE_kmod-brcmfmac=y" .config; then
            echo "✅ Success"
          else
            echo "❌ Failed"
            exit 1
          fi
      - name: Compile
        run: |
          cd lede
          make -j$(nproc)
      - name: Copy rootfs
        run: find lede/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;
      - name: Build Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Lede-N1
          path: out/*.img.gz

  official:
