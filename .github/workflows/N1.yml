          CONFIG_TARGET_ROOTFS_PARTSIZE=800
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_wpad=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_htop=y
          EOF
          make oldconfig

      - name: Compile
        run: |
          make -j$(nproc)

      - name: Check bin targets
        run: |
          ls -lh lede/bin/targets/
          find lede/bin/targets -name "*rootfs.tar.gz"

      - name: Copy rootfs
        run: |
          find lede/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;

      - name: Make N1 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Lede-N1
          path: out/*.img.gz
          retention-days: 30

  official:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential libncurses-dev git

      - name: Clone OpenWrt
        run: git clone https://github.com/openwrt/openwrt -b openwrt-23.05

      - name: Build config
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=800
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_wpad=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_htop=y
          EOF
          make oldconfig

      - name: Compile
        run: |
          make -j$(nproc)

      - name: Check bin targets
        run: |
          ls -lh openwrt/bin/targets/
          find openwrt/bin/targets -name "*rootfs.tar.gz"

      - name: Copy rootfs
        run: |
          find openwrt/bin/targets -name "*rootfs.tar.gz" -exec cp {} $GITHUB_WORKSPACE/rootfs.tar.gz \;

      - name: Make N1 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
