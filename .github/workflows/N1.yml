name: Phicomm N1

on:
  workflow_dispatch:
    inputs:
      openwrt_ip:
        description: "Router LAN IP"
        required: false
        default: "192.168.1.2"
      openwrt_kernel:
        description: "Kernel version"
        required: false
        default: "6.6.y"
        type: choice
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare source and minimal config
        id: prepare
        run: |
          REPO_URL="https://github.com/coolsnowwolf/lede"
          SOURCE_DIR="openwrt"
          git clone --depth 1 "${REPO_URL}" "${SOURCE_DIR}"

          cat > "${SOURCE_DIR}"/.config << EOF
          CONFIG_TARGET_amlogic=y
          CONFIG_TARGET_amlogic_mesongx=y
          CONFIG_TARGET_amlogic_mesongx_DEVICE_phicomm_n1=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_DEVEL=y
          CONFIG_CCACHE=n
          CONFIG_PACKAGE_TAR_GZIP=y

          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-nft-fullcone=y

          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_jq=y
          CONFIG_PACKAGE_ethtool=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-theme-argon=y

          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-commands=y
          CONFIG_PACKAGE_luci-app-cpufreq=y
          CONFIG_PACKAGE_luci-app-hd-idle=y

          CONFIG_PACKAGE_perl=y
          CONFIG_PACKAGE_perlbase-essential=y
          CONFIG_PACKAGE_perlbase-utf8=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_blkid=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_kmod-mmc=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_dosfstools=y
          CONFIG_PACKAGE_attr=y
          CONFIG_PACKAGE_losetup=y
          CONFIG_PACKAGE_uuidgen=y
          CONFIG_PACKAGE_tar=y
          CONFIG_PACKAGE_gawk=y
          CONFIG_PACKAGE_getopt=y
          CONFIG_PACKAGE_pigz=y
          CONFIG_PACKAGE_bsdtar=y

          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-hid=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-core=y

          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y

          CONFIG_PACKAGE_kmod-brcmfmac=y
          CONFIG_BRCMFMAC_SDIO=y
          CONFIG_PACKAGE_kmod-brcmutil=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_brcmfmac-firmware-43455-sdio-phicomm-n1=y
          CONFIG_PACKAGE_wpad-openssl=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_wireless-regdb=y

          # CONFIG_PACKAGE_docker is not set
          # CONFIG_PACKAGE_luci-app-dockerman is not set
          # CONFIG_PACKAGE_luci-app-passwall is not set
          # CONFIG_PACKAGE_luci-app-openclash is not set
          # CONFIG_PACKAGE_luci-app-v2raya is not set
          # CONFIG_PACKAGE_luci-app-nikki is not set
          # CONFIG_PACKAGE_luci-app-mosdns is not set
          # CONFIG_PACKAGE_luci-app-ddns is not set
          # CONFIG_PACKAGE_luci-app-samba4 is not set
          # CONFIG_PACKAGE_luci-app-vsftpd is not set
          # CONFIG_PACKAGE_wol is not set
          # CONFIG_PACKAGE_luci-app-wol is not set
          # CONFIG_PACKAGE_nlbwmon is not set
          # CONFIG_PACKAGE_luci-app-nlbwmon is not set
          EOF

          cd "${SOURCE_DIR}"
          make defconfig
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Build firmware
        id: build
        run: |
          SOURCE_DIR="openwrt"
          cd "${SOURCE_DIR}"
          make download -j8
          make -j$(nproc) || make -j1 V=s
          if [ $? -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload artifacts
        if: steps.build.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: N1-LEDE-Minimal-${{ github.run_id }}
          path: |
            openwrt/bin/targets/amlogic/mesongx/*.img.gz
            openwrt/bin/targets/amlogic/mesongx/*.tar.gz
          retention-days: 30
