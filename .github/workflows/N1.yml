name: Build N1
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: stupidlabs/oneclick-openwrt@main
        env:
          REPO_URL: https://github.com/openwrt/openwrt
          REPO_BRANCH: openwrt-23.05
          CONFIG_FILE: .config
          TZ: Asia/Shanghai
          EXTRA_SH: |
            echo "CONFIG_TARGET_armvirt=y
            CONFIG_TARGET_armvirt_64=y
            CONFIG_TARGET_armvirt_64_Default=y
            CONFIG_PACKAGE_luci=y
            CONFIG_PACKAGE_luci-base=y
            CONFIG_PACKAGE_luci-mod-network=y
            CONFIG_PACKAGE_luci-mod-wireless=y
            CONFIG_PACKAGE_kmod-mt76=y
            CONFIG_PACKAGE_hostapd=y
            CONFIG_PACKAGE_wpad=y
            CONFIG_PACKAGE_bridge=y" >> .config
            sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
            sed -i 's/OpenWrt/N1-Breed-AP/g' package/base-files/files/bin/config_generate
            uci -d batch << EOF
            set dhcp.lan.ignore=1
            commit dhcp
            set wireless.radio0.country='CN'
            set wireless.radio0.disabled='0'
            set wireless.default_radio0.ssid='N1-Breed-AP'
            set wireless.default_radio0.encryption='none'
            set wireless.radio1.country='CN'
            set wireless.radio1.disabled='0'
            set wireless.default_radio1.ssid='N1-Breed-AP-5G'
            set wireless.default_radio1.encryption='none'
            commit wireless
            EOF
      - name: Upload
        uses: softprops/action-gh-release@v2
        if: ${{ !cancelled() }}
        with:
          name: N1-Firmware
          tag: ${{ env.DATE }}
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
