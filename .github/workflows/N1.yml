name: Build N1
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget unzip bzip2 python3 python3-pip
      - name: Clone source
        run: |
          git clone --depth=1 https://github.com/ophub/amlogic-s9xxx-openwrt.git openwrt
          cd openwrt
          mkdir -p config-files
      - name: Config
        run: |
          cd openwrt
          cat > config-files/custom.conf << EOF
          TARGET_DEVICE="s905d"
          KERNEL_VERSION="5.15"
          TARGET_PROFILE="armvirt-64"
          OPENWRT_VER="openwrt-23.05"
          EOF
          cat > config-files/99-custom-settings << EOF
          uci set system.@system[0].hostname=N1-AP
          uci set network.lan.ipaddr=192.168.1.2
          uci set dhcp.lan.ignore=1
          uci set wireless.radio0.disabled=0
          uci set wireless.default_radio0.ssid=N1-Breed-AP
          uci set wireless.default_radio0.encryption=none
          uci set wireless.radio1.disabled=0
          uci set wireless.default_radio1.ssid=N1-Breed-AP-5G
          uci set wireless.default_radio1.encryption=none
          uci commit
          EOF
      - name: Compile
        run: |
          cd openwrt
          chmod +x build.sh
          bash build.sh -d s905d -v 5.15 -j2
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: N1-Breed-AP
          tag_name: ${{ github.run_id }}
          draft: false
          prerelease: false
          files: openwrt/output/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
