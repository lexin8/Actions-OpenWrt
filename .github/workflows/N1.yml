name: Build N1
on:
  workflow_dispatch:

jobs:
  ophub:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget unzip bzip2 python3 python3-pip

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Config
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          CONFIG_PACKAGE_hostapd=y
          CONFIG_PACKAGE_kmod-mt76=y
          EOF
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          sed -i '/exit 0/i uci set dhcp.lan.ignore=1 && uci commit dhcp' package/base-files/files/etc/rc.local
          sed -i '/exit 0/i uci set wireless.radio0.disabled=0 && uci set wireless.default_radio0.ssid=N1-Breed-AP && uci set wireless.default_radio0.encryption=none && uci set wireless.radio1.disabled=0 && uci set wireless.default_radio1.ssid=N1-Breed-AP-5G && uci set wireless.default_radio1.encryption=none && uci commit wireless' package/base-files/files/etc/rc.local

      - name: Compile
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc)

      - name: Find rootfs firmware
        run: |
          ROOTFS_FILE=$(find $GITHUB_WORKSPACE/openwrt/bin/targets -name "*rootfs.tar.gz" | head -n 1)
          mkdir -p $GITHUB_WORKSPACE/openwrt/bin/targets/armvirt/64/
          cp -f $ROOTFS_FILE $GITHUB_WORKSPACE/openwrt/bin/targets/armvirt/64/
          echo "Found firmware: $ROOTFS_FILE"

      - name: Make OpenWrt
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          mode: ophub
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
          auto_kernel: true
          openwrt_path: openwrt/bin/targets/armvirt/64/*rootfs.tar.gz
          kernel_repo: ophub/kernel
          kernel_usage: stable

      - name: Compress squashfs firmware
        run: |
          find $GITHUB_WORKSPACE -name "*.img" -exec gzip {} \;

      - name: Upload compressed firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ophub-n1
          path: out/*.img.gz
          retention-days: 30

  lede:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - run: git clone https://github.com/coolsnowwolf/lede
      - run: |
          cd lede
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          EOF
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig
          make -j$(nproc)
      - name: Compress squashfs firmware
        run: |
          cd lede
          for firmware_file in bin/targets/*/*/*squashfs*; do
            [ -f "${firmware_file}" ] && gzip "${firmware_file}"
          done
      - name: Upload compressed firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-lede-n1
          path: lede/bin/targets/*/*/*squashfs*.gz
          retention-days: 30

  official:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - run: git clone https://github.com/openwrt/openwrt -b openwrt-23.05
      - run: |
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          EOF
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig
          make -j$(nproc)
      - name: Compress squashfs firmware
        run: |
          cd openwrt
          for firmware_file in bin/targets/*/*/*squashfs*; do
            [ -f "${firmware_file}" ] && gzip "${firmware_file}"
          done
      - name: Upload compressed firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-official-n1
          path: openwrt/bin/targets/*/*/*squashfs*.gz
          retention-days: 30
