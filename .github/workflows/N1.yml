name: Build N1
on:
  workflow_dispatch:
jobs:
  ophub:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y git wget
      - run: git clone https://github.com/ophub/flippy-openwrt-actions
      - run: |
          cd flippy-openwrt-actions
          wget -q https://github.com/ophub/amlogic-s9xxx-openwrt/releases/download/openwrt_armvirt/openwrt-armvirt-64-default.rootfs.tar.gz
          ./make -s s905d -k 6.1 -f openwrt-armvirt-64-default.rootfs.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          name: N1-Firmware
          tag: ${{ github.run_id }}
          files: flippy-openwrt-actions/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lede:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - run: git clone https://github.com/coolsnowwolf/lede
      - run: |
          cd lede
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y" > .config
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig
          make -j$(nproc)
      - uses: softprops/action-gh-release@v2
        with:
          name: N1-Firmware
          tag: ${{ github.run_id }}
          files: lede/bin/targets/armvirt/64/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  official:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - run: git clone https://github.com/openwrt/openwrt -b openwrt-23.05
      - run: |
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y" > .config
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig
          make -j$(nproc)
      - uses: softprops/action-gh-release@v2
        with:
          name: N1-Firmware
          tag: ${{ github.run_id }}
          files: openwrt/bin/targets/armvirt/64/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
