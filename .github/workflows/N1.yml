name: Build N1
on:
  workflow_dispatch:
jobs:
  ophub:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y curl git wget
      - run: git clone https://github.com/ophub/amlogic-s9xxx-openwrt
      - run: |
          cd amlogic-s9xxx-openwrt
          chmod +x scripts/*.sh
          ./scripts/compile.sh -g s905d -k 6.1
      - uses: softprops/action-gh-release@v2
        with:
          name: N1-Firmware
          tag: ${{ github.run_id }}
          files: amlogic-s9xxx-openwrt/out/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  lede:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - run: git clone https://github.com/coolsnowwolf/lede
      - run: |
          cd lede
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo -e "CONFIG_TARGET_armvirt=y\nCONFIG_TARGET_armvirt_64=y\nCONFIG_TARGET_armvirt_64_Default=y\nCONFIG_PACKAGE_luci=y\nCONFIG_PACKAGE_wpad=y" > .config
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig && make -j$(nproc)
      - uses: softprops/action-gh-release@v2
        with:
          name: N1-Firmware
          tag: ${{ github.run_id }}
          files: lede/bin/targets/armvirt/64/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  official:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - run: git clone https://github.com/openwrt/openwrt -b openwrt-23.05
      - run: |
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo -e "CONFIG_TARGET_armvirt=y\nCONFIG_TARGET_armvirt_64=y\nCONFIG_TARGET_armvirt_64_Default=y\nCONFIG_PACKAGE_luci=y\nCONFIG_PACKAGE_wpad=y" > .config
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig && make -j$(nproc)
      - run: |
          git clone https://github.com/ophub/amlogic-s9xxx-openwrt pack
          cp openwrt/bin/targets/armvirt/64/*.img.gz pack/images/
          cd pack && chmod +x scripts/*.sh
          ./scripts/compile.sh -g s905d -k 6.1
      - uses: softprops/action-gh-release@v2
        with:
          name: N1-Firmware
          tag: ${{ github.run_id }}
          files: pack/out/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
