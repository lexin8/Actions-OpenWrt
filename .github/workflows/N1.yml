name: Build Newifi D2 (5.4 Kernel)
on:
  workflow_dispatch:  # 仅手动触发
jobs:
  build-lede:
    runs-on: ubuntu-22.04
    env:
      OPENWRT_DIR: openwrt  # 统一定义源码目录
      TARGET_PROFILE: d-team_newifi-d2
      KERNEL_VERSION: 5.4   # 内核版本常量

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ========== 优化1：缓存依赖，加速编译 ==========
      - name: Cache OpenWrt Resources
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.OPENWRT_DIR }}/dl
            ${{ env.OPENWRT_DIR }}/feeds
            /usr/local/lib/python3.10/site-packages
          key: ${{ runner.os }}-openwrt-${{ env.KERNEL_VERSION }}-${{ hashFiles('**/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.KERNEL_VERSION }}-

      # ========== 优化2：完善依赖安装（适配Ubuntu 22.04） ==========
      - name: Install Build Dependencies
        run: |
          sudo apt update -y && sudo apt full-upgrade -y
          # 精简+补齐依赖（移除冗余，补充5.4内核编译必需项）
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip wget xmlto xxd zlib1g-dev \
            linux-headers-$(uname -r)  # 补充内核头文件（5.4编译必需）
          # 清理缓存，释放空间
          sudo apt autoremove -y && sudo apt clean -y

      # ========== 核心修复：克隆源码+强制指定5.4内核 ==========
      - name: Clone Lean LEDE & Set 5.4 Kernel
        run: |
          # 移除--depth 1（避免子模块缺失导致编译失败）
          git clone https://github.com/coolsnowwolf/lede ${{ env.OPENWRT_DIR }}
          cd ${{ env.OPENWRT_DIR }}
          # 关键：修改ramips架构的内核版本为5.4（覆盖默认的5.10/5.15）
          sed -i 's/^KERNEL_PATCHVER := .*/KERNEL_PATCHVER := ${{ env.KERNEL_VERSION }}/' target/linux/ramips/Makefile
          sed -i 's/^KERNEL_TESTING_PATCHVER := .*/KERNEL_TESTING_PATCHVER := ${{ env.KERNEL_VERSION }}/' target/linux/ramips/Makefile
          # 更新并安装feeds（确保驱动包完整）
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 可选：克隆自定义插件（如有需要）
          # git clone https://github.com/nikkinikki-org/OpenWrt-nikki.git package/luci-app-nikki/

      # ========== 优化3：生成配置（修复内核版本+驱动冲突） ==========
      - name: Generate .config for Newifi D2
        run: |
          cd ${{ env.OPENWRT_DIR }}
          cat > .config << EOF
          # 基础架构配置
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_${{ env.TARGET_PROFILE }}=y
          
          # 强制绑定5.4内核（配合Makefile修改，双重保障）
          CONFIG_KERNEL_PATCHVER="${{ env.KERNEL_VERSION }}"
          CONFIG_LINUX_VERSION_5_4=y
          
          # ==================== 闭源MTK WiFi驱动（5.4内核适配） ====================
          CONFIG_PACKAGE_kmod-mt76x2e=y        # MT7612E (2.4G/5G)
          CONFIG_PACKAGE_kmod-mt7615e=y        # MT7615D (5G满血)
          CONFIG_PACKAGE_luci-app-mtwifi=y     # WiFi管理界面
          CONFIG_DRIVER_11AC_SUPPORT=y         # 开启11ac支持
          CONFIG_DRIVER_11N_SUPPORT=y          # 开启11n支持
          
          # ==================== 必须关闭开源驱动（避免冲突） ====================
          CONFIG_PACKAGE_kmod-mt76=n
          CONFIG_PACKAGE_kmod-mt7603=n
          CONFIG_PACKAGE_kmod-mt76x2=n
          CONFIG_PACKAGE_wpad-openssl=n
          CONFIG_PACKAGE_hostapd-common=n
          CONFIG_PACKAGE_wpad-basic=n
          CONFIG_PACKAGE_wpad=n
          
          # ==================== 网络功能（L2TP/IPsec） ====================
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y
          CONFIG_PACKAGE_kmod-ppp=y
          CONFIG_PACKAGE_kmod-l2tp=y
          CONFIG_PACKAGE_kmod-pppol2tp=y
          CONFIG_PACKAGE_kmod-udptunnel4=y
          CONFIG_PACKAGE_luci-proto-l2tp=y
          CONFIG_PACKAGE_luci-proto-ipsec=y
          
          # ==================== 常用插件 ====================
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          
          # ==================== 关闭无用插件（节省空间） ====================
          CONFIG_PACKAGE_luci-app-accesscontrol=n
          CONFIG_PACKAGE_luci-app-nlbwmon=n
          CONFIG_PACKAGE_luci-app-rclone=n
          CONFIG_PACKAGE_luci-app-upnp=n
          CONFIG_PACKAGE_luci-app-vlmcsd=n
          CONFIG_PACKAGE_luci-app-vsftpd=n
          CONFIG_PACKAGE_luci-app-wol=n
          CONFIG_PACKAGE_luci-app-autoreboot=n
          EOF
          
          # 生成最终配置（自动补全依赖）
          make defconfig

      # ========== 优化4：检查配置（便于调试） ==========
      - name: List luci-app status
        run: |
          cd openwrt
          echo -e "\n=================================================="
          echo -e "luci-app plugins"
          echo -e "==================================================\n"
          if [ -f .config ]; then
            grep -E '^(CONFIG_PACKAGE_luci-app-.*=|# CONFIG_PACKAGE_luci-app-.* is not set)' .config | sort | while read -r line; do
              if echo "$line" | grep -q '=y\|=m'; then
                name=$(echo "$line" | sed -e 's/^CONFIG_PACKAGE_//' -e 's/=[ym]$//')
                echo " ✔️ $name"
              else
                name=$(echo "$line" | sed -e 's/^# CONFIG_PACKAGE_//' -e 's/ is not set$//')
                echo " ❌ $name"
              fi
            done
          else
            echo " no .config"
          fi
          echo -e "==================================================\n"

      # ========== 优化5：下载依赖（多线程+断点续传） ==========
      - name: Download Build Dependencies
        run: |
          cd ${{ env.OPENWRT_DIR }}
          make download -j$(nproc)
          # 检查缺失的依赖（便于排查）
          find dl -size 0 -name "*.dl" -delete  # 删除空文件
          ls -lh dl/ | wc -l

      # ========== 核心编译：先多线程，失败后单线程排错 ==========
      - name: Compile Firmware
        run: |
          cd ${{ env.OPENWRT_DIR }}
          # GitHub Actions默认2核，限制线程数避免OOM
          make -j2 || make -j1 V=s  # 失败后单线程输出详细日志
          # 检查编译产物
          ls -lh bin/targets/ramips/mt7621/

      # ========== 优化6：上传产物（包含所有bin文件） ==========
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NewifiD2-LEDE-5.4-Kernel-${{ github.run_id }}
          path: |
            ${{ env.OPENWRT_DIR }}/bin/targets/ramips/mt7621/*.bin
            ${{ env.OPENWRT_DIR }}/bin/targets/ramips/mt7621/*.manifest  # 附带包清单
          retention-days: 30  # 产物保留30天
