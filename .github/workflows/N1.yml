name: Build N1
on:
  workflow_dispatch:

jobs:
  ophub:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget unzip bzip2 python3 python3-pip

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Config
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          CONFIG_PACKAGE_hostapd=y
          CONFIG_PACKAGE_kmod-mt76=y
          EOF
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          sed -i '/exit 0/i uci set dhcp.lan.ignore=1 && uci commit dhcp' package/base-files/files/etc/rc.local
          sed -i '/exit 0/i uci set wireless.radio0.disabled=0 && uci set wireless.default_radio0.ssid=N1-Breed-AP && uci set wireless.default_radio0.encryption=none && uci set wireless.radio1.disabled=0 && uci set wireless.default_radio1.ssid=N1-Breed-AP-5G && uci set wireless.default_radio1.encryption=none && uci commit wireless' package/base-files/files/etc/rc.local

      - name: Compile
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc)

      # 编译完成后：递归检索 openwrt/bin 目录所有文件（调试用）
      - name: List all files in openwrt/bin
        run: |
          echo "=== 编译输出文件目录结构 ==="
          ls -lhR openwrt/bin/
          echo "=== 检索 rootfs.tar.gz ==="
          find openwrt/bin -name "*rootfs.tar.gz"

      # 自动搜索并复制rootfs到固定路径
      - name: Find & Copy rootfs
        run: |
          find ${GITHUB_WORKSPACE}/openwrt/bin -name "*rootfs.tar.gz" -exec cp {} ${GITHUB_WORKSPACE}/rootfs.tar.gz \;

      - name: Make OpenWrt
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
          auto_kernel: true

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ophub-n1
          path: out/*.img.gz
          retention-days: 30

  lede:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - name: Clone lede
        run: git clone https://github.com/coolsnowwolf/lede
      - name: Config & Compile
        run: |
          cd lede
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          EOF
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig
          make -j$(nproc)
      
      # 检索lede/bin目录文件
      - name: List all files in lede/bin
        run: |
          ls -lhR lede/bin/
          find lede/bin -name "*rootfs.tar.gz"
      
      - name: Find & Copy rootfs
        run: find ${GITHUB_WORKSPACE}/lede/bin -name "*rootfs.tar.gz" -exec cp {} ${GITHUB_WORKSPACE}/rootfs.tar.gz \;
      - name: Package N1 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-lede-n1
          path: out/*.img.gz
          retention-days: 30

  official:
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential libncurses-dev git
      - name: Clone official
        run: git clone https://github.com/openwrt/openwrt -b openwrt-23.05
      - name: Config & Compile
        run: |
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_wpad=y
          EOF
          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          make defconfig
          make -j$(nproc)
      
      # 检索official/bin目录文件
      - name: List all files in openwrt/bin
        run: |
          ls -lhR openwrt/bin/
          find openwrt/bin -name "*rootfs.tar.gz"
      
      - name: Find & Copy rootfs
        run: find ${GITHUB_WORKSPACE}/openwrt/bin -name "*rootfs.tar.gz" -exec cp {} ${GITHUB_WORKSPACE}/rootfs.tar.gz \;
      - name: Package N1 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ github.workspace }}/rootfs.tar.gz
          openwrt_board: s905d
          openwrt_kernel: 5.15.y
          openwrt_ip: 192.168.1.2
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-official-n1
          path: out/*.img.gz
          retention-days: 30
