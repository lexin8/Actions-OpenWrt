name: Build Ophub Amlogic OpenWRT (N1/S905d)

# 手动触发编译（推荐），也可添加 push 触发（需注释掉 workflow_dispatch）
on:
  workflow_dispatch:

# 运行环境
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 1. 拉取GitHub仓库（含通用配置）
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 安装基础依赖
      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
              gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
              file wget curl swig libpcap-dev libelf-dev libpcre2-dev autoconf automake libtool \
              autopoint device-tree-compiler libncursesw5-dev pkg-config patchutils kmod \
              bc cpio liblzma-dev libz-dev lzop mkisofs squashfs-tools xsltproc zip time

      # 3. 克隆ophub源码（已修复报错）
      - name: Clone Ophub OpenWRT Source
        run: |
          git clone --depth=1 https://github.com/ophub/amlogic-s9xxx-openwrt.git ophub-n1
          cd ophub-n1
          # 自动创建配置文件夹，解决报错
          mkdir -p config-files
          # 配置N1编译参数
          cat > config-files/custom.conf << EOF
          TARGET_DEVICE="s905d"
          KERNEL_VERSION="5.15"
          TARGET_PROFILE="armvirt-64"
          OPENWRT_VER="latest"
          EOF

      # 4. 开始编译（调整线程为2，适配GitHub Actions 2核环境）
      - name: Compile OpenWRT
        run: |
          cd ophub-n1
          chmod +x compile-openwrt.sh
          bash compile-openwrt.sh -d s905d -v 5.15 -j2

      # 5. 上传固件到GitHub Artifacts（方便下载）
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ophub-openwrt-n1-firmware
          path: ophub-n1/output/
          retention-days: 90  # 固件保留90天
