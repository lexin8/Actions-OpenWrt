name: Build ImmortalWrt 24.10 Firmware

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 20 * * 6'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ImmortalWrt Firmware
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: 初始化编译环境
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils python3-setuptools rsync unzip zlib1g-dev file wget

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt

      - name: 更新 feeds（保留默认源，追加 Nikki）
        run: |
          cd openwrt
          
          # ImmortalWrt 默认的 feeds.conf.default 已经包含官方源
          # 我们只需要在文件末尾追加 Nikki 源
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          
          # 查看最终结果（可选）
          cat feeds.conf.default
          
          # 更新所有 feeds
          ./scripts/feeds update -a

      - name: 安装所有需要的包
        run: |
          cd openwrt
          
          # 安装所有需要的包（这些在 ImmortalWrt 官方源中都有）
          ./scripts/feeds install \
            softethervpn softethervpn5 \
            luci-app-softethervpn \
            strongswan strongswan-swanctl swanmon \
            luci-app-strongswan-swanctl \
            ddns-scripts luci-app-ddns \
            luci-app-udpxy \
            openssl readline ncurses zlib \
            sing-box golang \
            homeproxy luci-app-homeproxy
          
          # 单独安装 Nikki（来自刚刚追加的第三方源）
          ./scripts/feeds install nikki
          ./scripts/feeds install luci-app-nikki
          ./scripts/feeds install luci-i18n-nikki-zh-cn

      - name: 生成配置文件
        run: |
          cd openwrt
          
          # 生成默认配置作为基础
          make defconfig
          
          # 写入你的完整配置
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=600
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y

          # 内核特性
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_NETFILTER_XT_MATCH_POLICY=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_PPP_ASYNC=y
          CONFIG_KERNEL_PPP_SYNC_TTY=y
          CONFIG_KERNEL_PPP_L2TP=y
          CONFIG_KERNEL_TUN=y
          CONFIG_KERNEL_BRIDGE_NETFILTER=y

          # 基础包
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y

          # 基础库
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y

          # SoftEther VPN
          CONFIG_PACKAGE_softethervpn=y
          CONFIG_PACKAGE_softethervpn5=y
          CONFIG_PACKAGE_luci-app-softethervpn=y

          # StrongSwan
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-swanctl=y
          CONFIG_PACKAGE_swanmon=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-nonce=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-gmp=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-vici=y

          # HomeProxy / Sing-Box
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y

          # Nikki (来自第三方源)
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y

          # 禁用不需要的插件
          # CONFIG_PACKAGE_luci-app-arpbind is not set
          # CONFIG_PACKAGE_luci-app-autoreboot is not set
          # CONFIG_PACKAGE_luci-app-nlbwmon is not set
          # CONFIG_PACKAGE_luci-app-samba4 is not set
          # CONFIG_PACKAGE_luci-app-vlmcsd is not set
          # CONFIG_PACKAGE_luci-app-wol is not set
          EOF

      - name: 下载预编译的软件包
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
          
      - name: 整理固件文件
        run: |
          cd openwrt/bin/targets/x86/64
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "编译完成的固件在: $PWD"

      - name: 上传固件作为工件
        uses: actions/upload-artifact@main
        with:
          name: ImmortalWrt-x86-64-Firmware
          path: openwrt/bin/targets/x86/64/*.img.gz
          if-no-files-found: warn
