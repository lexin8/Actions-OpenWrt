name: fanchmwrt2

on:
  repository_dispatch:
  watch:
    types: started
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

jobs:
  Build:
    runs-on: ubuntu-22.04
    continue-on-error: false

    steps:
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update && sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get -y autoremove --purge && sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone Source Code
        id: clone
        run: |
          echo "OPENWRT_DIR=/home/runner/work/openwrt" >> $GITHUB_ENV
          mkdir -p ${{ env.OPENWRT_DIR }}
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL ${{ env.OPENWRT_DIR }}
          echo "源码克隆完成，目录：${{ env.OPENWRT_DIR }}"
          ls -la ${{ env.OPENWRT_DIR }}

      - name: Install Feeds
        run: |
          cd ${{ env.OPENWRT_DIR }}
          ./scripts/feeds update -a && ./scripts/feeds install -a
          ls -la ${{ env.OPENWRT_DIR }}/feeds/

      - name: SSH Connection (Debug)
        uses: P3TERX/ssh2actions@v1.0.0
        if: ${{ (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh') }}
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Generate Build Configuration
        run: |
          cd ${{ env.OPENWRT_DIR }}
          cat > ${{ env.OPENWRT_DIR }}/.config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
          EOF
          make defconfig
          echo "验证.config文件："
          ls -la ${{ env.OPENWRT_DIR }}/.config
          cat ${{ env.OPENWRT_DIR }}/.config | head -20

      - name: Download Dependencies
        run: |
          cd ${{ env.OPENWRT_DIR }}
          make download -j$(nproc) || make download -j1
          find dl -size -1024c -exec rm -f {} \;
          make defconfig

      - name: Upload .config File
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_config_${{ github.run_id }}
          path: ${{ env.OPENWRT_DIR }}/.config  

      - name: Compile Firmware
        run: |
          cd ${{ env.OPENWRT_DIR }}
          make -j$(nproc) || { make -j1 V=s; [ $? -ne 0 ] && exit 1; }

      - name: Package & Upload Firmware
        if: ${{ !cancelled() }}
        run: |
          FIRMWARE_DIR=$(find ${{ env.OPENWRT_DIR }}/bin/targets/x86/64 -type d -name "generic" -print -quit)
          [ -z "$FIRMWARE_DIR" ] && FIRMWARE_DIR=$(find ${{ env.OPENWRT_DIR }}/bin -type d -path "*x86*64*" | head -n1)
          [ -z "$FIRMWARE_DIR" ] && exit 1
          
          cd $FIRMWARE_DIR
          rm -rf packages *root* 2>/dev/null
          FIRMWARE_NAME="OpenWrt_x86-64_$(date +%Y%m%d_%H%M).tar.gz"
          tar czvf $FIRMWARE_NAME *.img.gz *.vmdk *.qcow2 *.iso 2>/dev/null || exit 1
          
          echo "Uploading firmware: $FIRMWARE_NAME"
          mkdir -p /tmp/firmware
          cp $FIRMWARE_NAME /tmp/firmware/
          ls -la /tmp/firmware/

      - name: Upload Firmware Artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware_${{ github.run_id }}
          path: /tmp/firmware/*.tar.gz

      - name: Compilation Failure Alert
        if: ${{ failure() }}
        run: |
          echo "Firmware compilation failed! Check build logs for details."
          ls -la /home/runner/work/
          ls -la ${{ env.OPENWRT_DIR }}
          exit 1
