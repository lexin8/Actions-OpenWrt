name: Generate & Upload x86_64 .config
on:
  workflow_dispatch:  # 仅手动触发，确保配置可控
    inputs:
      custom_config:
        description: '上传自定义.config（可选，不上传则生成默认x86_64配置）'
        required: false
        type: file
      enable_rtl8188eu:
        description: '是否启用rtl8188eu驱动（默认禁用，适配源码补丁逻辑）'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate_x86_64_config:
    runs-on: ubuntu-22.04
    steps:
      # 步骤1：拉取ImmortalWRT源码（24.10分支）
      - name: Checkout ImmortalWRT Source
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: openwrt-24.10
          fetch-depth: 1
          path: immortalwrt

      # 步骤2：安装编译依赖（生成.config必需）
      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install -y build-essential git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev
          cd immortalwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a

      # 步骤3：适配x86_64补丁（禁用rtl8188eu默认编译，或手动启用）
      - name: Patch x86_64 rtl8188eu Driver
        run: |
          cd immortalwrt
          # 适配源码中010-disable-default-build-x86.patch逻辑
          if [ "${{ github.event.inputs.enable_rtl8188eu }}" = "true" ]; then
            # 启用rtl8188eu x86_64编译
            sed -i 's/CONFIG_PLATFORM_I386_PC = n/CONFIG_PLATFORM_I386_PC = y/' package/kernel/rtl8188eu/Makefile
          else
            # 保持禁用（源码默认补丁逻辑）
            sed -i 's/CONFIG_PLATFORM_I386_PC = y/CONFIG_PLATFORM_I386_PC = n/' package/kernel/rtl8188eu/Makefile
          fi

      # 步骤4：生成x86_64默认.config（未上传自定义配置时）
      - name: Generate Default x86_64 .config
        if: ${{ !github.event.inputs.custom_config }}
        run: |
          cd immortalwrt
          # 加载x86_64官方默认配置
          make defconfig TARGET=x86 SUBTARGET=x86_64
          
          # 优化x86_64核心配置（适配源码中x86_64补丁）
          # 1. 启用x86_64 ELF重定位相关（适配darwin_scripts_include.patch）
          ./scripts/config set CONFIG_TARGET_X86_64 y
          ./scripts/config set CONFIG_TARGET_X86_64_GENERIC y
          # 2. 启用x86_64常见硬件驱动
          ./scripts/config set CONFIG_PACKAGE_kmod-e1000e y  # Intel千兆网卡（x86_64主流）
          ./scripts/config set CONFIG_PACKAGE_kmod-igb y
          ./scripts/config set CONFIG_PACKAGE_kmod-usb2 y
          ./scripts/config set CONFIG_PACKAGE_kmod-usb3 y
          # 3. 启用x86_64文件系统
          ./scripts/config set CONFIG_TARGET_ROOTFS_SQUASHFS y
          ./scripts/config set CONFIG_TARGET_ROOTFS_EXT4 y
          # 4. 禁用不必要的x86子架构
          ./scripts/config set CONFIG_TARGET_X86_GENERIC n
          ./scripts/config set CONFIG_TARGET_X86_GEODE n
          ./scripts/config set CONFIG_TARGET_X86_LEGACY n
          
          # 补全配置依赖，确保语法合法
          make olddefconfig
          # 备份x86_64专属.config
          cp .config ../x86_64_default.config

      # 步骤5：使用自定义.config（上传时覆盖）
      - name: Use Custom x86_64 .config
        if: ${{ github.event.inputs.custom_config }}
        run: |
          # 移动自定义配置到源码目录
          mv ${{ github.event.inputs.custom_config }} ./immortalwrt/.config
          cd immortalwrt
          # 补全依赖（仅补全，不修改核心配置）
          make olddefconfig
          cp .config ../x86_64_custom.config

      # 步骤6：上传x86_64 .config（保留90天）
      - name: Upload x86_64 .config
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-config
          path: |
            ./x86_64_*.config
            ./immortalwrt/.config
          retention-days: 90

      # 步骤7：可选：推送.config到仓库（方便后续编译直接使用）
      - name: Push x86_64 .config to Repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 克隆当前仓库
          git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} ./repo
          cd ./repo
          # 复制生成的x86_64 .config
          cp ../immortalwrt/.config ./x86_64.config
          # 提交并推送
          git add ./x86_64.config
          git commit -m "Update x86_64 .config $(date +%Y%m%d_%H%M%S)" || echo "No changes to commit"
          git push
