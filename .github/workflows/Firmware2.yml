name: Build ImmortalWrt 24.10 (Official Spec)

on:
  workflow_dispatch:

env:
  TARGET_ARCH: x86
  TARGET_SUBARCH: 64
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  BUILD_DIR: immortalwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Init build environment (Official Script)
        run: |
          # 官方初始化脚本
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          # 清理空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /tmp/*
          # 创建普通用户（免密码切换）
          sudo useradd -m builduser -s /bin/bash
          sudo chown -R builduser:builduser $GITHUB_WORKSPACE
          # 关键：给 builduser 添加 sudo 免密码权限（避免 su 认证失败）
          echo "builduser ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/builduser

      - name: 2. Clone source code (Official Command)
        run: |
          # 改用 sudo -u 免密码执行，替代 su -
          sudo -u builduser git clone -b ${{ env.REPO_BRANCH }} --single-branch --filter=blob:none ${{ env.REPO_URL }} ${{ env.BUILD_DIR }}
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && ./scripts/feeds update -a && ./scripts/feeds install -a"

      - name: 3. Configure build options
        run: |
          # 配置编译选项（免密码执行）
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && make defconfig"
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-full=y' >> .config"
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_xl2tpd=y' >> .config"
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_ppp=y' >> .config"
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y' >> .config"
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-mod-openssl=y' >> .config"
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-pki=y' >> .config"
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && make defconfig"
          # 打包并上传 .config
          cp ${{ env.BUILD_DIR }}/.config openwrt-config-24.10.config
          tar -zcf openwrt-config-24.10.tar.gz openwrt-config-24.10.config

      - name: 4. Upload .config archive
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config-24.10
          path: openwrt-config-24.10.tar.gz

      - name: 5. Download dependencies
        run: |
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && make download -j1"

      - name: 6. Build firmware (Single thread, Official Spec)
        run: |
          # 编译固件（免密码 + 单线程）
          sudo -u builduser bash -c "cd ${{ env.BUILD_DIR }} && make -j1 V=s 2>&1 | tee build.log"
          ls -lh ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/

      - name: 7. Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ env.BUILD_DIR }}/build.log
        if: always()

      - name: 8. Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-24.10-x86_64-firmware
          path: |
            ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/*.img.gz
            ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/*.tar.gz
            ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/*.manifest
