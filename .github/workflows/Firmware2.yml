name: fanchmwrt2

on:
  repository_dispatch:
  #  schedule:
  #    - cron: 0 20 * * 2,4,6,0
  watch:
    types: started
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'

env:
  # 配置文件相关
  CONFIG_FILE: istoreos.config
  CONFIG_FILE2: fanchmwrt.config
  # DIY脚本相关
  DIY_P1_SH: fanchmwrt.sh
  DIY_P2_SH: diy-part2.sh
  DIY_P3_SH: diy-part3.sh
  # 功能开关
  SSH_ACTIONS: false
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_SOFTETHERVPN: false
  UPLOAD_COWTRANSFER: true
  UPLOAD_RELEASE: true
  UPLOAD_WETRANSFER: false
  # 源码仓库相关
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: openwrt-23.05
  REPO_BRANCH2: openwrt-24.10
  DIY_SCRIPT: diy-script.sh
  # 编译相关
  CLASH_KERNEL: amd64
  CACHE_TOOLCHAIN: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: X86_64
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check Server Performance
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息:"
          echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone Source Code (fanchmwrt)
        run: |
          df -hT $GITHUB_WORKSPACE
          git clone $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          COMMIT_AUTHOR=$(git show -s --date=short --format="作者: %an")
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
          COMMIT_DATE=$(git show -s --date=short --format="时间: %ci")
          echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
          COMMIT_MESSAGE=$(git show -s --date=short --format="内容: %s")
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          COMMIT_HASH=$(git show -s --date=short --format="hash: %H")
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Clone Source Code (immortalwrt)
        run: |
          df -hT $GITHUB_WORKSPACE
          git clone $REPO_URL immortalwrt
          cd immortalwrt
          echo "IMMORTALWRT_PATH=$PWD" >> $GITHUB_ENV
          COMMIT_AUTHOR_IMMORTAL=$(git show -s --date=short --format="作者: %an")
          echo "COMMIT_AUTHOR_IMMORTAL=$COMMIT_AUTHOR_IMMORTAL" >> $GITHUB_ENV
          COMMIT_DATE_IMMORTAL=$(git show -s --date=short --format="时间: %ci")
          echo "COMMIT_DATE_IMMORTAL=$COMMIT_DATE_IMMORTAL" >> $GITHUB_ENV
          COMMIT_MESSAGE_IMMORTAL=$(git show -s --date=short --format="内容: %s")
          echo "COMMIT_MESSAGE_IMMORTAL=$COMMIT_MESSAGE_IMMORTAL" >> $GITHUB_ENV
          COMMIT_HASH_IMMORTAL=$(git show -s --date=short --format="hash: %H")
          echo "COMMIT_HASH_IMMORTAL=$COMMIT_HASH_IMMORTAL" >> $GITHUB_ENV

      - name: Install Feeds (immortalwrt)
        run: |
          cd $IMMORTALWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download Packages
        id: package
        run: |
          cd $OPENWRT_PATH
          
          # 生成默认配置
          make defconfig
          
          # 设置目标平台为 x86/64
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
          
          # 添加基础系统组件
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
          
          # 添加VPN相关组件 (L2TP/IPsec with strongSwan)
          echo "CONFIG_PACKAGE_strongswan-full=y" >> .config
          echo "CONFIG_PACKAGE_xl2tpd=y" >> .config
          echo "CONFIG_PACKAGE_ppp=y" >> .config
          echo "CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y" >> .config
          echo "CONFIG_PACKAGE_strongswan-mod-openssl=y" >> .config
          echo "CONFIG_PACKAGE_strongswan-pki=y" >> .config
          
          # 可选：添加L2TP配置界面
          echo "CONFIG_PACKAGE_luci-app-pptp-server=y" >> .config
          
          # 重新生成配置
          make defconfig
          
          # 下载软件包
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          
          # 保存配置文件
          cp .config $GITHUB_WORKSPACE/openwrt-config-x86-64.config
          
          # 同时保存为config.buildinfo格式
          cp .config $OPENWRT_PATH/bin/config.buildinfo 2>/dev/null || true

      - name: Upload .config to Artifact
        uses: actions/upload-artifact@master
        if: steps.package.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_config_${{ env.FIRMWARE_TAG }}_${{ github.run_id }}
          path: ${{ github.workspace }}/openwrt-config-x86-64.config

      - name: Compile OpenWrt Firmware
        id: compile
        run: |
          cd $OPENWRT_PATH
          echo -e "使用 $(nproc) 线程编译"
          # 尝试多线程编译，失败则降级单线程
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Find Firmware Files
        run: |
          cd $OPENWRT_PATH/bin/
          find . -name "*squashfs*" -o -name "*combined*" -o -name "*ext4*" -o -name "*config.buildinfo*"

      - name: Organize Firmware Files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          # 查找固件目录
          FIRMWARE_DIR=$(find $OPENWRT_PATH/bin/targets/x86/64 -type d 2>/dev/null | head -n1)
          
          if [ -z "$FIRMWARE_DIR" ]; then
            FIRMWARE_DIR=$(find $OPENWRT_PATH/bin/ -name "*squashfs*" | head -n 1 | xargs dirname)
          fi
          
          cd $FIRMWARE_DIR
          
          # 清理无用文件
          rm -rf packages
          find . -name "*root*" -delete
          
          # 将配置文件复制到固件目录
          cp $GITHUB_WORKSPACE/openwrt-config-x86-64.config ./config.buildinfo
          
          # 打包固件
          FIRMWARE_NAME=$(date +%Y.%m.%d.%H)_OpenWrt_x86-64.tar.gz
          tar czvf $FIRMWARE_NAME config.buildinfo *.img.gz *.vmdk *.qcow2 2>/dev/null || true
          
          # 保留仅打包文件
          ls | grep -v $FIRMWARE_NAME | xargs rm -rf 2>/dev/null || true
          
          # 输出变量
          echo "FIRMWARE=$FIRMWARE_DIR" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT
          echo "固件打包完成：$(ls $FIRMWARE_DIR)"

      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@master
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware_${{ env.FIRMWARE_TAG }}_${{ github.run_id }}
          path: ${{ steps.organize.outputs.FIRMWARE }}/*.tar.gz

      - name: Upload Config to Artifact
        uses: actions/upload-artifact@master
        if: steps.package.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_config_${{ env.FIRMWARE_TAG }}_${{ github.run_id }}
          path: ${{ github.workspace }}/openwrt-config-x86-64.config

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v1
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
        with:
          tag_name: ${{ env.FIRMWARE_TAG }}_${{ github.run_id }}
          name: OpenWrt Firmware ${{ env.FIRMWARE_TAG }} (Build ${{ github.run_id }})
          body: |
            ## OpenWrt 固件编译完成
            
            ### 版本信息
            - 平台: x86-64
            - 编译时间: ${{ env.COMMIT_DATE }}
            - 源码版本: ${{ env.COMMIT_HASH }}
            - 源码作者: ${{ env.COMMIT_AUTHOR }}
            
            ### 包含组件
            - Luci Web界面
            - Luci SSL支持
            - Luci 防火墙
            - **strongSwan Full (L2TP/IPsec VPN服务器)**
            - xl2tpd (L2TP守护进程)
            - PPP协议支持
            
            ### 说明
            固件已包含完整的L2TP over IPsec VPN服务端组件，可直接配置使用。
            默认登录IP: 192.168.1.1
            默认密码: password
            
            **注意**: 首次使用请修改默认密码并配置防火墙规则。
          files: |
            ${{ steps.organize.outputs.FIRMWARE }}/*.tar.gz
            ${{ github.workspace }}/openwrt-config-x86-64.config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
