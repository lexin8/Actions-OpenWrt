name: Firmware2

on:
  workflow_dispatch:

env:
  TARGET_ARCH: x86
  TARGET_SUBARCH: 64
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  BUILD_DIR: immortalwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Init build environment (Official Script)
        run: |
          # 严格使用官方初始化脚本（解决依赖缺失核心问题）
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          # 清理冗余文件释放空间（符合官方 25GB 磁盘要求）
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /tmp/*
          # 创建非 root 用户编译（遵循官方 "不要用 root/sudo" 规范）
          sudo useradd -m builduser
          sudo chown -R builduser:builduser $GITHUB_WORKSPACE

      - name: 2. Clone source code (Official Command)
        run: |
          su - builduser -c "git clone -b ${{ env.REPO_BRANCH }} --single-branch --filter=blob:none ${{ env.REPO_URL }} ${{ env.BUILD_DIR }}"
          su - builduser -c "cd ${{ env.BUILD_DIR }} && ./scripts/feeds update -a && ./scripts/feeds install -a"

      - name: 3. Configure build options
        run: |
          su - builduser -c "cd ${{ env.BUILD_DIR }} && make defconfig"
          # 追加指定组件配置
          su - builduser -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-full=y' >> .config"
          su - builduser -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_xl2tpd=y' >> .config"
          su - builduser -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_ppp=y' >> .config"
          su - builduser -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y' >> .config"
          su - builduser -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-mod-openssl=y' >> .config"
          su - builduser -c "cd ${{ env.BUILD_DIR }} && echo 'CONFIG_PACKAGE_strongswan-pki=y' >> .config"
          su - builduser -c "cd ${{ env.BUILD_DIR }} && make defconfig"
          # 上传 .config
          cp ${{ env.BUILD_DIR }}/.config openwrt-config-24.10.config
          tar -zcf openwrt-config-24.10.tar.gz openwrt-config-24.10.config

      - name: 4. Upload .config archive
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config-24.10
          path: openwrt-config-24.10.tar.gz

      - name: 5. Download dependencies
        run: su - builduser -c "cd ${{ env.BUILD_DIR }} && make download -j1"

      - name: 6. Build firmware (Single thread, Official Spec)
        run: |
          # 严格遵循官方 "非 root 用户 + 单线程编译" 要求
          su - builduser -c "cd ${{ env.BUILD_DIR }} && make -j1 V=s 2>&1 | tee build.log"
          ls -lh ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/

      - name: 7. Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ env.BUILD_DIR }}/build.log
        if: always()

      - name: 8. Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-24.10-x86_64-firmware
          path: |
            ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/*.img.gz
            ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/*.tar.gz
            ${{ env.BUILD_DIR }}/bin/targets/${{ env.TARGET_ARCH }}/${{ env.TARGET_SUBARCH }}/*.manifest
