name: fanchmwrt2

on:
  repository_dispatch:
  watch:
    types: started
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'

env:
  CONFIG_FILE: fanchmwrt.config
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

jobs:
  Build:
    runs-on: ubuntu-22.04
    continue-on-error: false

    steps:
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update && sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get -y autoremove --purge && sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone Source Code
        run: |
          # 克隆源码并命名为openwrt
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Install Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: SSH Connection (Debug)
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Load Build Configuration
        run: |
          cd $OPENWRT_PATH
          if [ -f $GITHUB_WORKSPACE/$CONFIG_FILE ]; then
            cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          else
            cat > .config <<EOF
            CONFIG_TARGET_x86=y
            CONFIG_TARGET_x86_64=y
            CONFIG_TARGET_x86_64_DEVICE_generic=y
            CONFIG_PACKAGE_luci=y
            CONFIG_PACKAGE_luci-ssl=y
            CONFIG_PACKAGE_strongswan-full=y
            CONFIG_PACKAGE_xl2tpd=y
            CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
            EOF
          fi
          make defconfig

      - name: Download Dependencies
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc) || make download -j1
          find dl -size -1024c -exec rm -f {} \;
          make defconfig

      - name: Upload .config File
        uses: actions/upload-artifact@master
        with:
          name: OpenWrt_config_${{ github.run_id }}
          path: ${{ env.OPENWRT_PATH }}/.config

      - name: Compile Firmware
        run: |
          cd $OPENWRT_PATH
          make -j$(nproc) || { make -j1 V=s; [ $? -ne 0 ] && exit 1; }

      - name: Package & Upload Firmware
        if: !cancelled()
        run: |
          FIRMWARE_DIR=$(find $OPENWRT_PATH/bin/targets/x86/64 -type d -name "generic" -print -quit)
          [ -z "$FIRMWARE_DIR" ] && FIRMWARE_DIR=$(find $OPENWRT_PATH/bin -type d -path "*x86*64*" | head -n1)
          [ -z "$FIRMWARE_DIR" ] && exit 1
          
          cd $FIRMWARE_DIR
          rm -rf packages *root* 2>/dev/null
          FIRMWARE_NAME="OpenWrt_x86-64_$(date +%Y%m%d_%H%M).tar.gz"
          tar czvf $FIRMWARE_NAME *.img.gz *.vmdk *.qcow2 *.iso 2>/dev/null || exit 1
          
          echo "Uploading firmware: $FIRMWARE_NAME"
          gh artifact upload "$FIRMWARE_NAME" --name "OpenWrt_firmware_${{ github.run_id }}" --clobber || \
          actions/upload-artifact@master --name "OpenWrt_firmware_${{ github.run_id }}" --path "$FIRMWARE_NAME"

      - name: Compilation Failure Alert
        if: failure()
        run: |
          echo "Firmware compilation failed! Check build logs for details."
          exit 1
