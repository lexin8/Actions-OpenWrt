name: Build OpenWrt Firmware2

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  CORES: 4
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  CONFIG_FILE: .config
  FIRMWARE_NAME: OpenWrt-Firmware-$(date +%Y%m%d-%H%M%S)

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zip
          sudo apt autoremove -y && sudo apt clean -y
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Clone OpenWrt source and packages
        run: |
          git clone --depth 1 $REPO_URL openwrt
          cd openwrt
          git clone --depth 1 https://github.com/nikkinikki-org/OpenWrt-nikki package/luci-app-nikki
          git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/openwrt-passwall-packages
          git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall package/openwrt-passwall
          git clone --depth 1 https://github.com/immortalwrt/homeproxy package/homeproxy

      - name: Generate custom config
        run: |
          cd openwrt
          rm -f .config
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          # 写入禁用插件配置
          echo '# CONFIG_DEFAULT_luci-app-arpbind is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-autoreboot is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-nlbwmon is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-samba4 is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-samba is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-vlmcsd is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-wol is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-zerotier is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-strongswan-swanctl is not set' >> .config
          # 写入启用插件配置
          echo 'CONFIG_PACKAGE_luci-app-nikki=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-passwall=y' >> .config
          echo 'CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y' >> .config
          echo 'CONFIG_PACKAGE_luci-i18n-geoview-zh-cn=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-homeproxy=y' >> .config
          echo 'CONFIG_PACKAGE_ddns-scripts=y' >> .config
          echo 'CONFIG_PACKAGE_ddns-scripts-cloudflare=y' >> .config
          echo 'CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-ddns=y' >> .config
          echo 'CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-udpxy=y' >> .config
          echo 'CONFIG_PACKAGE_udpxy=y' >> .config
          # 验证配置
          make defconfig

      - name: Download dependencies
        run: |
          cd openwrt
          make download -j$CORES
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile OpenWrt
        run: |
          cd openwrt
          echo "Using $(nproc) threads for compilation"
          make -j$CORES || make -j1 V=s
          echo "Compilation finished successfully!"

      - name: Package firmware
        run: |
          mkdir -p firmware-output
          cp -r openwrt/bin/targets/* firmware-output/
          cp openwrt/.config firmware-output/config.txt
          echo "Build time: $(date '+%Y-%m-%d %H:%M:%S')" > firmware-output/build-info.txt
          zip -r $FIRMWARE_NAME.zip firmware-output/
          ls -lh $FIRMWARE_NAME.zip

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}
          path: ./${{ env.FIRMWARE_NAME }}.zip
          retention-days: 90
