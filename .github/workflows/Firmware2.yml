name: fanchmwrt2

on:
  repository_dispatch:
  watch:
    types: started
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  OPENWRT_DIR: /home/runner/work/openwrt

jobs:
  Build:
    runs-on: ubuntu-22.04
    continue-on-error: false

    steps:
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update && sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get -y autoremove --purge && sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone Source Code
        id: clone
        run: |
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL $OPENWRT_DIR
          echo "源码克隆完成，目录：$OPENWRT_DIR"
          ls -la $OPENWRT_DIR

      - name: Install Feeds
        run: |
          cd $OPENWRT_DIR
          ./scripts/feeds update -a && ./scripts/feeds install -a
          ls -la $OPENWRT_DIR/feeds/

      - name: SSH Connection (Debug)
        uses: P3TERX/ssh2actions@v1.0.0
        if: ${{ (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh') }}
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Generate Build Configuration
        run: |
          cd $OPENWRT_DIR
          cat > $OPENWRT_DIR/.config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
          EOF
          make defconfig

      - name: Download Dependencies
        run: |
          cd $OPENWRT_DIR
          make download -j$(nproc) || make download -j1
          find dl -size -1024c -exec rm -f {} \;
          make defconfig

      - name: Prepare Config File for Upload
        run: |
          # 递归搜索 .config 文件（优先 OPENWRT_DIR 目录）
          CONFIG_FILE=$(find $OPENWRT_DIR -name ".config" -type f | head -n1)
          if [ -z "$CONFIG_FILE" ]; then
            echo "Error: .config file not found in $OPENWRT_DIR!"
            exit 1
          fi
          echo "Found .config file at: $CONFIG_FILE"
          
          # 创建临时目录存放配置文件
          mkdir -p /tmp/config_upload
          # 复制并命名（加 run_id 避免冲突）
          cp $CONFIG_FILE /tmp/config_upload/openwrt_config_${{ github.run_id }}.config
          # 可选：打包成 tar.gz（防止文件权限/格式问题）
          tar czvf /tmp/config_upload/openwrt_config_${{ github.run_id }}.tar.gz -C /tmp/config_upload .
        shell: bash

      # 上传配置文件（支持单个文件+打包文件）
      - name: Upload .config Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_config_${{ github.run_id }}
          path: |
            /tmp/config_upload/*.config
            /tmp/config_upload/*.tar.gz
          if-no-files-found: error

      - name: Compile Firmware
        run: |
          cd $OPENWRT_DIR
          make -j$(nproc) || { make -j1 V=s; [ $? -ne 0 ] && exit 1; }

      - name: Package & Upload Firmware
        if: ${{ !cancelled() }}
        run: |
          FIRMWARE_DIR=$(find $OPENWRT_DIR/bin/targets/x86/64 -type d -name "generic" -print -quit)
          [ -z "$FIRMWARE_DIR" ] && FIRMWARE_DIR=$(find $OPENWRT_DIR/bin -type d -path "*x86*64*" | head -n1)
          [ -z "$FIRMWARE_DIR" ] && exit 1
          
          cd $FIRMWARE_DIR
          rm -rf packages *root* 2>/dev/null
          FIRMWARE_NAME="OpenWrt_x86-64_$(date +%Y%m%d_%H%M).tar.gz"
          tar czvf $FIRMWARE_NAME *.img.gz *.vmdk *.qcow2 *.iso 2>/dev/null || exit 1
          
          echo "Uploading firmware: $FIRMWARE_NAME"
          mkdir -p /tmp/firmware
          cp $FIRMWARE_NAME /tmp/firmware/
          ls -la /tmp/firmware/

      - name: Upload Firmware Artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware_${{ github.run_id }}
          path: /tmp/firmware/*.tar.gz

      - name: Compilation Failure Alert
        if: ${{ failure() }}
        run: |
          echo "Firmware compilation failed! Check build logs for details."
          ls -la /home/runner/work/
          ls -la $OPENWRT_DIR
          exit 1
