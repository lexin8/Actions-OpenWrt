name: Build OpenWrt Firmware

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  # 编译核心数（按需调整）
  CORES: 4
  # 主源码仓库（拉取默认分支）
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  # 自定义配置文件名称
  CONFIG_FILE: .config
  # 固件打包名称（含日期）
  FIRMWARE_NAME: OpenWrt-Firmware-$(date +%Y%m%d-%H%M%S)

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zip
          sudo apt autoremove -y && sudo apt clean -y
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Clone OpenWrt source code and third-party packages
        run: |
          # 克隆主源码（默认分支）
          git clone --depth 1 $REPO_URL openwrt
          cd openwrt
          
          # 添加 luci-app-nikki 插件
          git clone --depth 1 https://github.com/nikkinikki-org/OpenWrt-nikki package/luci-app-nikki
          
          # 添加 passwall 插件及依赖
          git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/openwrt-passwall-packages
          git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall package/openwrt-passwall
          
          # 添加 homeproxy 插件
          git clone --depth 1 https://github.com/immortalwrt/homeproxy package/homeproxy

      - name: Load custom configuration
        run: |
          cd openwrt
          # 清空原有配置
          rm -f .config
          # 更新并安装所有 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 生成默认配置
          make defconfig
          
          # 写入自定义配置（严格保留注释格式）
          cat >> .config << EOF
# 关闭指定无用插件（严格格式）
# CONFIG_DEFAULT_luci-app-arpbind is not set
# CONFIG_PACKAGE_luci-app-autoreboot is not set
# CONFIG_PACKAGE_luci-app-nlbwmon is not set
# CONFIG_PACKAGE_luci-app-samba4 is not set
# CONFIG_PACKAGE_luci-app-samba is not set
# CONFIG_PACKAGE_luci-app-vlmcsd is not set
# CONFIG_PACKAGE_luci-app-wol is not set
# CONFIG_PACKAGE_luci-app-zerotier is not set
# CONFIG_PACKAGE_luci-app-strongswan-swanctl is not set

# 开启指定插件
CONFIG_PACKAGE_luci-app-nikki=y
CONFIG_PACKAGE_luci-app-passwall=y
CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
CONFIG_PACKAGE_luci-i18n-geoview-zh-cn=y
CONFIG_PACKAGE_luci-app-homeproxy=y

CONFIG_PACKAGE_ddns-scripts=y
CONFIG_PACKAGE_ddns-scripts-cloudflare=y
CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
CONFIG_PACKAGE_luci-app-ddns=y
CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
CONFIG_PACKAGE_luci-app-udpxy=y
CONFIG_PACKAGE_udpxy=y
EOF
          
          # 检查并修复配置（自动补全依赖，验证格式）
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j$CORES
          # 清理损坏的下载文件
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile OpenWrt
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          # 先多线程编译，失败则单线程输出详细日志
          make -j$CORES || make -j1 V=s
          echo "Compile completed!"

      - name: Package firmware (zip)
        run: |
          # 创建打包目录
          mkdir -p firmware-output
          # 复制固件文件到打包目录
          cp -r openwrt/bin/targets/* firmware-output/
          # 复制编译日志（可选，便于排查问题）
          cp openwrt/.config firmware-output/config.txt
          echo "Firmware build info: $(date)" > firmware-output/build-info.txt
          # 打包为 zip（压缩率更高，便于下载）
          zip -r $FIRMWARE_NAME.zip firmware-output/
          # 查看打包结果
          ls -lh $FIRMWARE_NAME.zip

      - name: Upload firmware package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}
          path: ${{ env.FIRMWARE_NAME }}.zip
          # 保留90天（默认90天，可调整）
          retention-days: 90
