name: Upload Cache

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  TZ: Asia/Shanghai
  CACHE_RELEASE_TAG: openwrt-base-cache
  CACHE_FILE_NAME: openwrt-base-cache.tar.gz
  CCACHE_DIR: ${{ github.workspace }}/openwrt/ccache
  CCACHE_MAXSIZE: 100G

jobs:
  Build-Base-Env-And-Upload:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Initialization System Env
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache
          sudo timedatectl set-timezone "$TZ"
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE
          ccache -o compression=true
          ccache -s

      - name: Expand Disk Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Clone OpenWrt Source
        run: |
          git clone --depth 1 $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 关键修复：直接删除gpio-button-hotplug模块文件（彻底移除编译入口）
          rm -rf package/kernel/gpio-button-hotplug
          # 移除base-files对该模块的依赖
          sed -i '/gpio-button-hotplug/d' package/base-files/Makefile

      - name: Generate Default Config
        run: |
          cd $OPENWRT_PATH
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: Build Base Toolchain
        run: |
          cd $OPENWRT_PATH
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          make toolchain/install -j1 CCACHE=1 V=s
          ccache -s

      - name: Build Common Plugins
        run: |
          cd $OPENWRT_PATH
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          # 单核心编译基础插件，避免依赖冲突
          make package/base-files/compile -j1 CCACHE=1
          make package/firewall/compile -j1 CCACHE=1
          make package/luci-base/compile -j1 CCACHE=1
          ccache -s

      - name: Package Base Cache
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p cache-tmp/staging_dir cache-tmp/dl cache-tmp/build_dir cache-tmp/ccache
          cp -rf $OPENWRT_PATH/staging_dir/toolchain cache-tmp/staging_dir/
          cp -rf $OPENWRT_PATH/dl cache-tmp/
          cp -rf $OPENWRT_PATH/build_dir/toolchain cache-tmp/build_dir/
          cp -rf $CCACHE_DIR/* cache-tmp/ccache/
          tar czvf $CACHE_FILE_NAME -C cache-tmp .
          ls -lh $CACHE_FILE_NAME
          rm -rf cache-tmp

      - name: Upload Cache to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CACHE_RELEASE_TAG }}
          name: OpenWrt Base Env Cache
          files: ${{ github.workspace }}/${{ env.CACHE_FILE_NAME }}
          overwrite: true
          draft: false
          prerelease: false
