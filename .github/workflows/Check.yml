name: Check
run-name: 检测x86_64源码macvlan/ipvlan模块阉割状态
on:
  workflow_dispatch:

jobs:
  check-module:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化环境
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update && sudo apt install -y git grep findutils tree

      # 克隆各版本源码 一一对应分支与本地目录
      - name: 克隆 OpenWrt 官方 25.03(替代未发布25.12)
        run: git clone --depth 1 --branch openwrt-25.03 https://github.com/openwrt/openwrt.git openwrt-2503
      - name: 克隆 OpenWrt 官方 24.10
        run: git clone --depth 1 --branch openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt-2410
      - name: 克隆 FanchmWrt 25.12.2 定制分支
        run: git clone --depth 1 --branch fanchmwrt-25.12.2 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2512
      - name: 克隆 FanchmWrt 24.10.4 定制分支
        run: git clone --depth 1 --branch fanchmwrt-24.10.4 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2410

      # 通用检索函数：全局查找内核配置+模块脚本，兼容新旧目录结构
      - name: 批量检索模块编译状态
        run: |
          function scan_module_status() {
            local src_dir=$1
            local ver_title=$2
            echo -e "\n========================================"
            echo "检测版本：${ver_title}"
            echo "源码根目录：${src_dir}"

            echo -e "\n---------- 1. 检索内核编译配置 ----------"
            find "${src_dir}/target/linux" -type f \( -name "defconfig" -o -name "config" -o -name "config-*" \) | while read cfg_file;do
              echo "配置文件路径：$cfg_file"
              grep -E "CONFIG_MACVLAN|CONFIG_IPVLAN" "$cfg_file" || echo "该文件无MACVLAN/IPVLAN配置"
            done

            echo -e "\n---------- 2. 检索内核模块打包定义 ----------"
            find "${src_dir}/package/kernel/linux/modules" -name "*.mk" | while read mk_file;do
              echo "模块规则文件：$mk_file"
              grep -iE "macvlan|ipvlan" "$mk_file" || echo "脚本未注册该虚拟网卡模块"
            done
            echo "========================================\n"
          }

          # 依次扫描四个版本
          scan_module_status "./openwrt-2503" "OpenWrt 官方 25.03 x86_64"
          scan_module_status "./openwrt-2410" "OpenWrt 官方 24.10 x86_64"
          scan_module_status "./fanchm-2512" "FanchmWrt 25.12.2 x86_64"
          scan_module_status "./fanchm-2410" "FanchmWrt 24.10.4 x86_64"

      - name: 模块状态判定标准
        run: |
          echo "===== 阉割判定规则 ====="
          echo "CONFIG_MACVLAN=m  → 编译为独立模块，未阉割，可opkg安装"
          echo "CONFIG_MACVLAN=y  → 直接内置内核，默认可用"
          echo "# CONFIG_XXX is not set → 源码编译禁用，彻底阉割无法使用"
          echo "mk文件无模块条目 → 固件不会打包对应驱动"

      - name: 归档检测配置文件
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config-backup
          path: |
            openwrt-2503/target/linux
            openwrt-2410/target/linux
            fanchm-2512/target/linux
            fanchm-2410/target/linux
