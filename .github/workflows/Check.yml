name: Check
run-name: 检测x86_64源码是否阉割macvlan/ipvlan模块
on:
  workflow_dispatch:
    inputs:
      check_desc:
        description: 检测OpenWrt官方&FanchmWrt 25.10/24版本网络模块
        required: false
        default: 自动判定模块阉割状态

jobs:
  check-module:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化运行环境
        uses: actions/checkout@v4

      - name: 安装基础依赖
        run: |
          sudo apt update && sudo apt install -y git grep

      - name: 克隆 OpenWrt 官方 25.10 分支
        run: |
          git clone --depth 1 --branch openwrt-25.10 https://github.com/openwrt/openwrt.git openwrt-2510
      - name: 克隆 OpenWrt 官方 24 分支
        run: |
          git clone --depth 1 --branch openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt-2410
      - name: 克隆 FanchmWrt 25.12(对标25.10)分支
        run: |
          git clone --depth 1 --branch fanchmwrt-25.12.2 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2510
      - name: 克隆 FanchmWrt 24 历史分支
        run: |
          git clone --depth 1 --branch fanchmwrt-24.10 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2410

      - name: 定义检测函数 & 批量检索配置
        run: |
          function scan_config() {
            local src_path=$1
            local ver_name=$2
            local defcfg="${src_path}/target/linux/x86/64/defconfig"
            echo "========================================"
            echo "【版本】${ver_name}"
            echo "配置文件路径: ${defcfg}"
            echo "---------- MACVLAN 配置 ----------"
            grep -E "^CONFIG_MACVLAN|# CONFIG_MACVLAN" "${defcfg}"
            echo "---------- IPVLAN 配置 ----------"
            grep -E "^CONFIG_IPVLAN|# CONFIG_IPVLAN" "${defcfg}"
            echo ""
          }

          # 逐个版本扫描
          scan_config "./openwrt-2510" "OpenWrt 官方 25.10 x86_64"
          scan_config "./openwrt-2410" "OpenWrt 官方 24.10 x86_64"
          scan_config "./fanchm-2510" "FanchmWrt 定制 25.10等效版 x86_64"
          scan_config "./fanchm-2410" "FanchmWrt 定制 24.10等效版 x86_64"

      - name: 汇总阉割判定结果
        run: |
          echo "==================== 判定规则 ===================="
          echo "CONFIG_XXX=m   → 编译为模块，未阉割，可opkg安装"
          echo "CONFIG_XXX=y   → 内置内核，未阉割"
          echo "# CONFIG_XXX is not set → 源码禁用，彻底阉割"
          echo "=================================================="
          echo "检测完成，上方日志可直接对比各版本模块状态"

      - name: 打包源码日志留存
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config-log
          path: |
            openwrt-2510/target/linux/x86/64/defconfig
            openwrt-2410/target/linux/x86/64/defconfig
            fanchm-2510/target/linux/x86/64/defconfig
            fanchm-2410/target/linux/x86/64/defconfig
