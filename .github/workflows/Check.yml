name: Check
run-name: 检测x86_64源码是否阉割macvlan/ipvlan内核模块
on:
  workflow_dispatch:
    inputs:
      check_desc:
        description: 对比OpenWrt官方 & FanchmWrt 模块编译状态
        required: false

jobs:
  check-module:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化运行环境
        uses: actions/checkout@v4

      - name: 安装基础依赖
        run: |
          sudo apt update && sudo apt install -y git grep

      - name: 克隆 OpenWrt 官方 25.12 稳定分支
        run: |
          git clone --depth 1 --branch openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt-2503
      - name: 克隆 OpenWrt 官方 24.10 稳定分支
        run: |
          git clone --depth 1 --branch openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt-2410

      - name: 克隆 FanchmWrt 25.12.2 定制分支
        run: |
          git clone --depth 1 --branch fanchmwrt-25.12.2 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2512
      - name: 克隆 FanchmWrt 24.10 定制分支
        run: |
          git clone --depth 1 --branch fanchmwrt-24.10 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2410

      - name: 批量扫描内核模块配置
        run: |
          function scan_config() {
            local src_path=$1
            local ver_name=$2
            local defcfg="${src_path}/target/linux/x86/64/defconfig"
            echo "========================================"
            echo "【检测版本】${ver_name}"
            echo "配置文件: ${defcfg}"
            echo "---------- MACVLAN 模块 ----------"
            grep -E "^CONFIG_MACVLAN|# CONFIG_MACVLAN" "${defcfg}" || echo "未找到MACVLAN配置项"
            echo "---------- IPVLAN 模块 ----------"
            grep -E "^CONFIG_IPVLAN|# CONFIG_IPVLAN" "${defcfg}" || echo "未找到IPVLAN配置项"
            echo ""
          }

          scan_config "./openwrt-2512" "OpenWrt 官方 25.12 x86_64"
          scan_config "./openwrt-2410" "OpenWrt 官方 24.10 x86_64"
          scan_config "./fanchm-2512" "FanchmWrt 25.12.2 x86_64"
          scan_config "./fanchm-2410" "FanchmWrt 24.10 x86_64"

      - name: 结果判定说明
        run: |
          echo "==================== 判定标准 ===================="
          echo "CONFIG_XXX=m     → 编译为内核模块，未阉割，可在线安装"
          echo "CONFIG_XXX=y     → 内置内核，默认启用"
          echo "# CONFIG_XXX is not set → 源码禁用，彻底阉割无法加载"
          echo "=================================================="

      - name: 导出配置文件存档
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config-backup
          path: |
            openwrt-2512/target/linux/x86/64/defconfig
            openwrt-2410/target/linux/x86/64/defconfig
            fanchm-2512/target/linux/x86/64/defconfig
            fanchm-2410/target/linux/x86/64/defconfig
