name: Check
run-name: 检测x86_64源码macvlan/ipvlan模块状态
on:
  workflow_dispatch:

jobs:
  check-module:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化环境
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update && sudo apt install -y git grep findutils tree

      # 克隆合法分支
      - name: 克隆 OpenWrt 官方 25.12
        run: git clone --depth 1 --branch openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt-2512
      - name: 克隆 OpenWrt 官方 24.10
        run: git clone --depth 1 --branch openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt-2410
      - name: 克隆 FanchmWrt 25.12.2
        run: git clone --depth 1 --branch fanchmwrt-25.12.2 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2512
      - name: 克隆 FanchmWrt 24.10.4
        run: git clone --depth 1 --branch fanchmwrt-24.10.4 https://github.com/fanchmwrt/fanchmwrt.git fanchm-2410

      - name: 批量检索模块编译状态
        run: |
          function scan_module_status() {
            local src_dir=$1
            local ver_title=$2
            echo -e "\n========================================"
            echo "检测版本：${ver_title}"
            echo "源码根目录：${src_dir}"

            echo -e "\n---------- 1. x86_64 内核编译开关 ----------"
            # 精准定位 x86/64 defconfig
            local defcfg_path="${src_dir}/target/linux/x86/64/defconfig"
            if [ -f "${defcfg_path}" ];then
              echo "配置文件：${defcfg_path}"
              grep -E "^#?CONFIG_MACVLAN|^#?CONFIG_IPVLAN" "${defcfg_path}"
            else
              echo "未找到 x86_64 defconfig，全局检索配置"
              find "${src_dir}/target/linux/x86" -name "defconfig" -exec grep -E "^#?CONFIG_MACVLAN|^#?CONFIG_IPVLAN" {} \;
            fi

            echo -e "\n---------- 2. 内核模块打包定义 ----------"
            local netdev_mk="${src_dir}/package/kernel/linux/modules/netdevices.mk"
            if [ -f "${netdev_mk}" ];then
              echo "模块规则：${netdev_mk}"
              grep -A5 -B2 "macvlan\|ipvlan" "${netdev_mk}"
            else
              echo "未找到netdevices.mk"
            fi
            echo "========================================\n"
          }

          scan_module_status "./openwrt-2512" "OpenWrt 官方 25.12 x86_64"
          scan_module_status "./openwrt-2410" "OpenWrt 官方 24.10 x86_64"
          scan_module_status "./fanchm-2512" "FanchmWrt 25.12.2 x86_64"
          scan_module_status "./fanchm-2410" "FanchmWrt 24.10.4 x86_64"

      - name: 模块状态判定标准
        run: |
          echo "===== 阉割判定规则 ====="
          echo "1. CONFIG_XXX=m  → 编译为模块，可opkg在线安装 ✅未阉割"
          echo "2. CONFIG_XXX=y  → 内置内核，默认启用 ✅未阉割"
          echo "3. # CONFIG_XXX is not set → 编译禁用 ❌源码阉割"
          echo "4. mk文件无模块代码 → 彻底移除驱动 ❌阉割"

      - name: 归档配置文件
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config-backup
          path: |
            openwrt-2512/target/linux
            openwrt-2410/target/linux
            fanchm-2512/target/linux
            fanchm-2410/target/linux
