name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml
          echo "已复制 list.meta.yml 到 nodes/ 目录"

      - name: 测速并过滤失效节点（每个节点测试10次）
        run: |
          cd AutoMergePublicNodes
          if [ ! -f list.meta.yml ]; then
            echo "错误：未找到 list.meta.yml"
            exit 1
          fi
          python3 << 'EOF'
          import yaml
          import asyncio
          import time

          TIMEOUT = 3
          TEST_TIMES = 10
          SUCCESS_THRESHOLD = 5

          async def test_node_once(node):
              server = node.get('server')
              port = node.get('port')
              if not server or not port:
                  return False, None
              try:
                  start = time.time()
                  _, writer = await asyncio.wait_for(
                      asyncio.open_connection(server, port),
                      timeout=TIMEOUT
                  )
                  elapsed = time.time() - start
                  writer.close()
                  await writer.wait_closed()
                  return True, elapsed
              except:
                  return False, None

          async def test_node(node):
              success = 0
              latencies = []
              for _ in range(TEST_TIMES):
                  ok, lat = await test_node_once(node)
                  if ok:
                      success += 1
                      latencies.append(lat)
              avg_latency = sum(latencies) / len(latencies) if latencies else None
              return node, success, avg_latency

          async def main():
              with open('list.meta.yml', 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f)
              proxies = data.get('proxies', [])
              if not proxies:
                  print("警告：未找到 proxies 字段")
                  with open('../nodes/proxies.yml', 'w') as f:
                      f.write('proxies: []')
                  return

              print(f"开始测试 {len(proxies)} 个节点（每个节点测试 {TEST_TIMES} 次）...")
              tasks = [test_node(p) for p in proxies]
              results = await asyncio.gather(*tasks)

              valid_nodes = []
              for node, success, avg_latency in results:
                  if success >= SUCCESS_THRESHOLD:
                      valid_nodes.append(node)
                      print(f"✅ {node.get('name', 'unknown')} : {success}/{TEST_TIMES} 成功, 平均延迟 {avg_latency:.2f}s")
                  else:
                      print(f"❌ 失效节点: {node.get('name', 'unknown')} ({node.get('server')}:{node.get('port')}) - 成功率 {success}/{TEST_TIMES}")

              print(f"有效节点数: {len(valid_nodes)} / {len(proxies)}")

              with open('../nodes/proxies.yml', 'w', encoding='utf-8') as f:
                  f.write('proxies:\n')
                  yaml.dump(valid_nodes, f, allow_unicode=True, sort_keys=False, default_flow_style=False)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/list.meta.yml nodes/proxies.yml
          git diff --cached --quiet || git commit -m "Auto update list.meta.yml and filtered proxies.yml [skip ci]"
          git push

      - name: 删除本次运行记录
        if: always()   # 无论之前的步骤成功或失败，都执行删除
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }} -X DELETE
