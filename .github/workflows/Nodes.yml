name: Extract and Filter Free Nodes

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  extract-and-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download list.meta.yml
        run: |
          curl -L -o list.meta.yml \
            "https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

      - name: Extract proxies (raw)
        run: |
          mkdir -p nodes
          echo "proxies:" > nodes/proxies_raw.yaml
          yq '.proxies' list.meta.yml >> nodes/proxies_raw.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Filter nodes by latency and name
        run: |
          python << 'EOF'
          import yaml
          import socket
          import time
          import concurrent.futures

          THRESHOLD_MS = 200          # 延迟阈值（毫秒）
          CONCURRENCY = 50            # 并发线程数
          TIMEOUT = 3                 # 连接超时（秒）

          # 名称过滤：只保留包含以下关键词的节点（可根据需要增删）
          KEEP_KEYWORDS = ['HK', 'JP', 'US', 'SG', 'TW', 'KR', 'GB', 'DE', 'FR', 'CA', 'AU']

          def test_node(node):
              server = node.get('server')
              port = node.get('port')
              name = node.get('name', '')
              # 名称过滤
              if not any(kw in name for kw in KEEP_KEYWORDS):
                  return None
              if not server or not port:
                  return None
              try:
                  start = time.time()
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(TIMEOUT)
                  sock.connect((server, int(port)))
                  latency = (time.time() - start) * 1000
                  sock.close()
                  if latency < THRESHOLD_MS:
                      return node
              except Exception:
                  pass
              return None

          with open('nodes/proxies_raw.yaml', 'r') as f:
              data = yaml.safe_load(f)
              nodes = data.get('proxies', [])

          print(f"Total nodes: {len(nodes)}")

          valid_nodes = []
          with concurrent.futures.ThreadPoolExecutor(max_workers=CONCURRENCY) as executor:
              futures = {executor.submit(test_node, node): node for node in nodes}
              for future in concurrent.futures.as_completed(futures):
                  result = future.result()
                  if result:
                      valid_nodes.append(result)

          print(f"Valid nodes after filtering: {len(valid_nodes)}")

          with open('nodes/proxies.yaml', 'w') as f:
              yaml.dump({'proxies': valid_nodes}, f, allow_unicode=True, default_flow_style=False)
          EOF

      - name: Commit and push filtered nodes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/proxies.yaml
          git diff --cached --quiet || git commit -m "Update filtered nodes/proxies.yaml [skip ci]"
          git push
