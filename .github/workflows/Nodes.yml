name: Extract Free Nodes

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许推送代码到当前仓库
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master          # 指定主分支
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download list.meta.yml
        run: |
          curl -L -o list.meta.yml \
            "https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

      - name: Extract proxies
        run: |
          # 确保 nodes 目录存在
          mkdir -p nodes
          yq '.proxies' list.meta.yml > nodes/proxies.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/proxies.yaml
          # 如果文件没有变化，则不提交
          git diff --cached --quiet || git commit -m "Update nodes/proxies.yaml [skip ci]"
          git push
