name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py 获取 AutoMergePublicNodes 节点
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml
          echo "已复制 list.meta.yml 到 nodes/ 目录"

      - name: 获取 free-nodes/v2rayfree 最新订阅文件
        id: get_latest
        run: |
          # 获取仓库根目录文件列表，过滤出以 v 开头且全为数字的文件，取最新一个
          curl -s "https://api.github.com/repos/free-nodes/v2rayfree/contents/" > files.json
          latest_file=$(jq -r '.[] | select(.type=="file") | .name' files.json | grep -E '^v[0-9]+$' | sort -r | head -n1)
          if [ -z "$latest_file" ]; then
            # 回退：从 README 中提取订阅链接
            echo "使用 README 中的链接"
            curl -s "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/README.md" | grep -oP 'https://raw.githubusercontent.com/free-nodes/v2rayfree/main/v[0-9]+' | head -n1 > url.txt
          else
            echo "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/$latest_file" > url.txt
          fi
          echo "订阅文件 URL: $(cat url.txt)"
          echo "url=$(cat url.txt)" >> $GITHUB_OUTPUT

      - name: 下载 v2rayfree 节点列表
        run: |
          curl -L -o v2rayfree_nodes.txt "${{ steps.get_latest.outputs.url }}"

      - name: 合并节点并转换为标准格式
        run: |
          python3 << 'EOF'
          import yaml
          import base64
          import re
          import urllib.parse

          def parse_ss(uri):
              # 格式: ss://method:password@server:port#tag
              # 也可能有 base64 编码的 method:password@server:port
              # 先尝试提取 # 之后的 tag
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
                  tag = urllib.parse.unquote(tag)
              # 去掉 ss:// 前缀
              if uri.startswith('ss://'):
                  uri = uri[5:]
              # 如果 uri 中不含 @，说明是 base64 编码的完整部分
              if '@' not in uri:
                  try:
                      decoded = base64.b64decode(uri).decode('utf-8')
                      # 解码后应为 method:password@server:port
                      if '@' in decoded:
                          uri = decoded
                  except:
                      pass
              # 现在 uri 形如 method:password@server:port
              match = re.match(r'([^:]+):([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              method, password, server, port = match.groups()
              return {
                  'type': 'ss',
                  'server': server,
                  'port': int(port),
                  'cipher': method,
                  'password': password,
                  'name': tag if tag else f"v2rayfree_ss_{server}_{port}"
              }

          def parse_trojan(uri):
              # 格式: trojan://password@server:port?params#tag
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
                  tag = urllib.parse.unquote(tag)
              # 去掉 trojan://
              if uri.startswith('trojan://'):
                  uri = uri[9:]
              # 分离 ? 参数部分
              if '?' in uri:
                  uri, query = uri.split('?', 1)
                  # 参数可以留作备用，但基本字段只需 server:port
              # uri 现在是 password@server:port
              match = re.match(r'([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              password, server, port = match.groups()
              node = {
                  'type': 'trojan',
                  'server': server,
                  'port': int(port),
                  'password': password,
                  'name': tag if tag else f"v2rayfree_trojan_{server}_{port}"
              }
              # 如果有 query，可以提取 sni 等（可选）
              if query:
                  params = urllib.parse.parse_qs(query)
                  if 'sni' in params:
                      node['sni'] = params['sni'][0]
                  if 'allowInsecure' in params:
                      node['skip-cert-verify'] = params['allowInsecure'][0] == '1'
              return node

          def parse_vless(uri):
              # 格式: vless://uuid@server:port?params#tag
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
                  tag = urllib.parse.unquote(tag)
              if uri.startswith('vless://'):
                  uri = uri[8:]
              if '?' in uri:
                  uri, query = uri.split('?', 1)
              else:
                  query = ''
              match = re.match(r'([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              uuid, server, port = match.groups()
              node = {
                  'type': 'vless',
                  'server': server,
                  'port': int(port),
                  'uuid': uuid,
                  'name': tag if tag else f"v2rayfree_vless_{server}_{port}"
              }
              # 解析参数
              if query:
                  params = urllib.parse.parse_qs(query)
                  if 'encryption' in params:
                      node['encryption'] = params['encryption'][0]
                  if 'flow' in params:
                      node['flow'] = params['flow'][0]
                  if 'sni' in params:
                      node['sni'] = params['sni'][0]
                  if 'type' in params:
                      node['network'] = params['type'][0]
                  if 'security' in params:
                      node['tls'] = params['security'][0] == 'tls'
              return node

          def parse_vmess(uri):
              # vmess://base64(json)
              if uri.startswith('vmess://'):
                  b64 = uri[8:]
                  # 可能包含 # 标签
                  if '#' in b64:
                      b64, tag = b64.split('#', 1)
                      tag = urllib.parse.unquote(tag)
                  else:
                      tag = None
                  try:
                      # 补齐 base64 填充
                      b64 += '=' * (4 - len(b64) % 4)
                      json_str = base64.b64decode(b64).decode('utf-8')
                      data = yaml.safe_load(json_str)
                      # 构造标准格式
                      node = {
                          'type': 'vmess',
                          'server': data.get('add'),
                          'port': int(data.get('port', 0)),
                          'uuid': data.get('id'),
                          'alterId': data.get('aid', 0),
                          'cipher': data.get('scy', 'auto'),
                          'name': tag if tag else data.get('ps', f"v2rayfree_vmess_{data.get('add')}_{data.get('port')}")
                      }
                      # 可选参数
                      if 'tls' in data and data['tls']:
                          node['tls'] = True
                      if 'sni' in data:
                          node['sni'] = data['sni']
                      if 'net' in data:
                          node['network'] = data['net']
                      if 'path' in data:
                          node['ws-path'] = data['path']
                      if 'host' in data:
                          node['ws-headers'] = {'Host': data['host']}
                      return node
                  except:
                      return None
              return None

          # 1. 读取 AutoMergePublicNodes 的 list.meta.yml
          with open('nodes/list.meta.yml', 'r', encoding='utf-8') as f:
              data1 = yaml.safe_load(f)
          proxies1 = data1.get('proxies', [])
          print(f"从 AutoMergePublicNodes 获取到 {len(proxies1)} 个节点")

          # 2. 解析 v2rayfree 订阅文件
          with open('v2rayfree_nodes.txt', 'r', encoding='utf-8', errors='ignore') as f:
              content = f.read().strip()
          # 如果是 base64 编码，先解码
          if not any(content.startswith(p) for p in ['ss://', 'trojan://', 'vless://', 'vmess://']):
              try:
                  content = base64.b64decode(content).decode('utf-8')
              except:
                  pass
          lines = [line.strip() for line in content.splitlines() if line.strip()]

          proxies2 = []
          for line in lines:
              node = None
              if line.startswith('ss://'):
                  node = parse_ss(line)
              elif line.startswith('trojan://'):
                  node = parse_trojan(line)
              elif line.startswith('vless://'):
                  node = parse_vless(line)
              elif line.startswith('vmess://'):
                  node = parse_vmess(line)
              if node:
                  # 确保必要字段存在
                  if 'name' not in node:
                      node['name'] = f"v2rayfree_{node['type']}_{len(proxies2)+1}"
                  # 保存原始 raw 链接，用于 links.txt
                  node['raw'] = line
                  proxies2.append(node)
              else:
                  # 无法解析的节点，仅保留原始链接，不参与测速但放入 links.txt
                  proxies2.append({'raw': line})
          print(f"从 v2rayfree 解析出 {len(proxies2)} 个节点")

          # 合并
          combined = proxies1 + proxies2
          print(f"合并后总节点数: {len(combined)}")

          # 保存合并后的节点供测速
          with open('combined_nodes.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(combined, f, allow_unicode=True)
          EOF

      - name: 测速并过滤失效节点（每个节点测试10次）
        run: |
          python3 << 'EOF'
          import yaml
          import asyncio
          import time

          TIMEOUT = 3
          TEST_TIMES = 10
          SUCCESS_THRESHOLD = 5

          async def test_node_once(server, port):
              try:
                  start = time.time()
                  _, writer = await asyncio.wait_for(
                      asyncio.open_connection(server, port),
                      timeout=TIMEOUT
                  )
                  elapsed = time.time() - start
                  writer.close()
                  await writer.wait_closed()
                  return True, elapsed
              except:
                  return False, None

          async def test_node(node):
              server = node.get('server')
              port = node.get('port')
              if not server or not port:
                  # 无法测速的节点，视为失败
                  return node, 0, None
              success = 0
              latencies = []
              for _ in range(TEST_TIMES):
                  ok, lat = await test_node_once(server, port)
                  if ok:
                      success += 1
                      latencies.append(lat)
              avg_latency = sum(latencies) / len(latencies) if latencies else None
              return node, success, avg_latency

          async def main():
              with open('combined_nodes.yaml', 'r', encoding='utf-8') as f:
                  combined = yaml.safe_load(f)
              
              print(f"开始测试 {len(combined)} 个节点（每个节点测试 {TEST_TIMES} 次）...")
              tasks = [test_node(node) for node in combined]
              results = await asyncio.gather(*tasks)

              valid_nodes = []
              valid_raw = []
              for node, success, avg_latency in results:
                  if success >= SUCCESS_THRESHOLD:
                      valid_nodes.append(node)
                      if 'raw' in node:
                          valid_raw.append(node['raw'])
                      name = node.get('name', 'unknown')
                      server = node.get('server', 'unknown')
                      port = node.get('port', 'unknown')
                      print(f"✅ {name} ({server}:{port}) : {success}/{TEST_TIMES} 成功, 平均延迟 {avg_latency:.2f}s")
                  else:
                      name = node.get('name', 'unknown')
                      server = node.get('server', 'unknown')
                      port = node.get('port', 'unknown')
                      print(f"❌ 失效节点: {name} ({server}:{port}) - 成功率 {success}/{TEST_TIMES}")

              print(f"有效节点数: {len(valid_nodes)} / {len(combined)}")

              # 保存标准 YAML 格式（移除 raw 字段）
              with open('nodes/proxies.yml', 'w', encoding='utf-8') as f:
                  f.write('proxies:\n')
                  clean_nodes = []
                  for node in valid_nodes:
                      clean_node = {k: v for k, v in node.items() if k != 'raw'}
                      clean_nodes.append(clean_node)
                  yaml.dump(clean_nodes, f, allow_unicode=True, sort_keys=False, default_flow_style=False)
              
              # 保存纯链接列表
              with open('nodes/links.txt', 'w', encoding='utf-8') as f:
                  for raw in valid_raw:
                      if raw:
                          f.write(raw + '\n')

          if __name__ == '__main__':
              asyncio.run(main())
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/list.meta.yml nodes/proxies.yml nodes/links.txt
          git diff --cached --quiet || git commit -m "Auto update nodes from both sources [skip ci]"
          git push
