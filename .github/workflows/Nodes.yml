name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 测速并过滤失效节点
        run: |
          cd AutoMergePublicNodes
          if [ ! -f list.meta.yml ]; then
            echo "错误：未找到 list.meta.yml"
            exit 1
          fi
          python3 << 'EOF'
          import yaml
          import asyncio
          import socket

          TIMEOUT = 5

          async def test_node(node):
              server = node.get('server')
              port = node.get('port')
              if not server or not port:
                  return node, False
              try:
                  _, writer = await asyncio.wait_for(
                      asyncio.open_connection(server, port),
                      timeout=TIMEOUT
                  )
                  writer.close()
                  await writer.wait_closed()
                  return node, True
              except:
                  return node, False

          async def main():
              with open('list.meta.yml', 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f)
              proxies = data.get('proxies', [])
              if not proxies:
                  print("警告：未找到 proxies 字段")
                  with open('../nodes/proxies.yml', 'w') as f:
                      f.write('proxies: []')
                  return

              print(f"开始测试 {len(proxies)} 个节点...")
              tasks = [test_node(p) for p in proxies]
              results = await asyncio.gather(*tasks)

              valid_nodes = []
              for node, ok in results:
                  if ok:
                      valid_nodes.append(node)
                  else:
                      print(f"失效节点: {node.get('name', 'unknown')} ({node.get('server')}:{node.get('port')})")

              print(f"有效节点数: {len(valid_nodes)} / {len(proxies)}")

              with open('../nodes/proxies.yml', 'w', encoding='utf-8') as f:
                  f.write('proxies:\n')
                  yaml.dump(valid_nodes, f, allow_unicode=True, sort_keys=False, default_flow_style=False)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/proxies.yml
          git diff --cached --quiet || git commit -m "Auto update proxies list (filtered) [skip ci]"
          git push
