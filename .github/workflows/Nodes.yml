name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py 获取 AutoMergePublicNodes 节点
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml
          echo "已复制 list.meta.yml 到 nodes/ 目录"

      - name: 获取 free-nodes/clashfree 最新订阅文件
        id: get_latest
        run: |
          # 获取 README 内容
          curl -s "https://raw.githubusercontent.com/free-nodes/clashfree/main/README.md" > readme.md
          
          # 提取所有 .yml 文件的 GitHub blob 链接并转换为 raw 链接
          grep -oP 'https://github.com/free-nodes/clashfree/blob/main/[^\)\s]+\.yml' readme.md | \
          while read blob_url; do
            raw_url=$(echo "$blob_url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
            echo "$raw_url"
          done | sort -r > urls.txt
          
          latest_url=$(head -n1 urls.txt)
          if [ -z "$latest_url" ]; then
            echo "错误：未在 README 中找到任何 .yml 订阅文件链接"
            exit 1
          fi
          
          echo "订阅文件 URL: $latest_url"
          echo "url=$latest_url" >> $GITHUB_OUTPUT

      - name: 下载 clashfree 节点列表
        run: |
          curl -L -o clashfree_nodes.yml "${{ steps.get_latest.outputs.url }}"

      - name: 合并节点为 Clash 配置格式
        run: |
          python3 << 'EOF'
          import yaml
          
          # 1. 读取 AutoMergePublicNodes 的 list.meta.yml
          with open('nodes/list.meta.yml', 'r', encoding='utf-8') as f:
              data1 = yaml.safe_load(f)
          proxies1 = data1.get('proxies', [])
          print(f"从 AutoMergePublicNodes 获取到 {len(proxies1)} 个节点")
          
          # 2. 读取 clashfree 订阅文件（已经是 Clash 格式）
          with open('clashfree_nodes.yml', 'r', encoding='utf-8', errors='ignore') as f:
              data2 = yaml.safe_load(f)
          proxies2 = data2.get('proxies', [])
          print(f"从 clashfree 获取到 {len(proxies2)} 个节点")
          
          # 合并所有节点
          all_proxies = proxies1 + proxies2
          print(f"合并后总节点数: {len(all_proxies)}")
          
          # 构建完整的 Clash 配置（只需 proxies 部分，测速工具可接受）
          clash_config = {
              'proxies': all_proxies
          }
          
          # 保存为 Clash 配置文件，供测速工具使用
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(clash_config, f, allow_unicode=True, sort_keys=False)
          EOF

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 安装 clash-speedtest
        run: go install github.com/faceair/clash-speedtest@latest

      - name: 测速并过滤节点
        run: |
          # 使用 clash-speedtest 测速，输出到 filtered.yaml
          # 参数说明：
          #   -c: 指定合并后的配置文件
          #   -output: 输出筛选后的配置
          #   -max-latency: 延迟超过 800ms 的节点将被过滤
          #   -min-download-speed: 下载速度低于 5 MB/s 的节点将被过滤
          #   -concurrent: 并发数设为 10 提高测速效率
          #   -timeout: 单次测速超时 5 秒
          ~/go/bin/clash-speedtest \
            -c merged_config.yaml \
            -output filtered.yaml \
            -max-latency 800ms \
            -min-download-speed 5 \
            -concurrent 10 \
            -timeout 5s \
            2>&1 | tee speedtest.log

      - name: 提取有效节点并保存为标准格式
        run: |
          python3 << 'EOF'
          import yaml
          
          # 读取测速筛选后的配置
          with open('filtered.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
          
          valid_proxies = data.get('proxies', [])
          print(f"测速筛选后有效节点数: {len(valid_proxies)}")
          
          # 保存为标准 YAML 格式
          with open('nodes/proxies.yml', 'w', encoding='utf-8') as f:
              yaml.dump(valid_proxies, f, allow_unicode=True, sort_keys=False)
          
          # 同时保存纯链接列表（从每个节点的 raw 字段提取）
          # 注意：clash-speedtest 输出中可能没有 raw 字段，这里仅保存原始节点的 YAML 表示
          with open('nodes/links.txt', 'w', encoding='utf-8') as f:
              for proxy in valid_proxies:
                  # 将每个节点转换为单行 YAML 表示
                  proxy_str = yaml.dump(proxy, default_flow_style=False).strip()
                  f.write(proxy_str + '\n\n')
          
          print(f"已保存到 nodes/proxies.yml 和 nodes/links.txt")
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/list.meta.yml nodes/proxies.yml nodes/links.txt
          git diff --cached --quiet || git commit -m "Auto update nodes from both sources [skip ci]"
          git push
