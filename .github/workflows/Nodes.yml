name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py 获取 AutoMergePublicNodes 节点
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml

      - name: 获取所有订阅源
        run: |
          mkdir -p sources

          readme1='https://github.com/free-nodes/clashfree/blob/main/README.md'
          readme2='https://github.com/free18/v2ray/blob/main/README.md'
          readme3=''
          readme4=''
          readme5=''
          sub1=''
          sub2=''
          sub3=''
          sub4=''
          sub5=''

          fetch_source() {
            local input="$1"
            local prefix="$2"
            echo "========================================"
            echo "处理源: $input"
            if [[ "$input" =~ ^https?://.*README\.md$ ]] || [[ "$input" =~ /blob/.*README\.md$ ]]; then
              if [[ "$input" =~ github\.com.*/blob/ ]]; then
                input=$(echo "$input" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
              fi
              echo "  下载 README: $input"
              curl -s -L "$input" > readme.tmp
              
              grep -Eo 'https?://[^[:space:]]+' readme.tmp | sed 's/[)"''),]\+$//' > all_urls_raw.txt
              echo "  找到的所有链接（清理后）:"
              cat all_urls_raw.txt
              
              grep -E '\.ya?ml$' all_urls_raw.txt > sub_urls.txt || true
              if [ -s sub_urls.txt ]; then
                echo "  ✅ 找到订阅链接 (.yml/.yaml):"
                cat sub_urls.txt
                echo "  开始下载..."
                while read -r url; do
                  if [[ "$url" =~ github\.com.*/blob/ ]]; then
                    url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
                  fi
                  echo "    下载: $url"
                  curl -L -o "sources/${prefix}_$(date +%s)_$RANDOM.yml" "$url"
                done < sub_urls.txt
              else
                echo "  ⚠️ 未找到订阅链接 (.yml/.yaml)"
                if grep -q '^proxies:' readme.tmp; then
                  echo "  📄 检测到 README 直接包含 Clash 配置，保存为配置文件"
                  cp readme.tmp "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml"
                else
                  echo "  ❌ 未找到任何可用内容"
                fi
              fi
            else
              echo "  直接订阅链接，开始下载..."
              curl -L -o "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml" "$input"
            fi
          }

          for url in "$readme1" "$readme2" "$readme3" "$readme4" "$readme5"; do
            [ -n "$url" ] && fetch_source "$url" "readme"
          done

          for url in "$sub1" "$sub2" "$sub3" "$sub4" "$sub5"; do
            [ -n "$url" ] && fetch_source "$url" "sub"
          done

          echo "========================================"
          echo "下载的源文件列表："
          ls -la sources/ || true

      - name: 合并节点
        run: |
          python3 << 'EOF'
          import yaml, glob, os
          all_proxies = []
          source_files = ['nodes/list.meta.yml'] + glob.glob('sources/*.yml')
          for f in source_files:
              if not os.path.exists(f): continue
              try:
                  data = yaml.safe_load(open(f, encoding='utf-8'))
                  proxies = data.get('proxies', [])
                  print(f"从 {f} 获取 {len(proxies)} 个节点")
                  all_proxies.extend(proxies)
              except Exception as e:
                  print(f"读取 {f} 失败: {e}")
          print(f"合并后总节点数: {len(all_proxies)}")
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump({'proxies': all_proxies}, f, allow_unicode=True, sort_keys=False)
          EOF

      - name: 清理节点名称（删除数字列表前缀）
        run: |
          python3 << 'EOF'
          import yaml, re
          with open('merged_config.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
          for p in data.get('proxies', []):
              if 'name' in p and isinstance(p['name'], str):
                  p['name'] = re.sub(r'^\d+(?:,\d+)*\|', '', p['name'])
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(data, f, allow_unicode=True, sort_keys=False)
          print("节点名称清理完成")
          EOF

      - name: 打包上传节点文件（用于分析）
        uses: actions/upload-artifact@v4
        with:
          name: nodes-for-analysis
          path: |
            merged_config.yaml
            nodes/list.meta.yml
            sources/*.yml
          retention-days: 3

      - name: 初步TCP测速过滤失效节点
        run: |
          python3 << 'EOF'
          import yaml, asyncio, time
          TIMEOUT = 3
          TEST_TIMES = 10
          SUCCESS_THRESHOLD = 5

          async def test_node_once(server, port):
              try:
                  start = time.time()
                  _, writer = await asyncio.wait_for(asyncio.open_connection(server, port), timeout=TIMEOUT)
                  writer.close(); await writer.wait_closed()
                  return True, time.time() - start
              except:
                  return False, None

          async def test_node(node):
              server, port = node.get('server'), node.get('port')
              if not server or not port: return node, 0, None
              success, latencies = 0, []
              for _ in range(TEST_TIMES):
                  ok, lat = await test_node_once(server, port)
                  if ok:
                      success += 1
                      latencies.append(lat)
              avg_lat = sum(latencies)/len(latencies) if latencies else None
              return node, success, avg_lat

          async def main():
              with open('merged_config.yaml') as f:
                  proxies = yaml.safe_load(f).get('proxies', [])
              print(f"测试 {len(proxies)} 个节点 (每个 {TEST_TIMES} 次)...")
              results = await asyncio.gather(*[test_node(n) for n in proxies])
              valid = []
              for node, success, avg in results:
                  if success >= SUCCESS_THRESHOLD:
                      valid.append(node)
                      print(f"✅ {node.get('name')} : {success}/{TEST_TIMES} 成功, 延迟 {avg:.2f}s")
                  else:
                      print(f"❌ {node.get('name')} : {success}/{TEST_TIMES} 失败")
              print(f"初步有效节点: {len(valid)} / {len(proxies)}")
              with open('preliminary_valid.yaml', 'w') as f:
                  yaml.dump({'proxies': valid}, f, allow_unicode=True, sort_keys=False)

          asyncio.run(main())
          EOF

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 安装 clash-speedtest
        run: go install github.com/faceair/clash-speedtest@latest

      - name: 二分定位崩溃节点并测速
        run: |
          python3 << 'EOF'
          import yaml, subprocess, os, sys

          INPUT_FILE = "preliminary_valid.yaml"
          SUSPECT_FILE = "suspect_nodes.yaml"
          SAFE_FILE = "safe_proxies.yaml"
          FINAL_OUTPUT = "filtered.yaml"
          SPEEDTEST_BIN = os.path.expanduser("~/go/bin/clash-speedtest")
          BASE_ARGS = ["-max-latency", "800ms", "-min-download-speed", "5", "-concurrent", "10", "-timeout", "5s"]

          def run_test(proxies):
              if not proxies: return True
              config = {"proxies": proxies}
              with open("temp_config.yaml", "w", encoding="utf-8") as f:
                  yaml.dump(config, f, allow_unicode=True, sort_keys=False)
              cmd = [SPEEDTEST_BIN, "-c", "temp_config.yaml", "-output", "temp_out.yaml"] + BASE_ARGS
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=120)
                  return result.returncode == 0 and os.path.exists("temp_out.yaml") and os.path.getsize("temp_out.yaml") > 0
              except:
                  return False

          def bisect(proxies, depth=0):
              indent = "  " * depth
              if run_test(proxies):
                  print(f"{indent}✅ 通过: {len(proxies)} 个节点")
                  return [], proxies[:]
              if len(proxies) == 1:
                  print(f"{indent}❌ 嫌疑节点: {proxies[0].get('name', '未知')}")
                  return proxies[:], []
              mid = len(proxies) // 2
              left, right = proxies[:mid], proxies[mid:]
              print(f"{indent}拆分 {len(proxies)} -> {len(left)} + {len(right)}")
              bad1, good1 = bisect(left, depth+1)
              bad2, good2 = bisect(right, depth+1)
              return bad1 + bad2, good1 + good2

          if not os.path.exists(SPEEDTEST_BIN):
              print("clash-speedtest 未安装")
              sys.exit(1)

          with open(INPUT_FILE, "r", encoding="utf-8") as f:
              all_proxies = yaml.safe_load(f).get("proxies", [])
          print(f"开始二分定位，总数: {len(all_proxies)}")

          bad, good = bisect(all_proxies)
          print(f"嫌疑: {len(bad)}, 安全: {len(good)}")

          with open(SUSPECT_FILE, "w", encoding="utf-8") as f:
              yaml.dump({"proxies": bad}, f, allow_unicode=True, sort_keys=False)
          with open(SAFE_FILE, "w", encoding="utf-8") as f:
              yaml.dump({"proxies": good}, f, allow_unicode=True, sort_keys=False)

          if good:
              print("对安全节点执行完整测速...")
              with open("temp_good.yaml", "w", encoding="utf-8") as f:
                  yaml.dump({"proxies": good}, f, allow_unicode=True, sort_keys=False)
              cmd = [SPEEDTEST_BIN, "-c", "temp_good.yaml", "-output", FINAL_OUTPUT] + ["-concurrent", "20"] + BASE_ARGS[1:]
              subprocess.run(cmd, timeout=180)
              if os.path.exists(FINAL_OUTPUT) and os.path.getsize(FINAL_OUTPUT) > 0:
                  with open(FINAL_OUTPUT, "r", encoding="utf-8") as f:
                      final_count = len(yaml.safe_load(f).get("proxies", []))
                  print(f"最终高质量节点: {final_count}")
              else:
                  print("完整测速失败，使用安全节点作为最终输出")
                  with open(FINAL_OUTPUT, "w", encoding="utf-8") as f:
                      yaml.dump({"proxies": good}, f, allow_unicode=True, sort_keys=False)
          else:
              print("无安全节点，降级使用初步结果")
              with open(FINAL_OUTPUT, "w", encoding="utf-8") as f:
                  yaml.dump({"proxies": all_proxies}, f, allow_unicode=True, sort_keys=False)

          for tmp in ["temp_config.yaml", "temp_out.yaml", "temp_good.yaml"]:
              if os.path.exists(tmp): os.remove(tmp)
          EOF

      - name: 上传二分定位结果
        uses: actions/upload-artifact@v4
        with:
          name: bisect-results
          path: |
            suspect_nodes.yaml
            safe_proxies.yaml
            filtered.yaml
          retention-days: 7

      - name: 保存最终订阅文件
        run: |
          if [ -f filtered.yaml ] && [ -s filtered.yaml ]; then
            cp filtered.yaml nodes/proxies.yml
          else
            cp preliminary_valid.yaml nodes/proxies.yml
          fi
          python3 -c "import yaml; print('最终有效节点数:', len(yaml.safe_load(open('nodes/proxies.yml'))['proxies']))"
          python3 << 'EOF'
          import yaml
          with open('nodes/proxies.yml') as f:
              proxies = yaml.safe_load(f).get('proxies', [])
          with open('nodes/links.txt', 'w') as f:
              for p in proxies:
                  f.write(yaml.dump(p, default_flow_style=False).strip() + '\n\n')
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add nodes/list.meta.yml nodes/proxies.yml nodes/links.txt
          git diff --cached --quiet || git commit -m "Auto update nodes [skip ci]"
          git push origin ${{ github.ref_name }}
