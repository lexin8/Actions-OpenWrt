name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py 获取 AutoMergePublicNodes 节点
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml
          echo "已复制 list.meta.yml 到 nodes/ 目录"

      - name: 获取 free-nodes/clashfree 最新订阅文件
        id: get_latest
        run: |
          # 获取 README 内容
          curl -s "https://raw.githubusercontent.com/free-nodes/clashfree/main/README.md" > readme.md
          
          # 提取所有 .yml 文件的 GitHub blob 链接并转换为 raw 链接
          grep -oP 'https://github.com/free-nodes/clashfree/blob/main/[^\)\s]+\.yml' readme.md | \
          while read blob_url; do
            raw_url=$(echo "$blob_url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
            echo "$raw_url"
          done | sort -r > urls.txt
          
          latest_url=$(head -n1 urls.txt)
          if [ -z "$latest_url" ]; then
            echo "错误：未在 README 中找到任何 .yml 订阅文件链接"
            exit 1
          fi
          
          echo "订阅文件 URL: $latest_url"
          echo "url=$latest_url" >> $GITHUB_OUTPUT

      - name: 下载 clashfree 节点列表
        run: |
          curl -L -o v2rayfree_nodes.txt "${{ steps.get_latest.outputs.url }}"

      - name: 合并节点并转换为标准格式
        run: |
          python3 << 'EOF'
          import yaml
          import base64
          import re
          import urllib.parse

          # 解析 Clash YAML 格式的 proxies
          def parse_clash_yaml(content):
              try:
                  data = yaml.safe_load(content)
                  proxies = data.get('proxies', [])
                  # 确保每个节点都有 server 和 port 字段，否则测速会失败
                  for node in proxies:
                      if 'server' not in node or 'port' not in node:
                          continue
                      # 添加 raw 字段（可选，用于 links.txt）
                      node['raw'] = yaml.dump(node, default_flow_style=False).strip()
                  return proxies
              except Exception as e:
                  print(f"解析 Clash YAML 失败: {e}")
                  return []

          # 1. 读取 AutoMergePublicNodes 的 list.meta.yml
          with open('nodes/list.meta.yml', 'r', encoding='utf-8') as f:
              data1 = yaml.safe_load(f)
          proxies1 = data1.get('proxies', [])
          print(f"从 AutoMergePublicNodes 获取到 {len(proxies1)} 个节点")

          # 2. 解析 clashfree 订阅文件（Clash YAML 格式）
          with open('v2rayfree_nodes.txt', 'r', encoding='utf-8', errors='ignore') as f:
              content = f.read()
          proxies2 = parse_clash_yaml(content)
          print(f"从 clashfree 获取到 {len(proxies2)} 个节点")

          # 合并
          combined = proxies1 + proxies2
          print(f"合并后总节点数: {len(combined)}")

          # 保存合并后的节点供测速
          with open('combined_nodes.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(combined, f, allow_unicode=True)
          EOF

      - name: 测速并过滤失效节点（每个节点测试10次）
        run: |
          python3 << 'EOF'
          import yaml
          import asyncio
          import time

          TIMEOUT = 3
          TEST_TIMES = 10
          SUCCESS_THRESHOLD = 5

          async def test_node_once(server, port):
              try:
                  start = time.time()
                  _, writer = await asyncio.wait_for(
                      asyncio.open_connection(server, port),
                      timeout=TIMEOUT
                  )
                  elapsed = time.time() - start
                  writer.close()
                  await writer.wait_closed()
                  return True, elapsed
              except:
                  return False, None

          async def test_node(node):
              server = node.get('server')
              port = node.get('port')
              if not server or not port:
                  # 无法测速的节点，视为失败
                  return node, 0, None
              success = 0
              latencies = []
              for _ in range(TEST_TIMES):
                  ok, lat = await test_node_once(server, port)
                  if ok:
                      success += 1
                      latencies.append(lat)
              avg_latency = sum(latencies) / len(latencies) if latencies else None
              return node, success, avg_latency

          async def main():
              with open('combined_nodes.yaml', 'r', encoding='utf-8') as f:
                  combined = yaml.safe_load(f)
              
              print(f"开始测试 {len(combined)} 个节点（每个节点测试 {TEST_TIMES} 次）...")
              tasks = [test_node(node) for node in combined]
              results = await asyncio.gather(*tasks)

              valid_nodes = []
              valid_raw = []
              for node, success, avg_latency in results:
                  if success >= SUCCESS_THRESHOLD:
                      valid_nodes.append(node)
                      if 'raw' in node:
                          valid_raw.append(node['raw'])
                      name = node.get('name', 'unknown')
                      server = node.get('server', 'unknown')
                      port = node.get('port', 'unknown')
                      print(f"✅ {name} ({server}:{port}) : {success}/{TEST_TIMES} 成功, 平均延迟 {avg_latency:.2f}s")
                  else:
                      name = node.get('name', 'unknown')
                      server = node.get('server', 'unknown')
                      port = node.get('port', 'unknown')
                      print(f"❌ 失效节点: {name} ({server}:{port}) - 成功率 {success}/{TEST_TIMES}")

              print(f"有效节点数: {len(valid_nodes)} / {len(combined)}")

              # 保存标准 YAML 格式（移除 raw 字段）
              with open('nodes/proxies.yml', 'w', encoding='utf-8') as f:
                  f.write('proxies:\n')
                  clean_nodes = []
                  for node in valid_nodes:
                      clean_node = {k: v for k, v in node.items() if k != 'raw'}
                      clean_nodes.append(clean_node)
                  yaml.dump(clean_nodes, f, allow_unicode=True, sort_keys=False, default_flow_style=False)
              
              # 保存纯链接列表（从 raw 字段提取）
              with open('nodes/links.txt', 'w', encoding='utf-8') as f:
                  for raw in valid_raw:
                      if raw:
                          f.write(raw + '\n')

          if __name__ == '__main__':
              asyncio.run(main())
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/list.meta.yml nodes/proxies.yml nodes/links.txt
          git diff --cached --quiet || git commit -m "Auto update nodes from both sources [skip ci]"
          git push
