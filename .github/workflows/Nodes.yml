name: Update Nodes

on:
  workflow_dispatch:
    inputs:
      readme_url1:
        description: 'README 链接 1（从中提取 .yml 订阅或节点链接）'
        required: false
        default: 'https://github.com/free-nodes/clashfree/blob/main/README.md'
      readme_url2:
        description: 'README 链接 2（可选）'
        required: false
        default: 'https://github.com/free18/v2ray/blob/main/README.md'
      readme_url3:
        description: 'README 链接 3（可选）'
        required: false
        default: ''
      readme_url4:
        description: 'README 链接 4（可选）'
        required: false
        default: ''
      readme_url5:
        description: 'README 链接 5（可选）'
        required: false
        default: ''
      sub_url1:
        description: '直接订阅链接 1（Clash 配置）'
        required: false
        default: ''
      sub_url2:
        description: '直接订阅链接 2（可选）'
        required: false
        default: ''
      sub_url3:
        description: '直接订阅链接 3（可选）'
        required: false
        default: ''
      sub_url4:
        description: '直接订阅链接 4（可选）'
        required: false
        default: ''
      sub_url5:
        description: '直接订阅链接 5（可选）'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py 获取 AutoMergePublicNodes 节点
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml

      - name: 获取所有订阅源
        run: |
          mkdir -p sources

          # 先将输入值赋给 shell 变量
          readme1="${{ github.event.inputs.readme_url1 }}"
          readme2="${{ github.event.inputs.readme_url2 }}"
          readme3="${{ github.event.inputs.readme_url3 }}"
          readme4="${{ github.event.inputs.readme_url4 }}"
          readme5="${{ github.event.inputs.readme_url5 }}"
          sub1="${{ github.event.inputs.sub_url1 }}"
          sub2="${{ github.event.inputs.sub_url2 }}"
          sub3="${{ github.event.inputs.sub_url3 }}"
          sub4="${{ github.event.inputs.sub_url4 }}"
          sub5="${{ github.event.inputs.sub_url5 }}"

          fetch_source() {
            local input="$1"
            local prefix="$2"
            echo "========================================"
            echo "处理源: $input"
            if [[ "$input" =~ ^https?://.*README\.md$ ]] || [[ "$input" =~ /blob/.*README\.md$ ]]; then
              if [[ "$input" =~ github\.com.*/blob/ ]]; then
                input=$(echo "$input" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
              fi
              echo "  下载 README: $input"
              curl -s -L "$input" > readme.tmp
              # 提取所有可能的 URL（包括被括号、引号包裹的）
              grep -Eo 'https?://[^ ]+' readme.tmp | sed 's/[),]//g' > all_urls.txt
              # 筛选 .yml 结尾的 URL
              grep '\.yml$' all_urls.txt > yml_urls.txt
              if [ -s yml_urls.txt ]; then
                echo "  找到 .yml 链接:"
                cat yml_urls.txt
                echo "  开始下载..."
                while read -r url; do
                  if [[ "$url" =~ github\.com.*/blob/ ]]; then
                    url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
                  fi
                  curl -L -o "sources/${prefix}_$(date +%s)_$RANDOM.yml" "$url"
                done < yml_urls.txt
              else
                echo "  未找到 .yml 链接，尝试提取节点链接"
                grep -Eo '(vmess|trojan|vless|ss)://[^ ]+' readme.tmp | sed 's/[),]//g' > node_links.txt
                if [ -s node_links.txt ]; then
                  echo "  找到节点链接:"
                  cat node_links.txt
                  echo "  开始转换..."
                  python3 << 'PYTHON'
          import yaml
          import base64
          import urllib.parse
          import re

          def parse_vmess(uri):
              if not uri.startswith('vmess://'):
                  return None
              b64 = uri[8:]
              tag = None
              if '#' in b64:
                  b64, tag = b64.split('#', 1)
              b64 += '=' * (4 - len(b64) % 4)
              try:
                  data = yaml.safe_load(base64.b64decode(b64))
                  node = {
                      'name': tag or data.get('ps', f"node_{data.get('add')}_{data.get('port')}"),
                      'type': 'vmess',
                      'server': data.get('add'),
                      'port': int(data.get('port', 0)),
                      'uuid': data.get('id'),
                      'alterId': int(data.get('aid', 0)),
                      'cipher': data.get('scy', 'auto'),
                  }
                  if data.get('tls'):
                      node['tls'] = True
                  if data.get('sni'):
                      node['sni'] = data['sni']
                  if data.get('net'):
                      node['network'] = data['net']
                  if data.get('path'):
                      node['ws-path'] = data['path']
                  if data.get('host'):
                      node['ws-headers'] = {'Host': data['host']}
                  return node
              except:
                  return None

          def parse_trojan(uri):
              if not uri.startswith('trojan://'):
                  return None
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
              uri = uri[9:]
              if '?' in uri:
                  uri, query = uri.split('?', 1)
              else:
                  query = ''
              match = re.match(r'([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              password, server, port = match.groups()
              node = {
                  'name': tag or f"node_trojan_{server}_{port}",
                  'type': 'trojan',
                  'server': server,
                  'port': int(port),
                  'password': password,
              }
              if query:
                  params = urllib.parse.parse_qs(query)
                  if 'sni' in params:
                      node['sni'] = params['sni'][0]
                  if 'allowInsecure' in params:
                      node['skip-cert-verify'] = params['allowInsecure'][0] == '1'
              return node

          def parse_vless(uri):
              if not uri.startswith('vless://'):
                  return None
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
              uri = uri[8:]
              if '?' in uri:
                  uri, query = uri.split('?', 1)
              else:
                  query = ''
              match = re.match(r'([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              uuid, server, port = match.groups()
              node = {
                  'name': tag or f"node_vless_{server}_{port}",
                  'type': 'vless',
                  'server': server,
                  'port': int(port),
                  'uuid': uuid,
              }
              if query:
                  params = urllib.parse.parse_qs(query)
                  if 'encryption' in params:
                      node['encryption'] = params['encryption'][0]
                  if 'flow' in params:
                      node['flow'] = params['flow'][0]
                  if 'sni' in params:
                      node['sni'] = params['sni'][0]
                  if 'type' in params:
                      node['network'] = params['type'][0]
                  if 'security' in params:
                      node['tls'] = params['security'][0] == 'tls'
              return node

          def parse_ss(uri):
              if not uri.startswith('ss://'):
                  return None
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
              uri = uri[5:]
              if '@' not in uri:
                  try:
                      decoded = base64.b64decode(uri).decode('utf-8')
                      if '@' in decoded:
                          uri = decoded
                  except:
                      return None
              match = re.match(r'([^:]+):([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              method, password, server, port = match.groups()
              node = {
                  'name': tag or f"node_ss_{server}_{port}",
                  'type': 'ss',
                  'server': server,
                  'port': int(port),
                  'cipher': method,
                  'password': password,
              }
              return node

          proxies = []
          with open('node_links.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('vmess://'):
                      node = parse_vmess(line)
                  elif line.startswith('trojan://'):
                      node = parse_trojan(line)
                  elif line.startswith('vless://'):
                      node = parse_vless(line)
                  elif line.startswith('ss://'):
                      node = parse_ss(line)
                  else:
                      continue
                  if node:
                      proxies.append(node)

          if proxies:
              with open('sources/node_proxies.yml', 'w') as f:
                  yaml.dump({'proxies': proxies}, f, allow_unicode=True, sort_keys=False)
              print(f"从节点链接转换得到 {len(proxies)} 个节点")
          else:
              print("未找到节点链接")
          PYTHON
                else
                  echo "  未找到任何节点链接"
                fi
              fi
            else
              curl -L -o "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml" "$input"
            fi
          }

          # 处理 README 源
          for url in "$readme1" "$readme2" "$readme3" "$readme4" "$readme5"; do
            if [ -n "$url" ]; then
              fetch_source "$url" "readme"
            fi
          done

          # 处理直接订阅源
          for url in "$sub1" "$sub2" "$sub3" "$sub4" "$sub5"; do
            if [ -n "$url" ]; then
              fetch_source "$url" "sub"
            fi
          done

          echo "========================================"
          echo "下载的源文件列表："
          ls -la sources/ || true

      - name: 合并节点
        run: |
          python3 << 'EOF'
          import yaml, glob, os
          all_proxies = []
          source_files = ['nodes/list.meta.yml'] + glob.glob('sources/*.yml')
          for f in source_files:
              if not os.path.exists(f): continue
              try:
                  data = yaml.safe_load(open(f, encoding='utf-8'))
                  proxies = data.get('proxies', [])
                  print(f"从 {f} 获取 {len(proxies)} 个节点")
                  all_proxies.extend(proxies)
              except Exception as e:
                  print(f"读取 {f} 失败: {e}")
          print(f"合并后总节点数: {len(all_proxies)}")
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump({'proxies': all_proxies}, f, allow_unicode=True, sort_keys=False)
          EOF

      - name: 初步TCP测速过滤失效节点
        run: |
          python3 << 'EOF'
          import yaml, asyncio, time
          TIMEOUT = 3
          TEST_TIMES = 10
          SUCCESS_THRESHOLD = 5

          async def test_node_once(server, port):
              try:
                  start = time.time()
                  _, writer = await asyncio.wait_for(asyncio.open_connection(server, port), timeout=TIMEOUT)
                  writer.close(); await writer.wait_closed()
                  return True, time.time() - start
              except:
                  return False, None

          async def test_node(node):
              server, port = node.get('server'), node.get('port')
              if not server or not port: return node, 0, None
              success, latencies = 0, []
              for _ in range(TEST_TIMES):
                  ok, lat = await test_node_once(server, port)
                  if ok:
                      success += 1
                      latencies.append(lat)
              avg_lat = sum(latencies)/len(latencies) if latencies else None
              return node, success, avg_lat

          async def main():
              with open('merged_config.yaml') as f:
                  proxies = yaml.safe_load(f).get('proxies', [])
              print(f"测试 {len(proxies)} 个节点 (每个 {TEST_TIMES} 次)...")
              results = await asyncio.gather(*[test_node(n) for n in proxies])
              valid = []
              for node, success, avg in results:
                  if success >= SUCCESS_THRESHOLD:
                      valid.append(node)
                      print(f"✅ {node.get('name')} : {success}/{TEST_TIMES} 成功, 延迟 {avg:.2f}s")
                  else:
                      print(f"❌ {node.get('name')} : {success}/{TEST_TIMES} 失败")
              print(f"初步有效节点: {len(valid)} / {len(proxies)}")
              with open('preliminary_valid.yaml', 'w') as f:
                  yaml.dump({'proxies': valid}, f, allow_unicode=True, sort_keys=False)

          asyncio.run(main())
          EOF

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 安装 clash-speedtest
        run: go install github.com/faceair/clash-speedtest@latest

      - name: clash-speedtest 精确测速
        run: |
          ~/go/bin/clash-speedtest \
            -c preliminary_valid.yaml \
            -output filtered.yaml \
            -max-latency 800ms \
            -min-download-speed 5 \
            -concurrent 10 \
            -timeout 5s \
            2>&1 | tee speedtest.log

      - name: 保存最终订阅文件
        run: |
          cp filtered.yaml nodes/proxies.yml
          python3 -c "import yaml; print('最终有效节点数:', len(yaml.safe_load(open('filtered.yaml'))['proxies']))"
          python3 << 'EOF'
          import yaml
          with open('filtered.yaml') as f:
              proxies = yaml.safe_load(f).get('proxies', [])
          with open('nodes/links.txt', 'w') as f:
              for p in proxies:
                  f.write(yaml.dump(p, default_flow_style=False).strip() + '\n\n')
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/list.meta.yml nodes/proxies.yml nodes/links.txt
          git diff --cached --quiet || git commit -m "Auto update nodes [skip ci]"
          git push
