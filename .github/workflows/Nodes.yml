name: Test Fetch Subscriptions

on:
  workflow_dispatch:
    inputs:
      readme_url1:
        description: '第一个 README 链接'
        required: false
        default: 'https://github.com/free-nodes/clashfree/blob/main/README.md'
      readme_url2:
        description: '第二个 README 链接'
        required: false
        default: 'https://github.com/free18/v2ray/blob/main/README.md'

permissions:
  contents: read

jobs:
  test-fetch:
    runs-on: ubuntu-22.04
    steps:
      - name: 创建临时目录
        run: mkdir -p sources

      - name: 获取所有订阅源
        run: |
          mkdir -p sources

          # 将输入值赋给 shell 变量
          readme1="${{ github.event.inputs.readme_url1 }}"
          readme2="${{ github.event.inputs.readme_url2 }}"
          readme3="${{ github.event.inputs.readme_url3 }}"
          readme4="${{ github.event.inputs.readme_url4 }}"
          readme5="${{ github.event.inputs.readme_url5 }}"
          sub1="${{ github.event.inputs.sub_url1 }}"
          sub2="${{ github.event.inputs.sub_url2 }}"
          sub3="${{ github.event.inputs.sub_url3 }}"
          sub4="${{ github.event.inputs.sub_url4 }}"
          sub5="${{ github.event.inputs.sub_url5 }}"

          fetch_source() {
            local input="$1"
            local prefix="$2"
            echo "========================================"
            echo "处理源: $input"
            if [[ "$input" =~ ^https?://.*README\.md$ ]] || [[ "$input" =~ /blob/.*README\.md$ ]]; then
              if [[ "$input" =~ github\.com.*/blob/ ]]; then
                input=$(echo "$input" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
              fi
              echo "  下载 README: $input"
              curl -s -L "$input" > readme.tmp
              
              # 提取所有链接（包括 .yml 和其他）
              grep -Eo 'https?://[^ ]+' readme.tmp | sed 's/[),]//g' > all_urls.txt || true
              echo "  找到的所有链接:"
              cat all_urls.txt
              
              # 提取 .yml 链接
              grep '\.yml$' all_urls.txt > yml_urls.txt || true
              if [ -s yml_urls.txt ]; then
                echo "  ✅ 找到 .yml 链接:"
                cat yml_urls.txt
                echo "  开始下载..."
                while read -r url; do
                  if [[ "$url" =~ github\.com.*/blob/ ]]; then
                    url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
                  fi
                  curl -L -o "sources/${prefix}_$(date +%s)_$RANDOM.yml" "$url"
                done < yml_urls.txt
              else
                echo "  ⚠️ 未找到 .yml 链接"
              fi
            else
              echo "  直接订阅链接，直接下载"
              curl -L -o "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml" "$input"
            fi
          }

          # 处理 README 源
          for url in "$readme1" "$readme2" "$readme3" "$readme4" "$readme5"; do
            if [ -n "$url" ]; then
              fetch_source "$url" "readme"
            fi
          done

          # 处理直接订阅源
          for url in "$sub1" "$sub2" "$sub3" "$sub4" "$sub5"; do
            if [ -n "$url" ]; then
              fetch_source "$url" "sub"
            fi
          done

          echo "========================================"
          echo "下载的源文件列表："
          ls -la sources/ || true

      - name: 统计节点数量
        run: |
          echo "========================================"
          echo "各源文件中的节点数量统计："
          for file in sources/*.yml; do
            if [ -f "$file" ]; then
              count=$(python3 -c "import yaml; data=yaml.safe_load(open('$file')); print(len(data.get('proxies', [])))" 2>/dev/null || echo "解析失败")
              echo "$file : $count 个节点"
            fi
          done
          echo "========================================"
          echo "测试完成。"
