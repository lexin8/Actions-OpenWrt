name: Extract and Filter Free Nodes

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  extract-and-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download list.meta.yml
        run: |
          curl -L -o list.meta.yml \
            "https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

      - name: Extract proxies (raw)
        run: |
          mkdir -p nodes
          echo "proxies:" > nodes/proxies_raw.yaml
          yq '.proxies' list.meta.yml >> nodes/proxies_raw.yaml

      - name: Download mihomo (Clash.Meta)
        run: |
          wget -qO mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-alpha.gz
          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/

      - name: Test nodes with mihomo
        run: |
          # 创建临时配置文件
          cat > test-config.yaml << 'EOF'
          mixed-port: 7890
          allow-lan: false
          mode: rule
          log-level: warning
          external-controller: 127.0.0.1:9090

          proxies: []  # 占位，后面会用 yq 覆盖

          proxy-groups:
            - name: PROXY
              type: select
              proxies:
                - *  # 动态填充所有节点

          rules:
            - MATCH,PROXY
          EOF

          # 将 nodes/proxies_raw.yaml 中的 proxies 合并到 test-config.yaml
          yq eval-all '. as $item ireduce ({}; . * $item)' nodes/proxies_raw.yaml test-config.yaml > test-config-merged.yaml

          # 启动 mihomo 后台运行
          /usr/local/bin/mihomo -d . -f test-config-merged.yaml &
          sleep 5

          # 通过 REST API 获取所有节点的延迟
          curl -s -X GET "http://127.0.0.1:9090/proxies/PROXY" | jq -r '.all[]' > all_proxies.txt

          # 测试每个节点延迟（需要循环调用 /proxies/{name}/delay）
          while read name; do
            delay=$(curl -s -X GET "http://127.0.0.1:9090/proxies/${name}/delay?timeout=5000&url=http://www.gstatic.com/generate_204" | jq '.delay')
            echo "$name $delay"
          done < all_proxies.txt > delays.txt

          # 停止 mihomo
          pkill mihomo

          # 过滤出延迟 <= 300ms 且不为 null 的节点
          awk '$2 != "null" && $2 <= 300 {print $1}' delays.txt > good_nodes.txt

      - name: Generate filtered proxies.yaml
        run: |
          # 读取 nodes/proxies_raw.yaml 中的节点列表，只保留 good_nodes.txt 中的节点
          python << 'EOF'
          import yaml

          with open('nodes/proxies_raw.yaml', 'r') as f:
              raw = yaml.safe_load(f)
          nodes = raw.get('proxies', [])

          with open('good_nodes.txt', 'r') as f:
              good_names = set(line.strip() for line in f)

          filtered = [node for node in nodes if node.get('name') in good_names]

          with open('nodes/proxies.yaml', 'w') as f:
              yaml.dump({'proxies': filtered}, f, allow_unicode=True, default_flow_style=False)
          EOF

      - name: Commit and push filtered nodes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/proxies.yaml
          git diff --cached --quiet || git commit -m "Update filtered nodes/proxies.yaml [skip ci]"
          git push
