name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py 获取 AutoMergePublicNodes 节点
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml
          echo "已复制 list.meta.yml 到 nodes/ 目录"

      - name: 获取 free-nodes/clashfree 最新订阅文件
        id: get_latest
        run: |
          # 获取 README 内容
          curl -s "https://raw.githubusercontent.com/free-nodes/clashfree/main/README.md" > readme.md
          
          # 提取所有 .yml 文件的 GitHub blob 链接并转换为 raw 链接
          grep -oP 'https://github.com/free-nodes/clashfree/blob/main/[^\)\s]+\.yml' readme.md | \
          while read blob_url; do
            raw_url=$(echo "$blob_url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
            echo "$raw_url"
          done | sort -r > urls.txt
          
          latest_url=$(head -n1 urls.txt)
          if [ -z "$latest_url" ]; then
            echo "错误：未在 README 中找到任何 .yml 订阅文件链接"
            exit 1
          fi
          
          echo "订阅文件 URL: $latest_url"
          echo "url=$latest_url" >> $GITHUB_OUTPUT

      - name: 下载 clashfree 节点列表
        run: |
          curl -L -o clashfree_nodes.yml "${{ steps.get_latest.outputs.url }}"

      - name: 合并节点为 Clash 配置格式
        run: |
          python3 << 'EOF'
          import yaml
          
          # 1. 读取 AutoMergePublicNodes 的 list.meta.yml
          with open('nodes/list.meta.yml', 'r', encoding='utf-8') as f:
              data1 = yaml.safe_load(f)
          proxies1 = data1.get('proxies', [])
          print(f"从 AutoMergePublicNodes 获取到 {len(proxies1)} 个节点")
          
          # 2. 读取 clashfree 订阅文件（已经是 Clash 格式）
          with open('clashfree_nodes.yml', 'r', encoding='utf-8', errors='ignore') as f:
              data2 = yaml.safe_load(f)
          proxies2 = data2.get('proxies', [])
          print(f"从 clashfree 获取到 {len(proxies2)} 个节点")
          
          # 合并所有节点
          all_proxies = proxies1 + proxies2
          print(f"合并后总节点数: {len(all_proxies)}")
          
          # 构建完整的 Clash 配置（只需 proxies 部分）
          clash_config = {
              'proxies': all_proxies
          }
          
          # 保存为 Clash 配置文件，供后续使用
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(clash_config, f, allow_unicode=True, sort_keys=False)
          EOF

      - name: 初步TCP测速过滤失效节点（每个节点测试10次）
        run: |
          python3 << 'EOF'
          import yaml
          import asyncio
          import time

          TIMEOUT = 3
          TEST_TIMES = 10
          SUCCESS_THRESHOLD = 5

          async def test_node_once(server, port):
              try:
                  start = time.time()
                  _, writer = await asyncio.wait_for(
                      asyncio.open_connection(server, port),
                      timeout=TIMEOUT
                  )
                  elapsed = time.time() - start
                  writer.close()
                  await writer.wait_closed()
                  return True, elapsed
              except:
                  return False, None

          async def test_node(node):
              server = node.get('server')
              port = node.get('port')
              if not server or not port:
                  # 无法测速的节点，视为失败
                  return node, 0, None
              success = 0
              latencies = []
              for _ in range(TEST_TIMES):
                  ok, lat = await test_node_once(server, port)
                  if ok:
                      success += 1
                      latencies.append(lat)
              avg_latency = sum(latencies) / len(latencies) if latencies else None
              return node, success, avg_latency

          async def main():
              # 读取合并后的所有节点
              with open('merged_config.yaml', 'r', encoding='utf-8') as f:
                  merged = yaml.safe_load(f)
              proxies = merged.get('proxies', [])
              
              print(f"开始对 {len(proxies)} 个节点进行初步TCP测速（每个节点测试 {TEST_TIMES} 次）...")
              tasks = [test_node(node) for node in proxies]
              results = await asyncio.gather(*tasks)

              valid_nodes = []
              for node, success, avg_latency in results:
                  if success >= SUCCESS_THRESHOLD:
                      valid_nodes.append(node)
                      name = node.get('name', 'unknown')
                      server = node.get('server', 'unknown')
                      port = node.get('port', 'unknown')
                      print(f"✅ 初步通过: {name} ({server}:{port}) : {success}/{TEST_TIMES} 成功, 平均延迟 {avg_latency:.2f}s")
                  else:
                      name = node.get('name', 'unknown')
                      server = node.get('server', 'unknown')
                      port = node.get('port', 'unknown')
                      print(f"❌ 初步失效: {name} ({server}:{port}) - 成功率 {success}/{TEST_TIMES}")

              print(f"初步有效节点数: {len(valid_nodes)} / {len(proxies)}")

              # 保存初步有效节点为 Clash 配置格式
              preliminary_config = {'proxies': valid_nodes}
              with open('preliminary_valid.yaml', 'w', encoding='utf-8') as f:
                  yaml.dump(preliminary_config, f, allow_unicode=True, sort_keys=False)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 安装 clash-speedtest
        run: go install github.com/faceair/clash-speedtest@latest

      - name: 使用 clash-speedtest 进行精确测速并筛选
        run: |
          # 使用 clash-speedtest 对初步有效节点进行精确测速
          # 参数说明：
          #   -c: 指定初步有效节点配置文件
          #   -output: 输出最终筛选后的配置
          #   -max-latency: 延迟超过 800ms 的节点将被过滤
          #   -min-download-speed: 下载速度低于 5 MB/s 的节点将被过滤
          #   -concurrent: 并发数设为 10 提高测速效率
          #   -timeout: 单次测速超时 5 秒
          ~/go/bin/clash-speedtest \
            -c preliminary_valid.yaml \
            -output filtered.yaml \
            -max-latency 800ms \
            -min-download-speed 5 \
            -concurrent 10 \
            -timeout 5s \
            2>&1 | tee speedtest.log

      - name: 保存最终订阅文件
        run: |
          # filtered.yaml 已经是标准的 Clash 配置（包含 proxies 键），直接复制
          cp filtered.yaml nodes/proxies.yml
          
          # 可选：生成纯节点列表（仅 proxies 数组）便于其他用途
          python3 << 'EOF'
          import yaml
          with open('filtered.yaml', 'r') as f:
              config = yaml.safe_load(f)
          proxies = config.get('proxies', [])
          with open('nodes/links.txt', 'w') as f:
              for proxy in proxies:
                  # 输出每个节点的 YAML 表示，便于阅读
                  f.write(yaml.dump(proxy, default_flow_style=False).strip())
                  f.write('\n\n')
          EOF
          
          # 输出最终有效节点数量
          python3 -c "import yaml; print('最终有效节点数:', len(yaml.safe_load(open('filtered.yaml'))['proxies']))"

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/list.meta.yml nodes/proxies.yml nodes/links.txt
          git diff --cached --quiet || git commit -m "Auto update nodes from both sources [skip ci]"
          git push
