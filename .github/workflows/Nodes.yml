name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装基础依赖
        run: sudo apt-get install -y python3-pip python3-yaml || true

      - name: 克隆 AutoMergePublicNodes
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1 || true

      - name: 修复依赖配置
        run: |
          cd AutoMergePublicNodes 2>/dev/null || exit 0
          sed -i 's|requests-file @ git+.*|requests-file==1.5.1|' requirements.txt 2>/dev/null
          sed -i 's/base64.b64decode(ss.encode.*)/base64.b64decode(ss.encode("utf-8"), validate=False)/' fetch.py 2>/dev/null
          sed -i 's/unquote(parsed.username)/unquote(parsed.username or "")/' fetch.py 2>/dev/null

      - name: 安装Python依赖
        run: |
          cd AutoMergePublicNodes 2>/dev/null || exit 0
          python3 -m pip install -r requirements.txt --upgrade || true

      - name: 运行节点抓取
        run: |
          cd AutoMergePublicNodes 2>/dev/null || exit 0
          python3 fetch.py 2>&1 | tee output.log || true

      - name: 复制节点文件
        run: |
          mkdir -p nodes
          [ -f AutoMergePublicNodes/list.meta.yml ] && cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml || true

      - name: 获取稳定订阅源（修复退出码1，全容错）
        run: |
          mkdir -p sources
          rm -f readme.tmp all_urls_raw.txt sub_urls.txt 2>/dev/null

          # 只保留稳定可用源，移除报错源
          readme1='https://github.com/free-nodes/clashfree/blob/main/README.md'
          readme2=''
          readme3=''
          sub1=''

          fetch_source() {
            local input="$1"
            local prefix="$2"
            echo "========================================"
            echo "处理源: $input"
            if [[ "$input" =~ ^https?://.*README\.md$ ]] || [[ "$input" =~ /blob/.*README\.md$ ]]; then
              if [[ "$input" =~ github\.com.*/blob/ ]]; then
                input=$(echo "$input" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|' 2>/dev/null)
              fi
              echo "下载: $input"
              curl -s -L --connect-timeout 8 --max-time 20 "$input" > readme.tmp 2>/dev/null || { echo "下载失败，跳过"; return; }
              
              grep -Eo 'https?://[^[:space:]]+' readme.tmp 2>/dev/null | sed 's/[)"'\'']\+$//' 2>/dev/null > all_urls_raw.txt
              grep -E '\.ya?ml$' all_urls_raw.txt 2>/dev/null > sub_urls.txt || true
              
              if [ -s sub_urls.txt ]; then
                while read -r url; do
                  [[ "$url" =~ github\.com.*/blob/ ]] && url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|' 2>/dev/null)
                  curl -s -L --connect-timeout 8 -o "sources/${prefix}_$(date +%s)_$RANDOM.yml" "$url" 2>/dev/null
                done < sub_urls.txt
              else
                grep -q '^proxies:' readme.tmp 2>/dev/null && cp readme.tmp "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml" 2>/dev/null
              fi
            fi
          }

          for url in "$readme1" "$readme2" "$readme3"; do
            [ -n "$url" ] && fetch_source "$url" "readme"
          done
          for url in "$sub1"; do
            [ -n "$url" ] && fetch_source "$url" "sub"
          done

      - name: 合并节点（去重+容错）
        run: |
          python3 << 'EOF'
          import yaml, glob, os
          all_proxies = []
          source_files = ['nodes/list.meta.yml'] + glob.glob('sources/*.yml')
          for f in source_files:
              if not os.path.exists(f) or os.path.getsize(f) == 0:
                  continue
              try:
                  with open(f, 'r', encoding='utf-8', errors='ignore') as fp:
                      data = yaml.safe_load(fp)
                  if data and isinstance(data.get('proxies'), list):
                      all_proxies.extend(data['proxies'])
              except Exception:
                  pass
          # 去重
          unique = []
          names = set()
          for p in all_proxies:
              n = p.get('name')
              if n and n not in names:
                  names.add(n)
                  unique.append(p)
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump({'proxies': unique}, f, sort_keys=False)
          EOF

      - name: TCP连通性测试
        run: |
          python3 << 'EOF'
          import yaml, asyncio, os
          if not os.path.exists('merged_config.yaml'):
              with open('preliminary_valid.yaml', 'w') as f:
                  yaml.dump({'proxies': []}, f)
              exit()
          async def test(server, port):
              try:
                  _, w = await asyncio.wait_for(asyncio.open_connection(server, port), 2)
                  w.close()
                  await w.wait_closed()
                  return True
              except:
                  return False
          async def main():
              with open('merged_config.yaml') as f:
                  data = yaml.safe_load(f) or {'proxies': []}
              valid = [n for n in data['proxies'] if n.get('server') and n.get('port') and await test(n['server'], n['port'])]
              with open('preliminary_valid.yaml', 'w') as f:
                  yaml.dump({'proxies': valid}, f)
          asyncio.run(main())
          EOF

      - name: 安装Go环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 安装测速工具
        run: go install github.com/faceair/clash-speedtest@latest || true

      - name: 精准测速
        run: |
          if [ -s preliminary_valid.yaml ]; then
            ~/go/bin/clash-speedtest -c preliminary_valid.yaml -output filtered.yaml \
            -max-latency 800ms -min-download-speed 5 -concurrent 10 -timeout 5s || true
          else
            echo "proxies: []" > filtered.yaml
          fi

      - name: 生成最终订阅
        run: |
          mkdir -p nodes
          cp filtered.yaml nodes/proxies.yml 2>/dev/null
          python3 << 'EOF'
          import yaml
          try:
              with open('filtered.yaml') as f:
                  ps = yaml.safe_load(f).get('proxies', [])
          except:
              ps = []
          with open('nodes/links.txt', 'w') as f:
              for p in ps:
                  f.write(yaml.dump(p, default_flow_style=False).strip()+'\n\n')
          print(f"最终有效节点：{len(ps)}")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin master --rebase --autostash || true
          git add nodes/ 2>/dev/null
          git diff --cached --quiet || git commit -m "Auto update nodes [skip ci]"
          git push origin HEAD:master || true
                    url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
                  fi
                  curl -s -L --connect-timeout 10 --max-time 30 -o "sources/${prefix}_$(date +%s)_$RANDOM.yml" "$url"
                done < sub_urls.txt
              else
                grep -q '^proxies:' readme.tmp && cp readme.tmp "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml"
              fi
            else
              curl -s -L --connect-timeout 10 --max-time 30 -o "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml" "$input"
            fi
          }

          for url in "$readme1" "$readme2" "$readme3" "$readme4" "$readme5"; do
            [ -n "$url" ] && fetch_source "$url" "readme"
          done
          for url in "$sub1" "$sub2" "$sub3" "$sub4" "$sub5"; do
            [ -n "$url" ] && fetch_source "$url" "sub"
          done

      - name: 合并所有节点（去重+容错）
        run: |
          python3 << 'EOF'
          import yaml, glob, os
          all_proxies = []
          source_files = ['nodes/list.meta.yml'] + glob.glob('sources/*.yml')
          for f in source_files:
              if not os.path.exists(f) or os.path.getsize(f) == 0:
                  continue
              try:
                  with open(f, 'r', encoding='utf-8', errors='ignore') as fp:
                      data = yaml.safe_load(fp)
                  if data and 'proxies' in data:
                      all_proxies.extend(data['proxies'])
              except Exception as e:
                  print(f"跳过无效文件 {f}: {e}")
          unique_proxies = []
          names = set()
          for p in all_proxies:
              name = p.get('name')
              if name and name not in names:
                  names.add(name)
                  unique_proxies.append(p)
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump({'proxies': unique_proxies}, f, sort_keys=False)
          EOF

      - name: TCP连通性过滤失效节点
        run: |
          python3 << 'EOF'
          import yaml, asyncio, os
          if not os.path.exists('merged_config.yaml') or os.path.getsize('merged_config.yaml') == 0:
              with open('preliminary_valid.yaml', 'w') as f:
                  yaml.dump({'proxies': []}, f)
              exit()
          async def test_node(server, port):
              try:
                  _, writer = await asyncio.wait_for(asyncio.open_connection(server, port), timeout=3)
                  writer.close()
                  await writer.wait_closed()
                  return True
              except:
                  return False
          async def main():
              with open('merged_config.yaml') as f:
                  data = yaml.safe_load(f) or {'proxies': []}
                  proxies = data['proxies']
              valid = [n for n in proxies if n.get('server') and n.get('port') and await test_node(n['server'], n['port'])]
              with open('preliminary_valid.yaml', 'w') as f:
                  yaml.dump({'proxies': valid}, f)
          asyncio.run(main())
          EOF

      - name: 安装Go环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 安装clash-speedtest
        run: go install github.com/faceair/clash-speedtest@latest

      - name: 精确测速过滤优质节点
        run: |
          if [ -s preliminary_valid.yaml ]; then
            ~/go/bin/clash-speedtest \
              -c preliminary_valid.yaml \
              -output filtered.yaml \
              -max-latency 800ms \
              -min-download-speed 5 \
              -concurrent 10 \
              -timeout 5s || true
          else
            echo "无有效节点，生成空文件"
            echo "proxies: []" > filtered.yaml
          fi

      - name: 生成最终订阅文件
        run: |
          mkdir -p nodes
          cp filtered.yaml nodes/proxies.yml
          python3 << 'EOF'
          import yaml
          try:
              with open('filtered.yaml') as f:
                  proxies = yaml.safe_load(f).get('proxies', [])
          except:
              proxies = []
          with open('nodes/links.txt', 'w') as f:
              for p in proxies:
                  f.write(yaml.dump(p, default_flow_style=False).strip() + '\n\n')
          print(f"最终有效节点: {len(proxies)}")
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin master --rebase --autostash || true
          git add nodes/
          git diff --cached --quiet || git commit -m "Auto update nodes [skip ci]"
          git push origin HEAD:master
