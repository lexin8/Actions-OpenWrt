- name: Create test config with proxies
  run: |
    python << 'EOF'
    import yaml

    with open('nodes/proxies_raw.yaml', 'r') as f:
        raw = yaml.safe_load(f)
    proxies = raw.get('proxies', [])

    config = {
        'mixed-port': 7890,
        'allow-lan': False,
        'mode': 'rule',
        'log-level': 'warning',
        'external-controller': '127.0.0.1:9090',
        'proxies': proxies,
        'proxy-groups': [
            {
                'name': 'PROXY',
                'type': 'select',
                'proxies': [p['name'] for p in proxies]  # 显式列出所有节点名
            }
        ],
        'rules': ['MATCH,PROXY']
    }

    with open('test-config.yaml', 'w') as f:
        yaml.dump(config, f, default_flow_style=False, allow_unicode=True)
    EOF

- name: Start mihomo and test latency
  run: |
    /usr/local/bin/mihomo -d . -f test-config.yaml &
    sleep 5

    # 获取所有节点名称
    curl -s http://127.0.0.1:9090/proxies/PROXY | jq -r '.proxies[]' > proxies.txt

    # 测试每个节点延迟
    while read name; do
      delay=$(curl -s -X GET "http://127.0.0.1:9090/proxies/${name}/delay?timeout=5000&url=http://www.gstatic.com/generate_204" | jq '.delay')
      echo "$name $delay"
    done < proxies.txt > delays.txt

    pkill mihomo || true

    # 过滤延迟 ≤ 300ms 的节点
    awk '$2 != "null" && $2 <= 300 {print $1}' delays.txt > good_nodes.txt
