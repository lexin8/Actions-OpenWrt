name: Test Fetch Subscriptions

on:
  workflow_dispatch:
    inputs:
      readme_url1:
        description: '第一个 README 链接'
        required: false
        default: 'https://github.com/free-nodes/clashfree/blob/main/README.md'
      readme_url2:
        description: '第二个 README 链接'
        required: false
        default: 'https://github.com/free18/v2ray/blob/main/README.md'

permissions:
  contents: read

jobs:
  test-fetch:
    runs-on: ubuntu-22.04
    steps:
      - name: 创建临时目录
        run: mkdir -p sources

      - name: 获取所有订阅源
        run: |
          # 将输入值赋给 shell 变量
          readme1="${{ github.event.inputs.readme_url1 }}"
          readme2="${{ github.event.inputs.readme_url2 }}"

          fetch_source() {
            local input="$1"
            local prefix="$2"
            echo "========================================"
            echo "处理源: $input"
            if [[ "$input" =~ ^https?://.*README\.md$ ]] || [[ "$input" =~ /blob/.*README\.md$ ]]; then
              if [[ "$input" =~ github\.com.*/blob/ ]]; then
                input=$(echo "$input" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
              fi
              echo "  下载 README: $input"
              curl -s -L "$input" > readme.tmp
              
              # 尝试判断是否为直接 Clash 配置（包含 proxies 字段）
              if grep -q '^proxies:' readme.tmp; then
                echo "  ✅ 检测到 README 直接包含 Clash 配置，直接保存"
                cp readme.tmp "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml"
                return
              fi
              
              # 提取 .yml 链接
              grep -Eo 'https?://[^ ]+' readme.tmp | sed 's/[),]//g' | grep '\.yml$' > yml_urls.txt || true
              if [ -s yml_urls.txt ]; then
                echo "  ✅ 找到 .yml 链接:"
                cat yml_urls.txt
                echo "  开始下载..."
                while read -r url; do
                  if [[ "$url" =~ github\.com.*/blob/ ]]; then
                    url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
                  fi
                  curl -L -o "sources/${prefix}_$(date +%s)_$RANDOM.yml" "$url"
                done < yml_urls.txt
              else
                echo "  ⚠️ 未找到 .yml 链接，尝试提取节点链接"
                grep -Eo '(vmess|trojan|vless|ss)://[^ ]+' readme.tmp | sed 's/[),]//g' > node_links.txt || true
                if [ -s node_links.txt ]; then
                  echo "  ✅ 找到节点链接，开始转换..."
                  python3 << 'PYTHON'
          import yaml
          import base64
          import urllib.parse
          import re

          def parse_vmess(uri):
              if not uri.startswith('vmess://'):
                  return None
              b64 = uri[8:]
              tag = None
              if '#' in b64:
                  b64, tag = b64.split('#', 1)
              b64 += '=' * (4 - len(b64) % 4)
              try:
                  data = yaml.safe_load(base64.b64decode(b64))
                  node = {
                      'name': tag or data.get('ps', f"node_{data.get('add')}_{data.get('port')}"),
                      'type': 'vmess',
                      'server': data.get('add'),
                      'port': int(data.get('port', 0)),
                      'uuid': data.get('id'),
                      'alterId': int(data.get('aid', 0)),
                      'cipher': data.get('scy', 'auto'),
                  }
                  if data.get('tls'):
                      node['tls'] = True
                  if data.get('sni'):
                      node['sni'] = data['sni']
                  if data.get('net'):
                      node['network'] = data['net']
                  if data.get('path'):
                      node['ws-path'] = data['path']
                  if data.get('host'):
                      node['ws-headers'] = {'Host': data['host']}
                  return node
              except:
                  return None

          def parse_trojan(uri):
              if not uri.startswith('trojan://'):
                  return None
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
              uri = uri[9:]
              if '?' in uri:
                  uri, query = uri.split('?', 1)
              else:
                  query = ''
              match = re.match(r'([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              password, server, port = match.groups()
              node = {
                  'name': tag or f"node_trojan_{server}_{port}",
                  'type': 'trojan',
                  'server': server,
                  'port': int(port),
                  'password': password,
              }
              if query:
                  params = urllib.parse.parse_qs(query)
                  if 'sni' in params:
                      node['sni'] = params['sni'][0]
                  if 'allowInsecure' in params:
                      node['skip-cert-verify'] = params['allowInsecure'][0] == '1'
              return node

          def parse_vless(uri):
              if not uri.startswith('vless://'):
                  return None
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
              uri = uri[8:]
              if '?' in uri:
                  uri, query = uri.split('?', 1)
              else:
                  query = ''
              match = re.match(r'([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              uuid, server, port = match.groups()
              node = {
                  'name': tag or f"node_vless_{server}_{port}",
                  'type': 'vless',
                  'server': server,
                  'port': int(port),
                  'uuid': uuid,
              }
              if query:
                  params = urllib.parse.parse_qs(query)
                  if 'encryption' in params:
                      node['encryption'] = params['encryption'][0]
                  if 'flow' in params:
                      node['flow'] = params['flow'][0]
                  if 'sni' in params:
                      node['sni'] = params['sni'][0]
                  if 'type' in params:
                      node['network'] = params['type'][0]
                  if 'security' in params:
                      node['tls'] = params['security'][0] == 'tls'
              return node

          def parse_ss(uri):
              if not uri.startswith('ss://'):
                  return None
              tag = None
              if '#' in uri:
                  uri, tag = uri.split('#', 1)
              uri = uri[5:]
              if '@' not in uri:
                  try:
                      decoded = base64.b64decode(uri).decode('utf-8')
                      if '@' in decoded:
                          uri = decoded
                  except:
                      return None
              match = re.match(r'([^:]+):([^@]+)@([^:]+):(\d+)', uri)
              if not match:
                  return None
              method, password, server, port = match.groups()
              node = {
                  'name': tag or f"node_ss_{server}_{port}",
                  'type': 'ss',
                  'server': server,
                  'port': int(port),
                  'cipher': method,
                  'password': password,
              }
              return node

          proxies = []
          with open('node_links.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('vmess://'):
                      node = parse_vmess(line)
                  elif line.startswith('trojan://'):
                      node = parse_trojan(line)
                  elif line.startswith('vless://'):
                      node = parse_vless(line)
                  elif line.startswith('ss://'):
                      node = parse_ss(line)
                  else:
                      continue
                  if node:
                      proxies.append(node)

          if proxies:
              with open('sources/node_proxies.yml', 'w') as f:
                  yaml.dump({'proxies': proxies}, f, allow_unicode=True, sort_keys=False)
              print(f"从节点链接转换得到 {len(proxies)} 个节点")
          else:
              print("未找到节点链接")
          PYTHON
                else
                  echo "  ❌ 未找到任何节点链接"
                fi
              fi
            else
              curl -L -o "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml" "$input"
            fi
          }

          # 处理 README 源
          for url in "$readme1" "$readme2"; do
            if [ -n "$url" ]; then
              fetch_source "$url" "readme"
            fi
          done

          echo "========================================"
          echo "下载的源文件列表："
          ls -la sources/ || true

      - name: 统计节点数量
        run: |
          echo "========================================"
          echo "各源文件中的节点数量统计："
          for file in sources/*.yml; do
            if [ -f "$file" ]; then
              count=$(python3 -c "import yaml; data=yaml.safe_load(open('$file')); print(len(data.get('proxies', [])))" 2>/dev/null || echo "解析失败")
              echo "$file : $count 个节点"
            fi
          done
          echo "========================================"
          echo "测试完成。"
