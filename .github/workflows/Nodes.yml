name: Update Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py 获取 AutoMergePublicNodes 节点
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制 list.meta.yml 到 nodes 目录
        run: |
          mkdir -p nodes
          cp AutoMergePublicNodes/list.meta.yml nodes/list.meta.yml

      - name: 获取所有订阅源
        run: |
          mkdir -p sources

          readme1='https://github.com/free-nodes/clashfree/blob/main/README.md'
          readme2='https://github.com/free18/v2ray/blob/main/README.md'
          readme3=''
          readme4=''
          readme5=''
          sub1=''
          sub2=''
          sub3=''
          sub4=''
          sub5=''

          fetch_source() {
            local input="$1"
            local prefix="$2"
            echo "========================================"
            echo "处理源: $input"
            if [[ "$input" =~ ^https?://.*README\.md$ ]] || [[ "$input" =~ /blob/.*README\.md$ ]]; then
              if [[ "$input" =~ github\.com.*/blob/ ]]; then
                input=$(echo "$input" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
              fi
              echo "  下载 README: $input"
              curl -s -L "$input" > readme.tmp
              
              grep -Eo 'https?://[^[:space:]]+' readme.tmp | sed 's/[)"''),]\+$//' > all_urls_raw.txt
              echo "  找到的所有链接（清理后）:"
              cat all_urls_raw.txt
              
              grep -E '\.ya?ml$' all_urls_raw.txt > sub_urls.txt || true
              if [ -s sub_urls.txt ]; then
                echo "  ✅ 找到订阅链接 (.yml/.yaml):"
                cat sub_urls.txt
                echo "  开始下载..."
                while read -r url; do
                  if [[ "$url" =~ github\.com.*/blob/ ]]; then
                    url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|; s|/blob/|/|')
                  fi
                  echo "    下载: $url"
                  curl -L -o "sources/${prefix}_$(date +%s)_$RANDOM.yml" "$url"
                done < sub_urls.txt
              else
                echo "  ⚠️ 未找到订阅链接 (.yml/.yaml)"
                if grep -q '^proxies:' readme.tmp; then
                  echo "  📄 检测到 README 直接包含 Clash 配置，保存为配置文件"
                  cp readme.tmp "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml"
                else
                  echo "  ❌ 未找到任何可用内容"
                fi
              fi
            else
              echo "  直接订阅链接，开始下载..."
              curl -L -o "sources/${prefix}_direct_$(date +%s)_$RANDOM.yml" "$input"
            fi
          }

          for url in "$readme1" "$readme2" "$readme3" "$readme4" "$readme5"; do
            [ -n "$url" ] && fetch_source "$url" "readme"
          done

          for url in "$sub1" "$sub2" "$sub3" "$sub4" "$sub5"; do
            [ -n "$url" ] && fetch_source "$url" "sub"
          done

          echo "========================================"
          echo "下载的源文件列表："
          ls -la sources/ || true

      - name: 合并节点
        run: |
          python3 << 'EOF'
          import yaml, glob, os
          all_proxies = []
          source_files = ['nodes/list.meta.yml'] + glob.glob('sources/*.yml')
          for f in source_files:
              if not os.path.exists(f): continue
              try:
                  data = yaml.safe_load(open(f, encoding='utf-8'))
                  proxies = data.get('proxies', [])
                  print(f"从 {f} 获取 {len(proxies)} 个节点")
                  all_proxies.extend(proxies)
              except Exception as e:
                  print(f"读取 {f} 失败: {e}")
          print(f"合并后总节点数: {len(all_proxies)}")
          with open('merged_config.yaml', 'w', encoding='utf-8') as f:
              yaml.dump({'proxies': all_proxies}, f, allow_unicode=True, sort_keys=False)
          EOF

      - name: 初步TCP测速过滤失效节点
        run: |
          python3 << 'EOF'
          import yaml, asyncio, time
          TIMEOUT = 3
          TEST_TIMES = 10
          SUCCESS_THRESHOLD = 5

          async def test_node_once(server, port):
              try:
                  start = time.time()
                  _, writer = await asyncio.wait_for(asyncio.open_connection(server, port), timeout=TIMEOUT)
                  writer.close(); await writer.wait_closed()
                  return True, time.time() - start
              except:
                  return False, None

          async def test_node(node):
              server, port = node.get('server'), node.get('port')
              if not server or not port: return node, 0, None
              success, latencies = 0, []
              for _ in range(TEST_TIMES):
                  ok, lat = await test_node_once(server, port)
                  if ok:
                      success += 1
                      latencies.append(lat)
              avg_lat = sum(latencies)/len(latencies) if latencies else None
              return node, success, avg_lat

          async def main():
              with open('merged_config.yaml') as f:
                  proxies = yaml.safe_load(f).get('proxies', [])
              print(f"测试 {len(proxies)} 个节点 (每个 {TEST_TIMES} 次)...")
              results = await asyncio.gather(*[test_node(n) for n in proxies])
              valid = []
              for node, success, avg in results:
                  if success >= SUCCESS_THRESHOLD:
                      valid.append(node)
                      print(f"✅ {node.get('name')} : {success}/{TEST_TIMES} 成功, 延迟 {avg:.2f}s")
                  else:
                      print(f"❌ {node.get('name')} : {success}/{TEST_TIMES} 失败")
              print(f"初步有效节点: {len(valid)} / {len(proxies)}")
              with open('preliminary_valid.yaml', 'w') as f:
                  yaml.dump({'proxies': valid}, f, allow_unicode=True, sort_keys=False)

          asyncio.run(main())
          EOF

      - name: 安装 Python 依赖 (用于 API 测速)
        run: pip install requests pyyaml

      - name: 下载并准备 Mihomo 内核
        run: |
          # 获取最新版本号
          LATEST_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "最新 Mihomo 版本: $LATEST_VERSION"
          
          # 下载 Mihomo 内核
          wget "https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_VERSION}/mihomo-linux-amd64-${LATEST_VERSION}.gz"
          gunzip "mihomo-linux-amd64-${LATEST_VERSION}.gz"
          chmod +x "mihomo-linux-amd64-${LATEST_VERSION}"
          mv "mihomo-linux-amd64-${LATEST_VERSION}" mihomo

          # 创建 Mihomo 工作目录
          mkdir -p mihomo_config
          cp preliminary_valid.yaml mihomo_config/config.yaml
          
          # 追加 API 配置
          cat >> mihomo_config/config.yaml <<EOF

          # Mihomo RESTful API 配置
          external-controller: 127.0.0.1:9090
          # 日志级别设为 error 以减少输出
          log-level: error
          EOF

      - name: 启动 Mihomo 内核
        run: |
          nohup ./mihomo -d mihomo_config > mihomo.log 2>&1 &
          # 等待 Mihomo 启动并监听 API 端口
          echo "等待 Mihomo 启动..."
          for i in {1..10}; do
            if curl -s http://127.0.0.1:9090/version > /dev/null 2>&1; then
              echo "Mihomo 启动成功"
              break
            fi
            sleep 1
          done

      - name: 通过 Mihomo API 精确测速并筛选
        run: |
          python3 << 'EOF'
          import requests, yaml, time, sys
          from concurrent.futures import ThreadPoolExecutor, as_completed

          API_BASE = "http://127.0.0.1:9090"
          TEST_URL = "http://www.gstatic.com/generate_204"
          TIMEOUT = 800  # 毫秒
          CONCURRENT = 10

          def get_all_proxies():
              """获取所有代理名称"""
              resp = requests.get(f"{API_BASE}/proxies")
              if resp.status_code != 200:
                  raise Exception(f"无法获取代理列表: {resp.status_code}")
              data = resp.json()
              # 过滤掉特殊代理 (DIRECT, REJECT 等)
              proxies = [name for name, info in data['proxies'].items() 
                        if info['type'] not in ('Direct', 'Reject', 'Selector', 'URLTest')]
              print(f"发现 {len(proxies)} 个可测速节点")
              return proxies

          def test_delay(proxy_name):
              """测试单个节点延迟"""
              try:
                  url = f"{API_BASE}/proxies/{proxy_name}/delay"
                  params = {"url": TEST_URL, "timeout": TIMEOUT}
                  start = time.time()
                  resp = requests.get(url, params=params, timeout=(TIMEOUT/1000)+2)
                  if resp.status_code == 200:
                      delay = resp.json().get('delay', 0)
                      return proxy_name, delay, None
                  else:
                      return proxy_name, None, f"API错误 {resp.status_code}"
              except Exception as e:
                  return proxy_name, None, str(e)

          def main():
              # 获取节点列表
              try:
                  all_proxies = get_all_proxies()
              except Exception as e:
                  print(f"错误: {e}")
                  sys.exit(1)
              
              # 并发测速
              results = {}
              with ThreadPoolExecutor(max_workers=CONCURRENT) as executor:
                  future_to_name = {executor.submit(test_delay, name): name for name in all_proxies}
                  for future in as_completed(future_to_name):
                      name, delay, error = future.result()
                      if delay is not None:
                          results[name] = delay
                          print(f"✅ {name}: {delay}ms")
                      else:
                          print(f"❌ {name}: 测速失败 ({error})")
              
              # 读取原始节点配置
              with open('preliminary_valid.yaml', 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f)
                  all_nodes = data.get('proxies', [])
              
              # 筛选出测速成功的节点 (延迟 < TIMEOUT)
              valid_nodes = [node for node in all_nodes if node.get('name') in results]
              print(f"\n测速成功节点数: {len(valid_nodes)} / {len(all_nodes)}")
              
              # 保存最终结果
              with open('filtered.yaml', 'w', encoding='utf-8') as f:
                  yaml.dump({'proxies': valid_nodes}, f, allow_unicode=True, sort_keys=False)
              
              # 额外保存一个按延迟排序的版本 (可选)
              sorted_nodes = sorted(valid_nodes, key=lambda n: results.get(n['name'], 9999))
              with open('nodes/proxies_sorted.yml', 'w', encoding='utf-8') as f:
                  yaml.dump({'proxies': sorted_nodes}, f, allow_unicode=True, sort_keys=False)

          if __name__ == "__main__":
              main()
          EOF

      - name: 停止 Mihomo 进程
        if: always()
        run: |
          pkill -f mihomo || true

      - name: 保存最终订阅文件
        run: |
          cp filtered.yaml nodes/proxies.yml
          python3 -c "import yaml; print('最终有效节点数:', len(yaml.safe_load(open('filtered.yaml'))['proxies']))"
          python3 << 'EOF'
          import yaml
          with open('filtered.yaml', 'r', encoding='utf-8') as f:
              proxies = yaml.safe_load(f).get('proxies', [])
          with open('nodes/links.txt', 'w', encoding='utf-8') as f:
              for p in proxies:
                  f.write(yaml.dump(p, default_flow_style=False).strip() + '\n\n')
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master || true
          git add nodes/list.meta.yml nodes/proxies.yml nodes/proxies_sorted.yml nodes/links.txt
          git diff --cached --quiet || git commit -m "Auto update nodes [skip ci]"
          git push origin master
