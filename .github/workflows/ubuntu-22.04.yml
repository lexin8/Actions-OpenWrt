name: fanchmwrt 分阶段编译

on:
  workflow_dispatch:
    inputs:
      stage:
        description: '选择编译阶段'
        required: true
        default: '1-base'
        type: choice
        options:
          - '1-base'
          - '2-ddns-udpxy'
          - '3-nikki'
          - '4-softethervpn'
          - '5-strongswan'
          - '6-homeproxy-singbox'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  FIRMWARE_NAME: fanchmwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    name: 阶段 ${{ github.event.inputs.stage }} 编译
    runs-on: ubuntu-22.04
    
    steps:
      - name: 检查服务器性能
        run: |
          echo "CPU核心数量: $(nproc)"
          df -hT

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl subversion libelf-dev autoconf automake libtool autopoint swig pkg-config ccache

      - name: 最大化磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: 克隆主源码
        run: |
          git clone --depth 1 $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      # ===== 缓存配置开始 =====
      - name: 缓存 feeds
        uses: actions/cache@v4
        id: cache-feeds
        with:
          path: openwrt/feeds
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 缓存 dl 源码包
        uses: actions/cache@v4
        id: cache-dl
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/.config') }}

      - name: 缓存 toolchain 编译工具链
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/toolchain-*
          key: toolchain-${{ hashFiles('openwrt/toolchain/Makefile') }}

      - name: 缓存 ccache 编译缓存
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.ref_name }}
      # ===== 缓存配置结束 =====

      - name: 配置 ccache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE
          ccache -o compression=true
          ccache -s

      - name: 配置 feeds（根据阶段添加源）
        run: |
          cd openwrt
          
          # 阶段3：添加 Nikki 源
          if [[ "${{ github.event.inputs.stage }}" == "3-nikki" ]]; then
            echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          fi
          
          # 阶段4：添加 SoftEtherVPN（kenzo 源）
          if [[ "${{ github.event.inputs.stage }}" == "4-softethervpn" ]]; then
            echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          fi
          
          # 阶段5和6：添加 StrongSwan、HomeProxy、Sing-Box（small 源）
          if [[ "${{ github.event.inputs.stage }}" == "5-strongswan" ]] || [[ "${{ github.event.inputs.stage }}" == "6-homeproxy-singbox" ]]; then
            echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          fi
          
          cat feeds.conf.default

      - name: 更新 feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: 安装 Go 1.26（所有阶段都需要）
        run: |
          cd openwrt
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/kenzok8/golang -b 1.26 feeds/packages/lang/golang

      - name: 安装所有 feeds 包
        run: cd openwrt && ./scripts/feeds install -a

      - name: 生成配置文件（根据阶段选择）
        run: |
          cd openwrt
          
          # 基础配置（所有阶段共用）
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=600
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_NETFILTER_XT_MATCH_POLICY=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_PPP_ASYNC=y
          CONFIG_KERNEL_PPP_SYNC_TTY=y
          CONFIG_KERNEL_PPP_L2TP=y
          CONFIG_KERNEL_TUN=y
          CONFIG_KERNEL_BRIDGE_NETFILTER=y
          EOF
          
          # 阶段2：添加 DDNS 和 UDPXY
          if [[ "${{ github.event.inputs.stage }}" == "2-ddns-udpxy" ]]; then
            cat >> .config << 'EOF2'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y
          EOF2
          fi
          
          # 阶段3：添加 Nikki
          if [[ "${{ github.event.inputs.stage }}" == "3-nikki" ]]; then
            cat >> .config << 'EOF3'
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          EOF3
          fi
          
          # 阶段4：添加 SoftEtherVPN
          if [[ "${{ github.event.inputs.stage }}" == "4-softethervpn" ]]; then
            cat >> .config << 'EOF4'
          CONFIG_PACKAGE_softethervpn=y
          CONFIG_PACKAGE_softethervpn5=y
          CONFIG_PACKAGE_luci-app-softethervpn=y
          EOF4
          fi
          
          # 阶段5：添加 StrongSwan
          if [[ "${{ github.event.inputs.stage }}" == "5-strongswan" ]]; then
            cat >> .config << 'EOF5'
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-swanctl=y
          CONFIG_PACKAGE_swanmon=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-nonce=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-gmp=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-vici=y
          CONFIG_PACKAGE_luci-app-strongswan-swanctl=y
          EOF5
          fi
          
          # 阶段6：添加 HomeProxy 和 Sing-Box
          if [[ "${{ github.event.inputs.stage }}" == "6-homeproxy-singbox" ]]; then
            cat >> .config << 'EOF6'
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          EOF6
          fi
          
          make defconfig

      - name: 下载软件包
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;

      - name: 编译固件（使用ccache加速）
        id: compile
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=$CCACHE_MAXSIZE
          export PATH="/usr/lib/ccache:$PATH"
          
          # 显示缓存统计
          ccache -s
          
          # 编译
          make -j$(nproc) V=s || make -j1 V=s
          
          # 显示编译后缓存统计
          ccache -s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 打包固件
        if: steps.compile.outputs.status == 'success'
        id: package
        run: |
          cd openwrt/bin/targets/x86/64
          
          # 创建固件包目录
          mkdir -p $GITHUB_WORKSPACE/firmware-package
          
          # 复制所有固件文件
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/firmware-package/ 2>/dev/null || true
          
          # 创建版本信息文件
          echo "编译阶段: ${{ github.event.inputs.stage }}" > $GITHUB_WORKSPACE/firmware-package/build-info.txt
          echo "编译时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_WORKSPACE/firmware-package/build-info.txt
          echo "源码版本: $(cd $GITHUB_WORKSPACE/openwrt && git rev-parse --short HEAD)" >> $GITHUB_WORKSPACE/firmware-package/build-info.txt
          
          # 打包所有文件
          cd $GITHUB_WORKSPACE
          FIRMWARE_NAME="${{ env.FIRMWARE_NAME }}-stage-${{ github.event.inputs.stage }}-$(date +%Y%m%d-%H%M%S).tar.gz"
          tar -czvf $FIRMWARE_NAME -C firmware-package .
          
          echo "package-path=$GITHUB_WORKSPACE/$FIRMWARE_NAME" >> $GITHUB_OUTPUT
          echo "package-name=$FIRMWARE_NAME" >> $GITHUB_OUTPUT

      - name: 清理不必要的文件（保留缓存）
        if: success()
        run: |
          cd openwrt
          # 清理编译中间文件，但保留ccache和dl缓存
          rm -rf build_dir/target-* build_dir/host
          echo "清理完成，缓存已保留"

      - name: 上传编译日志（如果失败）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-stage-${{ github.event.inputs.stage }}
          path: openwrt/logs/
          if-no-files-found: ignore
          
      - name: 上传固件包（如果成功）
        if: success() && steps.package.outputs.package-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package-name }}
          path: ${{ steps.package.outputs.package-path }}
          retention-days: 30
          if-no-files-found: error

      - name: 输出完成信息
        if: success()
        run: |
          echo "=========================================="
          echo "✅ 阶段 ${{ github.event.inputs.stage }} 编译成功！"
          echo "📦 固件包: ${{ steps.package.outputs.package-name }}"
          echo "=========================================="
