name: FanchmWrt-BuildTest

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config

jobs:
  build-test:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl subversion libelf-dev autoconf automake libtool pkg-config
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Clone fanchmwrt Source
        run: |
          git clone --depth 1 $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Patch fwxd - LAN Traffic Filter
        run: |
          cd $OPENWRT_PATH/package/fcm/fwxd/src
          # Add includes
          sed -i '/#include "fwx_user.h"/a #include "fwx_config.h"' fwx_netlink.c
          # Add filter logic
          sed -i '/total_down_bytes > 0/a \
          if (fwx_config_match_filter(node->ip)) { json_object_put(root); return; }' fwx_netlink.c

          # Add config functions
          cat >> fwx_config.c << 'EOF'
          #include <string.h>
          #include <uci.h>
          static char filter_ips[256] = {0};
          void fwx_filter_init(void) {
              struct uci_context *ctx = uci_alloc_context();
              struct uci_package *pkg = NULL;
              if (!ctx) return;
              uci_load(ctx, "fwx", &pkg);
              if (pkg) {
                  struct uci_section *sec = uci_lookup_section(ctx, pkg, "fwx");
                  if (sec) {
                      struct uci_option *opt = uci_lookup_option(ctx, sec, "lan_filter");
                      if (opt && opt->v.string) {
                          strncpy(filter_ips, opt->v.string, sizeof(filter_ips)-1);
                          filter_ips[sizeof(filter_ips)-1] = 0;
                      }
                  }
                  uci_unload(ctx, pkg);
              }
              uci_free_context(ctx);
          }
          int fwx_config_match_filter(const char *ip) {
              if (!ip || !*filter_ips)
                  return 0;
              return strstr(filter_ips, ip) ? 1 : 0;
          }
          EOF
          # Add function declarations
          echo "void fwx_filter_init(void);" >> fwx_config.h
          echo "int fwx_config_match_filter(const char *ip);" >> fwx_config.h

      - name: Prepare Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Minimal Firmware Config
        run: |
          cd $OPENWRT_PATH
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          EOF
          make defconfig

      - name: Compile Firmware
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          make -j$(nproc) V=s || make -j1 V=s

      - name: Upload Test Firmware
        uses: actions/upload-artifact@v4
        with:
          name: FanchmWrt-Test-Build
          path: openwrt/bin/targets/x86/64/
          retention-days: 3
