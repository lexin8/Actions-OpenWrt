name: Test-fwxd-Compile
on: workflow_dispatch

env:
  TZ: Asia/Shanghai
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt

jobs:
  test-fwxd:
    runs-on: ubuntu-22.04
    steps:
      - name: Init Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 rsync unzip file wget curl
          
      - name: Clone Source
        run: |
          git clone --depth 1 $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      # 你修复后的补丁（格式完全正确）
      - name: Patch fwxd
        run: |
          cd $OPENWRT_PATH/package/fcm/fwxd/src
          sed -i '/#include "fwx_user.h"/a #include "fwx_config.h"' fwx_netlink.c
          sed -i '/total_down_bytes > 0/a \
          if (fwx_config_match_filter(node->ip)) { json_object_put(root); return; }' fwx_netlink.c
          cat >> fwx_config.c << 'EOF'
          #include <string.h>
          #include <uci.h>
          static char filter_ips[256] = {0};
          void fwx_filter_init(void) {
              struct uci_context *ctx = uci_alloc_context();
              struct uci_package *pkg = NULL;
              if (!ctx) return;
              uci_load(ctx, "fwx", &pkg);
              if (pkg) {
                  struct uci_section *sec = uci_lookup_section(ctx, pkg, "fwx");
                  if (sec) {
                      struct uci_option *opt = uci_lookup_option(ctx, sec, "lan_filter");
                      if (opt && opt->v.string) {
                          strncpy(filter_ips, opt->v.string, sizeof(filter_ips)-1);
                          filter_ips[sizeof(filter_ips)-1] = 0;
                      }
                  }
                  uci_unload(ctx, pkg);
              }
              uci_free_context(ctx);
          }
          int fwx_config_match_filter(const char *ip) {
              if (!ip || !*filter_ips)
                  return 0;
              return strstr(filter_ips, ip) ? 1 : 0;
          }
          EOF
          echo "void fwx_filter_init(void);" >> fwx_config.h
          echo "int fwx_config_match_filter(const char *ip);" >> fwx_config.h

      # 1. 最小化准备（必须步骤）
      - name: Prepare
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a && ./scripts/feeds install -a
          make defconfig
          make tools/compile -j$(nproc)   # 只编编译工具
          make toolchain/compile -j$(nproc) # 只编交叉编译器

      # 2. 🚀 仅验证 fwxd 编译（核心命令！）
      - name: Test Compile fwxd ONLY
        run: |
          cd $OPENWRT_PATH
          make package/fcm/fwxd/compile V=s
