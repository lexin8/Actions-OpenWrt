name: openwrt-complete-feeds

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  # 核心源码配置（使用 ImmortalWrt 官方源，版本统一）
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  # 编译配置
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  UPLOAD_FIRMWARE: true
  FIRMWARE_OUTPUT_PATH: ${{ github.workspace }}/openwrt/bin/targets/x86/64

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep 'physical id' | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘剩余空间: $(df -h / | awk 'NR==2{print $4}')"
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 清理冗余包
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          # 更新源并安装全量编译依赖
          sudo -E apt-get -y update
          sudo -E apt-get -y install \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl \
            subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config \
            libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev \
            libev-dev golang-go
          # 清理缓存
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 2048
          root-reserve-mb: 2048
          remove-dotnet: true
          remove-android: true

      - name: Clone Source Code
        run: |
          # 改用官方 ImmortalWrt 源，避免第三方源的包缺失
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL ${{ github.workspace }}/openwrt
          echo "OPENWRT_PATH=${{ github.workspace }}/openwrt" >> $GITHUB_ENV
          ls -la ${{ github.workspace }}/openwrt
          
      # 核心修复：标准化 Feeds 配置（仅保留必要源，避免无效包）
      - name: Integrate Custom Feeds (Clean Version)
        run: |
          cd $OPENWRT_PATH
          # 备份并清空原有 feeds
          cp $FEEDS_CONF $FEEDS_CONF.bak
          > $FEEDS_CONF
          # 仅保留稳定的核心源 + 必要第三方源（移除冗余源）
          cat >> $FEEDS_CONF << 'EOF'
          src-git core https://github.com/immortalwrt/packages.git;openwrt-24.10
          src-git luci https://github.com/immortalwrt/luci.git;openwrt-24.10
          src-git routing https://git.openwrt.org/feed/routing.git;openwrt-24.10
          src-git small https://github.com/kenzok8/small.git;master
          EOF
          
          # 彻底清理 feeds 缓存
          ./scripts/feeds clean -a
          # 更新 feeds（强制刷新，避免缓存）
          ./scripts/feeds update -a -f
          
          # 卸载冲突/无效包（重点：移除已废弃的包）
          invalid_pkgs=(
            "bmx7" "bmx7-dnsupdate" "bmx7-json" "babeld" "olsrd" "olsrd-mod-nameservice" 
            "olsrd-mod-txtinfo" "kmod-batman-adv" "cpufreq" "prometheus-node-exporter-lua"
            "luci-app-bmx7" "luci-app-babeld" "luci-app-olsr" "luci-app-olsr-services" "luci-app-olsr-viz"
            "luci-proto-batman-adv"
          )
          conflict_pkgs=(
            "luci-base" "docker" "ttyd" "dockerd" "docker-compose" "ucode-mod-socket"
            "luci-app-dockerman" "luci-lib-docker" "golang" "yq" "strongswan"
          )
          
          for pkg in "${invalid_pkgs[@]}"; do
            ./scripts/feeds uninstall $pkg || true
          done
          for pkg in "${conflict_pkgs[@]}"; do
            ./scripts/feeds uninstall $pkg || true
          done
          
          # 修复 YQ 依赖
          rm -rf feeds/core/utils/yq
          mkdir -p feeds/core/utils/yq
          wget -q -O feeds/core/utils/yq/Makefile \
            https://raw.githubusercontent.com/immortalwrt/packages/openwrt-24.10/utils/yq/Makefile
          
          # 仅安装需要的包（取消 feeds install -a，避免安装无效包）
          # 1. 核心功能包
          ./scripts/feeds install -p luci \
            luci-base luci-app-dockerman luci-lib-docker luci-theme-argon luci-app-argon-config \
            luci-app-firewall luci-app-ddns luci-app-udpxy luci-compat
          # 2. 系统依赖包
          ./scripts/feeds install -p core \
            docker ttyd dockerd docker-compose ucode-mod-socket golang yq \
            strongswan strongswan-full strongswan-mod-xauth strongswan-mod-eap-mschapv2 \
            xl2tpd ppp ppp-mod-l2tp iptables-mod-ipsec ipsec-tools ntpclient ddns-scripts ddns-scripts-cloudflare wget-ssl
          # 3. 第三方功能包
          ./scripts/feeds install -p small homeproxy luci-app-homeproxy sing-box
          
      # 缓存优化
      - name: Cache Downloaded Packages
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENWRT_PATH }}/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-
            
      - name: Cache CCACHE
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-openwrt-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-
            
      - name: Initialize CCACHE
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true -o cache_dir=$CCACHE_DIR
          ccache -s
          
      # 修复配置文件：禁用所有无效包，避免语法错误
      - name: Configure Firmware Features
        run: |
          cd $OPENWRT_PATH
          cat > $CONFIG_FILE << 'EOF'
          # ===================== 架构与分区 =====================
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          
          # ===================== 编译开关 =====================
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          CONFIG_BUSYBOX_CUSTOM=y
          CONFIG_CLEAN_IPKG=y
          CONFIG_LUCI_LANG_zh_Hans=y
          
          # ===================== 禁用所有无效/废弃包（核心修复）=====================
          CONFIG_PACKAGE_bmx7=n
          CONFIG_PACKAGE_bmx7-dnsupdate=n
          CONFIG_PACKAGE_bmx7-json=n
          CONFIG_PACKAGE_babeld=n
          CONFIG_PACKAGE_olsrd=n
          CONFIG_PACKAGE_olsrd-mod-nameservice=n
          CONFIG_PACKAGE_olsrd-mod-txtinfo=n
          CONFIG_PACKAGE_kmod-batman-adv=n
          CONFIG_PACKAGE_cpufreq=n
          CONFIG_PACKAGE_prometheus-node-exporter-lua=n
          CONFIG_PACKAGE_luci-app-bmx7=n
          CONFIG_PACKAGE_luci-app-babeld=n
          CONFIG_PACKAGE_luci-app-olsr=n
          CONFIG_PACKAGE_luci-app-olsr-services=n
          CONFIG_PACKAGE_luci-app-olsr-viz=n
          CONFIG_PACKAGE_luci-proto-batman-adv=n
          
          # ===================== Docker 核心 =====================
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_ucode-mod-socket=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_yq=y
          
          # ===================== Strongswan (L2TP/IPsec/IKEv2) =====================
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-xauth=y
          CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
          CONFIG_PACKAGE_strongswan-ikev2=y
          CONFIG_PACKAGE_strongswan-eap=y
          CONFIG_PACKAGE_strongswan-eap-identity=y
          CONFIG_PACKAGE_strongswan-psk=y
          # 依赖组件
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          CONFIG_PACKAGE_ipsec-tools=y
          CONFIG_PACKAGE_ntpclient=y
          
          # ===================== 第三方功能 =====================
          # HomeProxy
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          
          # ===================== 基础功能 =====================
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_wget-ssl=y
          
          # ===================== 冲突禁用 =====================
          CONFIG_PACKAGE_wolfssl=n
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_PACKAGE_openswan=n
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=n
          CONFIG_PACKAGE_ip6tables=n
          CONFIG_PACKAGE_odhcp6c=n
          CONFIG_PACKAGE_odhcpd-ipv6only=n
          EOF
          
          # 关键：先清理配置缓存，再生成 defconfig
          rm -rf tmp/
          make defconfig
          
      # 下载依赖包
      - name: Download Dependencies
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          # 清理无效包
          find dl -size -1024c -exec rm -f {} \;
          echo "依赖包下载完成，共 $(ls -l dl | wc -l) 个文件"
          
      # 编译固件
      - name: Compile Firmware
        run: |
          cd $OPENWRT_PATH
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          # 先尝试多线程编译，失败则单线程（带详细日志便于排查）
          make -j$(nproc) V=s || make -j1 V=s
          # 输出编译统计
          ccache -s
          echo "固件编译完成，输出路径：$FIRMWARE_OUTPUT_PATH"
          
      # 上传固件
      - name: Upload Final Firmware
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_x86_64_Full (Docker+Strongswan+HomeProxy)
          path: ${{ env.FIRMWARE_OUTPUT_PATH }}/
          retention-days: 90
          
      - name: Completion Summary
        run: |
          echo "=========================================="
          echo "✅ 固件编译完成！"
          echo "📦 包含功能："
          echo "  - Docker/Dockerman + 适配版 YQ"
          echo "  - Strongswan (L2TP/IPsec/IKEv2)"
          echo "  - HomeProxy + Sing-Box"
          echo "  - DDNS/UDPXY/Argon 主题"
          echo "💾 固件存储路径：${{ env.FIRMWARE_OUTPUT_PATH }}"
          echo "=========================================="
