name: Test-fwxd-Compile
on: workflow_dispatch

env:
  TZ: Asia/Shanghai
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt

jobs:
  test-fwxd:
    runs-on: ubuntu-22.04
    steps:
      - name: Init Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 rsync unzip file wget curl
          
      - name: Clone Source
        run: |
          git clone --depth 1 $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Patch fwxd - LAN→LAN 内网流量过滤 (Web界面+功能完整版)
        run: |
          cd $OPENWRT_PATH
          
          ##############################################################################
          # 1. 修复后端 fwxd 服务（仅过滤LAN→LAN互访流量，WAN上网流量正常统计）
          ##############################################################################
          cd package/fcm/fwxd/src
          
          # 添加头文件依赖
          sed -i '/#include "fwx_user.h"/a #include "fwx_config.h"' fwx_netlink.c
          
          # 核心过滤规则：仅拦截 LAN 互访流量，不影响上网
          sed -i '/total_down_bytes > 0/a \
          if (fwx_config_match_filter(node->ip) && node->lan_to_lan) { json_object_put(root); return; }' fwx_netlink.c
          
          # 追加配置读取代码（格式严格对齐，EOF无越界）
          cat >> fwx_config.c << 'EOF'
          #include <string.h>
          #include <uci.h>
          static char filter_ips[256] = {0};
          void fwx_filter_init(void) {
              struct uci_context *ctx = uci_alloc_context();
              struct uci_package *pkg = NULL;
              if (!ctx) return;
              uci_load(ctx, "fwx", &pkg);
              if (pkg) {
                  struct uci_section *sec = uci_lookup_section(ctx, pkg, "fwx");
                  if (sec) {
                      struct uci_option *opt = uci_lookup_option(ctx, sec, "lan_filter");
                      if (opt && opt->v.string) {
                          strncpy(filter_ips, opt->v.string, sizeof(filter_ips)-1);
                          filter_ips[sizeof(filter_ips)-1] = 0;
                      }
                  }
                  uci_unload(ctx, pkg);
              }
              uci_free_context(ctx);
          }
          int fwx_config_match_filter(const char *ip) {
              if (!ip || !*filter_ips) return 0;
              return strstr(filter_ips, ip) ? 1 : 0;
          }
          EOF
          
          # 添加函数声明
          echo "void fwx_filter_init(void);" >> fwx_config.h
          echo "int fwx_config_match_filter(const char *ip);" >> fwx_config.h
          
          ##############################################################################
          # 2. 修改你源码自带的 Web 界面（原生路径：package/fcm/luci-app-fwxd）
          ##############################################################################
          cd $OPENWRT_PATH/package/fcm/luci-app-fwxd
          
          # 添加 UCI 配置文件（存储IP黑名单）
          mkdir -p root/etc/config
          cat > root/etc/config/fwx << 'EOF'
          config fwx 'main'
              option lan_filter ''
          EOF
          
          # 在 Web 后台添加 IP 输入框（原生页面嵌入）
          sed -i '/<fieldset>/a \
          <div class="cbi-section"> \
              <h3>LAN→LAN 内网流量过滤</h3> \
              <div class="cbi-value"> \
                  <label class="cbi-value-title">过滤IP列表</label> \
                  <div class="cbi-value-field"> \
                      <textarea name="lan_filter" rows="3" cols="50" placeholder="多个IP用空格分隔"><%=luci.model.uci.cursor():get("fwx","main","lan_filter","")%></textarea> \
                      <br><small>仅过滤设备互访流量，上网流量正常统计</small> \
                  </div> \
              </div> \
          </div>' luasrc/view/fwxd/config.htm

      # 1. 最小化准备（必须步骤）
      - name: Prepare
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a && ./scripts/feeds install -a
          make defconfig
          make tools/compile -j$(nproc)   # 只编编译工具
          make toolchain/compile -j$(nproc) # 只编交叉编译器

      # 2. 🚀 仅验证 fwxd 编译（核心命令！）
      - name: Test Compile fwxd ONLY
        run: |
          cd $OPENWRT_PATH
          make package/fcm/fwxd/compile V=s
