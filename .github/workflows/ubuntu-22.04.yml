name: docker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: openwrt-24.10
  REPO_BRANCH2: openwrt-23.05
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  UPLOAD_FIRMWARE: true
  FIRMWARE_OUTPUT_PATH: ${{ github.workspace }}/openwrt/bin/targets/x86/64

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone source code
        run: |
          git clone --depth 1 $REPO_URL2  ${{ github.workspace }}/openwrt
          echo "OPENWRT_PATH=${{ github.workspace }}/openwrt" >> $GITHUB_ENV
          ls -l ${{ github.workspace }}/openwrt

      - name: Add immortalwrt feeds (仅追加两条源，保留原有配置)
        run: |
          cd $OPENWRT_PATH
          cp $FEEDS_CONF $FEEDS_CONF.bak
          # 追加immortalwrt源（优先级最高）
          cat >> $FEEDS_CONF << EOF
          # 新增：immortalwrt 源（修复docker相关依赖）
          src-git immortalwrt_luci https://github.com/immortalwrt/luci.git;openwrt-24.10 priority=100
          src-git immortalwrt_pkgs https://github.com/immortalwrt/packages.git;openwrt-24.10 priority=99
          EOF
          cat $FEEDS_CONF
          # 更新feeds
          ./scripts/feeds clean
          ./scripts/feeds update -a
          
          # 核心修改：卸载原有冲突包，从immortalwrt源安装指定包
          ./scripts/feeds uninstall luci-base docker ttyd dockerd docker-compose ucode-mod-socket luci-app-dockerman luci-lib-docker golang
          # 从immortalwrt_luci源安装luci相关包
          ./scripts/feeds install -p immortalwrt_luci luci-base luci-app-dockerman luci-lib-docker
          # 从immortalwrt_pkgs源安装系统级包
          ./scripts/feeds install -p immortalwrt_pkgs docker ttyd dockerd docker-compose ucode-mod-socket golang

      - name: Configure firmware (配置内容严格对齐)
        run: |
          cd $OPENWRT_PATH
          # 写入配置（包含所有指定包）
          cat > $CONFIG_FILE << EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_BOARD="x86"
          CONFIG_TARGET_SUBTARGET="64"
          CONFIG_TARGET_PROFILE="Generic"
          CONFIG_TARGET_ARCH_PACKAGES="x86_64"
          # 基础系统
          CONFIG_BUSYBOX_CUSTOM=y
          CONFIG_CLEAN_IPKG=y
          # Luci基础及指定包
          CONFIG_LUCI=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-base=y
          # Docker相关指定包
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_ucode-mod-socket=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-lib-docker=y
          # 关闭不必要功能
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=n
          CONFIG_PACKAGE_ip6tables=n
          CONFIG_PACKAGE_odhcp6c=n
          CONFIG_PACKAGE_odhcpd-ipv6only=n
          EOF
          make defconfig

      - name: Download packages
        run: |
          cd $OPENWRT_PATH
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: make OpenWRT   
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s

      - name: Upload firmware directory
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware_x86_64_dockerman
          path: ${{ env.FIRMWARE_OUTPUT_PATH }}/
