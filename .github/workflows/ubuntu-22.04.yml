name: Cleanup Old Actions Runs
on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日自动清理
  workflow_dispatch:    # 可手动触发

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7       # 保留7天内记录
          keep_minimum_runs: 2 # 最少保留2条
