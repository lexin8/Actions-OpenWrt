name: 6小时SSH
on:
  workflow_dispatch:  # 仅手动触发

jobs:
  ssh-6h:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 拉满6小时
    permissions:
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 核心修复：自定义tmate配置，强制开启密码认证（Xshell直连）
      - name: 安装并配置tmate（支持密码+密钥）
        run: |
          # 安装tmate
          sudo apt update && sudo apt install -y tmate openssh-server
          
          # 配置sshd，开启密码认证（关键！）
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          
          # 设置root密码（自定义：这里设为 123456，你可以改成自己的）
          echo "root:123456" | sudo chpasswd
          
          # 重启sshd服务
          sudo service ssh restart
          
          # 启动tmate并后台运行，输出连接信息
          nohup tmate -F > tmate.log 2>&1 &
          sleep 10  # 等待tmate启动
          
          # 打印连接信息（包含Xshell可直接用的账号密码）
          echo "======================================"
          echo "✅ Xshell连接信息（复制到Xshell即可）"
          echo "🔧 主机：$(cat tmate.log | grep 'ssh ' | head -n1 | awk '{print $2}' | cut -d'@' -f2)"
          echo "🔧 用户名：root"
          echo "🔧 密码：123456"
          echo "🔧 端口：22"
          echo "======================================"
          echo "📌 Web SSH链接：$(cat tmate.log | grep 'Web SSH' | head -n1 | awk '{print $3}')"
          
          # 保持任务运行6小时
          while true; do
            echo "任务运行中... $(date)"
            sleep 300
          done
