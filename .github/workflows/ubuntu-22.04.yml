name: fanchmwrt 二阶段编译

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  FIRMWARE_NAME: fanchmwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone fanchmwrt Source
        run: |
          git clone --depth 1 $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache-

      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s

      # ===== 核心逻辑：清理冲突 + 强制 Go 1.26 =====
      - name: Clean Conflicts & Force Go 1.26
        run: |
          cd openwrt
          cat > feeds.conf << 'EOF'
          src-git packages https://git.openwrt.org/feed/packages.git
          src-git luci https://git.openwrt.org/project/luci.git
          src-git routing https://git.openwrt.org/feed/routing.git
          src-git telephony https://git.openwrt.org/feed/telephony.git
          src-git fanchmwrt https://github.com/fanchmwrt/fanchmwrt-packages.git
          EOF
          
          # 更新 feeds
          ./scripts/feeds update -a
          
          # 删除可能冲突的包
          rm -rf feeds/luci/applications/luci-app-mosdns
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns}
          rm -rf feeds/packages/utils/v2dat
          rm -rf feeds/packages/lang/golang
          
          # 强制安装 kenzok8 的 Go 1.26
          git clone https://github.com/kenzok8/golang -b 1.26 feeds/packages/lang/golang
          
          # 安装所有 feeds
          ./scripts/feeds install -a

      # ========== 第一阶段：基础 + DDNS + UDPXY + SoftEtherVPN + StrongSwan ==========
      - name: Stage1 - Base + DDNS + SoftEtherVPN + StrongSwan
        run: |
          cd openwrt
          
          # 基础配置
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_NETFILTER_XT_MATCH_POLICY=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_PPP_ASYNC=y
          CONFIG_KERNEL_PPP_SYNC_TTY=y
          CONFIG_KERNEL_PPP_L2TP=y
          CONFIG_KERNEL_TUN=y
          CONFIG_KERNEL_BRIDGE_NETFILTER=y
          
          # DDNS/UDPXY
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          EOF
          
          make defconfig
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s

      - name: Stage1 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .
          echo "stage1-firmware-path=$GITHUB_WORKSPACE/stage1-firmware.tar.gz" >> $GITHUB_OUTPUT

      - name: Stage1 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanchmwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      # ========== 第二阶段：Nikki + HomeProxy + Sing-Box ==========
      - name: Stage2 - Add kenzok8 Small Feeds (包含Nikki)
        run: |
          cd openwrt
          
          # 只添加 kenzok8 的 small 源（已包含 Nikki + homeproxy + sing-box）
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          
          # 更新 feeds
          ./scripts/feeds update -a
          
          # 安装 kenzok8 源的 Nikki 相关包
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          
          # 安装 HomeProxy/Sing-Box
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box

      - name: Stage2 - Config
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          # Nikki (kenzok8 源)
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          
          # HomeProxy & Sing-Box
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          EOF
          make defconfig

      - name: Stage2 - Download
        run: cd openwrt && make download -j$(nproc)

      - name: Stage2 - Compile
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: Stage2 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .
          echo "stage2-firmware-path=$GITHUB_WORKSPACE/stage2-firmware.tar.gz" >> $GITHUB_OUTPUT

      - name: Stage2 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanchmwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "📦 Stage1 固件已上传（基础 + DDNS + SoftEtherVPN + StrongSwan）"
          echo "📦 Stage2 固件已上传（Nikki + HomeProxy + Sing-Box）"
          echo "=========================================="
