name: Web SSH 6小时

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 366

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 安装网页终端
      run: |
        sudo apt update
        sudo apt install -y curl wget
        curl -fsSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | sudo tar xz -C /usr/local/bin

    - name: 启动网页终端 & 保持6小时
      env:
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        # 设置密码
        echo "root:openwrt" | sudo chpasswd
        sudo sed -i 's/^#PermitRootLogin/PermitRootLogin/' /etc/ssh/sshd_config
        sudo sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh

        # 启动 ngrok 映射 SSH
        nohup ngrok tcp 22 > ngrok.log 2>&1 &
        sleep 3

        # 获取链接
        echo "====================================="
        echo "✅ 网页终端地址（复制到浏览器打开）："
        echo "https://ngrok.com/ssh"
        echo "====================================="
        echo "👤 用户名：root"
        echo "🔑 密码：openwrt"
        echo "====================================="

        # 保活 6 小时
        end=$((SECONDS+21600))
        while [ $SECONDS -lt $end ]; do
          echo "运行中..."
          sleep 30
        done
