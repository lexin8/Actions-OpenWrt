name: ImmortalWrt 编译 StrongSwan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      # 步骤1：基础环境初始化
      - name: Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev libpam0g-dev liblzma-dev libev-dev
          sudo apt autoremove -y
          sudo apt clean
          sudo timedatectl set-timezone "$TZ"

      # 步骤2：拉取源码
      - name: Clone Source Code
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      # 步骤3：更新Feeds（基础版，无提速）
      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 步骤4：修复StrongSwan符号问题（仅OpenSSL）
      - name: Fix StrongSwan (OpenSSL Backend)
        run: |
          cd $OPENWRT_PATH/feeds/packages/net/strongswan
          # 1. 启用符号可见性，避免符号缺失
          sed -i '/CONFIGURE_ARGS+=/a --enable-symbol-visibility=no \\\n--with-crypto=openssl \\\n--enable-openssl \\\n--disable-wolfssl' Makefile
          # 2. 移除WolfSSL依赖，绑定OpenSSL
          sed -i 's/+PACKAGE_strongswan-mod-wolfssl:libwolfssl/+PACKAGE_strongswan-mod-openssl:libopenssl/' Makefile
          # 3. 确保完整复制库文件
          sed -i 's/$(CP) $(PKG_INSTALL_DIR)\/usr\/lib\/ipsec\/libstrongswan.so.\* $(1)\/usr\/lib\/ipsec\//$(CP) $(PKG_INSTALL_DIR)\/usr\/lib\/ipsec\/libstrongswan.so\* $(1)\/usr\/lib\/ipsec\//' Makefile

      # 步骤5：Stage1 - 基础配置（OpenSSL+StrongSwan）
      - name: Stage1 - Basic Config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          # StrongSwan核心（仅OpenSSL）
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          # 基础依赖
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_iptables-mod-nat-extra=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_KMOD_IP_TABLES=y
          CONFIG_KMOD_IP_NAT=y
          CONFIG_KMOD_IP_CONNTRACK=y
          CONFIG_KMOD_CRYPTO_AES=y
          CONFIG_KMOD_CRYPTO_HMAC=y
          CONFIG_KMOD_XFRM=y
          CONFIG_KMOD_IPSEC=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          # LuCI基础
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-strongswan=y
          # 禁用冲突组件
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_DEBUG=n
          EOF
          make defconfig

      # 步骤6：编译Stage1（基础版，无并行优化）
      - name: Compile Stage1
        run: |
          cd openwrt
          make download -j4
          make -j4 V=s

      # 步骤7：打包Stage1固件
      - name: Package Stage1
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .

      # 步骤8：上传Stage1固件
      - name: Upload Stage1
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      # 步骤9：Stage2 - 添加Nikki
      - name: Stage2 - Add Nikki
        run: |
          cd openwrt
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          ./scripts/feeds update nikki
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          # 追加配置（保留OpenSSL，禁用WolfSSL）
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          EOF
          make defconfig

      # 步骤10：编译Stage2
      - name: Compile Stage2
        run: |
          cd openwrt
          make download -j4
          make -j4 V=s

      # 步骤11：打包Stage2固件
      - name: Package Stage2
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .

      # 步骤12：上传Stage2固件
      - name: Upload Stage2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      # 步骤13：Stage3 - 添加HomeProxy
      - name: Stage3 - Add HomeProxy
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          # 追加配置（保留OpenSSL，禁用WolfSSL）
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          EOF
          make defconfig

      # 步骤14：编译Stage3
      - name: Compile Stage3
        run: |
          cd openwrt
          make download -j4
          make -j4 V=s

      # 步骤15：打包Stage3固件
      - name: Package Stage3
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage3-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage3-firmware/ || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage3-firmware/config-stage3.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage3-firmware.tar.gz -C stage3-firmware .

      # 步骤16：上传Stage3固件
      - name: Upload Stage3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage3-firmware
          path: stage3-firmware.tar.gz
          retention-days: 30

      # 步骤17：编译完成提示
      - name: Completion
        run: |
          echo "✅ 编译完成！"
          echo "🔧 StrongSwan：OpenSSL后端已启用，WolfSSL已移除，符号问题已修复"
          echo "📦 生成固件：Stage1(基础)/Stage2(Nikki)/Stage3(HomeProxy)"
