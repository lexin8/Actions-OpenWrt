name: ImmortalWrt 全自动分阶段编译

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  stage1:
    name: 阶段1 - 基础编译
    runs-on: ubuntu-22.04
    outputs:
      status: ${{ steps.compile.outputs.status }}
    steps:
      - name: 检查服务器性能
        run: |
          echo "CPU核心数量: $(nproc)"
          df -hT

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl subversion libelf-dev autoconf automake libtool autopoint swig pkg-config ccache

      - name: 最大化磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: 缓存 feeds
        uses: actions/cache@v4
        id: cache-feeds
        with:
          path: openwrt/feeds
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 缓存 dl 源码包
        uses: actions/cache@v4
        id: cache-dl
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/.config') }}

      - name: 缓存 toolchain
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/toolchain-*
          key: toolchain-${{ hashFiles('openwrt/toolchain/Makefile') }}

      - name: 缓存 ccache
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.ref_name }}

      - name: 配置 ccache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE
          ccache -o compression=true
          ccache -s

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 基础配置
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=600
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_NETFILTER_XT_MATCH_POLICY=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_PPP_ASYNC=y
          CONFIG_KERNEL_PPP_SYNC_TTY=y
          CONFIG_KERNEL_PPP_L2TP=y
          CONFIG_KERNEL_TUN=y
          CONFIG_KERNEL_BRIDGE_NETFILTER=y
          EOF
          make defconfig

      - name: 下载软件包
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件 - 阶段1
        id: compile
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 清理中间文件
        run: |
          cd openwrt
          rm -rf build_dir/target-* build_dir/host

  stage2:
    name: 阶段2 - 添加 DDNS/UDPXY
    needs: stage1
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - name: 恢复源码和缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 安装 DDNS 和 UDPXY
        run: |
          cd openwrt
          ./scripts/feeds install ddns-scripts ddns-scripts-cloudflare ddns-scripts_cloudflare.com-v4 luci-app-ddns luci-app-udpxy
          
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y
          EOF
          make defconfig

      - name: 下载新增软件包
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件 - 阶段2
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: 清理中间文件
        run: |
          cd openwrt
          rm -rf build_dir/target-* build_dir/host

  stage3:
    name: 阶段3 - 添加 SoftEtherVPN
    needs: stage2
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - name: 恢复源码和缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 安装 SoftEtherVPN
        run: |
          cd openwrt
          ./scripts/feeds install softethervpn softethervpn5 luci-app-softethervpn
          
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_softethervpn=y
          CONFIG_PACKAGE_softethervpn5=y
          CONFIG_PACKAGE_luci-app-softethervpn=y
          EOF
          make defconfig

      - name: 下载新增软件包
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件 - 阶段3
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: 清理中间文件
        run: |
          cd openwrt
          rm -rf build_dir/target-* build_dir/host

  stage4:
    name: 阶段4 - 添加 StrongSwan
    needs: stage3
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - name: 恢复源码和缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 安装 StrongSwan
        run: |
          cd openwrt
          ./scripts/feeds install strongswan strongswan-swanctl swanmon strongswan-charon \
            strongswan-mod-kernel-netlink strongswan-mod-nonce strongswan-mod-sha1 \
            strongswan-mod-sha2 strongswan-mod-aes strongswan-mod-hmac strongswan-mod-gmp \
            strongswan-mod-pem strongswan-mod-x509 strongswan-mod-vici luci-app-strongswan-swanctl
          
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-swanctl=y
          CONFIG_PACKAGE_swanmon=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-nonce=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-gmp=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-vici=y
          CONFIG_PACKAGE_luci-app-strongswan-swanctl=y
          EOF
          make defconfig

      - name: 下载新增软件包
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件 - 阶段4
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: 清理中间文件
        run: |
          cd openwrt
          rm -rf build_dir/target-* build_dir/host

  stage5:
    name: 阶段5 - 添加 Nikki
    needs: stage4
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - name: 恢复源码和缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 添加 Nikki 源
        run: |
          cd openwrt
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          ./scripts/feeds update nikki
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn

      - name: 添加 Nikki 配置
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          EOF
          make defconfig

      - name: 下载新增软件包
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件 - 阶段5
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: 清理中间文件
        run: |
          cd openwrt
          rm -rf build_dir/target-* build_dir/host

  stage6:
    name: 阶段6 - 添加 HomeProxy/Sing-Box
    needs: stage5
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - name: 恢复源码和缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 添加 Small 源
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box

      - name: 添加 HomeProxy 和 Sing-Box 配置
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          EOF
          make defconfig

      - name: 下载新增软件包
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件 - 阶段6
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: 打包最终固件（包含 .config）
        id: package
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/final-firmware
          
          # 复制固件文件
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/final-firmware/ 2>/dev/null || true
          
          # 复制最新的 .config 配置文件
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/final-firmware/config.txt
          
          # 创建版本信息
          echo "编译阶段: 6 (最终完整版)" > $GITHUB_WORKSPACE/final-firmware/build-info.txt
          echo "编译时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_WORKSPACE/final-firmware/build-info.txt
          echo "源码版本: $(cd $GITHUB_WORKSPACE/openwrt && git rev-parse --short HEAD)" >> $GITHUB_WORKSPACE/final-firmware/build-info.txt
          echo "配置文件: config.txt" >> $GITHUB_WORKSPACE/final-firmware/build-info.txt
          
          # 打包所有文件
          cd $GITHUB_WORKSPACE
          FINAL_NAME="${{ env.FIRMWARE_NAME }}-full-$(date +%Y%m%d-%H%M%S).tar.gz"
          tar -czvf $FINAL_NAME -C final-firmware .
          
          # 显示打包内容
          echo "打包文件列表："
          tar -tvf $FINAL_NAME
          
          echo "firmware-path=$GITHUB_WORKSPACE/$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: 上传最终固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-full-firmware
          path: ${{ steps.package.outputs.firmware-path }}
          retention-days: 30

      - name: 完成
        run: |
          echo "=========================================="
          echo "✅ 所有6个阶段编译成功！"
          echo "📦 最终固件包包含："
          echo "   - 固件镜像 (*.img.gz)"
          echo "   - 软件包清单 (*.manifest)"
          echo "   - 编译配置 (config.buildinfo)"
          echo "   - 校验和 (sha256sums)"
          echo "   - 最新配置文件 (config.txt)"
          echo "   - 版本信息 (build-info.txt)"
          echo "=========================================="
