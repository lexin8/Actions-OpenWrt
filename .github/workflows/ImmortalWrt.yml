name: ImmortalWrt 编译 StrongSwan (OpenSSL 后端)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 10G
  COMMON_CFLAGS: "-fvisibility=default -rdynamic -fPIC -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -O2 -mtune=generic -march=x86-64"
  COMMON_CXXFLAGS: "-fvisibility=default -rdynamic -fPIC -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -O2 -mtune=generic -march=x86-64"
  COMMON_LDFLAGS: "-rdynamic -fPIC -L/usr/lib/x86_64-linux-gnu -lssp"

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      # 步骤1：前置清理（核心解决目录锁定问题）
      - name: Pre-Cleanup (Fix Directory Lock)
        run: |
          # 卸载所有残留的tmpfs挂载
          sudo umount $GITHUB_WORKSPACE/openwrt/build_dir 2>/dev/null || true
          # 强制删除残留目录（忽略锁定）
          sudo rm -rf $GITHUB_WORKSPACE/openwrt 2>/dev/null || true
          # 清理系统缓存
          sudo sync && echo 3 | sudo tee /proc/sys/vm/drop_caches 2>/dev/null || true

      # 步骤2：服务器信息检查
      - name: Check Server Info
        run: |
          echo "CPU Cores: $(nproc)"
          echo "Free Memory: $(free -h | grep Mem | awk '{print $4}')"
          echo "Free Disk: $(df -h / | grep / | awk '{print $4}')"

      # 步骤3：环境初始化
      - name: Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo apt purge -y azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo apt update && sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo apt autoremove -y && sudo apt clean
          sudo timedatectl set-timezone "$TZ"

      # 步骤4：空间优化
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      # 步骤5：IO优化（无tmpfs，避免锁定）
      - name: Optimize IO
        run: |
          sudo sysctl -w vm.swappiness=10 2>/dev/null || echo "Skip swappiness adjust"
          sudo sysctl -w fs.file-max=1000000 2>/dev/null || echo "Skip file-max adjust"

      # 步骤6：拉取代码
      - name: Clone Source Code
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      # 步骤7：缓存配置
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      # 步骤8：CCACHE缓存配置
      - name: Setup CCACHE
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true -o cache_sloppy=true -o max_files=0 -o cache_dir=$CCACHE_DIR
          ccache -s

      # 步骤9：工具链编译参数修复
      - name: Fix Toolchain Params
        run: |
          export CFLAGS="${{ env.COMMON_CFLAGS }}"
          export CXXFLAGS="${{ env.COMMON_CXXFLAGS }}"
          export LDFLAGS="${{ env.COMMON_LDFLAGS }}"
          export STRONGSWAN_CFLAGS="${{ env.COMMON_CFLAGS }}"
          export STRONGSWAN_CXXFLAGS="${{ env.COMMON_CXXFLAGS }}"
          export STRONGSWAN_LDFLAGS="${{ env.COMMON_LDFLAGS }}"

      # 步骤10：更新Feeds
      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a -f || ./scripts/feeds update -a
          ./scripts/feeds install -a -f || ./scripts/feeds install -a

      # 步骤11：StrongSwan符号修复（OpenSSL后端）
      - name: Fix StrongSwan (OpenSSL)
        run: |
          cd $OPENWRT_PATH/feeds/packages/net/strongswan
          # 统一编译参数
          sed -i '/include $(INCLUDE_DIR)\/nls.mk/a TARGET_CFLAGS += ${{ env.COMMON_CFLAGS }}\nTARGET_CXXFLAGS += ${{ env.COMMON_CXXFLAGS }}\nTARGET_LDFLAGS += ${{ env.COMMON_LDFLAGS }}\nSTRONGSWAN_CFLAGS += ${{ env.COMMON_CFLAGS }}\nSTRONGSWAN_CXXFLAGS += ${{ env.COMMON_CXXFLAGS }}' Makefile
          # 强制OpenSSL后端+符号可见性
          sed -i '/CONFIGURE_ARGS+=/a --enable-symbol-visibility=no \\\n--with-libstrongswan-prefix=$(STAGING_DIR)/usr \\\n--with-pic \\\n--with-crypto=openssl \\\n--enable-openssl \\\n--disable-wolfssl \\\n--with-openssl=$(STAGING_DIR)/usr \\\n--with-cflags="${{ env.COMMON_CFLAGS }}" \\\n--with-cxxflags="${{ env.COMMON_CXXFLAGS }}" \\\n--with-ldflags="${{ env.COMMON_LDFLAGS }}"' Makefile
          # 绑定依赖版本
          sed -i '/define BuildPlugin/a DEPENDS+= strongswan (= $(PKG_VERSION)-$(PKG_RELEASE))\nTARGET_CFLAGS += $(STRONGSWAN_CFLAGS)\nTARGET_CXXFLAGS += $(STRONGSWAN_CXXFLAGS)\nTARGET_LDFLAGS += $(STRONGSWAN_LDFLAGS)' Makefile
          sed -i 's/+PACKAGE_strongswan-mod-wolfssl:libwolfssl/+PACKAGE_strongswan-mod-openssl:libopenssl +libstrongswan (= $(PKG_VERSION)-$(PKG_RELEASE))/' Makefile
          # 完整复制库文件
          sed -i 's/$(CP) $(PKG_INSTALL_DIR)\/usr\/lib\/ipsec\/libstrongswan.so.\* $(1)\/usr\/lib\/ipsec\//$(CP) $(PKG_INSTALL_DIR)\/usr\/lib\/ipsec\/libstrongswan.so\* $(1)\/usr\/lib\/ipsec\//' Makefile

      # 步骤12：Stage1配置（基础+StrongSwan）
      - name: Stage1 Config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          # StrongSwan核心（OpenSSL）
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          # 必需依赖
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_iptables-mod-nat-extra=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_KMOD_IP_TABLES=y
          CONFIG_KMOD_IP_NAT=y
          CONFIG_KMOD_IP_CONNTRACK=y
          CONFIG_KMOD_IP_CONNTRACK_MARK=y
          CONFIG_KMOD_NETFILTER_XT_MATCH_STATE=y
          CONFIG_PACKAGE_kmod-ipt-conntrack-extra=y
          CONFIG_KMOD_CRYPTO_AES=y
          CONFIG_KMOD_CRYPTO_CBC=y
          CONFIG_KMOD_CRYPTO_HMAC=y
          CONFIG_KMOD_CRYPTO_SHA256=y
          CONFIG_KMOD_XFRM=y
          CONFIG_KMOD_XFRM_USER=y
          CONFIG_KMOD_XFRM_MODE_TUNNEL=y
          CONFIG_KMOD_XFRM_MODE_TRANSPORT=y
          CONFIG_KMOD_IPSEC=y
          CONFIG_KMOD_IPSEC_MB=y
          CONFIG_KMOD_NETFILTER_XT_MATCH_IPSEC=y
          CONFIG_KMOD_l2tp=y
          CONFIG_KMOD_l2tp-ip=y
          CONFIG_KMOD_l2tp-eth=y
          CONFIG_KMOD_pppol2tp=y
          CONFIG_KMOD_crypto-rng=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          # LuCI及应用
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-ipsec-vpnserver-manyusers=y
          CONFIG_PACKAGE_luci-app-strongswan=y
          # DDNS组件
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_wget-ssl=y
          # StrongSwan扩展
          CONFIG_PACKAGE_strongswan-mod-xauth=y
          CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
          CONFIG_PACKAGE_strongswan-ikev2=y
          CONFIG_PACKAGE_strongswan-eap=y
          CONFIG_PACKAGE_strongswan-eap-identity=y
          CONFIG_PACKAGE_strongswan-psk=y
          # 工具
          CONFIG_PACKAGE_ipsec-tools=y
          CONFIG_PACKAGE_ntpclient=y
          # 禁用冲突组件
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_PACKAGE_openswan=n
          # 编译优化
          CONFIG_BUILD_OPTIMIZE_FULL=y
          CONFIG_BUILD_OPTIMIZE_SPEED=y
          CONFIG_STRIP_STRIP_ALL=y
          CONFIG_DEBUG=n
          CONFIG_PACKAGE_kmod-debug=n
          CONFIG_TARGET_x86=n
          CONFIG_TARGET_x86_geode=n
          CONFIG_TARGET_x86_legacy=n
          EOF
          make defconfig

      # 步骤13：上传配置文件
      - name: Upload Config
        if: always()
        run: |
          tar -czvf openwrt-config.tar.gz -C $GITHUB_WORKSPACE/openwrt .config
          echo "config-path=$GITHUB_WORKSPACE/openwrt-config.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload Config Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt-config.tar.gz
          retention-days: 7

      # 步骤14：编译Stage1
      - name: Compile Stage1
        run: |
          cd openwrt
          make download -j$(nproc)
          export CFLAGS="${{ env.COMMON_CFLAGS }}"
          export CXXFLAGS="${{ env.COMMON_CXXFLAGS }}"
          export LDFLAGS="${{ env.COMMON_LDFLAGS }}"
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          CORES=$(nproc)
          PARALLEL_JOBS=$((CORES + 1))
          make -j$PARALLEL_JOBS || make -j1 V=s
          ccache -s

      # 步骤15：打包Stage1固件
      - name: Package Stage1
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .
          echo "stage1-firmware-path=$GITHUB_WORKSPACE/stage1-firmware.tar.gz" >> $GITHUB_OUTPUT

      # 步骤16：上传Stage1固件
      - name: Upload Stage1
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      # 步骤17：Stage2配置（添加Nikki）
      - name: Stage2 Config (Nikki)
        run: |
          cd openwrt
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          ./scripts/feeds update nikki -f || ./scripts/feeds update nikki
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn -f || ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-minimal=n
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig

      # 步骤18：编译Stage2
      - name: Compile Stage2
        run: |
          cd openwrt
          make download -j$(nproc)
          export CFLAGS="${{ env.COMMON_CFLAGS }}"
          export CXXFLAGS="${{ env.COMMON_CXXFLAGS }}"
          export LDFLAGS="${{ env.COMMON_LDFLAGS }}"
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          CORES=$(nproc)
          PARALLEL_JOBS=$((CORES + 1))
          make -j$PARALLEL_JOBS || make -j1 V=s

      # 步骤19：打包Stage2固件
      - name: Package Stage2
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .
          echo "stage2-firmware-path=$GITHUB_WORKSPACE/stage2-firmware.tar.gz" >> $GITHUB_OUTPUT

      # 步骤20：上传Stage2固件
      - name: Upload Stage2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      # 步骤21：Stage3配置（添加HomeProxy）
      - name: Stage3 Config (HomeProxy)
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small -f || ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box -f || ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-minimal=n
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig

      # 步骤22：编译Stage3
      - name: Compile Stage3
        run: |
          cd openwrt
          make download -j$(nproc)
          export CFLAGS="${{ env.COMMON_CFLAGS }}"
          export CXXFLAGS="${{ env.COMMON_CXXFLAGS }}"
          export LDFLAGS="${{ env.COMMON_LDFLAGS }}"
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          CORES=$(nproc)
          PARALLEL_JOBS=$((CORES + 1))
          make -j$PARALLEL_JOBS || make -j1 V=s

      # 步骤23：打包Stage3固件
      - name: Package Stage3
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage3-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage3-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage3-firmware/config-stage3.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage3-firmware.tar.gz -C stage3-firmware .
          echo "stage3-firmware-path=$GITHUB_WORKSPACE/stage3-firmware.tar.gz" >> $GITHUB_OUTPUT

      # 步骤24：上传Stage3固件
      - name: Upload Stage3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage3-firmware
          path: stage3-firmware.tar.gz
          retention-days: 30

      # 步骤25：编译完成提示
      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "🔧 StrongSwan状态：OpenSSL后端 + 符号问题已修复"
          echo "📦 固件版本：Stage1(基础)/Stage2(Nikki)/Stage3(HomeProxy)"
          echo "=========================================="
