name: ImmortalWrt 极速二阶段编译

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: openwrt-24.10
  REPO_BRANCH2: openwrt-23.05
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
        # ========== 核心修改1：替换 strongswan 的 Makefile 修复符号表问题 ==========
      - name: Replace StrongSwan Makefile (Fix Symbol Table)
        run: |
          # 创建 strongswan 包目录（如果不存在）
          mkdir -p $OPENWRT_PATH/feeds/packages/net/strongswan/
          # 从当前仓库本地复制修复后的 Makefile（无需远程下载）
          cp -f $GITHUB_WORKSPACE/Makefile $OPENWRT_PATH/feeds/packages/net/strongswan/Makefile
          # 验证 Makefile 是否复制成功
          if [ -f $OPENWRT_PATH/feeds/packages/net/strongswan/Makefile ]; then
            echo "✅ StrongSwan Makefile 替换成功！"
            # 修复：用引号包裹正则表达式，避免被识别为命令选项
            grep -E "--enable-symbol-visibility=no|fvisibility=default|--with-openssl" "$OPENWRT_PATH/feeds/packages/net/strongswan/Makefile"
            if [ $? -eq 0 ]; then
              echo "✅ 修复参数已包含"
            else
              echo "⚠️ Makefile 中未检测到关键修复参数，请检查文件是否正确！" && exit 1
            fi
          else
            echo "❌ Makefile 复制失败！" && exit 1
          fi
          
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache-
            
      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s
          
      # ========== 核心修改2：强化编译参数，确保符号可见性 ==========
      - name: Fix Toolchain Compilation (Symbol Visibility)
        run: |
          # 全局设置符号可见性编译参数，覆盖所有编译环节
          export CFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fvisibility=default -rdynamic"
          export CXXFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fvisibility=default -rdynamic"
          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -lssp -rdynamic"
          # 将参数写入环境变量，确保后续编译生效
          echo "CFLAGS=$CFLAGS" >> $GITHUB_ENV
          echo "CXXFLAGS=$CXXFLAGS" >> $GITHUB_ENV
          echo "LDFLAGS=$LDFLAGS" >> $GITHUB_ENV
          echo "✅ 工具链修复完成，符号可见性参数已设置"
          
      - name: Update Feeds (提前同步，关键修复)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      # ========== 第一阶段：基础 + DDNS + UDPXY + Docker + strongswan-full ==========
      - name: Stage1 - Base + DDNS + UDPXY + Docker + strongswan-full
        run: |
          cd openwrt
          
          # 基础配置（核心：强制OpenSSL，禁用wolfssl，保留strongswan-full）
          cat > .config << 'EOF'
          # ===================== 核心系统架构与分区 =====================
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          # ==============================================
          # 核心开关（strongswan-full 必需）
          # ==============================================
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          # ==============================================
          # 强制使用OpenSSL，禁用wolfssl（关键）
          # ==============================================
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_openssl-util=y
          CONFIG_PACKAGE_wolfssl=n
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          # ==============================================
          # StrongSwan-full（L2TP/IPsec + IKEv2 核心）
          # ==============================================
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_iptables-mod-nat-extra=y
          # ==============================================
          # L2TP 专用组件
          # ==============================================
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          # ==============================================
          # 网络转发/NAT/加密（必需）
          # ==============================================
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_KMOD_IP_TABLES=y
          CONFIG_KMOD_IP_NAT=y
          CONFIG_KMOD_IP_CONNTRACK=y
          CONFIG_KMOD_IP_CONNTRACK_MARK=y
          CONFIG_KMOD_NETFILTER_XT_MATCH_STATE=y
          CONFIG_PACKAGE_kmod-ipt-conntrack-extra=y
          CONFIG_KMOD_CRYPTO_AES=y
          CONFIG_KMOD_CRYPTO_CBC=y
          CONFIG_KMOD_CRYPTO_HMAC=y
          CONFIG_KMOD_CRYPTO_SHA256=y
          CONFIG_KMOD_XFRM=y
          CONFIG_KMOD_XFRM_USER=y
          CONFIG_KMOD_XFRM_MODE_TUNNEL=y
          CONFIG_KMOD_XFRM_MODE_TRANSPORT=y
          CONFIG_KMOD_IPSEC=y
          CONFIG_KMOD_IPSEC_MB=y
          CONFIG_KMOD_NETFILTER_XT_MATCH_IPSEC=y
          CONFIG_KMOD_l2tp=y
          CONFIG_KMOD_l2tp-ip=y
          CONFIG_KMOD_l2tp-eth=y
          CONFIG_KMOD_pppol2tp=y
          CONFIG_KMOD_crypto-rng=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          # ==============================================
          # Web 管理界面（LuCI）
          # ==============================================
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-ipsec-vpnserver-manyusers=y
          CONFIG_PACKAGE_luci-app-strongswan=y
          # ==============================================
          # DDNS 组件
          # ==============================================
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_wget-ssl=y
          # ==============================================
          # StrongSwan 强化模块（强制OpenSSL依赖）
          # ==============================================
          CONFIG_PACKAGE_strongswan-mod-xauth=y
          CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
          CONFIG_PACKAGE_strongswan-ikev2=y
          CONFIG_PACKAGE_strongswan-eap=y
          CONFIG_PACKAGE_strongswan-eap-identity=y
          CONFIG_PACKAGE_strongswan-psk=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          # ==============================================
          # 调试/工具组件
          # ==============================================
          CONFIG_PACKAGE_ipsec-tools=y
          CONFIG_PACKAGE_ntpclient=y
          # ==============================================
          # 禁用冲突组件（防止和 strongswan 冲突）
          # ==============================================
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_PACKAGE_openswan=n
          EOF
          make defconfig
          
      - name: Upload OpenWRT Config
        if: always()
        id: upload-config
        run: |
          tar -czvf openwrt-config.tar.gz -C $GITHUB_WORKSPACE/openwrt .config
          echo "config-path=$GITHUB_WORKSPACE/openwrt-config.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Config Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt-config.tar.gz
          retention-days: 7
          
      # ========== 核心修改3：编译时强制启用CCACHE和符号参数 ==========
      - name: make OpenWRT   
        run: |
          cd openwrt
          make download -j$(nproc)
          # 强制传递符号可见性参数，确保覆盖所有编译环节
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 \
                 CFLAGS="-fvisibility=default -rdynamic" \
                 CXXFLAGS="-fvisibility=default -rdynamic" \
                 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          # 编译时输出详细日志，便于排查符号问题
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          # 验证strongswan编译产物的符号可见性（关键检查）
          find ./build_dir/ -name "libstrongswan.so" -exec nm -D -g {} | grep -i "crypto_init" \; || true
          
      - name: Stage1 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          # 复制符号检查日志到固件包
          echo "===== Symbol Check Log =====" > $GITHUB_WORKSPACE/stage1-firmware/symbol-check.log
          find $GITHUB_WORKSPACE/openwrt/build_dir/ -name "libstrongswan.so" -exec nm -D -g {} \; >> $GITHUB_WORKSPACE/stage1-firmware/symbol-check.log 2>&1
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .
          echo "stage1-firmware-path=$GITHUB_WORKSPACE/stage1-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Stage1 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      # ========== 第二阶段：Nikki + 保留strongswan-full ==========
      - name: Stage2 - Add Nikki Feed
        run: |
          cd openwrt
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          ./scripts/feeds update nikki
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          
      - name: Stage2 - Config (保留strongswan-full + 强制OpenSSL)
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          # 强制保留strongswan-full和OpenSSL
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-minimal=n
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_wolfssl=n
          CONFIG_PACKAGE_libwolfssl=n
          # 添加Nikki组件
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          # 禁用冲突组件
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig
          
      - name: Stage2 - Download
        run: cd openwrt && make download -j$(nproc)

      - name: Stage2 - Compile (保留符号参数)
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 \
                 CFLAGS="-fvisibility=default -rdynamic" \
                 CXXFLAGS="-fvisibility=default -rdynamic" \
                 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Stage2 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .
          echo "stage2-firmware-path=$GITHUB_WORKSPACE/stage2-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Stage2 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      # ========== 第三阶段：HomeProxy/Sing-Box + 保留strongswan-full ==========
      - name: Stage3 - Add Small Feed
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          
      - name: Stage3 - Config (保留strongswan-full + 强制OpenSSL)
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          # 强制保留strongswan-full和OpenSSL
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-minimal=n
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_wolfssl=n
          CONFIG_PACKAGE_libwolfssl=n
          # 添加HomeProxy/Sing-Box组件
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          # 禁用冲突组件
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig
          
      - name: Stage3 - Download
        run: cd openwrt && make download -j$(nproc)

      - name: Stage3 - Compile (保留符号参数)
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 \
                 CFLAGS="-fvisibility=default -rdynamic" \
                 CXXFLAGS="-fvisibility=default -rdynamic" \
                 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Stage3 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage3-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage3-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage3-firmware/config-stage3.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage3-firmware.tar.gz -C stage3-firmware .
          echo "stage3-firmware-path=$GITHUB_WORKSPACE/stage3-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Stage3 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage3-firmware
          path: stage3-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "📦 Stage1 固件已上传（基础 + DDNS + UDPXY + Docker + strongswan-full）"
          echo "📦 Stage2 固件已上传（Nikki + strongswan-full）"
          echo "📦 Stage3 固件已上传（HomeProxy + Sing-Box + strongswan-full）"
          echo "🔍 符号表修复已生效，强制使用OpenSSL，禁用wolfssl"
          echo "=========================================="
