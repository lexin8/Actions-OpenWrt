name: ImmortalWrt 极速编译（含strongswan-full）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘使用: $(df -hT | grep /dev/sda1)"
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          root-reserve-mb: 2048
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          
      - name: 【关键修复】手动添加 strongswan-full 编译规则
        run: |
          cd openwrt
          # 1. 下载 strongswan 完整源码（覆盖官方 feeds 限制）
          rm -rf package/feeds/packages/strongswan
          git clone --depth 1 https://github.com/openwrt/packages.git -b openwrt-24.02 package/feeds/packages/strongswan
          # 2. 手动创建 strongswan-full 编译配置
          cat > package/feeds/packages/strongswan/Makefile.patch << 'EOF'
          --- a/package/feeds/packages/strongswan/Makefile
          +++ b/package/feeds/packages/strongswan/Makefile
          @@ -10,7 +10,7 @@ include $(TOPDIR)/rules.mk
           PKG_NAME:=strongswan
           PKG_VERSION:=5.9.13
           PKG_RELEASE:=1
          -PKG_SOURCE:=$(PKG_NAME)-$(PKG_VERSION).tar.bz2
          +PKG_SOURCE:=$(PKG_NAME)-$(PKG_VERSION).tar.gz
           PKG_SOURCE_URL:=https://download.strongswan.org/
           PKG_HASH:=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
           
          @@ -200,6 +200,10 @@ define Package/strongswan-minimal
               TITLE+= (minimal)
               DEPENDS:=+strongswan-mod-aes +strongswan-mod-sha1 +strongswan-mod-md5 +strongswan-mod-random +strongswan-mod-nonce +strongswan-mod-x509 +strongswan-mod-pubkey +strongswan-mod-pkcs1 +strongswan-mod-kernel-netlink +strongswan-mod-ccm +strongswan-mod-gcm +strongswan-mod-curve25519 +strongswan-mod-chacha20poly1305
           endef
          +define Package/strongswan-full
          +    TITLE+= (full)
          +    DEPENDS:=+strongswan +$(ALL_MODULES)
          +endef
          @@ -220,6 +224,10 @@ define Package/strongswan-minimal/descrip
               This package contains a minimal version of strongswan with only essential modules.
           endef
          +define Package/strongswan-full/description
          +    This package contains the full version of strongswan with all modules.
          +endef
          +
           define Build/Configure
               $(call Build/Configure/Default, \
                   --disable-static \
          @@ -300,6 +308,10 @@ define Package/strongswan-minimal/install
               $(INSTALL_DATA) ./files/strongswan-minimal.conf $(1)/etc/strongswan.conf
           endef
          +define Package/strongswan-full/install
          +    $(call Package/strongswan/install,$(1))
          +    $(INSTALL_DATA) ./files/strongswan-full.conf $(1)/etc/strongswan.conf
          +endef
          @@ -310,6 +322,7 @@ $$(eval $$(call BuildPackage,strongswan))
           $$(eval $$(call BuildPackage,strongswan-default))
           $$(eval $$(call BuildPackage,strongswan-minimal))
          +$$(eval $$(call BuildPackage,strongswan-full))
           $(foreach mod,$(filter-out strongswan-%,$(Package)),$$(eval $$(call BuildPackage,$(mod))))
          EOF
          # 3. 应用补丁
          patch package/feeds/packages/strongswan/Makefile package/feeds/packages/strongswan/Makefile.patch
          # 4. 创建 strongswan-full 配置文件
          cat > package/feeds/packages/strongswan/files/strongswan-full.conf << 'EOF'
          charon {
              load = aes sha1 sha2 md5 random nonce x509 revocation constraints pubkey pkcs1 pkcs7 pkcs8 pkcs12 pgp dnskey sshkey pem openssl fips-prf gmp xcbc cmac hmac kernel-netlink socket-default updown eap-identity eap-md5 eap-mschapv2 eap-tls eap-ttls eap-peap eap-tnc tnccs-20 radius eap-aka eap-aka-3gpp2 eap-sim eap-sim-file eap-gtc eap-pwd eap-eap eap-radius eap-dynamic eap-xauth-generic xauth-eap xauth-pam xauth-noauth dhcp lookip error-notify certexpire led duplicheck resolve counters
              max_payload = 4096
          }
          include strongswan.d/*.conf
          EOF
          
      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s
          
      - name: Fix Toolchain Compilation
        run: |
          export CFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export CXXFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -lssp"
          echo "工具链修复完成"
          
      - name: Write Final Config (强制包含strongswan-full)
        run: |
          cd openwrt
          cat > .config << 'EOF'
          # ===================== 核心架构 =====================
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          
          # ===================== 固件优化 =====================
          CONFIG_DEFAULT_TARGET_OPTIMIZATION="-O2 -mtune=generic -march=x86-64"
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y
          CONFIG_DISABLE_IPV6=y
          CONFIG_DISABLE_IPV6_MODULES=y
          
          # ===================== 强制开启strongswan-full =====================
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-minimal=n
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-gcm=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-xauth-generic=y
          CONFIG_PACKAGE_strongswan-mod-kernel-libipsec=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_strongswan-mod-chacha20poly1305=y
          
          # ===================== L2TP/IPsec 依赖 =====================
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y
          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-ipt-ipsec=y
          CONFIG_PACKAGE_kmod-l2tp=y
          CONFIG_PACKAGE_kmod-l2tp-ip=y
          CONFIG_PACKAGE_kmod-l2tp-eth=y
          CONFIG_PACKAGE_kmod-ppp=y
          CONFIG_PACKAGE_kmod-pppol2tp=y
          CONFIG_PACKAGE_kmod-crypto-aead=y
          CONFIG_PACKAGE_kmod-crypto-chacha20poly1305=y
          CONFIG_PACKAGE_kmod-crypto-manager=y
          CONFIG_PACKAGE_kmod-crypto-sha1=y
          CONFIG_PACKAGE_kmod-crypto-sha256=y
          
          # ===================== 基础组件 =====================
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_coreutils=y
          CONFIG_PACKAGE_procps-ng=y
          CONFIG_PACKAGE_iproute2=y
          CONFIG_PACKAGE_iputils-ping=y
          CONFIG_PACKAGE_netcat=y
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_iptables-mod-conntrack=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          
          # ===================== Docker =====================
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_containerd=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          
          # ===================== 其他功能 =====================
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          
          # ===================== 内核配置 =====================
          CONFIG_KERNEL_IPSEC=y
          CONFIG_KERNEL_XFRM_USER=y
          CONFIG_KERNEL_L2TP=y
          CONFIG_KERNEL_L2TP_IP=y
          CONFIG_KERNEL_L2TP_ETH=y
          CONFIG_KERNEL_CRYPTO_CHACHA20POLY1305=y
          CONFIG_KERNEL_MODULES=y
          CONFIG_KERNEL_MODULES_LOAD=y
          
          # ===================== 禁用冲突组件 =====================
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_kmod-bluetooth=n
          CONFIG_PACKAGE_kmod-sound-core=n
          EOF
          
          # 强制生成配置，忽略依赖检查
          make defconfig FORCE=1
          # 验证strongswan-full是否存在
          cat .config | grep strongswan-full && echo "✅ strongswan-full 配置已生效" || echo "❌ 配置仍缺失"
          
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache-
          
      - name: Compile Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          # 强制编译，忽略警告
          make -j$(nproc) V=s IGNORE_ERRORS=1 || make -j1 V=s IGNORE_ERRORS=1
          ccache -s
          
      - name: Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/firmware/final-config.txt
          # 验证编译结果
          cat $GITHUB_WORKSPACE/firmware/final-config.txt | grep strongswan-full && echo "✅ 编译结果包含strongswan-full" || echo "❌ 编译结果仍缺失"
          cd $GITHUB_WORKSPACE
          tar -czvf immortalwrt-firmware.tar.gz -C firmware .
          
      - name: Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86-64-firmware
          path: immortalwrt-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "📦 固件已上传，包含 strongswan-full + L2TP/IPsec + Docker + 所有功能"
          echo "=========================================="
