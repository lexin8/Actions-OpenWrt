name: ImmortalWrt 

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G
  COMMON_FLAGS: "-fvisibility=default -rdynamic -fPIC -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -O2 -mtune=generic -march=x86-64"

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: 检查服务器性能
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: 初始化环境（含 StrongSwan 完整编译依赖）
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev libgmp-dev libgcrypt-dev libp11-kit-dev libxml2-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: 最大化编译空间
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: 缓存 DL 目录
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: 缓存 CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache-

      - name: 配置 CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s

      - name: 更新并安装 Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          if [ -d "feeds/packages/net/strongswan" ]; then
            echo "✅ StrongSwan 包已找到"
          else
            echo "❌ StrongSwan 包未找到，编译终止"
            exit 1
          fi

      - name: 【核心】生成并追加 Stage1 配置片段
        run: |
          cd $OPENWRT_PATH
          cat > .config.stage1 << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-ipsec=y
          CONFIG_PACKAGE_strongswan-ikev2=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
          CONFIG_PACKAGE_strongswan-mod-eap-identity=y
          CONFIG_PACKAGE_strongswan-mod-xauth=y
          CONFIG_PACKAGE_strongswan-mod-psk=y
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_strongswan-mod-wolfssl=n
          CONFIG_PACKAGE_strongswan-libtls=n
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_iptables-mod-nat-extra=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_KMOD_IP_TABLES=y
          CONFIG_KMOD_IP_NAT=y
          CONFIG_KMOD_IP_CONNTRACK=y
          CONFIG_KMOD_IP_CONNTRACK_MARK=y
          CONFIG_KMOD_NETFILTER_XT_MATCH_STATE=y
          CONFIG_PACKAGE_kmod-ipt-conntrack-extra=y
          CONFIG_KMOD_CRYPTO_AES=y
          CONFIG_KMOD_CRYPTO_CBC=y
          CONFIG_KMOD_CRYPTO_HMAC=y
          CONFIG_KMOD_CRYPTO_SHA256=y
          CONFIG_KMOD_XFRM=y
          CONFIG_KMOD_XFRM_USER=y
          CONFIG_KMOD_XFRM_MODE_TUNNEL=y
          CONFIG_KMOD_XFRM_MODE_TRANSPORT=y
          CONFIG_KMOD_IPSEC=y
          CONFIG_KMOD_l2tp=y
          CONFIG_KMOD_l2tp-ip=y
          CONFIG_KMOD_l2tp-eth=y
          CONFIG_KMOD_pppol2tp=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-ipsec-vpnserver-manyusers=y
          CONFIG_PACKAGE_luci-app-strongswan=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_ipsec-tools=y
          CONFIG_PACKAGE_ntpclient=y
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_PACKAGE_openswan=n
          EOF
          cat .config.stage1 > .config
          make defconfig

      - name: 【关键】验证 Stage1 StrongSwan 配置是否生效
        run: |
          cd $OPENWRT_PATH
          echo "=== 检查 StrongSwan 核心配置 ==="
          grep -E "CONFIG_PACKAGE_strongswan(=|_)" .config || true
          grep -E "CONFIG_PACKAGE_libopenssl|CONFIG_PACKAGE_libwolfssl" .config || true
          if grep -q "CONFIG_PACKAGE_strongswan-full=y" .config; then
            echo "✅ StrongSwan 配置已生效"
          else
            echo "❌ StrongSwan 配置未生效，编译终止"
            exit 1
          fi

      - name: 上传 Stage1 初始配置
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-stage1-config
          path: ${{ env.OPENWRT_PATH }}/.config
          retention-days: 7

      - name: 【关键】先单独编译 StrongSwan（确认可编译）
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          export CFLAGS="${{ env.COMMON_FLAGS }}"
          export CXXFLAGS="${{ env.COMMON_FLAGS }}"
          export LDFLAGS="-rdynamic -fPIC -L/usr/lib/x86_64-linux-gnu -lssp"
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make package/strongswan/compile V=s -j$(nproc) || make package/strongswan/compile V=s -j1
          if [ -d "build_dir/target-x86_64_musl/strongswan-*/ipkg-install/usr/sbin" ]; then
            echo "✅ StrongSwan 单独编译成功"
            ls -la build_dir/target-x86_64_musl/strongswan-*/ipkg-install/usr/sbin/
          else
            echo "❌ StrongSwan 单独编译失败"
            exit 1
          fi

      - name: 上传 StrongSwan 编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strongswan-compile-logs
          path: |
            ${{ env.OPENWRT_PATH }}/build_dir/target-x86_64_musl/strongswan-*/config.log
            ${{ env.OPENWRT_PATH }}/build_dir/target-x86_64_musl/strongswan-*/.built*
          retention-days: 7

      - name: 编译 Stage1 完整固件
        run: |
          cd $OPENWRT_PATH
          export CFLAGS="${{ env.COMMON_FLAGS }}"
          export CXXFLAGS="${{ env.COMMON_FLAGS }}"
          export LDFLAGS="-rdynamic -fPIC -L/usr/lib/x86_64-linux-gnu -lssp"
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s

      - name: 打包 Stage1 固件
        if: always()
        run: |
          cd $OPENWRT_PATH/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          cp -v $OPENWRT_PATH/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .

      - name: 上传 Stage1 固件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      - name: Stage2：添加 Nikki Feed 并追加配置
        run: |
          cd $OPENWRT_PATH
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          ./scripts/feeds update nikki
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          cat > .config.stage2 << 'EOF'
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          EOF
          cat .config.stage2 >> .config
          make defconfig

      - name: 验证 Stage2 配置
        run: |
          cd $OPENWRT_PATH
          echo "=== 检查 Stage2 新增配置 ==="
          grep -E "CONFIG_PACKAGE_nikki|CONFIG_PACKAGE_luci-app-nikki" .config || true
          if grep -q "CONFIG_PACKAGE_nikki=y" .config && grep -q "CONFIG_PACKAGE_strongswan-full=y" .config; then
            echo "✅ Stage2 配置已生效"
          else
            echo "❌ Stage2 配置未生效，编译终止"
            exit 1
          fi

      - name: 编译 Stage2 完整固件
        run: |
          cd $OPENWRT_PATH
          export CFLAGS="${{ env.COMMON_FLAGS }}"
          export CXXFLAGS="${{ env.COMMON_FLAGS }}"
          export LDFLAGS="-rdynamic -fPIC -L/usr/lib/x86_64-linux-gnu -lssp"
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: 打包 Stage2 固件
        if: always()
        run: |
          cd $OPENWRT_PATH/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $OPENWRT_PATH/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .

      - name: 上传 Stage2 固件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      - name: 完成
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "🔧 StrongSwan 状态：已通过单独编译验证，使用 OpenSSL 后端"
          echo "📦 Stage1 固件：基础 + DDNS + UDPXY + Docker + strongswan-full"
          echo "📦 Stage2 固件：Stage1 + Nikki"
          echo "=========================================="
