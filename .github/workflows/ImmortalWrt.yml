name: ImmortalWrt

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ImmortalWrt Firmware
    runs-on: ubuntu-22.04

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          echo "export TERM=linux" >> ~/.bashrc

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt source
        run: |
          git clone https://github.com/immortalwrt/immortalwrt -b openwrt-24.10 openwrt
          cd openwrt
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install base packages
        run: |
          cd openwrt
          # 只安装基础包，确保编译成功
          ./scripts/feeds install \
            ddns-scripts \
            luci-app-ddns \
            luci-app-udpxy
          
          # 确保 dnsmasq-full 的依赖
          ./scripts/feeds install libnettle
          ./scripts/feeds install libgmp

      - name: Setup ccache
        run: |
          cd openwrt
          mkdir -p ccache
          echo 'CONFIG_CCACHE=y' >> .config
          echo 'CONFIG_CCACHE_DIR="$(pwd)/ccache"' >> .config

      - name: Generate config
        run: |
          cd openwrt
          export TERM=linux
          make defconfig
          
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=600
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y

          # 基础网络配置
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_TUN=y

          # 基础包
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y

          # dnsmasq 配置
          CONFIG_PACKAGE_dnsmasq=n
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dnsmasq-full_dhcp=y
          CONFIG_PACKAGE_dnsmasq-full_dhcpv6=y
          EOF

          make defconfig

      - name: Cache OpenWrt build
        uses: actions/cache@v4
        id: cache-openwrt
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
            openwrt/build_dir
            openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: Download packages (if cache missed)
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@main
        with:
          name: ImmortalWrt-x86-64-Firmware
          path: openwrt/bin/targets/x86/64/*.img.gz
          if-no-files-found: warn
