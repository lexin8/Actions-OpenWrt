name: ImmortalWrt 极速二阶段编译

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  REPO_BRANCH2: v24.10.5
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache-
            
      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s
          
      - name: Fix Toolchain Compilation
        run: |
          export CFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export CXXFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -lssp"
          echo "工具链修复完成"
          
      - name: Update Feeds (提前同步，关键修复)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      # ========== 第一阶段：基础 + strongswan-full 手机兼容版（L2TP/PSK + IKEv2/PSK）==========
      - name: Stage1 - Base + strongswan-full + L2TP/IPsec & IKEv2 PSK
        run: |
          cd openwrt
          
          cat > .config << 'EOF'
          # ===================== 核心系统架构与分区 =====================
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y

          # 编译优化
          CONFIG_DEFAULT_TARGET_OPTIMIZATION="-O2 -mtune=generic -march=x86-64"
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y

          CONFIG_DEVEL=y
          CONFIG_BROKEN=y

          # ===================== SSL 全局强制 OpenSSL（永不编译失败）=====================
          CONFIG_DEFAULT_SSL_LIB_OPENSSL=y
          CONFIG_DEFAULT_SSL_LIB_WOLFSSL=n
          CONFIG_DEFAULT_SSL_LIB_MBEDTLS=n

          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libopenssl-conf=y
          CONFIG_OPENSSL_OPTIMIZE_SPEED=y

          # ===================== StrongSwan-full 手机兼容（L2TP/PSK + IKEv2/PSK）=====================
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-ipsec=y
          CONFIG_PACKAGE_strongswan-swanctl=y
          CONFIG_PACKAGE_strongswan-pki=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-gcm=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-prf=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-random=y
          CONFIG_PACKAGE_strongswan-mod-pubkey=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-openssl=y
          CONFIG_PACKAGE_strongswan-mod-xauth-generic=y
          CONFIG_PACKAGE_strongswan-mod-xauth-eap=y
          CONFIG_PACKAGE_strongswan-mod-eap-mschapv2=y
          CONFIG_PACKAGE_strongswan-mod-eap-tls=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-socket-default=y
          CONFIG_PACKAGE_strongswan-mod-updown=y
          CONFIG_PACKAGE_strongswan-mod-vici=y
          CONFIG_PACKAGE_strongswan-mod-stroke=y
          CONFIG_PACKAGE_strongswan-mod-attr=y
          CONFIG_PACKAGE_strongswan-mod-dhcp=y
          CONFIG_PACKAGE_strongswan-mod-farp=y
          CONFIG_PACKAGE_strongswan-mod-unity=y

          # 加密库绑定 OpenSSL
          CONFIG_STRONGSWAN_CRYPTO_OPENSSL=y
          CONFIG_STRONGSWAN_CRYPTO_WOLFSSL=n
          CONFIG_STRONGSWAN_CRYPTO_MBEDTLS=n

          # ===================== L2TP/IPsec PSK 手机必备 =====================
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-chap=y
          CONFIG_PACKAGE_ppp-mod-mschap=y
          CONFIG_PACKAGE_ppp-mod-mschapv2=y
          CONFIG_PACKAGE_ppp-mod-pap=y

          # ===================== 内核模块 =====================
          CONFIG_PACKAGE_kmod-ppp=y
          CONFIG_PACKAGE_kmod-pppol2tp=y
          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-xfrm-ipsec=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-nft-socket=y

          # 防火墙
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-nat=y

          # LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_luci-app-dockerman=y

          # DDNS
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y

          # 禁用冲突
          CONFIG_PACKAGE_libwolfssl=n
          CONFIG_PACKAGE_wolfssl=n
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          
          ./scripts/feeds install -a
          make defconfig
          
      - name: Upload OpenWRT Config
        if: always()
        run: |
          tar -czvf openwrt-config.tar.gz -C $GITHUB_WORKSPACE/openwrt .config
          echo "config-path=$GITHUB_WORKSPACE/openwrt-config.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Config Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt-config.tar.gz
          retention-days: 7
          
      - name: make OpenWRT   
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          
      - name: Stage1 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .
          echo "stage1-firmware-path=$GITHUB_WORKSPACE/stage1-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Stage1 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      # ========== 第二阶段：Nikki ==========
      - name: Stage2 - Add Nikki Feed
        run: |
          cd openwrt
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          ./scripts/feeds update nikki
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          
      - name: Stage2 - Config
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_libreswan=n
          EOF
          make defconfig
          
      - name: Stage2 - Download
        run: cd openwrt && make download -j$(nproc)

      - name: Stage2 - Compile
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Stage2 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .
          echo "stage2-firmware-path=$GITHUB_WORKSPACE/stage2-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Stage2 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      # ========== 第三阶段：HomeProxy + Sing-Box ==========
      - name: Stage3 - Add Small Feed
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          
      - name: Stage3 - Config
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_libreswan=n
          EOF
          make defconfig
          
      - name: Stage3 - Download
        run: cd openwrt && make download -j$(nproc)

      - name: Stage3 - Compile
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Stage3 - Package Firmware
        if: always()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/stage3-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage3-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage3-firmware/config-stage3.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage3-firmware.tar.gz -C stage3-firmware .
          echo "stage3-firmware-path=$GITHUB_WORKSPACE/stage3-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Stage3 - Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage3-firmware
          path: stage3-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "📦 已支持：L2TP/IPsec PSK + IKEv2 PSK（全平台手机）"
          echo "📦 无 wolfSSL 冲突，OpenSSL 全局稳定编译"
          echo "=========================================="
