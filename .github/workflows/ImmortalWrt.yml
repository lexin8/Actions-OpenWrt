name: ImmortalWrt 全自动分阶段编译

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Cache Feeds
        uses: actions/cache@v4
        with:
          path: openwrt/feeds
          key: feeds-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache Toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/toolchain-*
          key: toolchain-${{ hashFiles('openwrt/toolchain/Makefile') }}

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}

      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE
          ccache -o compression=true
          ccache -s

      - name: Fix Toolchain Compilation
        run: |
          export CFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export CXXFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -lssp"
          echo "工具链修复完成"

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Stage1 - Base Config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=600
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_NETFILTER_XT_MATCH_POLICY=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_PPP_ASYNC=y
          CONFIG_KERNEL_PPP_SYNC_TTY=y
          CONFIG_KERNEL_PPP_L2TP=y
          CONFIG_KERNEL_TUN=y
          CONFIG_KERNEL_BRIDGE_NETFILTER=y
          EOF
          make defconfig

      - name: Download Packages
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile Stage1
        run: |
          cd openwrt
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          export PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          rm -rf build_dir/target-* build_dir/host

      - name: Save Stage1 Cache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: stage1-cache-${{ github.run_id }}

      - name: Stage2 - DDNS/UDPXY
        run: |
          cd openwrt
          ./scripts/feeds install ddns-scripts ddns-scripts-cloudflare ddns-scripts_cloudflare.com-v4 luci-app-ddns luci-app-udpxy
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y
          EOF
          make defconfig
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          rm -rf build_dir/target-* build_dir/host

      - name: Save Stage2 Cache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: stage2-cache-${{ github.run_id }}

      - name: Stage3 - SoftEtherVPN
        run: |
          cd openwrt
          ./scripts/feeds install softethervpn softethervpn5 luci-app-softethervpn
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_softethervpn=y
          CONFIG_PACKAGE_softethervpn5=y
          CONFIG_PACKAGE_luci-app-softethervpn=y
          EOF
          make defconfig
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          rm -rf build_dir/target-* build_dir/host

      - name: Save Stage3 Cache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: stage3-cache-${{ github.run_id }}

      - name: Stage4 - StrongSwan
        run: |
          cd openwrt
          ./scripts/feeds install strongswan strongswan-swanctl swanmon strongswan-charon \
            strongswan-mod-kernel-netlink strongswan-mod-nonce strongswan-mod-sha1 \
            strongswan-mod-sha2 strongswan-mod-aes strongswan-mod-hmac strongswan-mod-gmp \
            strongswan-mod-pem strongswan-mod-x509 strongswan-mod-vici luci-app-strongswan-swanctl
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-swanctl=y
          CONFIG_PACKAGE_swanmon=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-nonce=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-gmp=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-vici=y
          CONFIG_PACKAGE_luci-app-strongswan-swanctl=y
          EOF
          make defconfig
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          rm -rf build_dir/target-* build_dir/host

      - name: Save Stage4 Cache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: stage4-cache-${{ github.run_id }}

      - name: Stage5 - Nikki
        run: |
          cd openwrt
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          ./scripts/feeds update nikki
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          EOF
          make defconfig
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          rm -rf build_dir/target-* build_dir/host

      - name: Save Stage5 Cache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: |
            openwrt
            ${{ env.CCACHE_DIR }}
          key: stage5-cache-${{ github.run_id }}

      - name: Stage6 - HomeProxy/Sing-Box
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          EOF
          make defconfig
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s

      - name: Package Final Firmware
        id: package
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/final-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/final-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/final-firmware/config.txt
          cd $GITHUB_WORKSPACE
          FINAL_NAME="${{ env.FIRMWARE_NAME }}-full-$(date +%Y%m%d-%H%M%S).tar.gz"
          tar -czvf $FINAL_NAME -C final-firmware .
          echo "firmware-path=$GITHUB_WORKSPACE/$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: Upload Final Firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-full-firmware
          path: ${{ steps.package.outputs.firmware-path }}
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 所有6个阶段编译成功！"
          echo "📦 最终固件已上传"
          echo "=========================================="
