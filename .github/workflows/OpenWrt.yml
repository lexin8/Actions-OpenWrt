name: Firmware 25

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: false
        default: 'x86'
      subtarget:
        description: 'Build subtarget'
        required: false
        default: '64'

permissions:
  contents: read
  actions: write

concurrency:
  group: build-official-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build_time.outputs.time }}
    
    steps:
      - name: Set build time
        id: build_time
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

  build-firmware:
    name: Build Official OpenWrt x86_64 (Pure + Dockerman)
    runs-on: ubuntu-latest
    needs: prepare
    
    steps:
      # 1. 拉取 【OpenWrt官方原版源码】（最新稳定分支 25.05）
      - name: Checkout Official OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.05
          fetch-depth: 1

      # 2. 安装官方编译必需依赖（无多余组件）
      - name: Install official build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk git libssl-dev \
            gettext zlib1g-dev unzip time python3 python3-distutils \
            file rsync wget xxd bison flex pkgconf libelf-dev

      # 3. 仅更新/安装 【官方原生软件源】（无任何第三方源）
      - name: Update & install official feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 4. 下载源码包（官方标准流程）
      - name: Download package source
        run: make download -j$(nproc) || true

      # 5. 纯净官方配置（仅x86_64 + 官方LuCI + 官方Dockerman）
      - name: Generate pure official config
        run: |
          cat > .config << 'EOF'
          # 官方原生 x86_64 平台配置
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=64
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_TARGET_ROOTFS_EXT4FS=y

          # 启用官方 LuCI 基础框架
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y

          # 【官方原生】Docker 管理插件（无第三方修改）
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
          CONFIG_PACKAGE_docker-compose=y

          # 官方原生网络基础组件
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-offload=y

          # 基础实用工具
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_vim-full=y

          # 编译优化
          CONFIG_CCACHE=y
          EOF

          make defconfig
          echo "✅ 官方纯净配置生成完成"

      # 6. 开始编译官方固件
      - name: Build Official OpenWrt
        id: build
        run: |
          set +e
          echo "开始编译 官方纯净 OpenWrt x86_64..."
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "✅ 官方固件编译成功"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 编译失败"
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # 7. 收集官方固件文件
      - name: Collect firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          cp -v bin/targets/x86/64/openwrt-*-x86-64-generic* firmware/ 2>/dev/null || true

      # 8. 打包固件
      - name: Archive firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          tar -czf openwrt-official-x86_64-${{ needs.prepare.outputs.build_time }}.tar.gz -C firmware .

      # 9. 上传固件产物
      - name: Upload firmware
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-official-x86_64
          path: openwrt-official-x86_64-*.tar.gz
          retention-days: 30

      # 10. 上传编译日志（失败/成功都上传）
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-build-logs
          path: build.log
          retention-days: 7

      # 11. 失败时显示错误日志
      - name: Show error logs
        if: failure()
        run: tail -n 200 build.log

  # 编译总结
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-firmware]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🎯 官方纯净版 OpenWrt x86_64 编译完成
          **状态**: ${{ needs.build-firmware.result }}
          **编译时间**: ${{ needs.prepare.outputs.build_time }}
          **源码**: openwrt/openwrt openwrt-25.05 官方原版
          **平台**: x86_64 Generic
          **根分区**: 512MB Ext4
          
          ## 内置组件（纯官方无第三方）
          ✅ LuCI 官方管理界面
          ✅ 中文语言包
          ✅ 官方原生 luci-app-dockerman
          ✅ Docker Compose
          ✅ Firewall4 (nftables)
          ✅ 基础系统工具
          
          ❌ 无任何第三方插件
          ❌ 无任何第三方软件源
          ❌ 无定制修改
          EOF
