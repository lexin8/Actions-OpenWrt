name: OpenWrt（中文界面）

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启SSH调试（true/false）'
        required: false
        default: 'false'

env:
  # 编译目标（按需修改，示例为x86_64）
  TARGET_ARCH: x86_64
  # OpenWrt源码分支（建议23.05，兼容性更好）
  OPENWRT_BRANCH: openwrt-23.05
  # Nikki插件Feed名称
  NIKKI_FEED_NAME: nikki

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 清理冗余包，加速编译
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y
          sudo apt full-upgrade -y
          # 安装编译依赖（含中文环境相关）
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl locales
          # 配置中文locale（避免编译时语言乱码）
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LC_ALL=zh_CN.UTF-8 LANG=zh_CN.UTF-8
          # 安装yq（Nikki依赖）
          sudo wget -O /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
          # 清理缓存
          sudo apt autoremove -y && sudo apt clean -y

      - name: 克隆OpenWrt源码
        run: |
          git clone --depth 1 --branch $OPENWRT_BRANCH https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          # 添加Nikki插件源（核心步骤）
          echo "src-git $NIKKI_FEED_NAME https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
          # 更新并安装所有Feeds（含Nikki）
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置编译选项（关键：启用中文+Nikki）
        run: |
          cd openwrt
          # 生成默认配置
          make defconfig
          # ========== 核心配置：确保中文界面 ==========
          # 启用LuCI中文语言包
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          # 启用LuCI基本界面（必须）
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-admin-full=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
          # ========== 核心配置：启用Nikki插件 ==========
          # 显式启用luci-app-nikki（确保编译进固件）
          echo "CONFIG_PACKAGE_luci-app-nikki=y" >> .config
          echo "CONFIG_PACKAGE_nikki=y" >> .config
          # 启用Nikki中文语言包（插件自带多语言）
          echo "CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y" >> .config
          # ========== 可选：调试用（如需） ==========
          # 保留编译日志
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_BUILD_LOG=y" >> .config
          # 加载配置并检查
          make defconfig

      - name: 可选：SSH调试（如需手动调整）
        if: ${{ github.event.inputs.ssh == 'true' }}
        uses: mxschmitt/action-tmate@v3

      - name: 开始编译
        run: |
          cd openwrt
          # 查看CPU核心数，最大化编译速度
          CORE_COUNT=$(nproc --all)
          echo "使用 $CORE_COUNT 核心编译"
          make -j$CORE_COUNT V=s 2>&1 | tee build.log

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Nikki-Chinese-${{ env.TARGET_ARCH }}
          path: openwrt/bin/targets/**/*.bin
          retention-days: 7

      - name: 上传编译日志（调试用）
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/build.log
          retention-days: 7
