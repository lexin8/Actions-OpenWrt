name: FanchmWrt (FWX compile test)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH2: fanchmwrt-24.10.4
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev golang-go
          sudo timedatectl set-timezone "$TZ"

      - name: Clone fanchmwrt Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH2 $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Apply FWX patches (package/fcm only)
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/apply-fwx-package-fcm.sh"
          bash "$GITHUB_WORKSPACE/scripts/apply-fwx-package-fcm.sh" "$OPENWRT_PATH" "$GITHUB_WORKSPACE"

      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-cache-fwx-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: dl-cache-fwx-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-fwx-${{ github.run_id }}
          restore-keys: ccache-fwx-

      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s

      - name: Update feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure minimal .config
        run: |
          cd $OPENWRT_PATH
          make defconfig
          printf "\nCONFIG_TARGET_x86_64=y\nCONFIG_TARGET_x86_64_Generic=y\nCONFIG_PACKAGE_kmod-fwx=y\nCONFIG_PACKAGE_fwxd=y\nCONFIG_PACKAGE_kmod-ipt-conntrack=y\n" >> .config
          make olddefconfig

      - name: Compile kmod-fwx (test)
        run: |
          cd $OPENWRT_PATH
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make download -j$(nproc)
          ccache -s
          make -j$(nproc) package/fcm/fwx/compile V=s
          make -j$(nproc) package/fcm/fwxd/compile V=s
          ccache -s
YAML
