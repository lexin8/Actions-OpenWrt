name: fanchmwrt+kenzo

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build fanchmwrt Firmware
    runs-on: ubuntu-22.04

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          # 新增luci-app-ipsec-vpnd编译依赖（libgmp-dev/libgcrypt-dev）
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev libgmp-dev libgcrypt-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          echo "export TERM=linux" >> ~/.bashrc

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 2048  # 增大swap适配ipsec编译
          temp-reserve-mb: 100
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone source & setup feeds
        run: |
          git clone https://github.com/fanchmwrt/fanchmwrt openwrt
          cd openwrt
          # 清空原有feeds避免冲突
          > feeds.conf.default
          # 保留原有第三方源
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          # 添加jell仓库（核心：luci-app-ipsec-vpnd所在仓库）
          echo "src-git jell https://github.com/kenzok8/jell" >> feeds.conf.default

      - name: Update & clean feeds
        run: |
          cd openwrt
          # 更新所有feeds（包括新增的jell仓库）
          ./scripts/feeds update -a -f
          # 保留原有清理逻辑
          rm -rf feeds/luci/applications/luci-app-mosdns
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns}
          rm -rf feeds/packages/utils/v2dat
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/kenzok8/golang -b 1.26 feeds/packages/lang/golang
          # 显式安装jell仓库的luci-app-ipsec-vpnd插件
          ./scripts/feeds install -p jell luci-app-ipsec-vpnd
          ./scripts/feeds install -p jell luci-i18n-ipsec-vpnd-zh-cn

      - name: Install all feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Generate config
        run: |
          cd openwrt
          export TERM=linux
          make defconfig
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          # IPsec必需的内核配置
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_NETFILTER_XT_MATCH_POLICY=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_PPP_ASYNC=y
          CONFIG_KERNEL_PPP_SYNC_TTY=y
          CONFIG_KERNEL_PPP_L2TP=y
          CONFIG_KERNEL_TUN=y
          CONFIG_KERNEL_BRIDGE_NETFILTER=y
          CONFIG_KERNEL_CRYPTO_AES=y
          CONFIG_KERNEL_CRYPTO_HMAC=y
          CONFIG_KERNEL_CRYPTO_SHA256=y
          # 基础工具
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y
          # luci-app-ipsec-vpnd核心配置（jell仓库）
          CONFIG_PACKAGE_luci-app-ipsec-vpnd=y
          CONFIG_PACKAGE_luci-i18n-ipsec-vpnd-zh-cn=y
          # IPsec依赖包
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-gcm=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-md5=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-socket-default=y
          CONFIG_PACKAGE_strongswan-mod-stroke=y
          CONFIG_PACKAGE_strongswan-mod-updown=y
          CONFIG_PACKAGE_strongswan-mod-xauth-generic=y
          CONFIG_PACKAGE_xl2tpd=y
          # 内核模块依赖
          CONFIG_PACKAGE_kmod-crypto-aes=y
          CONFIG_PACKAGE_kmod-crypto-hmac=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-ipsec6=y
          # 原有保留包
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          # 禁用无关包
          # CONFIG_PACKAGE_luci-app-arpbind is not set
          # CONFIG_PACKAGE_luci-app-autoreboot is not set
          # CONFIG_PACKAGE_luci-app-nlbwmon is not set
          # CONFIG_PACKAGE_luci-app-samba4 is not set
          # CONFIG_PACKAGE_luci-app-samba is not set
          # CONFIG_PACKAGE_luci-app-vlmcsd is not set
          # CONFIG_PACKAGE_luci-app-wol is not set
          EOF
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          # 预下载ipsec相关包
          make package/luci-app-ipsec-vpnd/download V=s -j1
          make download -j8
          find dl -size -1024c -exec ls -l {} \;

      - name: Build firmware
        run: |
          cd openwrt
          # 先编译ipsec核心依赖保证编译成功
          make package/strongswan/compile V=s -j1
          make package/xl2tpd/compile V=s -j1
          make package/luci-app-ipsec-vpnd/compile V=s -j1
          # 整体编译（出错时单线程输出详细日志）
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@main
        with:
          name: fanchmwrt-x86-64-Firmware
          path: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/packages/x86_64/luci/luci-app-ipsec-vpnd*ipk
          if-no-files-found: warn
