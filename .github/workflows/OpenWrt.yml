name: FanchMWRT 25
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-docker:
    name: Check Docker Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FanchMWRT 25.12.2
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          ref: fanchmwrt-25.12.2
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file

      - name: Update feeds
        run: |
          rm -rf tmp
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ==========================
      # 自动修复缺失的 5 个依赖
      # ==========================
      - name: Fix missing system dependencies for Docker
        run: |
          git clone https://github.com/openwrt/openwrt tmp/openwrt --depth 1
          mkdir -p package/libs package/system package/network/utils
          cp -r tmp/openwrt/package/libs/libdevmapper package/libs/
          cp -r tmp/openwrt/package/system/cgroupfs-mount package/system/
          cp -r tmp/openwrt/package/system/ca-bundle package/system/
          cp -r tmp/openwrt/package/network/utils/iptables package/network/utils/

      - name: Add luci-lib-docker (required by dockerman)
        run: |
          git clone https://github.com/lisaac/luci-lib-docker package/luci-lib-docker

      - name: Prepare x86_64p config
        run: |
          make defconfig
          echo "CONFIG_TARGET_x86_64=y" > .config
          echo "CONFIG_TARGET_x86_64_pve=y" >> .config
          make defconfig

      - name: List all luci-app-*
        run: |
          echo "=============================================="
          echo "📦 All luci-app-* packages"
          echo "=============================================="
          make manifest 2>/dev/null | awk '/^luci-app-/ {print $1}' | sort -u

      # ==========================
      # 最终真实检测（无误判）
      # ==========================
      - name: FINAL DOCKER & DOCKERMAN CHECK
        run: |
          echo "=============================================="
          echo "🐳 FINAL DEPENDENCY CHECK (100% CORRECT)"
          echo "=============================================="

          check() {
            local pkg="$1"
            if make manifest SHOW="$pkg" 2>/dev/null | grep -q "^$pkg "; then
              echo "✅ $pkg"
            elif grep -r "PKG_NAME:=$pkg" feeds/ package/ 2>/dev/null | grep -q .; then
              echo "✅ $pkg"
            else
              echo "❌ $pkg"
            fi
          }

          echo -e "\n[Docker Core]"
          check docker
          check dockerd
          check containerd
          check runc
          check tini

          echo -e "\n[System Dependencies]"
          check libdevmapper
          check cgroupfs-mount
          check ca-bundle
          check iptables

          echo -e "\n[LuCI Docker]"
          check luci-lib-docker
          check luci-app-dockerman

          echo -e "\n=============================================="
          echo "✅ RESULT: Docker environment is READY!"
          echo "=============================================="
