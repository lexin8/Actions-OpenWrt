name: FanchmWrt (FWX compile test - minimal)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH2: fanchmwrt-24.10.4
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils \
            curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler \
            swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache \
            libpam0g-dev liblzma-dev libev-dev golang-go
          sudo timedatectl set-timezone "$TZ"

      - name: Clone fanchmwrt Source
        run: |
          git clone --depth 1 -b "$REPO_BRANCH2" "$REPO_URL2" openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Apply FWX patches (package/fcm only)
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/apply-fwx-package-fcm.sh"
          bash "$GITHUB_WORKSPACE/scripts/apply-fwx-package-fcm.sh" "$OPENWRT_PATH" "$GITHUB_WORKSPACE"

      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-cache-fwx-min-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: dl-cache-fwx-min-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-fwx-min-${{ github.run_id }}
          restore-keys: ccache-fwx-min-

      - name: Setup CCache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE" -o compression=true
          ccache -s

      - name: Update feeds
        run: |
          cd "$OPENWRT_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply LuCI dashboard setting patch
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/apply-fwx-luci-dashboard-setting.sh"
          bash "$GITHUB_WORKSPACE/scripts/apply-fwx-luci-dashboard-setting.sh" "$OPENWRT_PATH" "$GITHUB_WORKSPACE"

      - name: Configure minimal .config
        run: |
          cd "$OPENWRT_PATH"
          make defconfig
          # Ensure only x86_64 target is selected.
          # Remove all "CONFIG_TARGET_* = y" lines to avoid building other targets/toolchains (e.g. mips).
          sed -i '/^CONFIG_TARGET_[A-Za-z0-9_]*=y$/d' .config
          cat >> .config <<'EOF'

          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_PACKAGE_kmod-fwx=y
          CONFIG_PACKAGE_fwxd=y
          CONFIG_PACKAGE_kmod-ipt-conntrack=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-app-fwx-dashboard-setting=y
          EOF
          # Do not call olddefconfig here; some OpenWrt trees don't provide that target.
          # Continue compilation using the modified .config.

      - name: Compile kmod-fwx (test)
        run: |
          cd "$OPENWRT_PATH"
          export CCACHE_DIR="$CCACHE_DIR" USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make download -j"$(nproc)"
          make -j"$(nproc)" package/fcm/fwx/compile V=s

      - name: Compile fwxd (test)
        run: |
          cd "$OPENWRT_PATH"
          export CCACHE_DIR="$CCACHE_DIR" USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j"$(nproc)" package/fcm/fwxd/compile V=s

      - name: Compile luci-app-fwx-dashboard-setting (test)
        run: |
          cd "$OPENWRT_PATH"
          export CCACHE_DIR="$CCACHE_DIR" USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j"$(nproc)" package/luci-app-fwx-dashboard-setting/compile V=s

