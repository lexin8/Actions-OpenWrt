name: OpenWrt

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '目标架构（如 x86_64）'
        required: true
        default: 'x86_64'

env:
  OPENWRT_BRANCH: master
  SWAP_SIZE: 10G

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装官方要求的依赖（修正版）
        run: |
          sudo apt update -y
          sudo apt install -y binutils bzip2 diffutils flex gawk gcc g++ getopt grep libc6-dev zlib1g-dev make perl python3 rsync subversion unzip git-core libssl-dev libncurses5-dev libncursesw5-dev build-essential pkg-config curl wget coreutils util-linux
          # 扩展交换分区（25.12 编译内存需求高）
          sudo fallocate -l $SWAP_SIZE /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 拉取 25.12 源码（官方流程）
        run: |
          git clone --branch $OPENWRT_BRANCH https://github.com/openwrt/openwrt.git openwrt-25.12
          cd openwrt-25.12
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 添加 Nikki 插件源（如需）
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
          ./scripts/feeds update nikki && ./scripts/feeds install -a

      - name: 配置编译选项（官方 menuconfig）
        run: |
          cd openwrt-25.12
          # 生成默认配置 + 启用中文 + Nikki
          make defconfig
          cat >> .config << EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          EOF
          make defconfig

      - name: 编译固件（官方流程 + 25.12 适配）
        run: |
          cd openwrt-25.12
          make -j1 V=s  # 单线程初始化
          make -j$(nproc -1) V=s  # 并行编译

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-25.12-${{ github.event.inputs.target_arch }}
          path: openwrt-25.12/bin/targets/**/*.bin
          retention-days: 7
