name: Build OpenWrt with L2TP/IPsec Server

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 1 * *'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai
  CCACHE_DIR: /home/runner/work/ccache
  CCACHE_MAXSIZE: 2G

jobs:
  build:
    name: Build OpenWrt for x86-64
    runs-on: ubuntu-22.04
    
    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo -E rm -rf /etc/apt/sources.list.d
          sudo -E apt-get update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE
          ccache -o compression=true

      - name: 缓存 feeds
        uses: actions/cache@v4  # 升级到 v4
        id: cache-feeds
        with:
          path: openwrt/feeds
          key: feeds-${{ env.REPO_BRANCH }}-${{ github.run_id }}
          restore-keys: |
            feeds-${{ env.REPO_BRANCH }}-
            feeds-

      - name: 缓存 dl 源码包
        uses: actions/cache@v4  # 升级到 v4
        id: cache-dl
        with:
          path: openwrt/dl
          key: dl-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            dl-${{ env.REPO_BRANCH }}-
            dl-

      - name: 缓存 ccache
        uses: actions/cache@v4  # 升级到 v4
        id: cache-ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.REPO_BRANCH }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ env.REPO_BRANCH }}-
            ccache-

      - name: 克隆源代码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --depth=1 openwrt
          cd openwrt

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入编译配置
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_BUSYBOX_CUSTOM=y
          CONFIG_BUSYBOX_CONFIG_FEATURE_FLOAT_SLEEP=y
          CONFIG_BUSYBOX_CONFIG_FEATURE_TOP_SMP_CPU=y
          CONFIG_PACKAGE_kmod-crypto-aead=y
          CONFIG_PACKAGE_kmod-crypto-ccm=y
          CONFIG_PACKAGE_kmod-crypto-cmac=y
          CONFIG_PACKAGE_kmod-crypto-crc32c=y
          CONFIG_PACKAGE_kmod-crypto-ctr=y
          CONFIG_PACKAGE_kmod-crypto-des=y
          CONFIG_PACKAGE_kmod-crypto-gcm=y
          CONFIG_PACKAGE_kmod-crypto-gf128=y
          CONFIG_PACKAGE_kmod-crypto-ghash=y
          CONFIG_PACKAGE_kmod-crypto-hmac=y
          CONFIG_PACKAGE_kmod-crypto-md5=y
          CONFIG_PACKAGE_kmod-crypto-rng=y
          CONFIG_PACKAGE_kmod-crypto-seqiv=y
          CONFIG_PACKAGE_kmod-crypto-sha1=y
          CONFIG_PACKAGE_kmod-crypto-sha256=y
          CONFIG_PACKAGE_kmod-crypto-sha512=y
          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-ipsec6=y
          CONFIG_PACKAGE_kmod-ipt-conntrack-extra=y
          CONFIG_PACKAGE_kmod-ipt-ipsec=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_kmod-nft-bridge=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-tunnel=y
          CONFIG_PACKAGE_kmod-ppp=y
          CONFIG_PACKAGE_kmod-pppoe=y
          CONFIG_PACKAGE_kmod-pppol2tp=y
          CONFIG_PACKAGE_kmod-pptp=y
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_linux-atm=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_iptables-mod-conntrack-extra=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          CONFIG_PACKAGE_iptables-mod-nat-extra=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ipsec=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          EOF

      - name: 生成默认配置
        run: |
          cd openwrt
          make defconfig

      - name: 下载所有依赖包
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 导出并上传.config配置文件（编译前）
        id: upload_config_before
        run: |
          cd openwrt
          if [ -f ".config" ]; then
            CONFIG_NAME="openwrt_config_before_$(date +%Y%m%d_%H%M%S).config"
            cp .config $GITHUB_WORKSPACE/$CONFIG_NAME
            echo "CONFIG_PATH=$GITHUB_WORKSPACE/$CONFIG_NAME" >> $GITHUB_OUTPUT
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ 编译前配置已保存：$CONFIG_NAME"
          else
            echo "⚠️ .config 文件不存在"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: 上传编译前.config到artifact
        uses: actions/upload-artifact@v4
        if: steps.upload_config_before.outputs.status == 'success'
        with:
          name: OpenWrt_Config_Before
          path: ${{ steps.upload_config_before.outputs.CONFIG_PATH }}
          retention-days: 7

      - name: 编译固件
        run: |
          cd openwrt
          # 启用 ccache
          export CCACHE_DIR=$CCACHE_DIR
          export USE_CCACHE=1
          make -j$(nproc) || make -j1 V=s

      - name: 整理固件
        run: |
          cd openwrt
          mkdir -p artifact
          rm -rf artifact/*
          cp -rf $(find bin/targets/ -type f -name "*combined*" -o -name "*squashfs*" -o -name "*ext4*" -o -name "*efi*") artifact/ 2>/dev/null || true

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-L2TP-IPsec-x86-64
          path: openwrt/artifact/
          if-no-files-found: warn
          retention-days: 7
