name: Build FanchmWrt x86_64

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: fanchmwrt-24.10.4
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: 检查服务器配置
      run: |
        echo "⚠️ 服务器配置信息："
        echo "--------------------------"
        echo "CPU 核心数: $(nproc)"
        echo "内存总量: $(free -h | awk '/^Mem/ {print $2}')"
        echo "Swap 总量: $(free -h | awk '/^Swap/ {print $2}')"
        echo "磁盘空间: $(df -h / | awk '/\// {print $4}')"
        echo "--------------------------"

    - name: 检出代码
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆 FanchmWrt 源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义 feeds.conf 和 .config
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 🔍 关键步骤：测试原始 fwxd 源码
      id: test_original
      run: |
        set -e
        cd openwrt
        FWXD_SRC="package/fcm/fwxd/src"
        
        echo "=== 1. 检查源码文件完整性 ==="
        if [ ! -d "$FWXD_SRC" ]; then
          echo "❌ 错误：fwxd 源码目录不存在！"
          exit 1
        fi
        
        echo "✅ fwxd 源码目录存在，文件列表："
        ls -la "$FWXD_SRC"
        
        echo -e "\n=== 2. 检查关键文件 ==="
        for file in fwx_config.c fwx_config.h fwx_app_filter.c Makefile; do
          if [ -f "$FWXD_SRC/$file" ]; then
            echo "✅ $file 存在"
          else
            echo "❌ $file 不存在！"
          fi
        done
        
        echo -e "\n=== 3. 尝试最小化编译 fwxd ==="
        # 先尝试编译依赖
        make package/fcm/libfwx_common/compile V=s -j1 || true
        # 再编译 fwxd
        if make package/fcm/fwxd/compile V=s -j1; then
          echo "✅ 原始 fwxd 编译成功！"
          echo "ORIGINAL_BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "❌ 原始 fwxd 编译失败！"
          echo "ORIGINAL_BUILD_SUCCESS=false" >> $GITHUB_ENV
          # 保存编译日志
          make package/fcm/fwxd/compile V=s -j1 2>&1 | tee fwxd_original_build.log
        fi

    - name: 📦 上传原始源码编译日志（如果失败）
      if: env.ORIGINAL_BUILD_SUCCESS == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: fwxd-original-build-log
        path: openwrt/fwxd_original_build.log
        retention-days: 7

    - name: 🛠️ 应用安全补丁（仅当原始编译成功时）
      if: env.ORIGINAL_BUILD_SUCCESS == 'true'
      run: |
        set -e
        cd openwrt/package/fcm/fwxd/src
        
        echo "=== 应用安全补丁：只追加，不覆盖 ==="
        
        # 1. 修改 fwx_netlink.c
        echo "1. 修改 fwx_netlink.c..."
        if ! grep -q "fwx_config.h" fwx_netlink.c; then
          sed -i '/#include "fwx_user.h"/a #include "fwx_config.h"' fwx_netlink.c
          echo "   ✅ 追加头文件成功"
        else
          echo "   ℹ️ 头文件已存在，跳过"
        fi
        
        if ! grep -q "g_monitor_enable" fwx_netlink.c; then
          sed -i '/total_down_bytes > 0/a \
          if (g_monitor_enable) { json_object_put(root); return; }' fwx_netlink.c
          echo "   ✅ 追加监控判断逻辑成功"
        else
          echo "   ℹ️ 监控逻辑已存在，跳过"
        fi
        
        # 2. 修改 fwx_config.c
        echo "2. 修改 fwx_config.c..."
        if ! grep -q "g_monitor_enable" fwx_config.c; then
          echo "" >> fwx_config.c
          echo "int g_monitor_enable = 1;" >> fwx_config.c
          echo "   ✅ 追加全局变量成功"
        else
          echo "   ℹ️ 全局变量已存在，跳过"
        fi
        
        # 3. 修改 fwx_config.h
        echo "3. 修改 fwx_config.h..."
        if ! grep -q "g_monitor_enable" fwx_config.h; then
          echo "" >> fwx_config.h
          echo "extern int g_monitor_enable;" >> fwx_config.h
          echo "   ✅ 追加变量声明成功"
        else
          echo "   ℹ️ 变量声明已存在，跳过"
        fi
        
        # 4. Web 界面部分
        echo "4. 配置 Web 界面..."
        WEB_DIR="$GITHUB_WORKSPACE/openwrt/feeds/fanchmwrt/luci-app-fwx-macfilter"
        mkdir -p "$WEB_DIR/root/etc/config"
        
        if [ ! -f "$WEB_DIR/root/etc/config/fwx" ]; then
          echo "config fwx 'setting'" > "$WEB_DIR/root/etc/config/fwx"
          echo "    option monitor_enable '1'" >> "$WEB_DIR/root/etc/config/fwx"
          echo "   ✅ 创建配置文件成功"
        else
          echo "   ℹ️ 配置文件已存在，跳过"
        fi
        
        echo "✅ 补丁应用完成！"

    - name: 下载 dl 库
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
