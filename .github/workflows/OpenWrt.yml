name: Newifi D2 LEDE
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          
      - name: Clone source
        run: |
          git clone https://github.com/coolsnowwolf/lede openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Generate config
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y
          CONFIG_PACKAGE_kmod-mt7603=y
          CONFIG_PACKAGE_kmod-mt76x2=y
          CONFIG_PACKAGE_wpad-openssl=y
          CONFIG_PACKAGE_hostapd-common=y
          CONFIG_DRIVER_11AC_SUPPORT=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          CONFIG_PACKAGE_luci-proto-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y
          CONFIG_PACKAGE_kmod-pppol2tp=y
          CONFIG_PACKAGE_kmod-l2tp=y
          CONFIG_PACKAGE_luci-app-accesscontrol=n
          CONFIG_PACKAGE_luci-app-nlbwmon=n
          CONFIG_PACKAGE_luci-app-rclone=n
          CONFIG_PACKAGE_luci-app-upnp=n
          CONFIG_PACKAGE_luci-app-vlmcsd=n
          CONFIG_PACKAGE_luci-app-vsftpd=n
          CONFIG_PACKAGE_luci-app-wol=n
          CONFIG_PACKAGE_luci-app-autoreboot=n
          EOF
          make defconfig
      - name: List luci-app status
        run: |
          cd openwrt
          echo -e "\n=================================================="
          echo -e "luci-app plugins"
          echo -e "==================================================\n"
          if [ -f .config ]; then
            grep -E '^(CONFIG_PACKAGE_luci-app-.*=|# CONFIG_PACKAGE_luci-app-.* is not set)' .config | sort | while read -r line; do
              if echo "$line" | grep -q '=y\|=m'; then
                name=$(echo "$line" | sed -e 's/^CONFIG_PACKAGE_//' -e 's/=[ym]$//')
                echo " ✔️ $name"
              else
                name=$(echo "$line" | sed -e 's/^# CONFIG_PACKAGE_//' -e 's/ is not set$//')
                echo " ❌ $name"
              fi
            done
          else
            echo " no .config"
          fi
          echo -e "==================================================\n"
      - name: Download
        run: |
          cd openwrt
          make download -j$(nproc)
      - name: Build
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: NewifiD2-LEDE
          path: openwrt/bin/targets/ramips/mt7621/*.bin
