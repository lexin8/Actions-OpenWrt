name: OpenWrt X86-64 分步编译测试

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH连接调试（true/false）'
        required: true
        default: 'false'

env:
  # 基础配置
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v23.05.3
  TZ: Asia/Shanghai
  # PassWall 官方仓库
  PASSWALL_MAIN_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall
  PASSWALL_PACKAGES_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall-packages
  # 分步编译标记
  STEP1_BASE: true          # 步骤1：基础固件
  STEP2_DOCKER: true        # 步骤2：添加Docker
  STEP3_NIKKI: true         # 步骤3：添加Nikki
  STEP4_PROXY: true         # 步骤4：添加Passwall/Homeproxy

jobs:
  build-openwrt:
    runs-on: ubuntu-22.04
    steps:
      # 步骤0：环境初始化（通用）
      - name: 初始化系统环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          # 扩容磁盘
          sudo swapoff /swapfile
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 克隆OpenWrt官方源码
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          # 初始化feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: SSH调试（可选）
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # 步骤1：编译基础X86-64固件（仅官方核心组件+中文基础）
      - name: 步骤1 - 配置基础固件（含中文LuCI）
        if: env.STEP1_BASE == 'true'
        run: |
          cd $OPENWRT_PATH
          # 基础X86-64配置 + 中文LuCI+Argon主题
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=800
          CONFIG_TARGET_ROOTFS_TARGZ=y
          # 基础LuCI + 中文语言包
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y  # LuCI核心中文语言包
          # 美观的Argon中文主题（替代默认bootstrap）
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-argon-config=y  # Argon主题配置工具
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y  # Argon配置中文包
          # 基础网络工具
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          EOF
          # 生成配置
          make defconfig
          # 下载依赖
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 步骤1 - 编译基础固件
        if: env.STEP1_BASE == 'true'
        run: |
          cd $OPENWRT_PATH
          echo "开始编译基础固件（含中文LuCI+Argon主题）..."
          make -j$(nproc) || make -j1 V=s
          # 验证编译结果
          if [ -f bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz ]; then
            echo "STEP1_SUCCESS=true" >> $GITHUB_ENV
            echo "基础固件编译成功！"
          else
            echo "STEP1_SUCCESS=false" >> $GITHUB_ENV
            echo "基础固件编译失败！"
            exit 1
          fi

      - name: 步骤1 - 上传基础固件
        if: env.STEP1_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 01-基础OpenWrt固件（中文Argon主题）
          path: ${{ env.OPENWRT_PATH }}/bin/targets/x86/64/*.img.gz

      # 步骤2：添加Docker组件编译（保留中文主题）
      - name: 步骤2 - 配置Docker组件（含中文LuCI）
        if: env.STEP1_SUCCESS == 'true' && env.STEP2_DOCKER == 'true'
        run: |
          cd $OPENWRT_PATH
          # 清空旧配置，保留中文主题+添加Docker
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=1000
          CONFIG_TARGET_ROOTFS_TARGZ=y
          # 中文LuCI + Argon主题
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-argon-config=y
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
          # Docker组件 + 中文语言包
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-i18n-docker-zh-cn=y  # Docker中文语言包
          # Docker依赖内核模块
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          EOF
          make defconfig
          make download -j$(nproc)

      - name: 步骤2 - 编译带Docker的固件
        if: env.STEP1_SUCCESS == 'true' && env.STEP2_DOCKER == 'true'
        run: |
          cd $OPENWRT_PATH
          echo "开始编译带Docker的固件（含中文LuCI+Argon主题）..."
          make -j$(nproc) || make -j1 V=s
          if [ -f bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz ]; then
            echo "STEP2_SUCCESS=true" >> $GITHUB_ENV
            echo "Docker固件编译成功！"
          else
            echo "STEP2_SUCCESS=false" >> $GITHUB_ENV
            echo "Docker固件编译失败！"
            exit 1
          fi

      - name: 步骤2 - 上传Docker固件
        if: env.STEP2_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 02-带Docker的OpenWrt固件（中文Argon主题）
          path: ${{ env.OPENWRT_PATH }}/bin/targets/x86/64/*.img.gz

      # 步骤3：添加Nikki组件编译（保留中文主题）
      - name: 步骤3 - 配置Nikki组件（含中文LuCI）
        if: env.STEP2_SUCCESS == 'true' && env.STEP3_NIKKI == 'true'
        run: |
          cd $OPENWRT_PATH
          # 添加Nikki源码源
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 配置文件：中文主题 + Nikki + Docker
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=1200
          CONFIG_TARGET_ROOTFS_TARGZ=y
          # 中文LuCI + Argon主题
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-argon-config=y
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
          # Docker组件 + 中文
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-i18n-docker-zh-cn=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          # Nikki组件（自动适配中文）
          CONFIG_PACKAGE_luci-app-nikki=y
          EOF
          make defconfig
          make download -j$(nproc)

      - name: 步骤3 - 编译带Nikki的固件
        if: env.STEP2_SUCCESS == 'true' && env.STEP3_NIKKI == 'true'
        run: |
          cd $OPENWRT_PATH
          echo "开始编译带Nikki的固件（含中文LuCI+Argon主题）..."
          make -j$(nproc) || make -j1 V=s
          if [ -f bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz ]; then
            echo "STEP3_SUCCESS=true" >> $GITHUB_ENV
            echo "Nikki固件编译成功！"
          else
            echo "STEP3_SUCCESS=false" >> $GITHUB_ENV
            echo "Nikki固件编译失败！"
            exit 1
          fi

      - name: 步骤3 - 上传Nikki固件
        if: env.STEP3_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 03-带Docker+Nikki的OpenWrt固件（中文Argon主题）
          path: ${{ env.OPENWRT_PATH }}/bin/targets/x86/64/*.img.gz

      # 步骤4：添加Passwall组件编译（保留中文主题）
      - name: 步骤4 - 配置Passwall组件（含中文LuCI）
        if: env.STEP3_SUCCESS == 'true' && env.STEP4_PROXY == 'true'
        run: |
          cd $OPENWRT_PATH
          # 移除原kenzo/small源，添加PassWall官方双仓库
          sed -i '/kenzo/d' feeds.conf.default
          sed -i '/small/d' feeds.conf.default
          sed -i '1i src-git passwall_packages ${PASSWALL_PACKAGES_REPO};main' feeds.conf.default
          sed -i '2i src-git passwall_main ${PASSWALL_MAIN_REPO};main' feeds.conf.default
          
          # 更新feeds并清理冲突包
          ./scripts/feeds update -a
          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev,shadowsocks-rust,shadowsocksr-libev,simple-obfs,tcping,trojan-plus,tuic-client,v2ray-plugin,xray-plugin,geoview,shadow-tls}
          
          # 重新更新并安装PassWall组件
          ./scripts/feeds update passwall_packages passwall_main
          ./scripts/feeds install -a -p passwall_packages
          ./scripts/feeds install -a -p passwall_main
          
          # 修复依赖
          ./scripts/feeds install ucode-mod-digest
          
          # 最终配置文件：中文主题 + 全组件
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=60
          CONFIG_TARGET_ROOTFS_PARTSIZE=1500
          CONFIG_TARGET_ROOTFS_TARGZ=y
          # 核心中文LuCI + Argon主题
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-argon-config=y
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
          # Docker组件 + 中文
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-i18n-docker-zh-cn=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          # Nikki组件
          CONFIG_PACKAGE_luci-app-nikki=y
          # PassWall官方组件 + 中文语言包
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y  # PassWall中文语言包
          CONFIG_PACKAGE_geoview=y
          CONFIG_PACKAGE_luci-i18n-geoview-zh-cn=y    # Geoview中文语言包
          # PassWall核心依赖组件
          CONFIG_PACKAGE_xray-core=y
          CONFIG_PACKAGE_v2ray-core=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_hysteria=y
          CONFIG_PACKAGE_tuic-client=y
          # DNS分流组件 + 中文
          CONFIG_PACKAGE_smartdns=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y
          CONFIG_PACKAGE_chinadns-ng=y
          # 依赖组件
          CONFIG_PACKAGE_ucode-mod-digest=y
          CONFIG_PACKAGE_rust-bindgen-host=y
          EOF
          make defconfig
          make download -j$(nproc)

      - name: 步骤4 - 编译最终完整固件
        if: env.STEP3_SUCCESS == 'true' && env.STEP4_PROXY == 'true'
        run: |
          cd $OPENWRT_PATH
          echo "开始编译最终完整固件（含中文LuCI+Argon主题）..."
          make -j$(nproc) || make -j1 V=s
          if [ -f bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz ]; then
            echo "STEP4_SUCCESS=true" >> $GITHUB_ENV
            echo "最终固件编译成功！"
          else
            echo "STEP4_SUCCESS=false" >> $GITHUB_ENV
            echo "最终固件编译失败！"
            exit 1
          fi

      - name: 步骤4 - 上传最终完整固件
        if: env.STEP4_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 04-完整固件（Docker+Nikki+Passwall+中文Argon主题）
          path: ${{ env.OPENWRT_PATH }}/bin/targets/x86/64/*.img.gz

      # 兜底：输出编译日志（方便调试）
      - name: 输出编译日志（失败时）
        if: failure()
        run: |
          cd $OPENWRT_PATH
          cat build.log || echo "无build.log文件"
          ls -lh bin/targets/x86/64/ || echo "无编译产物"
