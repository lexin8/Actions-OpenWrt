name: fanchmwrt+kenzo

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build fanchmwrt Firmware
    runs-on: ubuntu-22.04

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          echo "export TERM=linux" >> ~/.bashrc

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone source & setup feeds
        run: |
          git clone https://github.com/fanchmwrt/fanchmwrt openwrt
          cd openwrt
          sed -i '1i src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '2i src-git small https://github.com/kenzok8/small' feeds.conf.default
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> feeds.conf.default
          echo "src-git packages_official https://github.com/openwrt/packages.git;openwrt-24.10" >> feeds.conf.default
          echo "src-git luci_official https://github.com/openwrt/luci.git;openwrt-24.10" >> feeds.conf.default

      - name: Update & clean
        run: |
          cd openwrt
          ./scripts/feeds update -a
          rm -rf feeds/luci/applications/luci-app-mosdns
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns}
          rm -rf feeds/packages/utils/v2dat
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/kenzok8/golang -b 1.26 feeds/packages/lang/golang

      - name: Force packages from official source
        run: |
          cd openwrt
          # 删除所有其他源中的 softethervpn
          rm -rf feeds/kenzo/softethervpn* 2>/dev/null || true
          rm -rf feeds/small/softethervpn* 2>/dev/null || true
          rm -rf feeds/packages/net/softethervpn* 2>/dev/null || true
          
          # 删除所有其他源中的 strongswan 相关组件
          rm -rf feeds/kenzo/strongswan* 2>/dev/null || true
          rm -rf feeds/small/strongswan* 2>/dev/null || true
          rm -rf feeds/packages/net/strongswan* 2>/dev/null || true
          rm -rf feeds/packages/utils/strongswan* 2>/dev/null || true
          
          # 删除所有其他源中的 luci-app-strongswan-swanctl
          rm -rf feeds/kenzo/luci-app-strongswan-swanctl* 2>/dev/null || true
          rm -rf feeds/small/luci-app-strongswan-swanctl* 2>/dev/null || true
          rm -rf feeds/luci/applications/luci-app-strongswan-swanctl* 2>/dev/null || true
          
          # 从官方源复制 softethervpn
          if [ -d "feeds/packages_official/net/softethervpn" ]; then
            mkdir -p feeds/packages/net/softethervpn
            cp -r feeds/packages_official/net/softethervpn/* feeds/packages/net/softethervpn/
          fi
          if [ -d "feeds/packages_official/net/softethervpn5" ]; then
            mkdir -p feeds/packages/net/softethervpn5
            cp -r feeds/packages_official/net/softethervpn5/* feeds/packages/net/softethervpn5/
          fi
          
          # 从官方源复制 strongswan 相关组件
          if [ -d "feeds/packages_official/net/strongswan" ]; then
            mkdir -p feeds/packages/net/strongswan
            cp -r feeds/packages_official/net/strongswan/* feeds/packages/net/strongswan/
          fi
          if [ -d "feeds/packages_official/net/strongswan-swanctl" ]; then
            mkdir -p feeds/packages/net/strongswan-swanctl
            cp -r feeds/packages_official/net/strongswan-swanctl/* feeds/packages/net/strongswan-swanctl/
          fi
          if [ -d "feeds/packages_official/net/swanmon" ]; then
            mkdir -p feeds/packages/net/swanmon
            cp -r feeds/packages_official/net/swanmon/* feeds/packages/net/swanmon/
          fi
          if [ -d "feeds/packages_official/net/strongswan-charon" ]; then
            mkdir -p feeds/packages/net/strongswan-charon
            cp -r feeds/packages_official/net/strongswan-charon/* feeds/packages/net/strongswan-charon/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-kernel-netlink" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-kernel-netlink
            cp -r feeds/packages_official/net/strongswan-mod-kernel-netlink/* feeds/packages/net/strongswan-mod-kernel-netlink/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-nonce" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-nonce
            cp -r feeds/packages_official/net/strongswan-mod-nonce/* feeds/packages/net/strongswan-mod-nonce/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-sha1" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-sha1
            cp -r feeds/packages_official/net/strongswan-mod-sha1/* feeds/packages/net/strongswan-mod-sha1/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-sha2" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-sha2
            cp -r feeds/packages_official/net/strongswan-mod-sha2/* feeds/packages/net/strongswan-mod-sha2/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-aes" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-aes
            cp -r feeds/packages_official/net/strongswan-mod-aes/* feeds/packages/net/strongswan-mod-aes/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-hmac" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-hmac
            cp -r feeds/packages_official/net/strongswan-mod-hmac/* feeds/packages/net/strongswan-mod-hmac/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-gmp" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-gmp
            cp -r feeds/packages_official/net/strongswan-mod-gmp/* feeds/packages/net/strongswan-mod-gmp/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-pem" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-pem
            cp -r feeds/packages_official/net/strongswan-mod-pem/* feeds/packages/net/strongswan-mod-pem/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-x509" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-x509
            cp -r feeds/packages_official/net/strongswan-mod-x509/* feeds/packages/net/strongswan-mod-x509/
          fi
          if [ -d "feeds/packages_official/net/strongswan-mod-vici" ]; then
            mkdir -p feeds/packages/net/strongswan-mod-vici
            cp -r feeds/packages_official/net/strongswan-mod-vici/* feeds/packages/net/strongswan-mod-vici/
          fi
          
          # 从官方源复制 luci-app-strongswan-swanctl
          if [ -d "feeds/luci_official/applications/luci-app-strongswan-swanctl" ]; then
            mkdir -p feeds/luci/applications/luci-app-strongswan-swanctl
            cp -r feeds/luci_official/applications/luci-app-strongswan-swanctl/* feeds/luci/applications/luci-app-strongswan-swanctl/
          fi

      - name: Install all feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Generate config
        run: |
          cd openwrt
          export TERM=linux
          make defconfig
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y
          CONFIG_PACKAGE_softethervpn=y
          CONFIG_PACKAGE_softethervpn5=y
          CONFIG_PACKAGE_luci-app-softethervpn=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          # CONFIG_PACKAGE_luci-app-arpbind is not set
          # CONFIG_PACKAGE_luci-app-autoreboot is not set
          # CONFIG_PACKAGE_luci-app-nlbwmon is not set
          # CONFIG_PACKAGE_luci-app-samba4 is not set
          # CONFIG_PACKAGE_luci-app-samba is not set
          # CONFIG_PACKAGE_luci-app-vlmcsd is not set
          # CONFIG_PACKAGE_luci-app-wol is not set
          EOF
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@main
        with:
          name: fanchmwrt-x86-64-Firmware
          path: openwrt/bin/targets/x86/64/*.img.gz
          if-no-files-found: warn
