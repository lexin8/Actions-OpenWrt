name: fanchmwrt+kenzo (L2TP/IPsec PSK)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  # 统一配置避免硬编码
  OPENWRT_SRC: https://github.com/fanchmwrt/fanchmwrt
  FEEDS:
    kenzo: https://github.com/kenzok8/openwrt-packages
    small: https://github.com/kenzok8/small
    nikki: https://github.com/nikkinikki-org/OpenWrt-nikki.git
    jell: https://github.com/kenzok8/jell

jobs:
  build-firmware:
    name: Build OpenWrt Firmware (x86_64)
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
        working-directory: openwrt

    steps:
      - name: 📊 Check Server Resources
        run: |
          echo "CPU核心数: $(nproc)"
          echo "内存信息: $(free -h | grep Mem)"
          echo "磁盘空间: $(df -h | grep /home)"
          echo "系统版本: $(lsb_release -d)"

      - name: 🧰 Initialize Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 升级系统+清理旧依赖
          sudo apt update && sudo apt upgrade -y
          sudo apt purge -y azure-cli ghc* zulu* llvm* firefox dotnet* powershell openjdk* mongodb* moby*
          sudo apt autoremove -y && sudo apt clean

          # 安装全量编译依赖（按OpenWrt官方清单+IPsec补充）
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget qemu-utils curl subversion libelf-dev autoconf automake libtool autopoint \
            device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev \
            libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev libgmp-dev libgcrypt-dev python3-setuptools

          # 设置时区+终端环境
          sudo timedatectl set-timezone "$TZ"
          echo "export TERM=linux" >> ~/.bashrc
          source ~/.bashrc

      - name: 📦 Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096  # 足够应对IPsec编译
          temp-reserve-mb: 200
          root-reserve-mb: 2048
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: 📥 Clone OpenWrt Source
        run: |
          git clone --depth=1 ${{ env.OPENWRT_SRC }} openwrt
          cd openwrt
          # 初始化Git避免feeds报错
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: 🗂️ Configure Feeds (标准化+防冲突)
        run: |
          # 1. 彻底清空原有feeds，避免残留冲突
          > feeds.conf.default

          # 2. 按优先级添加源（jell优先保证ipsec插件正确）
          echo "src-git jell ${{ env.FEEDS.jell }}" >> feeds.conf.default
          echo "src-git kenzo ${{ env.FEEDS.kenzo }}" >> feeds.conf.default
          echo "src-git small ${{ env.FEEDS.small }}" >> feeds.conf.default
          echo "src-git nikki ${{ env.FEEDS.nikki }}" >> feeds.conf.default

          # 3. 更新feeds（强制刷新+忽略错误）
          ./scripts/feeds update -a -f --force-remove > feeds_update.log 2>&1 || true

          # 4. 清理冲突包（仅保留必要清理）
          rm -rf feeds/*/mosdns* feeds/*/alist* feeds/*/adguardhome* feeds/*/xray* feeds/*/v2ray* feeds/*/sing* feeds/*/smartdns*
          rm -rf feeds/packages/lang/golang && git clone --depth=1 -b 1.26 https://github.com/kenzok8/golang feeds/packages/lang/golang

          # 5. 显式安装核心插件（指定源避免拉取错误版本）
          ./scripts/feeds install -p jell -y luci-app-ipsec-vpnd luci-i18n-ipsec-vpnd-zh-cn
          ./scripts/feeds install -p kenzo -y luci-app-nikki luci-i18n-nikki-zh-cn
          ./scripts/feeds install -p small -y homeproxy luci-app-homeproxy

          # 6. 安装所有依赖（静默模式）
          ./scripts/feeds install -a -y

      - name: ⚙️ Generate Build Config
        run: |
          # 生成默认配置
          make defconfig

          # 写入核心配置（按功能分类，清晰易维护）
          cat > .config << 'EOF'
          # 目标架构
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y

          # 分区大小
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700

          # 固件格式
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y

          # 内核核心配置（IPsec/L2TP必需）
          CONFIG_KERNEL_IP_FORWARD=y
          CONFIG_KERNEL_NETFILTER=y
          CONFIG_KERNEL_NETFILTER_XT_MATCH_POLICY=y
          CONFIG_KERNEL_PPP=y
          CONFIG_KERNEL_PPP_ASYNC=y
          CONFIG_KERNEL_PPP_SYNC_TTY=y
          CONFIG_KERNEL_PPP_L2TP=y
          CONFIG_KERNEL_TUN=y
          CONFIG_KERNEL_BRIDGE_NETFILTER=y
          CONFIG_KERNEL_CRYPTO_AES=y
          CONFIG_KERNEL_CRYPTO_HMAC=y
          CONFIG_KERNEL_CRYPTO_SHA256=y
          CONFIG_KERNEL_CRYPTO_MD5=y

          # 基础工具
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libreadline=y
          CONFIG_PACKAGE_libncurses=y
          CONFIG_PACKAGE_zlib=y

          # L2TP/IPsec PSK核心（jell仓库）
          CONFIG_PACKAGE_luci-app-ipsec-vpnd=y
          CONFIG_PACKAGE_luci-i18n-ipsec-vpnd-zh-cn=y

          # IPsec依赖包（强制使用feeds内版本）
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-gcm=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-md5=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-socket-default=y
          CONFIG_PACKAGE_strongswan-mod-stroke=y
          CONFIG_PACKAGE_strongswan-mod-updown=y
          CONFIG_PACKAGE_strongswan-mod-xauth-generic=y
          CONFIG_PACKAGE_xl2tpd=y

          # 内核模块依赖
          CONFIG_PACKAGE_kmod-crypto-aes=y
          CONFIG_PACKAGE_kmod-crypto-hmac=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-ipsec6=y

          # 保留功能
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y

          # 禁用无关包（减少编译量+避免冲突）
          CONFIG_PACKAGE_softethervpn=n
          CONFIG_PACKAGE_softethervpn5=n
          CONFIG_PACKAGE_luci-app-softethervpn=n
          CONFIG_PACKAGE_olsrd=n
          CONFIG_PACKAGE_luci-app-olsr=n
          # CONFIG_PACKAGE_luci-app-arpbind is not set
          # CONFIG_PACKAGE_luci-app-autoreboot is not set
          # CONFIG_PACKAGE_luci-app-nlbwmon is not set
          # CONFIG_PACKAGE_luci-app-samba4 is not set
          # CONFIG_PACKAGE_luci-app-samba is not set
          # CONFIG_PACKAGE_luci-app-vlmcsd is not set
          # CONFIG_PACKAGE_luci-app-wol is not set

          # 编译优化
          CONFIG_DEVEL=y
          CONFIG_BUILD_LOG=y
          CONFIG_CCACHE=y
          EOF

          # 验证配置+补全依赖
          make defconfig
          # 检查关键包是否配置成功
          grep -E "luci-app-ipsec-vpnd|strongswan|xl2tpd" .config

      - name: 📥 Download Packages (前置下载避免编译中断)
        run: |
          # 创建下载日志
          mkdir -p logs
          # 分步下载（先核心依赖，再全部）
          make package/strongswan/download V=s -j1 > logs/strongswan_download.log 2>&1
          make package/xl2tpd/download V=s -j1 > logs/xl2tpd_download.log 2>&1
          make package/luci-app-ipsec-vpnd/download V=s -j1 > logs/ipsec_download.log 2>&1
          # 多线程下载剩余包（失败重试）
          make download -j$(nproc) || make download -j1 > logs/all_download.log 2>&1

          # 检查缺失包
          find dl -size -1024c -name "*.tar.*" -o -name "*.zip" | tee logs/missing_packages.log

      - name: 🔨 Build Firmware (分步编译+防报错)
        run: |
          # 1. 预编译核心依赖（单线程避免冲突）
          make package/libopenssl/compile V=s -j1 > logs/libopenssl_compile.log 2>&1
          make package/strongswan/compile V=s -j1 > logs/strongswan_compile.log 2>&1
          make package/xl2tpd/compile V=s -j1 > logs/xl2tpd_compile.log 2>&1

          # 2. 编译IPsec插件
          make package/luci-app-ipsec-vpnd/compile V=s -j1 > logs/ipsec_compile.log 2>&1

          # 3. 编译保留功能包
          make package/luci-app-nikki/compile V=s -j1 > logs/nikki_compile.log 2>&1
          make package/luci-app-homeproxy/compile V=s -j1 > logs/homeproxy_compile.log 2>&1

          # 4. 整体编译（自动降级线程数）
          make -j$(($(nproc)-1)) || make -j1 V=s > logs/full_compile.log 2>&1

          # 检查编译产物
          ls -lh bin/targets/x86/64/*.img.gz || echo "固件编译失败，查看日志：logs/full_compile.log"

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-firmware
          path: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/packages/x86_64/luci/luci-app-ipsec-vpnd*ipk
            openwrt/logs/*.log  # 上传日志方便排查
          retention-days: 7
          if-no-files-found: warn

      - name: 🚨 Upload Error Logs (编译失败时)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: openwrt/logs/*.log
          retention-days: 7
