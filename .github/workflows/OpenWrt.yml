name: OpenWrt X86-64 分步编译测试

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection debug (true/false)'
        required: true
        default: 'false'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v23.05.3
  TZ: Asia/Shanghai
  PASSWALL_PACKAGES_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall-packages
  PASSWALL_MAIN_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall
  STEP1_BASE: true
  STEP2_DOCKER: true
  STEP3_NIKKI: true
  STEP4_PROXY: true
  # 通用基础配置（含关闭无用插件）
  BASE_CONFIG: |
    CONFIG_TARGET_x86=y
    CONFIG_TARGET_x86_64=y
    CONFIG_TARGET_x86_64_Generic=y
    CONFIG_TARGET_KERNEL_PARTSIZE=60
    CONFIG_TARGET_ROOTFS_TARGZ=y
    CONFIG_TARGET_IMAGES_GZIP=y
    CONFIG_TARGET_EFI_IMAGES=y
    CONFIG_PACKAGE_luci=y
    CONFIG_PACKAGE_luci-base=y
    CONFIG_PACKAGE_luci-mod-admin-full=y
    CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
    CONFIG_PACKAGE_luci-theme-argon=y
    CONFIG_PACKAGE_luci-theme-argon-config=y
    CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
    # 关闭指定无用插件
    # CONFIG_DEFAULT_luci-app-arpbind is not set
    # CONFIG_PACKAGE_luci-app-autoreboot is not set
    # CONFIG_PACKAGE_luci-app-nlbwmon is not set
    # CONFIG_PACKAGE_luci-app-samba4 is not set
    # CONFIG_PACKAGE_luci-app-samba is not set
    # CONFIG_PACKAGE_luci-app-vlmcsd is not set
    # CONFIG_PACKAGE_luci-app-wol is not set
    # CONFIG_PACKAGE_luci-app-zerotier is not set
    # CONFIG_PACKAGE_luci-app-strongswan-swanctl is not set
  # 需排除的无用/冲突组件（集中管理）
  EXCLUDE_COMPONENTS: "xray-core v2ray-geodata sing-box chinadns-ng dns2socks hysteria ipt2socks microsocks naiveproxy shadowsocks-libev shadowsocks-rust shadowsocksr-libev simple-obfs tcping trojan-plus tuic-client v2ray-plugin xray-plugin geoview shadow-tls"

jobs:
  build-openwrt:
    runs-on: ubuntu-22.04
    steps:
      - name: Initialize system environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 封装所有通用函数
          cat > /tmp/openwrt_funcs.sh << 'EOF'
          # 函数1：生成.config文件
          generate_config() {
            local ROOT_SIZE=$1
            local CUSTOM_CFG=$2
            local WITH_BASE_TOOLS=$3
            cd $OPENWRT_PATH
            echo "$BASE_CONFIG" > .config
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=$ROOT_SIZE" >> .config
            if [ "$WITH_BASE_TOOLS" = "true" ]; then
              echo "CONFIG_PACKAGE_wget=y" >> .config
              echo "CONFIG_PACKAGE_curl=y" >> .config
              echo "CONFIG_PACKAGE_openssh-sftp-server=y" >> .config
            fi
            echo "$CUSTOM_CFG" >> .config
            make defconfig
            make download -j$(nproc)
            find dl -size -1024c -exec rm -f {} \;
          }

          # 函数2：编译验证
          build_firmware() {
            local STEP=$1
            local DESC=$2
            cd $OPENWRT_PATH
            echo "===== Start building $DESC ====="
            make -j$(nproc) || make -j1 V=s
            if ls $OPENWRT_PATH/bin/targets/x86/64/*combined-efi.img.gz 1> /dev/null 2>&1; then
              echo "${STEP}_SUCCESS=true" >> $GITHUB_ENV
              echo "$DESC build success!"
            else
              echo "${STEP}_SUCCESS=false" >> $GITHUB_ENV
              echo "$DESC build failed!"
              exit 1
            fi
          }

          # 函数3：打包并准备上传（仅ASCII命名）
          package_and_upload() {
            local STEP=$1
            local TYPE=$2
            local DESC=$3
            # 获取北京时间（仅数字和符号，无中文）
            TIME=$(date +"%y%m%d_%H%M")
            # 压缩包名称：仅ASCII字符（避免URI解析错误）
            PACKAGE_NAME="${TIME}_openwrt_${TYPE}.tar.gz"
            UPLOAD_DISPLAY_NAME="${TIME}_0${STEP}-${DESC}"
            
            # 创建临时目录打包
            mkdir -p /tmp/openwrt_files
            cp $OPENWRT_PATH/bin/targets/x86/64/*combined-efi.img.gz /tmp/openwrt_files/
            cp $OPENWRT_PATH/bin/targets/x86/64/files.json /tmp/openwrt_files/
            tar -zcvf /tmp/$PACKAGE_NAME -C /tmp/openwrt_files .
            
            # 保存上传参数
            echo "${STEP}_PACKAGE_PATH=/tmp/$PACKAGE_NAME" >> $GITHUB_ENV
            echo "${STEP}_UPLOAD_NAME=$UPLOAD_DISPLAY_NAME" >> $GITHUB_ENV
            echo "===== Packaged as: $PACKAGE_NAME ====="
          }

          # 函数4：清理冲突组件
          clean_conflict_components() {
            cd $OPENWRT_PATH
            local COMPONENT_PATH=""
            for comp in $EXCLUDE_COMPONENTS; do
              COMPONENT_PATH+="feeds/packages/net/$comp "
            done
            if [ -n "$COMPONENT_PATH" ]; then
              rm -rf $COMPONENT_PATH
              echo "Cleaned conflict components: $EXCLUDE_COMPONENTS"
            fi
          }
          EOF

          # 系统环境初始化
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          sudo swapoff /swapfile
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
        shell: bash

      - name: Clone OpenWrt source code
        run: |
          source /tmp/openwrt_funcs.sh
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          ./scripts/feeds update -a
          ./scripts/feeds install -a
        shell: bash

      - name: SSH debug
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # -------------------------- Step 1: Base firmware --------------------------
      - name: Step1 - Configure base firmware
        if: env.STEP1_BASE == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          generate_config "800" "" "true"
        shell: bash

      - name: Step1 - Build base firmware
        if: env.STEP1_BASE == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          build_firmware "STEP1" "base firmware"
        shell: bash

      - name: Step1 - Package base firmware
        if: env.STEP1_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          package_and_upload "1" "base" "base_firmware_efi"
        shell: bash

      - name: Step1 - Upload base firmware
        if: env.STEP1_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.1_UPLOAD_NAME }}
          path: ${{ env.1_PACKAGE_PATH }}

      # -------------------------- Step 2: Docker firmware --------------------------
      - name: Step2 - Configure Docker firmware
        if: env.STEP1_SUCCESS == 'true' && env.STEP2_DOCKER == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          DOCKER_CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-i18n-docker-zh-cn=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          EOF
          )
          generate_config "1000" "$DOCKER_CFG" "false"
        shell: bash

      - name: Step2 - Build Docker firmware
        if: env.STEP1_SUCCESS == 'true' && env.STEP2_DOCKER == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          build_firmware "STEP2" "docker firmware"
        shell: bash

      - name: Step2 - Package Docker firmware
        if: env.STEP2_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          package_and_upload "2" "docker" "docker_firmware_efi"
        shell: bash

      - name: Step2 - Upload Docker firmware
        if: env.STEP2_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.2_UPLOAD_NAME }}
          path: ${{ env.2_PACKAGE_PATH }}

      # -------------------------- Step 3: Nikki firmware --------------------------
      - name: Step3 - Configure Nikki firmware
        if: env.STEP2_SUCCESS == 'true' && env.STEP3_NIKKI == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          NIKKI_CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-i18n-docker-zh-cn=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          EOF
          )
          generate_config "1200" "$NIKKI_CFG" "false"
        shell: bash

      - name: Step3 - Build Nikki firmware
        if: env.STEP2_SUCCESS == 'true' && env.STEP3_NIKKI == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          build_firmware "STEP3" "nikki firmware"
        shell: bash

      - name: Step3 - Package Nikki firmware
        if: env.STEP3_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          package_and_upload "3" "nikki" "docker_nikki_firmware_efi"
        shell: bash

      - name: Step3 - Upload Nikki firmware
        if: env.STEP3_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.3_UPLOAD_NAME }}
          path: ${{ env.3_PACKAGE_PATH }}

      # -------------------------- Step 4: Passwall firmware --------------------------
      - name: Step4 - Configure Passwall firmware
        if: env.STEP3_SUCCESS == 'true' && env.STEP4_PROXY == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          sed -i '/kenzo/d' feeds.conf.default
          sed -i '/small/d' feeds.conf.default
          sed -i "1i src-git passwall_packages $PASSWALL_PACKAGES_REPO;main" feeds.conf.default
          sed -i "2i src-git passwall_main $PASSWALL_MAIN_REPO;main" feeds.conf.default
          ./scripts/feeds update -a
          clean_conflict_components
          ./scripts/feeds update passwall_packages passwall_main
          ./scripts/feeds install -a -p passwall_packages
          ./scripts/feeds install -a -p passwall_main
          ./scripts/feeds install ucode-mod-digest
          PROXY_CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-i18n-docker-zh-cn=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_geoview=y
          CONFIG_PACKAGE_luci-i18n-geoview-zh-cn=y
          CONFIG_PACKAGE_xray-core=y
          CONFIG_PACKAGE_v2ray-core=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_hysteria=y
          CONFIG_PACKAGE_tuic-client=y
          CONFIG_PACKAGE_smartdns=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_ucode-mod-digest=y
          CONFIG_PACKAGE_rust-bindgen-host=y
          EOF
          )
          generate_config "1500" "$PROXY_CFG" "false"
        shell: bash

      - name: Step4 - Build final firmware
        if: env.STEP3_SUCCESS == 'true' && env.STEP4_PROXY == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          build_firmware "STEP4" "final firmware (docker+nikki+passwall)"
        shell: bash

      - name: Step4 - Package final firmware
        if: env.STEP4_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          package_and_upload "4" "full" "docker_nikki_passwall_firmware_efi"
        shell: bash

      - name: Step4 - Upload final firmware
        if: env.STEP4_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.4_UPLOAD_NAME }}
          path: ${{ env.4_PACKAGE_PATH }}

      # -------------------------- Error debug --------------------------
      - name: Output build log
        if: failure()
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          cat build.log || echo "No build.log file"
          ls -lh $OPENWRT_PATH/bin/targets/x86/64/ || echo "No build products"
        shell: bash
