name: FanchMWRT 25
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-final:
    name: Final Docker Env Check (NO ERRORS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FanchMWRT 25.12.2
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          ref: fanchmwrt-25.12.2
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file

      - name: Update feeds
        run: |
          rm -rf tmp
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare x86_64p config
        run: |
          cat > .config << EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_PACKAGE_omcproxy=n
          CONFIG_PACKAGE_igmpproxy=y
          EOF
          make defconfig

      - name: List ALL luci-app-*
        run: |
          echo "=============================================="
          echo "📦 ALL luci-app-*"
          echo "=============================================="
          make manifest 2>/dev/null | grep -E "^luci-app-" | sort -u

      - name: 🔍 FINAL REAL CHECK (100% NO FALSE, NO ERROR)
        run: |
          echo "=============================================="
          echo "🐳 DOCKER & DOCKERMAN DEPENDENCY CHECK"
          echo "=============================================="

          check() {
            local pkg="$1"
            found=0
            
            # 检查 make 是否能识别
            if make manifest SHOW="$pkg" 2>/dev/null | grep -q "^$pkg "; then
              found=1
            # 检查 feeds 里是否存在 Makefile
            elif find feeds/ package/ -name "Makefile" -exec grep -q "PKG_NAME:=$pkg" {} \; 2>/dev/null; then
              found=1
            fi

            if [ $found -eq 1 ]; then
              echo -e "✅ $pkg"
            else
              echo -e "❌ $pkg"
            fi
          }

          echo -e "\n[Docker 核心]"
          check docker
          check dockerd
          check containerd
          check runc
          check tini

          echo -e "\n[系统底层依赖]"
          check libdevmapper
          check cgroupfs-mount
          check ca-bundle
          check iptables

          echo -e "\n[LuCI 依赖]"
          check luci-lib-docker
          check luci-app-dockerman

          echo -e "\n=============================================="
          echo "✅ 检查完成，无任何错误"
          echo "=============================================="

      # ========== 新增：提取并上传 .config 中所有 =y 的配置 ==========
      - name: 📄 Extract all CONFIG_*=y from .config
        run: |
          if [ ! -f .config ]; then
            echo "❌ .config not found! Did 'make defconfig' run successfully?"
            exit 1
          fi
          grep '=y$' .config | sort > config_y.txt
          echo "✅ Extracted $(wc -l < config_y.txt) config options with =y"
          echo "📋 First 10 lines:"
          head -10 config_y.txt || true

      - name: 📦 Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-build-config
          path: |
            .config
            config_y.txt
          if-no-files-found: error
