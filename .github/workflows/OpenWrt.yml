name: Build LEDE Firmware for Newifi 3 (D2)

on:
  workflow_dispatch:
    inputs:
      ssh_enable:
        description: 'Enable SSH for debug'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential asciidoc binutils bzip2 gawk gettext \
        git libncurses5-dev libz-dev patch python3 python2.7 unzip zlib1g-dev \
        lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib \
        p7zip p7zip-full msmtp libssl-dev texinfo libreadline-dev libglib2.0-dev \
        xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler \
        g++-multilib antlr3 gperf

    - name: Clone Source Code
      run: |
        git clone --depth 1 https://github.com/coolsnowwolf/lede.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Customize Configuration (diy-part1)
      run: |
        cd openwrt
        # 添加 Nikki 源码（轻量级代理）
        git clone --depth 1 https://github.com/nikkinikki-org/OpenWrt-nikki.git package/luci-app-nikki
        # 如需 OpenClash，取消下面一行的注释（二选一）
        # git clone --depth 1 https://github.com/vernesong/OpenClash.git package/luci-app-openclash

    - name: Generate .config
      run: |
        cd openwrt
        cat > .config << "EOF"
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y

        # 基本设置
        CONFIG_IPV6=y

        # 闭源无线驱动（mtwifi）
        CONFIG_PACKAGE_mtwifi=y

        # DDNS 组件
        CONFIG_PACKAGE_luci-app-ddns=y
        CONFIG_PACKAGE_ddns-scripts=y
        CONFIG_PACKAGE_ddns-scripts-cloudflare=y
        CONFIG_PACKAGE_curl=y

        # Nikki 代理（轻量，与 OpenClash 二选一）
        CONFIG_PACKAGE_luci-app-nikki=y
        CONFIG_PACKAGE_luci-app-OpenClash=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-inet-diag=y

        # 接口分流 (MWAN3)
        CONFIG_PACKAGE_mwan3=y
        CONFIG_PACKAGE_luci-app-mwan3=y

        # L2TP 拨号
        CONFIG_PACKAGE_xl2tpd=y
        CONFIG_PACKAGE_kmod-l2tp=y
        CONFIG_PACKAGE_kmod-ppp=y
        CONFIG_PACKAGE_ppp=y

        # 额外工具
        CONFIG_PACKAGE_openssl-util=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_PACKAGE_luci-lib-ipkg=y

        # 自动处理依赖
        CONFIG_DEVEL=y
        CONFIG_AUTOREMOVE=y

        # 禁用不需要的插件
        CONFIG_PACKAGE_luci-app-accesscontrol=n
        CONFIG_PACKAGE_luci-app-nlbwmon=n
        CONFIG_PACKAGE_luci-app-rclone=n
        CONFIG_PACKAGE_luci-app-upnp=n
        CONFIG_PACKAGE_luci-app-vlmcsd=n
        CONFIG_PACKAGE_luci-app-vsftpd=n
        CONFIG_PACKAGE_luci-app-wol=n
        CONFIG_PACKAGE_luci-app-autoreboot=n
        EOF

        make defconfig

    - name: List all luci-app-* packages status
      run: |
        cd openwrt
        echo -e "\n=================================================="
        echo -e "📋 All luci-app-* packages (✔️ enabled | ❌ disabled)"
        echo -e "==================================================\n"
        if [ -f .config ]; then
          grep -E '^(CONFIG_PACKAGE_luci-app-.*=|# CONFIG_PACKAGE_luci-app-.* is not set)' .config | sort | while read -r line; do
            if echo "$line" | grep -q '=y\|=m'; then
              name=$(echo "$line" | sed -e 's/^CONFIG_PACKAGE_//' -e 's/=[ym]$//')
              echo " ✔️ $name"
            else
              name=$(echo "$line" | sed -e 's/^# CONFIG_PACKAGE_//' -e 's/ is not set$//')
              echo " ❌ $name"
            fi
          done
        else
          echo " ⚠️ .config not found"
        fi
        echo -e "==================================================\n"

    - name: Upload .config as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-config
        path: openwrt/.config
        retention-days: 7

    - name: Download package sources
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build Firmware
      id: build
      run: |
        cd openwrt
        set +e
        echo "Starting multi-thread build..."
        make -j$(nproc) 2>&1 | tee build.log
        BUILD_RESULT=${PIPESTATUS[0]}

        if [ $BUILD_RESULT -ne 0 ]; then
          echo -e "\n❌ Multi-thread build failed, retrying with single thread and verbose output..."
          make clean
          make -j1 V=s 2>&1 | tee -a build.log
          BUILD_RESULT=${PIPESTATUS[0]}
        fi
        set -e

        ccache -s

        if [ $BUILD_RESULT -eq 0 ]; then
          echo "✅ Build succeeded"
          echo "build_status=success" >> $GITHUB_OUTPUT
          exit 0
        else
          echo "❌ Build failed"
          echo "build_status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Organize Firmware
      if: steps.build.outputs.build_status == 'success'
      run: |
        cd openwrt/bin/targets/ramips/mt7621
        mkdir -p ../../../../../artifacts
        cp -a *.bin ../../../../../artifacts/ || true

    - name: Upload Firmware
      if: steps.build.outputs.build_status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: Newifi3_D2_OpenWrt
        path: artifacts/
