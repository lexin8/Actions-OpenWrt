name: fanchmwrt 25
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 10G
  GIT_DISCOVERY_ACROSS_FILESYSTEM: 1

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 初始化环境
        uses: actions/checkout@v4

      - name: 安装官方编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          g++-multilib gettext git libncurses-dev libssl-dev python3-distutils \
          python3-pip python3-setuptools rsync unzip zlib1g-dev file wget ccache

      # 你原有仓库的 DL 缓存
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-dockerman-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: dl-dockerman-

      # 你原有仓库的 CCache 缓存
      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-dockerman-${{ github.run_id }}
          restore-keys: ccache-dockerman-

      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s

      # 你原有仓库的工具链修复
      - name: Fix Toolchain Compilation
        run: |
          export CFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export CXXFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -lssp"
          echo "工具链修复完成"

      - name: 克隆 fanchmwrt-25.12.2 源码
        run: |
          git clone --depth 1 https://github.com/fanchmwrt/fanchmwrt.git -b fanchmwrt-25.12.2 openwrt

      - name: 检测并配置插件源
        run: |
          cd openwrt
          if [ ! -d "feeds/luci/applications/luci-app-dockerman" ]; then
            echo "src-git dockerman https://github.com/lisaac/luci-app-dockerman.git" >> feeds.conf.default
          fi

      - name: 更新并安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ===================== 核心修复：启用原生完整版 libwebsockets-full =====================
      - name: 启用 libwebsockets-full (原生带LIBUV)
        run: |
          cd openwrt
          cat >> .config << EOF
          CONFIG_PACKAGE_libwebsockets-full=y
          CONFIG_PACKAGE_libwebsockets-openssl=n
          CONFIG_PACKAGE_libwebsockets-mbedtls=n
          EOF

      - name: 官方编译环境初始化
        run: |
          cd openwrt
          make defconfig
          make prepare CCACHE=1 -j$(nproc) V=s

      # ===================== 严格按顺序编译（不跳过任何组件） =====================
      - name: 全组件编译
        run: |
          cd openwrt
          # 1. 基础依赖
          make package/libuv/compile CCACHE=1 V=s -j$(nproc)
          # 2. 原生完整版 libwebsockets (带libuv)
          make package/libwebsockets-full/compile CCACHE=1 V=s -j$(nproc)
          # 3. ttyd (正常通过)
          make package/ttyd/compile CCACHE=1 V=s -j$(nproc)
          # 4. 插件依赖
          make package/ucode-mod-socket/compile CCACHE=1 V=s -j$(nproc)
          # 5. Docker 全套
          make package/runc/compile CCACHE=1 V=s -j$(nproc)
          make package/containerd/compile CCACHE=1 V=s -j$(nproc)
          make package/dockerd/compile CCACHE=1 V=s -j$(nproc)
          make package/docker/compile CCACHE=1 V=s -j$(nproc)
          make package/docker-compose/compile CCACHE=1 V=s -j$(nproc)
          # 6. 主插件
          make package/luci-app-dockerman/compile CCACHE=1 V=s -j$(nproc)

      - name: 最终校验
        run: |
          cd openwrt
          DOCKERMAN=$(find bin/packages/ -name "luci-app-dockerman*.ipk")
          TTYD=$(find bin/packages/ -name "ttyd*.ipk")
          LWS=$(find bin/packages/ -name "libwebsockets-full*.ipk")
          
          if [ -n "$DOCKERMAN" ] && [ -n "$TTYD" ] && [ -n "$LWS" ]; then
            echo -e "\033[1;32m🎉 全部编译成功！无跳过、无魔改、原生编译"
            echo "✅ 插件: $DOCKERMAN"
            echo "✅ ttyd: $TTYD"
            echo "✅ libwebsockets-full: $LWS\033[0m"
          else
            exit 1
          fi

      - name: 上传所有IPK
        uses: actions/upload-artifact@v4
        with:
          name: dockerman-full-ipk
          path: openwrt/bin/packages/**/*.ipk
