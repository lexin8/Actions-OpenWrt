name: Build 21.02

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH for debug (true/false)'
        required: true
        default: 'false'

env:
  TZ: Asia/Shanghai
  # 21.02 分支配置（保留 strongswan-full）
  OPENWRT_REPO: https://github.com/openwrt/openwrt
  OPENWRT_BRANCH: openwrt-21.02
  IMMORTALWRT_REPO: https://github.com/immortalwrt/immortalwrt
  IMMORTALWRT_BRANCH: openwrt-21.02
  # 简化工作目录（避免路径冲突）
  OPENWRT_DIR: /home/runner/openwrt
  IMMORTALWRT_DIR: /home/runner/immortalwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      # 3. 拉取 OpenWrt 源码
      - name: Pull OpenWrt Source Code
        run: |
          echo "=== Create OpenWrt Directory ==="
          mkdir -p $OPENWRT_DIR
          
          echo "=== Clone OpenWrt Repository ==="
          git clone --depth=1 -b $OPENWRT_BRANCH $OPENWRT_REPO $OPENWRT_DIR
          
          echo "=== Update & Install Feeds ==="
          cd $OPENWRT_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 4. 拉取 ImmortalWrt 源码
      - name: Pull ImmortalWrt Source Code
        run: |
          echo "=== Create ImmortalWrt Directory ==="
          mkdir -p $IMMORTALWRT_DIR
          
          echo "=== Clone ImmortalWrt Repository ==="
          git clone --depth=1 -b $IMMORTALWRT_BRANCH $IMMORTALWRT_REPO $IMMORTALWRT_DIR
          
          echo "=== Update & Install Feeds ==="
          cd $IMMORTALWRT_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 5. SSH 调试（可选）
      - name: SSH Debug (Optional)
        uses: P3TERX/ssh2actions@v1.0.0
        if: ${{ github.event.inputs.ssh == 'true' }}
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # 6. 编译 OpenWrt 固件（核心步骤）
      - name: Compile OpenWrt Firmware
        run: |
          echo "=== Configure OpenWrt ==="
          cd $OPENWRT_DIR
          echo "$COMMON_CONFIG" > .config
          make defconfig
          
          echo "=== Download Dependencies (Single Thread) ==="
          make download -j1 V=s
          # 清理无效小文件
          find dl -size -1024c -exec rm -f {} \;
          
          echo "=== Compile Firmware ==="
          export CCACHE_DIR=/home/runner/.ccache
          export USE_CCACHE=1
          # 多线程优先，失败则单线程兜底
          make -j$(nproc) V=s || make -j1 V=s
          
          echo "=== Organize Artifacts ==="
          mkdir -p /tmp/openwrt_firmware
          cp bin/targets/x86/64/*squashfs*.img.gz /tmp/openwrt_firmware/ || true
          cp .config /tmp/openwrt_firmware/openwrt_2102_config.config

      # 7. 上传 OpenWrt 产物
      - name: Upload OpenWrt Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_21.02_Firmware
          path: /tmp/openwrt_firmware/
          retention-days: 7

      # 8. 编译 ImmortalWrt 固件（核心步骤）
      - name: Compile ImmortalWrt Firmware
        run: |
          echo "=== Configure ImmortalWrt ==="
          cd $IMMORTALWRT_DIR
          echo "$COMMON_CONFIG" > .config
          make defconfig
          
          echo "=== Download Dependencies (Single Thread) ==="
          make download -j1 V=s
          find dl -size -1024c -exec rm -f {} \;
          
          echo "=== Compile Firmware ==="
          export CCACHE_DIR=/home/runner/.ccache
          export USE_CCACHE=1
          make -j$(nproc) V=s || make -j1 V=s
          
          echo "=== Organize Artifacts ==="
          mkdir -p /tmp/immortalwrt_firmware
          cp bin/targets/x86/64/*squashfs*.img.gz /tmp/immortalwrt_firmware/ || true
          cp .config /tmp/immortalwrt_firmware/immortalwrt_2102_config.config

      # 9. 上传 ImmortalWrt 产物
      - name: Upload ImmortalWrt Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_21.02_Firmware
          path: /tmp/immortalwrt_firmware/
          retention-days: 7
