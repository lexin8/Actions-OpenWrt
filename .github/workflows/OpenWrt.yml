name: FanchmWrt 25

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-env:
    name: Check & Clean Feeds (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FanchMWRT 25.12.2
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          ref: fanchmwrt-25.12.2
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file

      # ==============================
      # 格式绝对对齐！无缩进！不报错！
      # ==============================
      - name: Replace feeds.conf.default (remove commit tags)
        run: |
          cp feeds.conf.default feeds.conf.default.bak
          cat > feeds.conf.default << EOF
          src-git packages https://git.openwrt.org/feed/packages.git;openwrt-25.12
          src-git luci https://git.openwrt.org/project/luci.git;openwrt-25.12
          src-git routing https://git.openwrt.org/feed/routing.git;openwrt-25.12
          src-git telephony https://git.openwrt.org/feed/telephony.git;openwrt-25.12
          src-git video https://github.com/openwrt/video.git;openwrt-25.12
          src-git fanchmwrt https://github.com/fanchmwrt/fanchmwrt-packages.git
          EOF

      - name: Show new feeds.conf.default
        run: cat feeds.conf.default

      - name: Update feeds
        run: |
          rm -rf tmp
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare x86_64 config
        run: |
          make defconfig
          echo "CONFIG_TARGET_x86_64=y" > .config
          make defconfig

      # ==============================
      # 依赖检查（不含添加插件）
      # ==============================
      - name: Check Docker & LuCI dependencies
        run: |
          echo "================================================================"
          echo " FanchMWRT 25.12.2 依赖检查（已移除commit历史版本）"
          echo "================================================================"

          check() {
            local pkg="$1"
            echo -n "👉 检查 $pkg ... "
            if make menuconfig SHOW="$pkg" 2>/dev/null | grep -q "^[[:space:]]*$pkg"; then
              echo "✅ 存在"
            else
              echo "❌ 缺失"
            fi
          }

          echo -e "\n=== Docker 核心依赖 ==="
          check "docker"
          check "dockerd"
          check "containerd"
          check "runc"
          check "tini"

          echo -e "\n=== 系统底层依赖 ==="
          check "libdevmapper"
          check "cgroupfs-mount"
          check "ca-bundle"
          check "iptables"

          echo -e "\n=== LuCI 基础环境 ==="
          check "luci-lib-base"
          check "luci-lib-ip"
          check "luci-lib-jsonc"
          check "luci-lib-nixio"

          echo -e "\n================================================================"
          echo "✅ 检查完成！无格式错误、无手动插件、纯官方源"
          echo "================================================================"
            echo -e "\033[31m⚠️  发现 $fail 个依赖缺失，无法正常编译 Dockerman\033[0m"
          fi
          echo "================================================================"
