name: FanchMWRT 25
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==============================================
  # 第一步：使用【原始带commit】的 feeds 检查
  # ==============================================
  check-original:
    name: 1. Original Feeds (with commit) Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FanchMWRT 25.12.2
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          ref: fanchmwrt-25.12.2
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file

      - name: Keep original feeds.conf.default
        run: |
          cp feeds.conf.default feeds.conf.default.original
          cat feeds.conf.default

      - name: Update feeds
        run: |
          rm -rf tmp
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare x86_64p config
        run: |
          make defconfig
          echo "CONFIG_TARGET_x86_64=y" > .config
          echo "CONFIG_TARGET_x86_64_pve=y" >> .config
          make defconfig

      - name: Show ALL luci-app-*
        run: |
          echo "=============================================="
          echo "All luci-app-* (Original feeds)"
          echo "=============================================="
          ./scripts/feeds list | grep "^luci-app-" | sort

      - name: Check Dockerman Dependencies
        run: |
          echo "=============================================="
          echo "Docker & Dockerman Dependency Check (ORIGINAL)"
          echo "=============================================="
          check() {
            pkg=$1
            if ./scripts/feeds list | grep -qx "$pkg"; then
              echo "✅ $pkg"
            else
              echo "❌ $pkg"
            fi
          }
          check docker
          check dockerd
          check containerd
          check runc
          check tini
          check libdevmapper
          check cgroupfs-mount
          check ca-bundle
          check iptables
          check luci-lib-docker
          check luci-app-dockerman

  # ==============================================
  # 第二步：【去掉所有commit】重新检查
  # ==============================================
  check-nocommit:
    name: 2. No-Commit Feeds Check
    runs-on: ubuntu-latest
    needs: check-original
    steps:
      - name: Checkout FanchMWRT 25.12.2
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          ref: fanchmwrt-25.12.2
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file

      - name: Replace feeds → REMOVE ALL COMMIT
        run: |
          cat > feeds.conf.default << EOF
          src-git packages https://git.openwrt.org/feed/packages.git;openwrt-25.12
          src-git luci https://git.openwrt.org/project/luci.git;openwrt-25.12
          src-git routing https://git.openwrt.org/feed/routing.git;openwrt-25.12
          src-git telephony https://git.openwrt.org/feed/telephony.git;openwrt-25.12
          src-git video https://github.com/openwrt/video.git;openwrt-25.12
          src-git fanchmwrt https://github.com/fanchmwrt/fanchmwrt-packages.git
          EOF

      - name: Show new feeds
        run: cat feeds.conf.default

      - name: Update feeds
        run: |
          rm -rf tmp
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare x86_64p config
        run: |
          make defconfig
          echo "CONFIG_TARGET_x86_64=y" > .config
          echo "CONFIG_TARGET_x86_64_pve=y" >> .config
          make defconfig

      - name: Show ALL luci-app-*
        run: |
          echo "=============================================="
          echo "All luci-app-* (NO COMMIT)"
          echo "=============================================="
          ./scripts/feeds list | grep "^luci-app-" | sort

      - name: Final Docker & Dockerman Check
        run: |
          echo "=============================================="
          echo "Docker & Dockerman Dependency Check (NO COMMIT)"
          echo "=============================================="
          check() {
            pkg=$1
            if ./scripts/feeds list | grep -qx "$pkg"; then
              echo "✅ $pkg"
            else
              echo "❌ $pkg"
            fi
          }
          check docker
          check dockerd
          check containerd
          check runc
          check tini
          check libdevmapper
          check cgroupfs-mount
          check ca-bundle
          check iptables
          check luci-lib-docker
          check luci-app-dockerman
