  # ==================== DockerMan（已修复 Go 兼容） ====================
  build-dockerman:
    name: Test DockerMan + luci-lib-docker
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: fanchmwrt-25.12.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext zlib1g-dev swig unzip time rsync python3 python3-dev wget file jq xxd \
            quilt autoconf automake bison flex pkgconf libelf-dev

      - name: Use official feeds + Docker
        run: |
          cat > feeds.conf.default << 'EOF'
          src-git packages https://github.com/openwrt/packages.git;openwrt-25.12
          src-git luci https://github.com/openwrt/luci.git;openwrt-25.12
          src-git routing https://github.com/openwrt/routing.git;openwrt-25.12
          src-git dockerman https://github.com/lisaac/luci-app-dockerman.git
          src-git dockerlib https://github.com/lisaac/luci-lib-docker.git
          EOF
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ==================== 【关键修复】仅升级 Go，不污染官方源 ====================
      - name: Fix Go for Docker (containerd compile)
        run: |
          sudo rm -rf /usr/local/go /usr/bin/go
          sudo apt-get remove -y golang-go || true
          wget -q https://go.dev/dl/go1.23.6.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.23.6.linux-amd64.tar.gz
          echo "GOROOT=/usr/local/go" >> $GITHUB_ENV
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          
          rm -rf feeds/packages/lang/golang
          git clone --depth=1 https://github.com/openwrt/packages.git openwrt-packages-temp
          cp -r openwrt-packages-temp/lang/golang feeds/packages/lang/
          rm -rf openwrt-packages-temp
          
          ./scripts/feeds update golang
          ./scripts/feeds install -a

      - name: Use official yq
        run: |
          rm -rf feeds/packages/utils/yq || true
          mkdir -p feeds/packages/utils/yq
          wget -O feeds/packages/utils/yq/Makefile https://raw.githubusercontent.com/openwrt/packages/openwrt-25.12/utils/yq/Makefile

      - name: Download packages
        run: make download -j$(nproc) || true

      - name: Setup config
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_sudo=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_vim-full=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_containerd=y
          CONFIG_PACKAGE_runc=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-lib-docker=y
          EOF
          export TERM=xterm
          make defconfig

      - name: Build OpenWrt firmware
        id: build
        run: |
          set +e
          echo "🔨 开始编译 OpenWrt 固件 (x86_64)..."
          echo "时间: $(date)"
          echo "CPU核心数: $(nproc)"
          echo ""
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Collect firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          cp -v bin/targets/x86_64/openwrt-*.* firmware/ 2>/dev/null || true
          tar -czf openwrt-dockerman-${{ needs.prepare.outputs.build_time }}.tar.gz -C firmware .

      - name: Upload dockerman firmware
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dockerman-firmware
          path: openwrt-dockerman-*.tar.gz
          retention-days: 30

      - name: Upload dockerman logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dockerman-build-logs
          path: build.log
          retention-days: 7

  # ==================== 构建摘要 ====================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-base, build-unblock, build-openclash, build-dockerman]
    if: always()
    steps:
      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 📦 OpenWrt x86_64 Official 25.12 Build
          
          | Build Job | Status |
          |-----------|--------|
          | Base (Official only) | ${{ needs.build-base.result }} |
          | + UnblockNeteaseMusic | ${{ needs.build-unblock.result }} |
          | + OpenClash | ${{ needs.build-openclash.result }} |
          | + DockerMan | ${{ needs.build-dockerman.result }} |
          
          ✅ 100% 官方 OpenWrt 25.12 源
          ✅ 无 kenzo / nikki / small
          ✅ 无第三方插件污染
          ✅ containerd/docker 编译已修复
          ✅ 动态核心编译：make -j$(nproc)
          EOF
