name: FanchMWRT-x86_64p-Real-Check
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-real:
    name: Real Dependency Check (No False Negative)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FanchMWRT 25.12.2
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          ref: fanchmwrt-25.12.2
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file

      - name: Show original feeds
        run: cat feeds.conf.default

      - name: Update feeds
        run: |
          rm -rf tmp
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate x86_64p config
        run: |
          make defconfig
          echo "CONFIG_TARGET_x86_64=y" > .config
          echo "CONFIG_TARGET_x86_64_pve=y" >> .config
          make defconfig

      - name: Show all luci-app-*
        run: |
          echo "=============================================="
          echo "All luci-app-*"
          echo "=============================================="
          make manifest 2>/dev/null | awk '/^luci-app-/ {print $1}' | sort -u

      - name: REAL DEPENDENCY CHECK (100% ACCURATE)
        run: |
          echo "=============================================="
          echo "REAL CHECK (make visible + file search)"
          echo "=============================================="

          check() {
            local pkg="$1"
            if make manifest SHOW="$pkg" 2>/dev/null | grep -q "^$pkg "; then
              echo "✅ $pkg"
            elif grep -r "PKG_NAME:=$pkg" feeds/ 2>/dev/null | grep -q .; then
              echo "✅ $pkg (exists in feeds)"
            else
              echo "❌ $pkg"
            fi
          }

          echo -e "\n[Docker Core]"
          check docker
          check dockerd
          check containerd
          check runc
          check tini

          echo -e "\n[System]"
          check libdevmapper
          check cgroupfs-mount
          check ca-bundle
          check iptables

          echo -e "\n[LuCI Docker]"
          check luci-lib-docker
          check luci-app-dockerman
