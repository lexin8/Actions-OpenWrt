name: FanchmWrt 25

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  list-apps:
    name: List all luci-app- & Check Docker (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FanchMWRT 25.12.2
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          ref: fanchmwrt-25.12.2
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file

      - name: Replace feeds.conf.default (remove commit tags)
        run: |
          cp feeds.conf.default feeds.conf.default.bak
          cat > feeds.conf.default << EOF
          src-git packages https://git.openwrt.org/feed/packages.git;openwrt-25.12
          src-git luci https://git.openwrt.org/project/luci.git;openwrt-25-25.12
          src-git routing https://git.openwrt.org/feed/routing.git;openwrt-25.12
          src-git telephony https://git.openwrt.org/feed/telephony.git;openwrt-25.12
          src-git video https://github.com/openwrt/video.git;openwrt-25.12
          src-git fanchmwrt https://github.com/fanchmwrt/fanchmwrt-packages.git
          EOF

      - name: Show feeds.conf.default
        run: cat feeds.conf.default

      - name: Update feeds
        run: |
          rm -rf tmp
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare x86_64 config
        run: |
          make defconfig
          echo "CONFIG_TARGET_x86_64=y" > .config
          make defconfig

      - name: ==============================================
        run: echo "LIST OF ALL luci-app-* PLUGINS"
      - name: ==============================================
        run: |
          make menuconfig SHOW=luci-app- 2>/dev/null | grep -o "luci-app-[a-zA-Z0-9_-]*" | sort -u

      - name: ==============================================
        run: echo "CHECK DOCKER DEPENDENCIES"
      - name: ==============================================
        run: |
          check() {
            local pkg="$1"
            echo -n "👉 $pkg ... "
            if make menuconfig SHOW="$pkg" 2>/dev/null | grep -q "^[[:space:]]*$pkg"; then
              echo "✅ EXISTS"
            else
              echo "❌ MISSING"
            fi
          }
          check docker
          check dockerd
          check containerd
          check runc
