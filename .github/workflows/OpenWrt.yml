name: Build LEDE Firmware for Newifi 3 (D2)

on:
  workflow_dispatch:
    inputs:
      ssh_enable:
        description: 'Enable SSH for debug'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential asciidoc binutils bzip2 gawk gettext \
        git libncurses5-dev libz-dev patch python3 python2.7 unzip zlib1g-dev \
        lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib \
        p7zip p7zip-full msmtp libssl-dev texinfo libreadline-dev libglib2.0-dev \
        xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler \
        g++-multilib antlr3 gperf

    - name: Clone Source Code
      run: |
        git clone --depth 1 https://github.com/coolsnowwolf/lede.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Customize Configuration (diy-part1)
      run: |
        cd openwrt
        # 添加 OpenClash 源码
        git clone --depth 1 https://github.com/nikkinikki-org/OpenWrt-nikki.git package/luci-app-nikki
        # 添加你的自定义 feeds 或其他插件
        # echo 'src-git yourrepo https://github.com/yourname/yourrepo.git' >> feeds.conf.default

    - name: Generate .config
      run: |
        cd openwrt
        cat > .config << "EOF"
        # Target: Newifi 3 (D2)
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_newifi-d2=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y

        # 基本设置
        CONFIG_BUSYBOX_CUSTOM=y
        CONFIG_IPV6=y
        CONFIG_KERNEL_IO_URING=y

        # 无线驱动 (默认 kmod-mt7603e / kmod-mt76x2e)
        CONFIG_PACKAGE_mtwifi=y
        CONFIG_PACKAGE_kmod-mt7603e=y
        CONFIG_PACKAGE_kmod-mt76x2e=y

        # DDNS 组件
        CONFIG_PACKAGE_luci-app-ddns=y
        CONFIG_PACKAGE_ddns-scripts=y
        CONFIG_PACKAGE_ddns-scripts-cloudflare=y
        CONFIG_PACKAGE_curl=y

        # OpenClash
        CONFIG_PACKAGE_luci-app-nikki=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-inet-diag=y

        # 额外常用包
        CONFIG_PACKAGE_openssl-util=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_PACKAGE_luci-lib-ipkg=y

        # 让 OpenWrt 自动处理依赖
        CONFIG_DEVEL=y
        CONFIG_AUTOREMOVE=y
        CONFIG_PACKAGE_luci-app-accesscontrol=n
        CONFIG_PACKAGE_luci-app-nlbwmon=n
        CONFIG_PACKAGE_luci-app-rclone=n
        CONFIG_PACKAGE_luci-app-upnp=n
        CONFIG_PACKAGE_luci-app-vlmcsd=n
        CONFIG_PACKAGE_luci-app-vsftpd=n
        CONFIG_PACKAGE_luci-app-turboacc=n
        CONFIG_PACKAGE_luci-app-autoreboot=n
        CONFIG_PACKAGE_luci-app-passwall2=y
        EOF
        make defconfig

    - name: 列出所有luci-app-*插件编译状态
      run: |
        cd openwrt
        echo -e "\n=================================================="
        echo -e "📋 所有 luci-app-* 插件（已选中 ✔️ | 未选中 ❌）"
        echo -e "==================================================\n"

        # 读取所有luci-app-*插件（包含选中+未选中）
        if [ -f .config ]; then
          grep -E '^(CONFIG_PACKAGE_luci-app-.*=|# CONFIG_PACKAGE_luci-app-.* is not set)' .config | sort | while read -r line; do
           if echo "$line" | grep -q '=y\|=m'; then
              # 已选中编译
              name=$(echo "$line" | sed -e 's/^CONFIG_PACKAGE_//' -e 's/=[ym]$//')
             echo " ✔️ $name"
           else
             # 未选中编译
             name=$(echo "$line" | sed -e 's/^# CONFIG_PACKAGE_//' -e 's/ is not set$//')
             echo " ❌ $name"
            fi
         done
        else
          echo " ⚠️ 未找到.config配置文件"
        fi
        echo -e "==================================================\n"

    - name: Copy custom .config
      run: |
        cp ${{ github.workspace }}/.config openwrt/.config

    - name: Download Package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build Firmware
      run: |
        cd openwrt
        echo -e "$(nproc) thread build"
        make -j$(nproc) || make -j1 V=s

    - name: Organize Firmware
      run: |
        cd openwrt/bin/targets/ramips/mt7621
        mkdir -p ../../../../../artifacts
        cp -a *.bin ../../../../../artifacts/

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: Newifi3_D2_OpenWrt
        path: artifacts/
