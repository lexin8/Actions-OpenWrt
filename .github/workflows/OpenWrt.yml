name: fanchmwrt 25
on:
  workflow_dispatch:  # 仅手动触发

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: 初始化环境
        uses: actions/checkout@v4

      # ===================== 核心：OpenWrt 官方完整版系统依赖 =====================
      - name: 安装 OpenWrt 官方编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          g++-multilib gettext git libncurses-dev libssl-dev python3-distutils \
          python3-pip python3-setuptools rsync unzip zlib1g-dev file wget
          sudo apt clean

      # 1. 克隆指定源码（浅层克隆，速度最快）
      - name: 克隆 fanchmwrt-25.12.2 源码
        run: |
          git clone --depth 1 https://github.com/fanchmwrt/fanchmwrt.git -b fanchmwrt-25.12.2 openwrt

      # 2. 检测源码是否原生自带插件
      - name: 检测原生 luci-app-dockerman
        run: |
          cd openwrt
          echo -e "\033[1;36m========== 检测：源码是否原生自带插件 ==========\033[0m"
          if [ ! -d "feeds/luci/applications/luci-app-dockerman" ] && [ ! -d "package/luci-app-dockerman" ]; then
            echo -e "\033[1;31m❌ fanchmwrt 无原生插件，自动拉取第三方仓库\033[0m"
            echo "src-git dockerman https://github.com/lisaac/luci-app-dockerman.git" >> feeds.conf.default
          else
            echo -e "\033[1;32m✅ fanchmwrt 原生自带 luci-app-dockerman\033[0m"
          fi

      # 3. 官方标准流程：更新并安装所有软件源
      - name: 更新并安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 4. 【修复核心】编译基础宿主工具链（解决 libdeflate-gzip 缺失）
      - name: 编译官方基础工具链
        run: |
          cd openwrt
          make defconfig
          make tools/install -j$(nproc) V=s
          make toolchain/install -j$(nproc) V=s

      # 5. 【严格匹配你的Makefile】编译插件+所有依赖
      - name: 编译 Dockerman 全套组件
        run: |
          cd openwrt
          echo -e "\033[1;36m========== 开始编译：插件+官方依赖 ==========\033[0m"
          # Docker 底层运行时
          make package/runc/compile V=s -j$(nproc)
          make package/containerd/compile V=s -j$(nproc)
          # Docker 核心服务
          make package/dockerd/compile V=s -j$(nproc)
          make package/docker/compile V=s -j$(nproc)
          make package/docker-compose/compile V=s -j$(nproc)
          # 插件强制依赖 (来自Makefile)
          make package/ttyd/compile V=s -j$(nproc)
          make package/ucode-mod-socket/compile V=s -j$(nproc)
          # 主插件 (最后编译)
          make package/luci-app-dockerman/compile V=s -j$(nproc)

      # 6. 最终校验编译结果
      - name: 输出最终检测报告
        run: |
          cd openwrt
          PLUGIN=$(find bin/packages/ -name "luci-app-dockerman*.ipk" | head -1)
          DOCKERD=$(find bin/packages/ -name "dockerd*.ipk" | head -1)
          
          echo -e "\033[1;36m========== 最终测试结果 ==========\033[0m"
          if [ -n "$PLUGIN" ] && [ -n "$DOCKERD" ]; then
            echo -e "\033[1;32m🎉 测试完全通过！"
            echo -e "✅ 环境：符合 OpenWrt 官方标准"
            echo -e "✅ 源码：插件存在性检测完成"
            echo -e "✅ 编译：插件+所有依赖打包成功"
            echo -e "📦 插件路径：$PLUGIN\033[0m"
          else
            echo -e "\033[1;31m💥 编译失败！\033[0m"
            exit 1
          fi

      # 7. 上传所有IPK安装包
      - name: 上传编译成果
        uses: actions/upload-artifact@v4
        with:
          name: dockerman-ipk-full
          path: openwrt/bin/packages/**/*.ipk
