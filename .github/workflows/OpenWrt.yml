name: Firmware 25

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: build-firmware-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build_time.outputs.time }}
    steps:
      - name: Set build time
        id: build_time
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

  # ==================== 基础构建（无第三方 feeds） ====================
  build-base:
    name: Build Base (Official Feeds Only)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: fanchmwrt-25.12.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext zlib1g-dev swig unzip time rsync \
            python3 python3-dev wget file jq xxd \
            quilt autoconf automake bison flex pkgconf libelf-dev

      - name: Update and install official feeds only
        run: |
          # 确保 feeds.conf.default 只包含官方源
          cp feeds.conf.default feeds.conf.default.bak
          # 注释掉所有第三方源（如果默认就有）
          sed -i '/^src-git unblockneteasemusic/d; /^src-git openclash/d; /^src-git dockerman/d; /^src-git docker/d' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install build-time dependencies (yq, nodejs, ruby)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo apt-get install -y ruby ruby-dev

      - name: Download package index
        run: make download -j$(nproc) || true

      - name: Setup build configuration
        run: |
          cat > .config << 'EOF'
          # 目标平台
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n

          # 代理 / 组播 / VPN
          CONFIG_PACKAGE_omcproxy=n
          CONFIG_PACKAGE_igmpproxy=y
          CONFIG_PACKAGE_luci-app-ipsec-vpn=y
          CONFIG_PACKAGE_luci-i18n-ipsec-vpn-zh-cn=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-proto-l2tp=y
          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-ipsec6=y
          CONFIG_PACKAGE_kmod-tun=y

          # 内核加密与 IPsec
          CONFIG_KERNEL_CRYPTO_AES=y
          CONFIG_KERNEL_CRYPTO_SHA1=y
          CONFIG_KERNEL_CRYPTO_HMAC=y
          CONFIG_KERNEL_CRYPTO_XFRM=y
          CONFIG_KERNEL_XFRM_USER=y
          CONFIG_KERNEL_XFRM_IPCOMP=y
          CONFIG_KERNEL_NET_KEY=y
          CONFIG_KERNEL_INET_AH=y
          CONFIG_KERNEL_INET_ESP=y
          CONFIG_KERNEL_INET_IPCOMP=y
          CONFIG_KERNEL_INET_XFRM_MODE_TRANSPORT=y
          CONFIG_KERNEL_INET_XFRM_MODE_TUNNEL=y

          # 网络工具 / 防火墙 / nftables
          CONFIG_PACKAGE_net-tools=y
          CONFIG_PACKAGE_iproute2=y
          CONFIG_PACKAGE_traceroute=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_mtr=y
          CONFIG_PACKAGE_nmap=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_bind-dig=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_bridge-utils=y
          CONFIG_PACKAGE_strace=y
          CONFIG_PACKAGE_lsof=y
          CONFIG_PACKAGE_iftop=y
          CONFIG_PACKAGE_arping=y
          CONFIG_PACKAGE_psmisc=y
          CONFIG_PACKAGE_procps-ng=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_tree=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_iptables-mod-ipopt=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_ipip=y
          CONFIG_PACKAGE_vxlan=y
          CONFIG_PACKAGE_luci-proto-ipip=y
          CONFIG_PACKAGE_luci-proto-vxlan=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-fib=y
          CONFIG_PACKAGE_kmod-nf-flow=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-udp=y
          CONFIG_PACKAGE_kmod-ipt-conntrack=y
          CONFIG_PACKAGE_kmod-ipt-nat=y
          CONFIG_PACKAGE_kmod-libcgroup=y
          CONFIG_PACKAGE_kmod-overlay=y
          CONFIG_PACKAGE_kmod-veth=y

          # Docker 相关（基础中不包含，但为了保持配置一致性，先不加）
          # CONFIG_PACKAGE_docker=y
          # CONFIG_PACKAGE_dockerd=y
          # CONFIG_PACKAGE_luci-lib-docker=y
          # CONFIG_PACKAGE_ttyd=y
          # CONFIG_PACKAGE_luci-app-dockerman=y

          # 代理工具 (homeproxy / sing-box / nikki / openclash) 基础中不加
          # CONFIG_PACKAGE_luci-app-homeproxy=y
          # CONFIG_PACKAGE_luci-app-openclash=y
          # CONFIG_PACKAGE_luci-app-nikki=y

          # 网易云解锁基础中不加
          # CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          # CONFIG_PACKAGE_node=y

          # LuCI 基础与主题
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-nixio=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-lib-ip=y
          CONFIG_PACKAGE_rpcd=y
          CONFIG_PACKAGE_rpcd-mod-luci=y
          CONFIG_PACKAGE_lua=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-firewall=y
          CONFIG_PACKAGE_luci-mod-system=y
          CONFIG_PACKAGE_luci-mod-status=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-argon=y

          # 其他应用
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_ucode-mod-socket=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_luci-app-firewall=y

          # 基础工具
          CONFIG_PACKAGE_cfdisk=y
          CONFIG_PACKAGE_which=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_sudo=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_zip=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_vim-full=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y
          CONFIG_PACKAGE_ipset=y

          # 构建优化
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          EOF
          make defconfig

      - name: Build firmware
        id: build
        run: |
          set +e
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Collect firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          cp -v bin/targets/x86/64/openwrt-*.* firmware/ 2>/dev/null || true
          tar -czf openwrt-base-${{ needs.prepare.outputs.build_time }}.tar.gz -C firmware .

      - name: Upload base firmware
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: base-firmware
          path: openwrt-base-*.tar.gz
          retention-days: 30

      - name: Upload base logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: base-build-logs
          path: build.log
          retention-days: 7

  # ==================== 测试 unblockneteasemusic ====================
  build-unblock:
    name: Test UnblockNeteaseMusic
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: fanchmwrt-25.12.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext zlib1g-dev swig unzip time rsync python3 python3-dev wget file jq xxd \
            quilt autoconf automake bison flex pkgconf libelf-dev

      - name: Update official feeds
        run: ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Add unblockneteasemusic feed
        run: |
          echo 'src-git unblockneteasemusic https://github.com/UnblockNeteaseMusic/luci-app-unblockneteasemusic.git' >> feeds.conf.default
          ./scripts/feeds update unblockneteasemusic
          ./scripts/feeds install -a -p unblockneteasemusic

      - name: Install dependencies (nodejs)
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo apt-get install -y ruby ruby-dev

      - name: Download package index
        run: make download -j$(nproc) || true

      - name: Setup config (same as base)
        run: |
          cat > .config << 'EOF'
          # 复用基础配置，但额外启用 unblockneteasemusic 相关包
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n

          # ...（此处省略与基础完全相同的配置，实际使用时复制上面的内容，并额外添加下面的行）...
          # 以下为简化示例，实际请复制完整配置
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          CONFIG_PACKAGE_node=y
          EOF
          # 为避免重复，实际编写时最好将基础配置放在单独文件，这里为简洁略过
          # 但用户需要将之前的基础配置完整粘贴过来，并添加这两行。
          make defconfig

      - name: Build firmware
        id: build
        run: |
          set +e
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Collect firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          cp -v bin/targets/x86/64/openwrt-*.* firmware/ 2>/dev/null || true
          tar -czf openwrt-unblock-${{ needs.prepare.outputs.build_time }}.tar.gz -C firmware .

      - name: Upload unblock firmware
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: unblock-firmware
          path: openwrt-unblock-*.tar.gz
          retention-days: 30

      - name: Upload unblock logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unblock-build-logs
          path: build.log
          retention-days: 7

  # ==================== 测试 openclash ====================
  build-openclash:
    name: Test OpenClash
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: fanchmwrt-25.12.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext zlib1g-dev swig unzip time rsync python3 python3-dev wget file jq xxd \
            quilt autoconf automake bison flex pkgconf libelf-dev

      - name: Update official feeds
        run: ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Add openclash feed
        run: |
          echo 'src-git openclash https://github.com/vernesong/OpenClash.git' >> feeds.conf.default
          ./scripts/feeds update openclash
          ./scripts/feeds install -a -p openclash

      - name: Install dependencies (ruby)
        run: sudo apt-get install -y ruby ruby-dev

      - name: Download package index
        run: make download -j$(nproc) || true

      - name: Setup config (enable openclash)
        run: |
          cat > .config << 'EOF'
          # 基础配置 + CONFIG_PACKAGE_luci-app-openclash=y
          # 请复制基础配置并添加该行
          EOF
          make defconfig

      - name: Build firmware
        id: build
        run: |
          set +e
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Collect firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          cp -v bin/targets/x86/64/openwrt-*.* firmware/ 2>/dev/null || true
          tar -czf openwrt-openclash-${{ needs.prepare.outputs.build_time }}.tar.gz -C firmware .

      - name: Upload openclash firmware
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openclash-firmware
          path: openwrt-openclash-*.tar.gz
          retention-days: 30

      - name: Upload openclash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openclash-build-logs
          path: build.log
          retention-days: 7

  # ==================== 测试 dockerman ====================
  build-dockerman:
    name: Test DockerMan + luci-lib-docker
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: fanchmwrt-25.12.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext zlib1g-dev swig unzip time rsync python3 python3-dev wget file jq xxd \
            quilt autoconf automake bison flex pkgconf libelf-dev

      - name: Update official feeds
        run: ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Add dockerman and luci-lib-docker feeds
        run: |
          cat >> feeds.conf.default << 'EOF'
          src-git dockerman https://github.com/lisaac/luci-app-dockerman.git
          src-git docker https://github.com/lisaac/luci-lib-docker.git
          EOF
          ./scripts/feeds update dockerman docker
          ./scripts/feeds install -a -p dockerman
          ./scripts/feeds install -a -p docker

      - name: Download package index
        run: make download -j$(nproc) || true

      - name: Setup config (enable docker related)
        run: |
          cat > .config << 'EOF'
          # 基础配置 + Docker 相关包
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          EOF
          make defconfig

      - name: Build firmware
        id: build
        run: |
          set +e
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Collect firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          cp -v bin/targets/x86/64/openwrt-*.* firmware/ 2>/dev/null || true
          tar -czf openwrt-dockerman-${{ needs.prepare.outputs.build_time }}.tar.gz -C firmware .

      - name: Upload dockerman firmware
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dockerman-firmware
          path: openwrt-dockerman-*.tar.gz
          retention-days: 30

      - name: Upload dockerman logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dockerman-build-logs
          path: build.log
          retention-days: 7

  # ==================== 汇总结果 ====================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-base, build-unblock, build-openclash, build-dockerman]
    if: always()
    steps:
      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 📦 OpenWrt x86_64 Split Build Results
          
          | Build Job | Status | Artifact |
          |-----------|--------|----------|
          | Base (Official only) | ${{ needs.build-base.result }} | [base-firmware](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | + unblockneteasemusic | ${{ needs.build-unblock.result }} | [unblock-firmware](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | + openclash | ${{ needs.build-openclash.result }} | [openclash-firmware](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | + dockerman | ${{ needs.build-dockerman.result }} | [dockerman-firmware](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          
          **Build Time:** ${{ needs.prepare.outputs.build_time }}
          
          ## How to identify the problematic feed
          - If **Base** fails → environment or official feed issue.
          - If **Base** succeeds but a specific test fails → that feed is the culprit.
          - Check the corresponding build logs for detailed error messages.
          EOF
