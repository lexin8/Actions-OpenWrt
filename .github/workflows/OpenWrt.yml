name: Firmware 25

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (default: x86/64)'
        required: false
        default: 'x86'
      subtarget:
        description: 'Build subtarget (default: 64)'
        required: false
        default: '64'

permissions:
  contents: read
  actions: write

concurrency:
  group: build-firmware-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-22.04
    outputs:
      build_time: ${{ steps.build_time.outputs.time }}
    
    steps:
      - name: Set build time
        id: build_time
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

  build-firmware:
    name: Build OpenWrt Firmware (x86_64 with LuCI Apps)
    runs-on: ubuntu-22.04
    needs: prepare
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: openwrt-25.12
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext zlib1g-dev swig unzip time rsync \
            python3 python3-distutils wget file jq xxd \
            quilt autoconf automake bison flex pkgconf libelf-dev
      
      - name: Update and install official feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/luci-app-unblockneteasemusic
          git clone --depth 1 -b js https://github.com/UnblockNeteaseMusic/luci-app-unblockneteasemusic.git package/luci-app-unblockneteasemusic


      - name: Override node package from ImmortalWrt
        run: |
          # 卸载官方 node（如果有）
          ./scripts/feeds uninstall node
          # 创建自定义包目录
          mkdir -p package/lang/node
          # 克隆 ImmortalWrt openwrt-25.12 分支的 node 包
          git clone --depth 1 --filter=blob:none --sparse -b openwrt-25.12 https://github.com/immortalwrt/packages.git immortal_tmp
          cd immortal_tmp
          git sparse-checkout set lang/node
          cp -r lang/node/* ../package/lang/node/
          cd ..
          rm -rf immortal_tmp
          # 移除可能存在的 BUILDONLY 标志
          if grep -q "BUILDONLY:=1" package/lang/node/Makefile; then
            sed -i '/BUILDONLY:=1/d' package/lang/node/Makefile
            echo "✅ 已移除 BUILDONLY 标志"
          fi
          echo "✅ node 包已放置到 package/lang/node/"
          ls -la package/lang/node/
      
      - name: Add third-party feeds for LuCI apps
        run: |
          true
      
      - name: Install missing tools (yq, node)
        run: |
          # Install yq (YAML query tool)
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          
          # Install nodejs from NodeSource repository
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          yq --version
          node --version
          npm --version
      
      - name: Download package index
        run: make download -j$(nproc) || true
      
      - name: Setup build configuration
        run: |
          cat > .config << 'EOF'
          # 目标平台 - x86_64
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          
          # 禁用不需要的
          CONFIG_PACKAGE_omcproxy=n
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          
          # VPN 相关（核心包，其他依赖会自动拉入）
          CONFIG_PACKAGE_luci-app-ipsec-vpn=y
          CONFIG_PACKAGE_luci-i18n-ipsec-vpn-zh-cn=y
          
          # 防火墙与网络（防火墙选择会自动拉入依赖）
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          
          # 网易云解锁（核心应用）
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          
          # LuCI 主题与国际化
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          
          # 其他应用
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          
          # 可选编辑工具（根据需要）
          CONFIG_PACKAGE_vim-full=y
          CONFIG_PACKAGE_nano=y
          
          # 构建优化
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          EOF
          
          make defconfig
          echo "✅ 配置完成"
          grep -c "=" .config || true
      
      - name: Build OpenWrt firmware
        id: build
        run: |
          set +e
          echo "开始编译 OpenWrt 固件 (x86_64)..."
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "✅ 编译成功"
            echo "build_status=success" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ 编译失败"
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Collect firmware files
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          
          # Copy firmware images
          echo "📦 收集固件镜像..."
          cp -v bin/targets/x86/64/openwrt-*.* firmware/ 2>/dev/null || true
          
          # Copy packages
          if [ -d "bin/packages" ]; then
            echo "📦 收集架构相关包..."
            mkdir -p firmware/packages
            cp -rv bin/packages/* firmware/packages/ 2>/dev/null || true
          fi
          
          # Copy target-specific packages
          if [ -d "bin/targets/x86/64/packages" ]; then
            echo "📦 收集目标相关包..."
            mkdir -p firmware/target-packages
            cp -rv bin/targets/x86/64/packages/* firmware/target-packages/ 2>/dev/null || true
          fi
          
          echo ""
          echo "📊 固件目录结构:"
          du -sh firmware/
          ls -lh firmware/ | head -20
      
      - name: Create firmware archive
        if: steps.build.outputs.build_status == 'success'
        run: |
          echo "📦 打包固件..."
          cd firmware
          tar -czf ../openwrt-x86_64-${{ needs.prepare.outputs.build_time }}.tar.gz *
          cd ..
          
          echo "✅ 固件包信息:"
          ls -lh openwrt-x86_64-*.tar.gz
      
      - name: Upload firmware artifacts
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-firmware
          path: openwrt-x86_64-*.tar.gz
          retention-days: 30
      
      - name: Upload all packages
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-packages-all
          path: bin/
          retention-days: 30
      
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            logs/
          retention-days: 7
      
      - name: Show build summary on failure
        if: failure()
        run: |
          echo "❌ 编译失败 - 显示最后 200 行构建日志:"
          tail -n 200 build.log

  build-summary:
    name: Build Summary
    runs-on: ubuntu-22.04
    needs: [prepare, build-firmware]
    if: always()
    
    steps:
      - name: Generate build summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 📦 OpenWrt x86_64 Firmware Build
          
          **Build Status:** ${{ needs.build-firmware.result }}
          **Build Time:** ${{ needs.prepare.outputs.build_time }}
          
          ## Target Configuration
          - Platform: x86_64 Generic
          - Branch: openwrt-25.12
          - Kernel Partition: 100 MB
          - Root FS: 1024 MB (Ext4)
          
          ## 🎵 Core Applications
          | App | Description | Source |
          |-----|-------------|--------|
          | luci-app-unblockneteasemusic | 网易云音乐解锁 | 官方源 |
          | luci-app-openclash | OpenClash 代理工具 | 官方源 |
          | luci-app-dockerman | Docker 管理界面 | 官方源 |
          
          ## 📡 Additional Services
          | Category | Packages |
          |----------|----------|
          | VPN | IPsec, L2TP, PPTP |
          | Proxy | Home Proxy, Sing-box, Nikki |
          | Container | Docker, Docker Compose |
          | Utilities | ttyd, DDNS, UDPXY |
          | Firewall | Firewall4 (nftables) |
          
          ## 📊 Build Info
          - Feeds: Official OpenWrt
          - Included: 基础 + 网络工具 + LuCI 完整套件 + 中文支持
          - Optimized: ccache 启用，并行编译
          
          [View Workflow Run →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
