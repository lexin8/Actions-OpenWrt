name: Build OpenWrt 23.05.3 with L2TP/IPsec

# 触发条件：手动触发/推送到main分支
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/openwrt-build.yml'

# 工作流配置
jobs:
  build:
    runs-on: ubuntu-22.04  # 推荐Ubuntu 22.04，兼容性最好
    steps:
      # 步骤1：准备编译环境
      - name: Prepare System Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
              gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
              file wget curl qemu-utils subversion autoconf automake libtool autopoint device-tree-compiler \
              libelf-dev libfuse3-dev pkg-config meson ninja-build

      # 步骤2：克隆OpenWrt 23.05.3源码
      - name: Clone OpenWrt Source Code
        run: |
          git clone -b openwrt-23.05 --single-branch https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          # 切换到23.05.3稳定版tag
          git checkout v23.05.3
          # 更新feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 步骤3：复制自定义.config配置（核心组件）
      - name: Customize Config File
        run: |
          cd openwrt
          # 写入L2TP/IPsec所需的所有组件配置
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_coreutils=y
          CONFIG_PACKAGE_procps-ng=y
          CONFIG_PACKAGE_iproute2=y

          CONFIG_PACKAGE_ipsec-tools=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y

          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-ipt-ipsec=y
          CONFIG_PACKAGE_kmod-ppp=y
          CONFIG_PACKAGE_kmod-pppol2tp=y

          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_libipsec0=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_iptables-mod-conntrack=y

          CONFIG_KERNEL_IPSEC=y
          CONFIG_KERNEL_XFRM_USER=y
          CONFIG_KERNEL_L2TP=y
          CONFIG_KERNEL_L2TP_IP=y
          CONFIG_KERNEL_L2TP_ETH=y
          
          # 可选：Docker（如需容器化部署L2TP）
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-docker=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-lib-docker=y
          
          # 可选：LuCI Web管理界面
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-firewall=y
          
          # 编译优化
          CONFIG_CPU_TYPE="core2"
          CONFIG_BUILD_LOG=y
          CONFIG_STRIP_UPX=y
          EOF
          
          # 自动补全依赖（关键）
          make defconfig

      # 步骤4：下载预编译依赖（加速编译）
      - name: Download Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      # 步骤5：开始编译固件
      - name: Build OpenWrt Firmware
        run: |
          cd openwrt
          # 编译（-j后的数字=CPU核心数，可根据服务器调整）
          make -j$(nproc) || make -j1 V=s
          # 检查编译结果
          ls -lh bin/targets/x86/64/

      # 步骤6：上传编译产物到Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-23.05.3-L2TP-IPsec
          path: openwrt/bin/targets/x86/64/
          retention-days: 30  # 产物保留30天
