name: Firmware 25

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (default: x86/64)'
        required: false
        default: 'x86'
      subtarget:
        description: 'Build subtarget (default: 64)'
        required: false
        default: '64'

permissions:
  contents: read
  actions: write

concurrency:
  group: build-official-25.12-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build_time.outputs.time }}
    
    steps:
      - name: Set build time
        id: build_time
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

  build-firmware:
    name: Build Official OpenWrt 25.12 x86_64 (Pure + Dockerman)
    runs-on: ubuntu-latest
    needs: prepare
    
    steps:
      # ✅ 修复：精确拉取 OpenWrt 25.12 官方源码（解决 Git 通配符失败）
      - name: Checkout Official OpenWrt 25.12
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          fetch-depth: 1

      # 安装官方编译依赖（适配25.12版本）
      - name: Install official build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk git libssl-dev \
            gettext zlib1g-dev unzip time python3 python3-distutils \
            file rsync wget xxd bison flex pkgconf libelf-dev \
            # 25.12新增依赖：APK包管理器相关
            libarchive-dev libcurl4-openssl-dev libssl-dev

      # 仅更新/安装官方原生软件源（无任何第三方源）
      - name: Update & install official feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 下载官方源码包（标准流程）
      - name: Download package source
        run: make download -j$(nproc) || true

      # 纯净官方配置（25.12标准x86_64 + 官方Dockerman）
      - name: Generate pure official config
        run: |
          cat > .config << 'EOF'
          # OpenWrt 25.12 官方 x86_64 平台配置
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=64
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_EXT4FS=y

          # 启用官方 LuCI 基础框架（25.12 原生）
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y

          # 【官方原生】Docker 管理插件（25.12 官方源自带）
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y

          # 25.12 官方网络组件
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-offload=y

          # 基础系统工具（官方原生）
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_vim-full=y

          # 编译优化（官方推荐）
          CONFIG_CCACHE=y
          CONFIG_DEVEL=y
          # 25.12 新特性：APK包管理器
          CONFIG_PACKAGE_manager=apk
          EOF

          make defconfig
          echo "✅ 官方纯净配置生成完成"

      # 编译官方固件（适配25.12版本）
      - name: Build Official OpenWrt 25.12
        id: build
        run: |
          set +e
          echo "开始编译 OpenWrt 25.12 官方纯净固件 (x86_64)..."
          make -j$(nproc) V=s 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          set -e
          
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "✅ 编译成功"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 编译失败"
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # 收集固件
      - name: Collect firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          mkdir -p firmware
          cp -v bin/targets/x86/64/openwrt-*-x86-64-generic* firmware/ 2>/dev/null || true

      # 打包固件
      - name: Archive firmware
        if: steps.build.outputs.build_status == 'success'
        run: |
          tar -czf openwrt-25.12-official-x86_64-${{ needs.prepare.outputs.build_time }}.tar.gz -C firmware .

      # 上传固件产物
      - name: Upload firmware
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25.12-official-x86_64
          path: openwrt-25.12-official-x86_64-*.tar.gz
          retention-days: 30

      # 上传编译日志（成功/失败都上传）
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-25.12-build-logs
          path: build.log
          retention-days: 7

      # 失败时显示错误日志
      - name: Show error logs
        if: failure()
        run: tail -n 200 build.log

  # 编译总结
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-firmware]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🎯 OpenWrt 25.12 官方纯净版编译完成
          **状态**: ${{ needs.build-firmware.result }}
          **编译时间**: ${{ needs.prepare.outputs.build_time }}
          **源码**: openwrt/openwrt openwrt-25.12 官方原版
          **平台**: x86_64 Generic
          **根分区**: 1024MB Ext4
          
          ## 内置组件（纯官方无第三方）
          ✅ LuCI 官方管理界面（25.12 原生）
          ✅ 中文语言包
          ✅ 官方原生 luci-app-dockerman
          ✅ Docker + Docker Compose
          ✅ Firewall4 (nftables)
          ✅ APK 包管理器（25.12 新特性）
          ✅ 基础系统工具
          
          ❌ 无任何第三方插件
          ❌ 无任何第三方软件源
          ❌ 无定制修改
          EOF
