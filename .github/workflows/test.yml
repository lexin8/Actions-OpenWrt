name: fanchmwrt

on:
  repository_dispatch:
  watch:
    types: started
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH connection to Actions
        required: true
        default: 'false'

env:
  CONFIG_FILE2: fanchmwrt.config
  DIY_P1_SH: fanchmwrt.sh
  SSH_ACTIONS: false
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_SOFTETHERVPN: false
  UPLOAD_COWTRANSFER: true
  UPLOAD_RELEASE: true
  UPLOAD_WETRANSFER: false
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v23.05.3
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04
    steps:
      - name: Check Server Performance
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息:"
          echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - uses: actions/checkout@main

      - name: Clone Source Code
        run: |
          df -hT $GITHUB_WORKSPACE
          git clone $REPO_URL openwrt -b $REPO_BRANCH
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Install Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run DIY Script
        run: |
          chmod +x $DIY_P1_SH
          ./$DIY_P1_SH

      - name: Load Config
        run: |
          rm -rf openwrt/.config
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE2 ] && mv $CONFIG_FILE2 openwrt/.config

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true' || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download Packages
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Organize Files
        id: organize
        run: |
          cd openwrt/bin/targets/x86/64
          rm -rf packages
          find . -name "*ext4*" | xargs rm -rf
          find . -name "*root*" | xargs rm -rf
          tar czvf $(date +%Y.%m.%d-%H)_OpenWrt_x86_64.tar.gz config.buildinfo *.img.gz
          ls | grep -v OpenWrt | xargs rm
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload Firmware
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt_x86_64
          path: ${{ env.FIRMWARE }}
