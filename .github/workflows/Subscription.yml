name: Update Subscription Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py（忽略错误）
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 复制并编码订阅文件
        run: |
          mkdir -p nodes
          cd AutoMergePublicNodes
          if [ ! -f list_raw.txt ]; then
            echo "错误：未找到 list_raw.txt"
            exit 1
          fi
          # 复制原始文件
          cp list_raw.txt ../nodes/list_raw.txt
          echo "已复制 list_raw.txt 到 nodes/list_raw.txt"
          # 生成 Base64 编码版本（无换行）
          base64 -w 0 list_raw.txt > ../nodes/subscription.txt
          echo "已生成 Base64 编码订阅文件 nodes/subscription.txt"
          echo "原始文件大小: $(wc -c < ../nodes/list_raw.txt) 字节"
          echo "Base64 文件大小: $(wc -c < ../nodes/subscription.txt) 字节"

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/list_raw.txt nodes/subscription.txt
          git diff --cached --quiet || git commit -m "Auto update subscription [skip ci]"
          git push
