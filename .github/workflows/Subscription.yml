name: Update Subscription Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 安装 yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

      - name: 提取 proxies 部分并生成订阅文件
        run: |
          mkdir -p nodes
          cd AutoMergePublicNodes
          echo "proxies:" > ../nodes/proxies.yaml
          yq '.proxies' list.meta.yml >> ../nodes/proxies.yaml

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/proxies.yaml
          git diff --cached --quiet || git commit -m "Auto update proxies list [skip ci]"
          git push
