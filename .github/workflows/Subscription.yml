name: Update Subscription Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py（忽略错误）
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 提取 proxies 部分并生成订阅文件
        run: |
          mkdir -p nodes
          cd AutoMergePublicNodes
          if [ ! -f list.meta.yml ]; then
            echo "错误：未找到 list.meta.yml"
            exit 1
          fi
          python3 << EOF
          import yaml
          with open('list.meta.yml', 'r', encoding='utf-8') as f:
          data = yaml.safe_load(f)
          proxies = data.get('proxies', [])
          if not proxies:
          print("警告：未找到 proxies 字段或为空")
          with open('../nodes/proxies.yml', 'w', encoding='utf-8') as f:
          f.write('proxies:\n')
          yaml.dump(proxies, f, allow_unicode=True, sort_keys=False, default_flow_style=False)
          print(f"已生成 nodes/proxies.yml，包含 {len(proxies)} 个节点")
          EOF

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/proxies.yml
          git diff --cached --quiet || git commit -m "Auto update proxies list [skip ci]"
          git push
