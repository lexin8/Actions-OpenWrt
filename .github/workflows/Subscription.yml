name: Update Subscription Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py（忽略错误）
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 查看生成的文件（调试用）
        run: |
          cd AutoMergePublicNodes
          echo "========== 文件列表 =========="
          ls -lR
          echo "=============================="
          echo "最近修改的文本文件："
          find . -type f \( -name "*.txt" -o -name "*.yaml" -o -name "*.conf" \) -printf "%T@ %p\n" | sort -nr | head -10

      - name: 智能复制订阅文件
        run: |
          mkdir -p nodes
          cd AutoMergePublicNodes

          possible_files=(
            "sub/subscription.txt"
            "sub/subscription"
            "subscription.txt"
            "subscription.yaml"
            "sub/*.txt"
            "*.txt"
          )

          found=""
          for pattern in "${possible_files[@]}"; do
            shopt -s nullglob
            files=($pattern)
            shopt -u nullglob
            if [ ${#files[@]} -gt 0 ]; then
              found="${files[0]}"
              break
            fi
          done

          if [ -z "$found" ]; then
            echo "未找到预设文件名，查找最近修改的文本文件..."
            found=$(find . -type f \( -name "*.txt" -o -name "*.yaml" -o -name "*.conf" \) -printf "%T@ %p\n" | sort -nr | head -1 | cut -d' ' -f2-)
          fi

          if [ -n "$found" ] && [ -f "$found" ]; then
            cp "$found" ../nodes/subscription.txt
            echo "已复制 $found 到 nodes/subscription.txt"
            echo "文件大小: $(wc -c < ../nodes/subscription.txt) 字节"
          else
            echo "错误：未找到任何订阅文件"
            exit 1
          fi

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/subscription.txt
          git diff --cached --quiet || git commit -m "Auto update subscription nodes [skip ci]"
          git push
