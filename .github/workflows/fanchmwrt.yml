name: fanchmwrt

on:
  repository_dispatch:
  watch:
    types: started
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'

env:
  CONFIG_FILE: istoreos.config
  CONFIG_FILE2: fanchmwrt.config
  DIY_P1_SH: fanchmwrt.sh
  DIY_P2_SH: l2tp.sh
  DIY_P3_SH: diy-part3.sh
  SSH_ACTIONS: false
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  ENABLE_L2TP_COMPONENTS: false
  UPLOAD_SOFTETHERVPN: false
  UPLOAD_COWTRANSFER: true
  UPLOAD_RELEASE: true
  UPLOAD_WETRANSFER: false
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  CACHE_TOOLCHAIN: true
  TZ: Asia/Shanghai
  GOLANG_REPO: https://github.com/sbwml/packages_lang_golang
  GOLANG_BRANCH: 26.x

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Check Server Performance
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息:"
          echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache
          if [ ! -d "/usr/local/go" ]; then
            wget https://dl.google.com/go/go1.24.0.linux-amd64.tar.gz -O /tmp/go.tar.gz
            sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf /tmp/go.tar.gz
            echo "PATH=/usr/local/go/bin:$PATH" >> $GITHUB_ENV
          fi
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          mkdir -p $GITHUB_WORKSPACE/openwrt/ccache
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/ccache" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV

      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone Source Code
        run: |
          df -hT $GITHUB_WORKSPACE
          git clone --depth 1 $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          COMMIT_AUTHOR=$(git show -s --date=short --format="作者: %an")
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
          COMMIT_DATE=$(git show -s --date=short --format="时间: %ci")
          echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
          COMMIT_MESSAGE=$(git show -s --date=short --format="内容: %s")
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          COMMIT_HASH=$(git show -s --date=short --format="hash: %H")
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Cache OpenWrt Build Files
        if: env.CACHE_TOOLCHAIN == 'true'
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: true
          mixkey: default-${{ hashFiles(env.CONFIG_FILE2, env.DIY_P1_SH) }}
          prefix: ${{ env.OPENWRT_PATH }}
          paths: |
            staging_dir/toolchain
            staging_dir/target
            dl
            build_dir
            feeds/packages/lang/golang
            ccache

      - name: Upgrade Golang to 1.24+
        run: |
          cd $OPENWRT_PATH
          rm -rf feeds/packages/lang/golang
          git clone --depth 1 $GOLANG_REPO -b $GOLANG_BRANCH feeds/packages/lang/golang
          ./scripts/feeds install -a golang

      - name: 运行一键部署脚本
        run: |
          chmod +x $DIY_P1_SH
          ./$DIY_P1_SH

      - name: softethervpn
        id: softethervpn
        if: env.UPLOAD_SOFTETHERVPN == 'true' && !cancelled()
        run: |
          cd ${{ github.workspace }}/openwrt/feeds/packages/net/
          rm -rf softethervpn*
          cp -r ${{ github.workspace }}/softethervpn .
          cp -r ${{ github.workspace }}/softethervpn5 .

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: 下载 package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          echo "依赖包下载完成，共$(ls dl | wc -l)个包"

      - name: 开始编译固件
        id: compile
        run: |
          cd openwrt
          export CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/ccache
          export USE_CCACHE=1
          echo -e "$(nproc) thread compile (启用ccache缓存)"
          make -j$(nproc) CCACHE=1 || make -j1 CCACHE=1 V=s
          echo "::set-output name=status::success"
          echo "编译完成，耗时: $(date +%s -d @0)-$(date +%s) 秒"

      - name: 搜索固件
        run: |
          cd openwrt/bin/
          find . -name "*squashfs*"

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/
          cd $(find . -name "*squashfs*"  | head -n 1 | xargs dirname)
          ls
          rm -rf packages
          find . -name "*ext4*" |xargs rm -rf
          find . -name "*root*" |xargs rm -rf
          FIRMWARE_NAME=$(date +%Y.%m.%d.%H)_OpenWrt_default.tar.gz
          tar czvf $FIRMWARE_NAME config.buildinfo *.img.gz
          ls | grep -v $FIRMWARE_NAME | xargs rm -rf
          ls
          echo "::set-output name=FIRMWARE::$PWD"
          echo "::set-output name=FIRMWARE_NAME::$FIRMWARE_NAME"
          echo "::set-output name=status::success"

      - name: 上传到 directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware_default_${{ steps.compile.outputs.DEVICE_NAME }}_${{ steps.compile.outputs.FILE_DATE }}
          path: ${{ steps.organize.outputs.FIRMWARE }}
          retention-days: 7

      - name: Upload to Release
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: OpenWrt Build ${{ github.run_id }} (default)
          files: ${{ steps.organize.outputs.FIRMWARE }}/*
          body: |
            📅 编译时间: $(date +%Y-%m-%d %H:%M:%S)
            📝 源码版本: ${{ env.COMMIT_HASH }}
            📌 分支: 默认分支
          draft: false
          prerelease: false
