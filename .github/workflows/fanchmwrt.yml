name: fanchmwrt

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH调试（true/false）'
        required: true
        default: 'false'
        type: boolean

env:
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  TZ: Asia/Shanghai
  PASSWALL_MAIN_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall
  PASSWALL_PACKAGES_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall-packages
  HOMEPROXY_FEED: https://github.com/immortalwrt/homeproxy
  DOCKERMAN_FEED: https://github.com/kenzok8/openwrt-packages
  GOLANG_REPO: https://github.com/kenzok8/golang
  GOLANG_BRANCH: 1.26
  STEP1_BASE: true
  STEP2_COMMON: true
  STEP3_DOCKER: true
  STEP4_NIKKI: true
  STEP5_PROXY: true
  COMMON_CONFIG: |
    CONFIG_TARGET_x86=y
    CONFIG_TARGET_x86_64=y
    CONFIG_TARGET_x86_64_Generic=y
    CONFIG_TARGET_KERNEL_PARTSIZE=60
    CONFIG_TARGET_ROOTFS_TARGZ=y
    CONFIG_TARGET_EFI_IMAGES=y
    CONFIG_PACKAGE_luci=y
    CONFIG_PACKAGE_luci-base=y
    CONFIG_PACKAGE_luci-mod-admin-full=y
    CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
    CONFIG_PACKAGE_luci-theme-argon=y
    CONFIG_PACKAGE_luci-theme-argon-config=y
    CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
    CONFIG_PACKAGE_wget=y
    CONFIG_PACKAGE_curl=y
    CONFIG_PACKAGE_openssh-sftp-server=y
    CONFIG_GOLANG_VERSION_1_26=y
    CONFIG_GOLANG_BASE_VERSION="1.26"

jobs:
  build-openwrt:
    runs-on: ubuntu-22.04
    steps:
      - name: 0.1 初始化环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 核心函数定义
          cat > /tmp/openwrt_funcs.sh << 'EOF'
          build_verify() {
            local STEP=$1 STEP_NUM=$2 STEP_NAME=$3
            if find $OPENWRT_PATH/bin/targets/x86/64 -name "*combined-efi*" -type f | grep -q .; then
              echo "${STEP}_SUCCESS=true BUILD_STOPPED=false LAST_SUCCESS_STEP_NUM=${STEP_NUM} LAST_SUCCESS_STEP_NAME=${STEP_NAME}" >> $GITHUB_ENV
              return 0
            else
              echo "${STEP}_SUCCESS=false BUILD_STOPPED=true" >> $GITHUB_ENV
              return 1
            fi
          }

          package_firmware() {
            local STEP_NUM=$1 STEP_TYPE=$2 STEP_NAME=$3
            TIME=$(date +"%y%m%d_%H%M")
            PACKAGE_NAME="openwrt_${STEP_TYPE}_v${STEP_NUM}_${TIME}.tar.gz"
            UPLOAD_NAME="${STEP_NUM}-${STEP_NAME}_${TIME}"
            
            mkdir -p /tmp/openwrt_package && rm -rf /tmp/openwrt_package/*
            find $OPENWRT_PATH/bin/targets/x86/64 -name "*combined-efi*" -type f -exec cp {} /tmp/openwrt_package/ \;
            find $OPENWRT_PATH -name "config.buildinfo" -type f -exec cp {} /tmp/openwrt_package/ \;
            tar -zcvf /tmp/$PACKAGE_NAME -C /tmp/openwrt_package .
            
            echo "FINAL_PACKAGE_PATH=/tmp/$PACKAGE_NAME FINAL_UPLOAD_NAME=$UPLOAD_NAME" >> $GITHUB_ENV
          }

          generate_config() {
            local ROOT_PART_SIZE=$1 CUSTOM_CONFIG=$2
            cd $OPENWRT_PATH
            echo "$COMMON_CONFIG" > .config
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=$ROOT_PART_SIZE" >> .config
            echo "$CUSTOM_CONFIG" >> .config
            make defconfig && make download -j$(nproc)
            find dl -size -1024c -exec rm -f {} \;
          }
          EOF

          source /tmp/openwrt_funcs.sh

          # 系统初始化
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update && sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get -y autoremove --purge && sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          sudo swapoff /swapfile && sudo rm -f /swapfile
          sudo fallocate -l 16G /swapfile && sudo chmod 600 /swapfile
          sudo mkswap /swapfile && sudo swapon /swapfile

          # 初始化环境变量
          echo "BUILD_STOPPED=false LAST_SUCCESS_STEP_NUM=0 FINAL_PACKAGE_PATH=" >> $GITHUB_ENV

      - name: 0.2 克隆源码
        run: |
          source /tmp/openwrt_funcs.sh
          git clone --depth=1 $REPO_URL openwrt
          cd openwrt && echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          ./scripts/feeds update -a

      - name: 0.3 清理冲突组件
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          rm -rf feeds/luci/applications/luci-app-mosdns 2>/dev/null
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns} 2>/dev/null
          rm -rf feeds/packages/utils/v2dat feeds/packages/lang/golang 2>/dev/null

      - name: 0.4 替换Golang 1.26
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          git clone --depth=1 $GOLANG_REPO -b $GOLANG_BRANCH feeds/packages/lang/golang
          ./scripts/feeds install -a

      - name: 0.5 SSH调试
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # 步骤1：基础固件
      - name: 1.1 配置基础固件
        if: env.STEP1_BASE == 'true' && env.BUILD_STOPPED == 'false'
        run: |
          source /tmp/openwrt_funcs.sh
          generate_config "512" ""

      - name: 1.2 编译基础固件
        if: env.STEP1_BASE == 'true' && env.BUILD_STOPPED == 'false'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP1" "1" "基础固件"

      # 步骤2：常用组件
      - name: 2.1 配置常用组件
        if: env.STEP2_COMMON == 'true' && env.BUILD_STOPPED == 'false' && env.STEP1_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          CUSTOM_CONFIG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          EOF
          )
          generate_config "640" "$CUSTOM_CONFIG"

      - name: 2.2 编译常用组件固件
        if: env.STEP2_COMMON == 'true' && env.BUILD_STOPPED == 'false' && env.STEP1_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP2" "2" "常用组件固件"

      # 步骤3：Dockerman
      - name: 3.1 配置Dockerman
        if: env.STEP3_DOCKER == 'true' && env.BUILD_STOPPED == 'false' && env.STEP2_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          sed -i "1i src-git kenzok8 $DOCKERMAN_FEED;main" feeds.conf.default
          ./scripts/feeds update -a && rm -rf feeds/luci/applications/luci-app-docker 2>/dev/null
          ./scripts/feeds install -a
          CUSTOM_CONFIG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          EOF
          )
          generate_config "800" "$CUSTOM_CONFIG"

      - name: 3.2 编译Dockerman固件
        if: env.STEP3_DOCKER == 'true' && env.BUILD_STOPPED == 'false' && env.STEP2_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP3" "3" "Dockerman固件"

      # 步骤4：Nikki
      - name: 4.1 配置Nikki组件
        if: env.STEP4_NIKKI == 'true' && env.BUILD_STOPPED == 'false' && env.STEP3_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
          ./scripts/feeds update -a && ./scripts/feeds install -a
          CUSTOM_CONFIG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          EOF
          )
          generate_config "960" "$CUSTOM_CONFIG"

      - name: 4.2 编译Nikki固件
        if: env.STEP4_NIKKI == 'true' && env.BUILD_STOPPED == 'false' && env.STEP3_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP4" "4" "Nikki固件"

      # 步骤5：Passwall+Homeproxy
      - name: 5.1 配置代理组件
        if: env.STEP5_PROXY == 'true' && env.BUILD_STOPPED == 'false' && env.STEP4_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          sed -i "2i src-git passwall_packages $PASSWALL_PACKAGES_REPO;main" feeds.conf.default
          sed -i "3i src-git passwall_main $PASSWALL_MAIN_REPO;main" feeds.conf.default
          sed -i "4i src-git homeproxy $HOMEPROXY_FEED;main" feeds.conf.default
          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,hysteria,tuic-client} 2>/dev/null
          ./scripts/feeds update passwall_packages passwall_main homeproxy
          ./scripts/feeds install -a -p passwall_packages
          ./scripts/feeds install -a -p passwall_main
          ./scripts/feeds install -a -p homeproxy
          CUSTOM_CONFIG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_geoview=y
          CONFIG_PACKAGE_luci-i18n-geoview-zh-cn=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
          CONFIG_PACKAGE_xray-core=y
          CONFIG_PACKAGE_v2ray-core=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_hysteria=y
          CONFIG_PACKAGE_tuic-client=y
          CONFIG_PACKAGE_smartdns=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_ucode-mod-digest=y
          CONFIG_PACKAGE_rust-bindgen-host=y
          EOF
          )
          generate_config "1600" "$CUSTOM_CONFIG"

      - name: 5.2 编译最终固件
        if: env.STEP5_PROXY == 'true' && env.BUILD_STOPPED == 'false' && env.STEP4_SUCCESS == 'true'
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP5" "5" "完整固件"

      # 统一打包
      - name: 打包固件
        if: env.LAST_SUCCESS_STEP_NUM > 0
        run: |
          source /tmp/openwrt_funcs.sh
          if [ "$BUILD_STOPPED" = "false" ] && [ "$LAST_SUCCESS_STEP_NUM" = "5" ]; then
            package_firmware "5" "full" "完整固件"
          else
            case $LAST_SUCCESS_STEP_NUM in
              1) package_firmware "1" "base" "基础固件" ;;
              2) package_firmware "2" "common" "常用组件固件" ;;
              3) package_firmware "3" "docker" "Dockerman固件" ;;
              4) package_firmware "4" "nikki" "Nikki固件" ;;
            esac
          fi

      # 统一上传
      - name: 上传固件
        if: env.FINAL_PACKAGE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_UPLOAD_NAME }}
          path: ${{ env.FINAL_PACKAGE_PATH }}
          retention-days: 7

      # 错误排查
      - name: 输出错误日志
        if: failure()
        run: |
          source /tmp/openwrt_funcs.sh
          cd $OPENWRT_PATH
          cat build.log | grep -E "error|conflict|fatal|version mismatch" || echo "无关键错误"
          find $OPENWRT_PATH/bin/targets/x86/64 -name "*combined-efi*" -type f || echo "无固件文件"
