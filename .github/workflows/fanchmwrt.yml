name: fanchmwrt-build

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH调试（true/false）'
        required: true
        default: 'false'
        type: boolean

env:
  # 基础配置
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  TZ: Asia/Shanghai
  DEVICE_NAME: x86_64_Generic
  FILE_DATE: ${{ github.run_id }}
  # 第三方源
  PASSWALL_MAIN: https://github.com/Openwrt-Passwall/openwrt-passwall
  PASSWALL_PKG: https://github.com/Openwrt-Passwall/openwrt-passwall-packages
  HOMEPROXY: https://github.com/immortalwrt/homeproxy
  DOCKERMAN: https://github.com/kenzok8/openwrt-packages
  GOLANG_REPO: https://github.com/kenzok8/golang
  GOLANG_BRANCH: 1.26
  NIKKI_FEED: https://github.com/nikkinikki-org/OpenWrt-nikki
  # 步骤开关
  STEP1: true
  STEP2: true
  STEP3: true
  STEP4: true
  STEP5: true
  # 通用编译配置
  COMMON_CFG: |
    CONFIG_TARGET_x86=y
    CONFIG_TARGET_x86_64=y
    CONFIG_TARGET_x86_64_Generic=y
    CONFIG_TARGET_KERNEL_PARTSIZE=60
    CONFIG_TARGET_ROOTFS_TARGZ=y
    CONFIG_TARGET_EFI_IMAGES=y
    CONFIG_PACKAGE_luci=y
    CONFIG_PACKAGE_luci-base=y
    CONFIG_PACKAGE_luci-mod-admin-full=y
    CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
    CONFIG_PACKAGE_luci-theme-argon=y
    CONFIG_PACKAGE_luci-theme-argon-config=y
    CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
    CONFIG_PACKAGE_wget=y
    CONFIG_PACKAGE_curl=y
    CONFIG_PACKAGE_openssh-sftp-server=y
    CONFIG_GOLANG_VERSION_1_26=y
    CONFIG_GOLANG_BASE_VERSION="1.26"
    # 关闭无用插件
    # CONFIG_DEFAULT_luci-app-arpbind is not set
    # CONFIG_PACKAGE_luci-app-autoreboot is not set
    # CONFIG_PACKAGE_luci-app-nlbwmon is not set
    # CONFIG_PACKAGE_luci-app-samba4 is not set
    # CONFIG_PACKAGE_luci-app-samba is not set
    # CONFIG_PACKAGE_luci-app-vlmcsd is not set
    # CONFIG_PACKAGE_luci-app-wol is not set
    # CONFIG_PACKAGE_luci-app-zerotier is not set
    # CONFIG_PACKAGE_luci-app-strongswan-swanctl is not set

jobs:
  Build:
    runs-on: ubuntu-22.04
    steps:
      # 1. 服务器性能检查
      - name: Check Server Performance
        run: |
          echo "警告⚠ 服务器性能有限，插件过多需注意CPU负载！"
          echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort -u | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号: $(cat /proc/cpuinfo | grep -m1 'model name' | awk -F: '{print $2}')\n"
          echo "内存信息: $(sudo lshw -short -C memory | grep GiB)"
          echo "硬盘信息: $(ls /dev/sd* | grep -v [1-9] | wc -l) 块" && df -hT

      # 2. 磁盘扩容（修复：使用官方Action而非手动docker运行）
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true

      # 3. 环境初始化（合并函数定义+系统配置）
      - name: Init Env
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 核心函数封装
          cat > /tmp/build.sh << 'EOF'
          # 编译验证
          build_verify() {
            [ -f "$OPENWRT_PATH/bin/targets/x86/64/*combined-efi*" ] && {
              echo "STEP${1}_SUCCESS=true" >> $GITHUB_ENV
              echo "LAST_STEP=${1}" >> $GITHUB_ENV
            } || echo "STEP${1}_SUCCESS=false" >> $GITHUB_ENV
          }
          # 生成配置
          gen_config() {
            cd $OPENWRT_PATH
            echo "$COMMON_CFG" > .config
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${1}" >> .config
            [ -n "$2" ] && echo "$2" >> .config
            make defconfig && make download -j$(nproc)
            find dl -size -1024c -exec rm -f {} \;
          }
          # 添加feeds源
          add_feed() {
            grep -q "^src-git $1 " feeds.conf.default || echo "src-git $1 $2;main" >> feeds.conf.default
          }
          # 编译执行
          run_build() {
            cd $OPENWRT_PATH
            make -j$(nproc) || make -j1 V=s
            build_verify $1
            echo "status=success" >> $GITHUB_OUTPUT
          }
          EOF
          # 加载函数
          source /tmp/build.sh
          # 系统配置
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get update && sudo -E apt-get install -y $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get autoremove -y && sudo -E apt-get clean -y
          sudo timedatectl set-timezone "$TZ"
          sudo fallocate -l 16G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
          # 初始化变量
          echo "LAST_STEP=0" >> $GITHUB_ENV

      # 4. 代码检出+依赖处理
      - name: Code Checkout & Env Prepare
        run: |
          # 克隆源码
          git clone --depth=1 $REPO_URL openwrt
          cd openwrt && echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          ./scripts/feeds update -a
          # 清理冲突包
          rm -rf feeds/luci/applications/luci-app-mosdns 2>/dev/null
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns} 2>/dev/null
          rm -rf feeds/packages/utils/v2dat feeds/packages/lang/golang 2>/dev/null
          # 安装依赖
          git clone --depth=1 $GOLANG_REPO -b $GOLANG_BRANCH feeds/packages/lang/golang
          ./scripts/feeds install -a

      # 5. SSH调试
      - name: SSH Debug
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # -------------------------- 分步编译 --------------------------
      # 步骤1：基础固件
      - name: Step1 - Base Firmware
        id: step1
        if: env.STEP1 == 'true'
        run: |
          source /tmp/build.sh
          gen_config 512
          run_build 1

      # 步骤2：常用组件
      - name: Step2 - Common Plugins
        id: step2
        if: env.STEP2 == 'true' && env.STEP1_SUCCESS == 'true'
        run: |
          source /tmp/build.sh
          CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          EOF
          )
          gen_config 640 "$CFG"
          run_build 2

      # 步骤3：Dockerman
      - name: Step3 - Dockerman
        id: step3
        if: env.STEP3 == 'true' && env.STEP2_SUCCESS == 'true'
        run: |
          source /tmp/build.sh
          cd $OPENWRT_PATH
          add_feed kenzok8 $DOCKERMAN
          ./scripts/feeds update -a && rm -rf feeds/luci/applications/luci-app-docker 2>/dev/null
          ./scripts/feeds install -a
          CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          EOF
          )
          gen_config 800 "$CFG"
          run_build 3

      # 步骤4：Nikki
      - name: Step4 - Nikki
        id: step4
        if: env.STEP4 == 'true' && env.STEP3_SUCCESS == 'true'
        run: |
          source /tmp/build.sh
          cd $OPENWRT_PATH
          add_feed nikki $NIKKI_FEED
          ./scripts/feeds update -a && ./scripts/feeds install -a
          CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          EOF
          )
          gen_config 960 "$CFG"
          run_build 4

      # 步骤5：代理组件
      - name: Step5 - Proxy Plugins
        id: step5
        if: env.STEP5 == 'true' && env.STEP4_SUCCESS == 'true'
        run: |
          source /tmp/build.sh
          cd $OPENWRT_PATH
          add_feed passwall_pkg $PASSWALL_PKG
          add_feed passwall_main $PASSWALL_MAIN
          add_feed homeproxy $HOMEPROXY
          ./scripts/feeds update -a
          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,hysteria,tuic-client} 2>/dev/null
          ./scripts/feeds install -a
          CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_geoview=y
          CONFIG_PACKAGE_luci-i18n-geoview-zh-cn=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
          CONFIG_PACKAGE_xray-core=y
          CONFIG_PACKAGE_v2ray-core=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_hysteria=y
          CONFIG_PACKAGE_tuic-client=y
          CONFIG_PACKAGE_smartdns=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_ucode-mod-digest=y
          CONFIG_PACKAGE_rust-bindgen-host=y
          EOF
          )
          gen_config 1600 "$CFG"
          run_build 5

      # -------------------------- 结果处理 --------------------------
      # 上传固件
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        if: ${{ (steps.step1.outputs.status == 'success' || steps.step2.outputs.status == 'success' || steps.step3.outputs.status == 'success' || steps.step4.outputs.status == 'success' || steps.step5.outputs.status == 'success') && !cancelled() }}
        with:
          name: OpenWrt_Firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
          path: |
            ${{ env.OPENWRT_PATH }}/bin/targets/*/*
            !${{ env.OPENWRT_PATH }}/bin/targets/*/packages
          retention-days: 7

      # 错误调试
      - name: Error Debug
        if: failure()
        run: |
          source /tmp/build.sh
          cd $OPENWRT_PATH
          echo "===== 编译错误 ====="
          cat build.log | grep -E "error|conflict|fatal|version mismatch|no such file" || echo "无关键错误"
          echo "===== Feeds配置 ====="
          cat feeds.conf.default
          echo "===== 固件检查 ====="
          find bin/targets/x86/64 -name "*combined-efi*" || echo "未生成固件"
          echo "最后成功步骤: $LAST_STEP"
