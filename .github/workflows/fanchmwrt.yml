name: Build OpenWrt Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: fanchmwrt-24.10.4
  CONFIG_FILE: .config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: 初始化编译环境
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget subversion \
        upx-ucl autoconf automake libtool patch cmake
        sudo apt-get install -y qemu-utils
        df -h
    
    - name: 克隆源码
      run: |
        git clone $REPO_URL openwrt
        cd openwrt
        ln -sf $GITHUB_WORKSPACE $CONFIG_FILE
        
    - name: 更新 feeds 并添加第三方源
      run: |
        cd openwrt
        
        # 添加 nikki 源码
        echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
        
        # 添加 kenzo/small 源
        sed -i '1i src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
        sed -i '2i src-git small https://github.com/kenzok8/small' feeds.conf.default
        
        # 更新 feeds
        ./scripts/feeds update -a
        
        # 清理冲突组件
        rm -rf feeds/luci/applications/luci-app-mosdns 2>/dev/null
        rm -rf feeds/packages/net/alist 2>/dev/null
        rm -rf feeds/packages/net/adguardhome 2>/dev/null
        rm -rf feeds/packages/net/mosdns 2>/dev/null
        rm -rf feeds/packages/net/xray* 2>/dev/null
        rm -rf feeds/packages/net/v2ray* 2>/dev/null
        rm -rf feeds/packages/net/sing* 2>/dev/null
        rm -rf feeds/packages/net/smartdns 2>/dev/null
        rm -rf feeds/packages/utils/v2dat 2>/dev/null
        rm -rf feeds/packages/lang/golang 2>/dev/null
        
        # 替换高版本 golang
        git clone https://github.com/kenzok8/golang -b 1.26 feeds/packages/lang/golang
        
        # 重新更新并安装 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 强制安装核心组件
        ./scripts/feeds install -p small luci-app-homeproxy
        ./scripts/feeds install -p kenzo luci-app-passwall
        ./scripts/feeds install -p nikki luci-app-nikki
        ./scripts/feeds install ucode-mod-digest
        
        # 修复依赖版本
        sed -i 's/luci-base >= 22.03/luci-base >= 21.02/g' feeds/small/luci-app-homeproxy/Makefile 2>/dev/null
        sed -i 's/luci-base >= 22.03/luci-base >= 21.02/g' feeds/kenzo/luci-app-passwall/Makefile 2>/dev/null
    

        
        # 运行配置
        make defconfig
        
    - name: 下载软件包
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: 编译固件
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "======================="
        echo "编译完成!"
        echo "======================="
        
    - name: 整理输出文件
      run: |
        cd openwrt/bin/targets/x86/64
        rm -rf packages
        echo "==========固件信息=========="
        ls -lh
        
    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-x86-64-${{ github.run_number }}
        path: openwrt/bin/targets/x86/64/*.img*
        
    - name: 上传配置文件
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-config-${{ github.run_number }}
        path: openwrt/.config
        
    - name: 创建发布
      if: github.event_name == 'push' && contains(github.ref, 'tags')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          openwrt/bin/targets/x86/64/*.img*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
