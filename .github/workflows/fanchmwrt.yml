name: fanchmwrt

on:
  repository_dispatch:
  watch:
    types: started
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'

env:
  CONFIG_FILE: istoreos.config
  CONFIG_FILE2: fanchmwrt.config
  DIY_P1_SH: fanchmwrt.sh
  DIY_P2_SH: l2tp.sh
  DIY_P3_SH: diy-part3.sh
  SSH_ACTIONS: false
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  ENABLE_L2TP_COMPONENTS: false
  UPLOAD_SOFTETHERVPN: false
  UPLOAD_COWTRANSFER: true
  UPLOAD_RELEASE: false
  UPLOAD_WETRANSFER: false
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  TZ: Asia/Shanghai
  GOLANG_REPO: https://github.com/sbwml/packages_lang_golang
  GOLANG_BRANCH: 26.x
  CACHE_RELEASE_TAG: openwrt-base-cache
  CACHE_FILE_NAME: openwrt-base-cache.tar.gz

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: builddir

      - name: Clone Source Code
        run: |
          git clone --depth 1 $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          COMMIT_AUTHOR=$(git show -s --date=short --format="作者: %an")
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
          COMMIT_DATE=$(git show -s --date=short --format="时间: %ci")
          echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
          COMMIT_MESSAGE=$(git show -s --date=short --format="内容: %s")
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          COMMIT_HASH=$(git show -s --date=short --format="hash: %H")
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Download Base Env Cache from Releases
        run: |
          wget --no-check-certificate "https://github.com/${{ github.repository }}/releases/download/${{ env.CACHE_RELEASE_TAG }}/${{ env.CACHE_FILE_NAME }}" -O $GITHUB_WORKSPACE/${{ env.CACHE_FILE_NAME }}
          if [ ! -f "$GITHUB_WORKSPACE/${{ env.CACHE_FILE_NAME }}" ]; then
            exit 1
          fi
          cd $OPENWRT_PATH
          tar xzvf $GITHUB_WORKSPACE/${{ env.CACHE_FILE_NAME }} --overwrite
          if [ ! -d "staging_dir/toolchain" ]; then
            exit 1
          fi

      - name: Install Golang (Official Doc + Full Clean)
        run: |
          cd $OPENWRT_PATH
          # ========== 新增：彻底清理缓存中的旧版Golang ==========
          # 1. 清理feeds中的golang（基础）
          rm -rf feeds/packages/lang/golang
          # 2. 清理工具链/目标目录/主机目录中的golang可执行文件和库
          rm -rf staging_dir/toolchain-*/*/lib/go staging_dir/toolchain-*/*/bin/go staging_dir/toolchain-*/*/bin/gofmt
          rm -rf staging_dir/target-*/*/usr/lib/go staging_dir/target-*/*/usr/bin/go
          rm -rf staging_dir/host/bin/go staging_dir/host/lib/go staging_dir/host/usr/lib/go
          # 3. 清理下载缓存中的旧版golang源码
          rm -rf dl/go*
          # ========== 保留官方文档的安装逻辑 ==========
          git clone https://github.com/sbwml/packages_lang_golang -b 26.x feeds/packages/lang/golang
          # 强制更新并安装，确保覆盖旧配置
          ./scripts/feeds update -f golang
          ./scripts/feeds install -a -f golang
          # 验证清理结果（可选，便于排查）
          echo "=== Golang清理结果验证 ==="
          find $OPENWRT_PATH -name "go" -type f -exec ls -l {} \; || echo "无残留的go可执行文件"

      - name: 运行一键部署脚本
        run: |
          cd $OPENWRT_PATH
          chmod +x $GITHUB_WORKSPACE/builddir/$DIY_P1_SH
          $GITHUB_WORKSPACE/builddir/$DIY_P1_SH

      - name: softethervpn
        id: softethervpn
        if: env.UPLOAD_SOFTETHERVPN == 'true' && !cancelled()
        run: |
          cd ${{ github.workspace }}/openwrt/feeds/packages/net/
          rm -rf softethervpn*
          cp -r ${{ github.workspace }}/builddir/softethervpn .
          cp -r ${{ github.workspace }}/builddir/softethervpn5 .

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: 下载 package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 导出并上传.config配置文件
        id: upload_config
        run: |
          cd openwrt
          if [ -f ".config" ]; then
            CONFIG_NAME="openwrt_config_$(date +%Y%m%d_%H%M%S).config"
            cp .config $GITHUB_WORKSPACE/$CONFIG_NAME
            echo "::set-output name=CONFIG_PATH::$GITHUB_WORKSPACE/$CONFIG_NAME"
            echo "::set-output name=status::success"
          else
            echo "::set-output name=status::failed"
          fi

      - name: 上传.config到directory
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Config_File
          path: ${{ steps.upload_config.outputs.CONFIG_PATH }}
          retention-days: 7

      - name: 开始编译固件
        id: compile
        run: |
          cd openwrt
          export CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/ccache
          export USE_CCACHE=1
          export CFLAGS="-Wno-format-nonliteral $CFLAGS"
          export CXXFLAGS="-Wno-format-nonliteral $CXXFLAGS"
          make -j2 CCACHE=1 || make -j1 CCACHE=1 V=s
          echo "::set-output name=status::success"

      - name: 搜索固件
        run: |
          cd openwrt/bin/
          find . -name "*squashfs*"

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/
          cd $(find . -name "*squashfs*"  | head -n 1 | xargs dirname)
          ls
          rm -rf packages
          find . -name "*ext4*" |xargs rm -rf
          find . -name "*root*" |xargs rm -rf
          FIRMWARE_NAME=$(date +%Y.%m.%d.%H)_OpenWrt_default.tar.gz
          tar czvf $FIRMWARE_NAME config.buildinfo *.img.gz
          ls | grep -v $FIRMWARE_NAME | xargs rm -rf
          ls
          echo "::set-output name=FIRMWARE::$PWD"
          echo "::set-output name=FIRMWARE_NAME::$FIRMWARE_NAME"
          echo "::set-output name=status::success"

      - name: 上传到 directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware_default
          path: ${{ steps.organize.outputs.FIRMWARE }}
          retention-days: 7
