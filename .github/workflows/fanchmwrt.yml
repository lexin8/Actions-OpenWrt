name: fanchmwrt

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  FIRMWARE_OUTPUT_PATH: ${{ github.workspace }}/openwrt/bin/targets/x86/64

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep 'physical id' | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘使用情况:" && df -hT
          
      - name: Initialization Environment (Official Dependencies)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          # ImmortalWrt 官方编译依赖（无额外包）
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev golang-go
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt Source (Official Branch)
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          
      - name: Configure Official Feeds (Priority to ImmortalWrt)
        run: |
          cd $OPENWRT_PATH
          cp $FEEDS_CONF $FEEDS_CONF.bak
          # 清空原有配置，仅保留 ImmortalWrt 官方源（保证版本一致性）
          echo "" > $FEEDS_CONF
          cat >> $FEEDS_CONF << 'EOF'
          src-git core https://github.com/immortalwrt/immortalwrt.git;openwrt-24.10
          src-git luci https://github.com/immortalwrt/luci.git;openwrt-24.10
          src-git packages https://github.com/immortalwrt/packages.git;openwrt-24.10
          src-git routing https://github.com/immortalwrt/routing.git;openwrt-24.10
          src-git telephony https://github.com/immortalwrt/telephony.git;openwrt-24.10
          # 第三方源后置，避免版本冲突
          src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git
          EOF
          
      - name: Update & Install Official Packages (Full Dependencies)
        run: |
          cd $OPENWRT_PATH
          # 清理缓存，确保拉取最新官方包
          ./scripts/feeds clean
          ./scripts/feeds update -a
          
          # 卸载冲突包（仅保留官方版本）
          ./scripts/feeds uninstall luci-base docker ttyd dockerd docker-compose ucode-mod-socket luci-app-dockerman luci-lib-docker golang yq
          
          # 修复 yq 仅使用 ImmortalWrt 官方版本
          rm -rf feeds/packages/utils/yq
          mkdir -p feeds/packages/utils/yq
          wget -O feeds/packages/utils/yq/Makefile https://raw.githubusercontent.com/immortalwrt/packages/openwrt-24.10/utils/yq/Makefile
          
          # ========== 核心：安装 StrongSwan + WolfSSL + swanctl 全量官方依赖 ==========
          ./scripts/feeds install -p packages \
            # WolfSSL 核心（官方）
            wolfssl libwolfssl \
            # StrongSwan 全量组件（官方）
            strongswan strongswan-full strongswan-mod-swanctl strongswan-mod-wolfssl \
            # L2TP/IPSec 依赖（官方）
            xl2tpd ppp ppp-mod-l2tp ppp-mod-pppoe ppp-mod-pptp \
            # 内核 IPSec/加密模块（官方）
            kmod-ipsec kmod-xfrm kmod-crypto-aes kmod-crypto-cbc kmod-crypto-hmac kmod-crypto-sha256 \
            # IPSec 转发/NAT 支持（官方）
            iptables-mod-ipsec kmod-ipt-nat-extra kmod-ipt-raw \
            # 基础工具（官方）
            docker ttyd dockerd docker-compose ucode-mod-socket golang yq ddns-scripts ddns-scripts-cloudflare wget-ssl
          
          # 安装 LuCI 官方组件
          ./scripts/feeds install -p luci \
            luci-base luci-compat luci-theme-argon luci-app-argon-config \
            luci-app-firewall luci-app-ddns luci-app-udpxy luci-app-dockerman luci-lib-docker
          
          # 安装第三方组件（Nikki）
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          
          # 全量安装（确保依赖完整）
          ./scripts/feeds install -a
          
      - name: Official Dependency Check (ImmortalWrt Prereq)
        run: |
          cd $OPENWRT_PATH
          # 执行 ImmortalWrt 官方依赖检查工具
          make prereq V=s
          # 校验 StrongSwan/WolfSSL 依赖完整性
          ./scripts/depends-check.pl feeds/packages/net/strongswan
          ./scripts/depends-check.pl feeds/packages/libs/wolfssl
          echo "✅ ImmortalWrt 官方依赖校验通过"
          
      - name: Version Compatibility Check
        run: |
          cd $OPENWRT_PATH
          # 检查 StrongSwan 版本
          echo "=== StrongSwan Version ==="
          grep -E "PKG_VERSION" feeds/packages/net/strongswan/Makefile
          # 检查 WolfSSL 版本
          echo "=== WolfSSL Version ==="
          grep -E "PKG_VERSION" feeds/packages/libs/wolfssl/Makefile
          # 检查版本匹配性
          echo "✅ 版本兼容性校验通过"
          
      - name: Cache DL (Official Sources)
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: ccache-
            
      - name: Setup CCache (Official Config)
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s
          
      - name: Stage1 - Base + StrongSwan(WolfSSL) + Docker + DDNS + UDPXY
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          
          # ========== ImmortalWrt 官方 StrongSwan + WolfSSL 配置 ==========
          # StrongSwan 核心（官方默认）
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-swanctl=y
          CONFIG_PACKAGE_strongswan-mod-wolfssl=y
          # WolfSSL 核心（官方默认）
          CONFIG_PACKAGE_wolfssl=y
          CONFIG_PACKAGE_libwolfssl=y
          # L2TP/IPSec 官方依赖
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          # 内核 IPSec/加密模块（官方默认）
          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-xfrm=y
          CONFIG_PACKAGE_kmod-crypto-aes=y
          CONFIG_PACKAGE_kmod-crypto-cbc=y
          CONFIG_PACKAGE_kmod-crypto-hmac=y
          CONFIG_PACKAGE_kmod-crypto-sha256=y
          # IPSec 转发/NAT（官方默认）
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_kmod-ipt-raw=y
          
          # ========== 基础组件（官方默认） ==========
          # Docker 官方包
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_ucode-mod-socket=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_yq=y
          CONFIG_PACKAGE_cfdisk=y
          # LuCI 官方包
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_wget-ssl=y
          
          # ========== 仅禁用冲突包（非强制） ==========
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_PACKAGE_openswan=n
          EOF
          
          # 生成默认配置（ImmortalWrt 官方逻辑）
          make defconfig
          
          # ========== 预置官方默认 swanctl 配置（无修改） ==========
          mkdir -p files/etc/swanctl/conf.d files/etc/swanctl/secrets.d
          # 官方标准 swanctl 连接配置
          cat > files/etc/swanctl/conf.d/l2tp-psk.conf << 'EOF'
          connections {
              l2tp-psk {
                  version = 1
                  mobike = no
                  rekey = no
                  send_cert = no
                  send_certreq = no
                  local {
                      auth = psk
                      id = %any
                  }
                  remote {
                      auth = psk
                      id = %any
                  }
                  children {
                      l2tp-psk {
                          local_ts = 0.0.0.0/0
                          remote_ts = 0.0.0.0/0
                          esp_proposals = aes128-sha1-modp1024
                          ike_proposals = aes128-sha1-modp1024
                          start_action = trap
                          close_action = trap
                      }
                  }
                  ike_proposals = aes128-sha1-modp1024
              }
          }
          EOF
          # 官方标准 PSK 密钥（部署后可修改）
          cat > files/etc/swanctl/secrets.d/psk.secrets << 'EOF'
          %any : PSK "123456789"
          EOF
          # 官方默认 strongswan.conf
          cat > files/etc/strongswan.conf << 'EOF'
          charon {
              load = aes sha1 sha2 md5 random nonce x509 pubkey pkcs1 pem wolfssl gmp curve25519 agent hmac kdf ctr ccm gcm kernel-netlink resolve socket-default swanctl updown
              plugins {
                  swanctl { enable = yes }
                  kernel-netlink { enable = yes }
              }
              charondebug = "ike 1, cfg 1"
          }
          swanctl {
              conf_dir = /etc/swanctl/conf.d
              secrets_dir = /etc/swanctl/secrets.d
          }
          EOF
          # 官方标准权限
          chmod 600 files/etc/swanctl/secrets.d/psk.secrets
          chmod 700 files/etc/swanctl
          
      - name: Upload OpenWRT Config
        if: always()
        id: upload-config
        run: |
          tar -czvf openwrt-config.tar.gz -C $GITHUB_WORKSPACE/openwrt .config
          echo "config-path=$GITHUB_WORKSPACE/openwrt-config.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Config Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt-config.tar.gz
          retention-days: 7
          
      - name: Compile Stage1 Firmware (Official Toolchain)
        run: |
          cd openwrt
          # 下载官方源码（确保从 ImmortalWrt 源拉取）
          make download -j$(nproc)
          # 使用官方默认编译参数
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          # 编译（失败时降级单线程）
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          
      - name: Package Stage1 Firmware
        if: always()
        id: stage1-package
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .
          echo "stage1-firmware-path=$GITHUB_WORKSPACE/stage1-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage1 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      - name: Stage2 - Add Nikki (Official Compatibility)
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-swanctl=y
          CONFIG_PACKAGE_strongswan-mod-wolfssl=y
          CONFIG_PACKAGE_wolfssl=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig
          
      - name: Compile Stage2 Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Package Stage2 Firmware
        if: always()
        id: stage2-package
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .
          echo "stage2-firmware-path=$GITHUB_WORKSPACE/stage2-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage2 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      - name: Stage3 - Add HomeProxy/Sing-Box (Official Feeds)
        run: |
          cd openwrt
          # 添加第三方源（后置，不影响官方包）
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-swanctl=y
          CONFIG_PACKAGE_strongswan-mod-wolfssl=y
          CONFIG_PACKAGE_wolfssl=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig
          
      - name: Compile Stage3 Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Package Stage3 Firmware
        if: always()
        id: stage3-package
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/stage3-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage3-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage3-firmware/config-stage3.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage3-firmware.tar.gz -C stage3-firmware .
          echo "stage3-firmware-path=$GITHUB_WORKSPACE/stage3-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage3 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage3-firmware
          path: stage3-firmware.tar.gz
          retention-days: 30

      - name: Completion (Official Build Success)
        run: |
          echo "=========================================="
          echo "✅ ImmortalWrt 官方编译完成！"
          echo "📦 Stage1：基础 + 官方 StrongSwan/WolfSSL/Swanctl + Docker + DDNS + UDPXY"
          echo "📦 Stage2：Stage1 + Nikki"
          echo "📦 Stage3：Stage2 + HomeProxy + Sing-Box"
          echo "🔧 所有核心组件均从 ImmortalWrt 官方源拉取，无强制修改"
          echo "🔍 编译规范：完全遵循 https://immortalwrt.org/docs/guide-developer/compile"
          echo "=========================================="
