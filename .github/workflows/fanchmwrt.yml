name: fanchmwrt-build

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH调试（true/false）'
        required: true
        default: 'false'
        type: boolean

env:
  # 基础配置
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  TZ: Asia/Shanghai
  # 第三方源
  PASSWALL_MAIN_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall
  PASSWALL_PACKAGES_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall-packages
  HOMEPROXY_FEED: https://github.com/immortalwrt/homeproxy
  DOCKERMAN_FEED: https://github.com/kenzok8/openwrt-packages
  GOLANG_REPO: https://github.com/kenzok8/golang
  GOLANG_BRANCH: 1.26
  # 步骤开关
  STEP1_BASE: true
  STEP2_COMMON: true
  STEP3_DOCKER: true
  STEP4_NIKKI: true
  STEP5_PROXY: true
  # 通用编译配置（严格格式）
  COMMON_CONFIG: |
    CONFIG_TARGET_x86=y
    CONFIG_TARGET_x86_64=y
    CONFIG_TARGET_x86_64_Generic=y
    CONFIG_TARGET_KERNEL_PARTSIZE=60
    CONFIG_TARGET_ROOTFS_TARGZ=y
    CONFIG_TARGET_EFI_IMAGES=y
    CONFIG_PACKAGE_luci=y
    CONFIG_PACKAGE_luci-base=y
    CONFIG_PACKAGE_luci-mod-admin-full=y
    CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
    CONFIG_PACKAGE_luci-theme-argon=y
    CONFIG_PACKAGE_luci-theme-argon-config=y
    CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
    CONFIG_PACKAGE_wget=y
    CONFIG_PACKAGE_curl=y
    CONFIG_PACKAGE_openssh-sftp-server=y
    CONFIG_GOLANG_VERSION_1_26=y
    CONFIG_GOLANG_BASE_VERSION="1.26"
    # 关闭指定无用插件（严格格式）
    # CONFIG_DEFAULT_luci-app-arpbind is not set
    # CONFIG_PACKAGE_luci-app-autoreboot is not set
    # CONFIG_PACKAGE_luci-app-nlbwmon is not set
    # CONFIG_PACKAGE_luci-app-samba4 is not set
    # CONFIG_PACKAGE_luci-app-samba is not set
    # CONFIG_PACKAGE_luci-app-vlmcsd is not set
    # CONFIG_PACKAGE_luci-app-wol is not set
    # CONFIG_PACKAGE_luci-app-zerotier is not set
    # CONFIG_PACKAGE_luci-app-strongswan-swanctl is not set

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 1. 环境初始化
      - name: 1. 环境初始化
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 核心函数定义
          cat > /tmp/funcs.sh << 'EOF'
          # 编译验证函数
          build_verify() {
            local STEP=$1
            local STEP_NUM=$2
            if find $OPENWRT_PATH/bin/targets/x86/64 -name "*combined-efi*" -type f | grep -q .; then
              echo "STEP${STEP_NUM}_SUCCESS=true" >> $GITHUB_ENV
              echo "LAST_SUCCESS_STEP_NUM=${STEP_NUM}" >> $GITHUB_ENV
            else
              echo "STEP${STEP_NUM}_SUCCESS=false" >> $GITHUB_ENV
            fi
          }

          # 配置生成函数
          gen_config() {
            local ROOT_SIZE=$1
            local CUSTOM_CFG=$2
            cd $OPENWRT_PATH
            echo "$COMMON_CONFIG" > .config
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${ROOT_SIZE}" >> .config
            echo "${CUSTOM_CFG}" >> .config
            make defconfig && make download -j$(nproc)
            find dl -size -1024c -exec rm -f {} \;
          }

          # 打包函数
          package_fw() {
            local STEP_NUM=$1
            local TYPE=$2
            local NAME=$3
            TIME=$(date +"%y%m%d_%H%M")
            PKG_NAME="openwrt_${TYPE}_v${STEP_NUM}_${TIME}.tar.gz"
            UPLOAD_NAME="${STEP_NUM}-${NAME}_${TIME}"
            
            mkdir -p /tmp/fw && rm -rf /tmp/fw/*
            find $OPENWRT_PATH/bin/targets/x86/64 -name "*combined-efi*" -type f -exec cp {} /tmp/fw/ \;
            find $OPENWRT_PATH -name "config.buildinfo" -type f -exec cp {} /tmp/fw/ \;
            tar -zcvf /tmp/${PKG_NAME} -C /tmp/fw .
            
            echo "FINAL_PKG_PATH=/tmp/${PKG_NAME}" >> $GITHUB_ENV
            echo "FINAL_UPLOAD_NAME=${UPLOAD_NAME}" >> $GITHUB_ENV
          }
          EOF

          # 加载函数
          source /tmp/funcs.sh

          # 系统配置
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get update && sudo -E apt-get install -y $(curl -fsSL is.gd/depends_ubuntu_2204)
          sudo -E apt-get autoremove -y && sudo -E apt-get clean -y
          sudo timedatectl set-timezone "$TZ"
          sudo fallocate -l 16G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile

          # 初始化环境变量
          echo "LAST_SUCCESS_STEP_NUM=0" >> $GITHUB_ENV
          echo "FINAL_PKG_PATH=" >> $GITHUB_ENV

      # 2. 源码处理
      - name: 2. 源码处理
        run: |
          source /tmp/funcs.sh
          git clone --depth=1 $REPO_URL openwrt
          cd openwrt && echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          ./scripts/feeds update -a

      # 3. 冲突清理
      - name: 3. 冲突清理
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          rm -rf feeds/luci/applications/luci-app-mosdns 2>/dev/null
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns} 2>/dev/null
          rm -rf feeds/packages/utils/v2dat feeds/packages/lang/golang 2>/dev/null

      # 4. 依赖适配
      - name: 4. 依赖适配
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          git clone --depth=1 $GOLANG_REPO -b $GOLANG_BRANCH feeds/packages/lang/golang
          ./scripts/feeds install -a

      # 5. SSH调试
      - name: 5. SSH调试
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # 6. 步骤1-基础固件配置
      - name: 6. 步骤1-基础固件配置
        if: env.STEP1_BASE == 'true'
        run: |
          source /tmp/funcs.sh
          gen_config "512" ""

      # 7. 步骤1-基础固件编译
      - name: 7. 步骤1-基础固件编译
        if: env.STEP1_BASE == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP1" "1"

      # 8. 步骤2-常用组件配置
      - name: 8. 步骤2-常用组件配置
        if: env.STEP2_COMMON == 'true' && env.STEP1_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          CUSTOM_CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          EOF
          )
          gen_config "640" "${CUSTOM_CFG}"

      # 9. 步骤2-常用组件编译
      - name: 9. 步骤2-常用组件编译
        if: env.STEP2_COMMON == 'true' && env.STEP1_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP2" "2"

      # 10. 步骤3-Dockerman配置
      - name: 10. 步骤3-Dockerman配置
        if: env.STEP3_DOCKER == 'true' && env.STEP2_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          sed -i "1i src-git kenzok8 $DOCKERMAN_FEED;main" feeds.conf.default
          ./scripts/feeds update -a && rm -rf feeds/luci/applications/luci-app-docker 2>/dev/null
          ./scripts/feeds install -a
          CUSTOM_CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          EOF
          )
          gen_config "800" "${CUSTOM_CFG}"

      # 11. 步骤3-Dockerman编译
      - name: 11. 步骤3-Dockerman编译
        if: env.STEP3_DOCKER == 'true' && env.STEP2_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP3" "3"

      # 12. 步骤4-Nikki配置
      - name: 12. 步骤4-Nikki配置
        if: env.STEP4_NIKKI == 'true' && env.STEP3_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
          ./scripts/feeds update -a && ./scripts/feeds install -a
          CUSTOM_CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          EOF
          )
          gen_config "960" "${CUSTOM_CFG}"

      # 13. 步骤4-Nikki编译
      - name: 13. 步骤4-Nikki编译
        if: env.STEP4_NIKKI == 'true' && env.STEP3_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP4" "4"

      # 14. 步骤5-代理组件配置
      - name: 14. 步骤5-代理组件配置
        if: env.STEP5_PROXY == 'true' && env.STEP4_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          sed -i "2i src-git passwall_packages $PASSWALL_PACKAGES_REPO;main" feeds.conf.default
          sed -i "3i src-git passwall_main $PASSWALL_MAIN_REPO;main" feeds.conf.default
          sed -i "4i src-git homeproxy $HOMEPROXY_FEED;main" feeds.conf.default
          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,hysteria,tuic-client} 2>/dev/null
          ./scripts/feeds update passwall_packages passwall_main homeproxy
          ./scripts/feeds install -a -p passwall_packages
          ./scripts/feeds install -a -p passwall_main
          ./scripts/feeds install -a -p homeproxy
          CUSTOM_CFG=$(cat <<'EOF'
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_udpxy=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_mkfs.ext4=y
          CONFIG_PACKAGE_mkfs.vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_geoview=y
          CONFIG_PACKAGE_luci-i18n-geoview-zh-cn=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
          CONFIG_PACKAGE_xray-core=y
          CONFIG_PACKAGE_v2ray-core=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_hysteria=y
          CONFIG_PACKAGE_tuic-client=y
          CONFIG_PACKAGE_smartdns=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_ucode-mod-digest=y
          CONFIG_PACKAGE_rust-bindgen-host=y
          EOF
          )
          gen_config "1600" "${CUSTOM_CFG}"

      # 15. 步骤5-代理组件编译
      - name: 15. 步骤5-代理组件编译
        if: env.STEP5_PROXY == 'true' && env.STEP4_SUCCESS == 'true'
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s
          build_verify "STEP5" "5"

      # 16. 步骤6-统一打包
      - name: 16. 步骤6-统一打包
        if: env.LAST_SUCCESS_STEP_NUM > 0
        run: |
          source /tmp/funcs.sh
          case $LAST_SUCCESS_STEP_NUM in
            1) package_fw "1" "base" "基础固件" ;;
            2) package_fw "2" "common" "常用组件固件" ;;
            3) package_fw "3" "docker" "Dockerman固件" ;;
            4) package_fw "4" "nikki" "Nikki固件" ;;
            5) package_fw "5" "full" "完整固件" ;;
          esac

      # 17. 步骤7-固件上传
      - name: 17. 步骤7-固件上传
        if: env.FINAL_PKG_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_UPLOAD_NAME }}
          path: ${{ env.FINAL_PKG_PATH }}
          retention-days: 7

      # 18. 步骤8-错误排查
      - name: 18. 步骤8-错误排查
        if: failure()
        run: |
          source /tmp/funcs.sh
          cd $OPENWRT_PATH
          echo "===== 编译错误日志 ====="
          cat build.log | grep -E "error|conflict|fatal|version mismatch|no such file" || echo "无关键错误"
          echo "===== 固件生成检查 ====="
          find $OPENWRT_PATH/bin/targets/x86/64 -name "*combined-efi*" -type f || echo "未生成固件文件"
          echo "===== 最后成功步骤 ====="
          echo "LAST_SUCCESS_STEP_NUM: $LAST_SUCCESS_STEP_NUM"
