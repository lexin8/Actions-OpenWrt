name: fanchmwrt

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: openwrt-24.10
  REPO_BRANCH2: openwrt-23.05
  STRONGSWAN_REPO: https://github.com/immortalwrt/packages
  STRONGSWAN_BRANCH: openwrt-24.10
  STRONGSWAN_PATH: net/strongswan
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  FIRMWARE_OUTPUT_PATH: ${{ github.workspace }}/openwrt/bin/targets/x86/64

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep 'physical id' | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          # 补充 StrongSwan 编译依赖
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev golang-go libgmp-dev libgcrypt20-dev libcurl4-openssl-dev libsqlite3-dev libldap2-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096  # 增大交换空间，避免编译内存不足
          root-reserve-mb: 2048
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt || git clone --depth 1 -b $REPO_BRANCH $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          
      - name: Replace StrongSwan with Full Version
        run: |
          cd $OPENWRT_PATH
          # 删除原有 StrongSwan 目录（避免冲突）
          rm -rf feeds/packages/net/strongswan package/feeds/packages/strongswan
          # 克隆完整版 StrongSwan
          mkdir -p package/custom/strongswan
          git clone --depth 1 -b $STRONGSWAN_BRANCH $STRONGSWAN_REPO temp-packages
          cp -rf temp-packages/$STRONGSWAN_PATH/* package/custom/strongswan/
          rm -rf temp-packages
          # 修改 StrongSwan Makefile：启用脚本支持（核心修复）
          sed -i 's/--disable-scripts/--enable-scripts/g' package/custom/strongswan/Makefile
          # 补充 L2TP 内核依赖
          sed -i '/DEPENDS:= +libpthread +ip \\/a \ \t+kmod-l2tp +kmod-l2tp-ip +kmod-pppol2tp \\\n\t+kmod-ipt-raw +kmod-ipt-nat-extra' package/custom/strongswan/Makefile
          # 确保 ipsec.init 脚本存在
          mkdir -p package/custom/strongswan/files
          wget -O package/custom/strongswan/files/ipsec.init https://raw.githubusercontent.com/openwrt/packages/master/net/strongswan/files/ipsec.init
          chmod +x package/custom/strongswan/files/ipsec.init
          # 验证文件
          ls -la package/custom/strongswan/Makefile && echo "✅ StrongSwan Makefile 修复完成"
          
      - name: Add Feeds (immortalwrt + nikki + fix docker/yq)
        run: |
          cd $OPENWRT_PATH
          cp $FEEDS_CONF $FEEDS_CONF.bak
          # 清理原有 feeds 避免冲突
          echo "src-git immortalwrt_core https://github.com/immortalwrt/immortalwrt.git;$REPO_BRANCH package" > $FEEDS_CONF
          echo "src-git immortalwrt_luci https://github.com/immortalwrt/luci.git;openwrt-24.10 priority=100" >> $FEEDS_CONF
          echo "src-git immortalwrt_pkgs https://github.com/immortalwrt/packages.git;openwrt-24.10 priority=99" >> $FEEDS_CONF
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git" >> $FEEDS_CONF
          echo "src-git small https://github.com/kenzok8/small" >> $FEEDS_CONF
          # 更新 feeds 并修复依赖
          ./scripts/feeds clean
          ./scripts/feeds update -a
          # 卸载冲突组件
          ./scripts/feeds uninstall luci-base docker ttyd dockerd docker-compose ucode-mod-socket luci-app-dockerman luci-lib-docker golang yq strongswan
          # 修复 yq 依赖
          rm -rf feeds/packages/utils/yq
          mkdir -p feeds/packages/utils/yq
          wget -O feeds/packages/utils/yq/Makefile https://raw.githubusercontent.com/immortalwrt/packages/openwrt-24.10/utils/yq/Makefile
          # 重新安装核心组件
          ./scripts/feeds install -p immortalwrt_luci luci-base luci-app-dockerman luci-lib-docker
          ./scripts/feeds install -p immortalwrt_pkgs docker ttyd dockerd docker-compose ucode-mod-socket golang yq
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          ./scripts/feeds install -a
          
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            dl-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache-
            
      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true -o cache_dir=$CCACHE_DIR
          ccache -s
          
      - name: Fix Compilation Flags (StrongSwan 兼容)
        run: |
          cd $OPENWRT_PATH
          # 修复 StrongSwan 编译的 Fortify 冲突
          echo "CFLAGS=-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -O2 -march=native" >> .bashrc
          echo "CXXFLAGS=-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -O2 -march=native" >> .bashrc
          echo "LDFLAGS=-L/usr/lib/x86_64-linux-gnu -lssp" >> .bashrc
          source .bashrc
          echo "✅ 编译参数修复完成"
          
      - name: Stage1 - Base + Strongswan + Docker + DDNS + UDPXY
        run: |
          cd $OPENWRT_PATH
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          # StrongSwan 完整版（核心）
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-ipsec=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-mod-stroke=y
          CONFIG_PACKAGE_strongswan-mod-updown=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          # L2TP/IPsec 依赖
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          # 网络/防火墙
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_KMOD_IP_TABLES=y
          CONFIG_KMOD_IP_NAT=y
          CONFIG_KMOD_IP_CONNTRACK=y
          CONFIG_KMOD_CRYPTO_AES=y
          CONFIG_KMOD_CRYPTO_CBC=y
          CONFIG_KMOD_CRYPTO_HMAC=y
          CONFIG_KMOD_CRYPTO_SHA256=y
          CONFIG_KMOD_XFRM=y
          CONFIG_KMOD_IPSEC=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          # Docker 完整组件
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_ucode-mod-socket=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_yq=y
          CONFIG_PACKAGE_cfdisk=y
          # 基础 LuCI 组件
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_wget-ssl=y
          # 禁用冲突组件
          CONFIG_PACKAGE_wolfssl=n
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_PACKAGE_openswan=n
          EOF
          make defconfig
          
      - name: Upload OpenWRT Config
        if: always()
        id: upload-config
        run: |
          tar -czvf openwrt-config.tar.gz -C $GITHUB_WORKSPACE/openwrt .config
          echo "config-path=$GITHUB_WORKSPACE/openwrt-config.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Config Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt-config.tar.gz
          retention-days: 7
          
      - name: Compile Stage1 Firmware
        run: |
          cd $OPENWRT_PATH
          # 预下载依赖
          make download -j$(nproc)
          # 启用 CCACHE 加速编译
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          # 先尝试多核编译，失败则单核
          make -j$(($(nproc)-1)) V=s || make -j1 V=s
          ccache -s
          
      - name: Package Stage1 Firmware
        if: always()
        id: stage1-package
        run: |
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          # 复制固件文件
          cp -v $FIRMWARE_OUTPUT_PATH/*.img.gz $FIRMWARE_OUTPUT_PATH/*.manifest $FIRMWARE_OUTPUT_PATH/config.buildinfo $FIRMWARE_OUTPUT_PATH/sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          # 复制配置文件
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          # 打包
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .
          echo "stage1-firmware-path=$GITHUB_WORKSPACE/stage1-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage1 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      - name: Stage2 - Add Nikki
        run: |
          cd $OPENWRT_PATH
          # 追加 Nikki 配置，保留 StrongSwan
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          # 强制禁用冲突组件
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_wolfssl=n
          EOF
          make defconfig
          
      - name: Compile Stage2 Firmware
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(($(nproc)-1)) V=s || make -j1 V=s
          
      - name: Package Stage2 Firmware
        if: always()
        id: stage2-package
        run: |
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v $FIRMWARE_OUTPUT_PATH/*.img.gz $FIRMWARE_OUTPUT_PATH/*.manifest $FIRMWARE_OUTPUT_PATH/config.buildinfo $FIRMWARE_OUTPUT_PATH/sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .
          echo "stage2-firmware-path=$GITHUB_WORKSPACE/stage2-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage2 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      - name: Stage3 - Add HomeProxy/Sing-Box
        run: |
          cd $OPENWRT_PATH
          # 追加 HomeProxy 配置
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          # 禁用冲突
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_wolfssl=n
          EOF
          make defconfig
          
      - name: Compile Stage3 Firmware
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(($(nproc)-1)) V=s || make -j1 V=s
          
      - name: Package Stage3 Firmware
        if: always()
        id: stage3-package
        run: |
          mkdir -p $GITHUB_WORKSPACE/stage3-firmware
          cp -v $FIRMWARE_OUTPUT_PATH/*.img.gz $FIRMWARE_OUTPUT_PATH/*.manifest $FIRMWARE_OUTPUT_PATH/config.buildinfo $FIRMWARE_OUTPUT_PATH/sha256sums $GITHUB_WORKSPACE/stage3-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage3-firmware/config-stage3.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage3-firmware.tar.gz -C stage3-firmware .
          echo "stage3-firmware-path=$GITHUB_WORKSPACE/stage3-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage3 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage3-firmware
          path: stage3-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "📦 Stage1：基础 + 完整版 Strongswan + Docker/Dockerman + DDNS + UDPXY"
          echo "📦 Stage2：Stage1 + Nikki"
          echo "📦 Stage3：Stage2 + HomeProxy + Sing-Box"
          echo "🔑 StrongSwan 特性：完整 ipsec 命令 + init.d 服务 + L2TP/IPsec 兼容安卓/iOS"
          echo "=========================================="
