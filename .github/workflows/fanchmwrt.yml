name: fanchmwrt

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: openwrt-24.10
  REPO_BRANCH2: openwrt-23.05
  STRONGSWAN_REPO: https://github.com/immortalwrt/packages
  STRONGSWAN_BRANCH: openwrt-24.10
  STRONGSWAN_PATH: net/strongswan
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  FIRMWARE_OUTPUT_PATH: ${{ github.workspace }}/openwrt/bin/targets/x86/64

jobs:
  Build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep 'physical id' | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev libncursesw5-dev swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev golang-go libwolfssl-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          
      - name: Add ImmortalWrt Official Feeds (保留原有 + 新增全量依赖)
        run: |
          cd $OPENWRT_PATH
          # 备份原有 feeds.conf.default，避免删除
          cp $FEEDS_CONF $FEEDS_CONF.bak
          # 保留原有内容 + 新增 ImmortalWrt 官方源（拉取 StrongSwan/WolfSSL/swanctl 依赖）
          cat >> $FEEDS_CONF << 'EOF'
          # ImmortalWrt 官方源 - 拉取 StrongSwan/WolfSSL/swanctl 全量依赖
          src-git immortalwrt_core https://github.com/immortalwrt/immortalwrt.git;openwrt-24.10
          src-git immortalwrt_pkgs https://github.com/immortalwrt/packages.git;openwrt-24.10 priority=99
          src-git immortalwrt_luci https://github.com/immortalwrt/luci.git;openwrt-24.10 priority=100
          EOF
          # 拉取 StrongSwan 源码（确保全量模块）
          mkdir -p packages/net
          git clone --depth 1 -b $STRONGSWAN_BRANCH $STRONGSWAN_REPO temp-packages
          mv temp-packages/$STRONGSWAN_PATH packages/net/
          rm -rf temp-packages
          ls -la packages/net/strongswan || echo "⚠️ StrongSwan 拉取失败，请检查仓库路径"
          
      - name: Update & Install Feeds (全量依赖安装)
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds clean
          ./scripts/feeds update -a
          # 卸载冲突组件
          ./scripts/feeds uninstall luci-base docker ttyd dockerd docker-compose ucode-mod-socket luci-app-dockerman luci-lib-docker golang yq
          # 修复 yq 依赖
          rm -rf feeds/packages/utils/yq
          mkdir -p feeds/packages/utils/yq
          wget -O feeds/packages/utils/yq/Makefile https://raw.githubusercontent.com/immortalwrt/packages/openwrt-24.10/utils/yq/Makefile
          # 安装 ImmortalWrt 官方组件（含 StrongSwan/WolfSSL/swanctl）
          ./scripts/feeds install -p immortalwrt_pkgs strongswan-full strongswan-mod-swanctl strongswan-mod-wolfssl wolfssl libwolfssl xl2tpd ppp ppp-mod-l2tp kmod-ipsec kmod-xfrm kmod-crypto-aes kmod-crypto-cbc kmod-crypto-hmac kmod-crypto-sha256 iptables-mod-ipsec kmod-ipt-nat-extra
          # 安装其他依赖
          ./scripts/feeds install -p immortalwrt_luci luci-base luci-app-dockerman luci-lib-docker
          ./scripts/feeds install -p immortalwrt_pkgs docker ttyd dockerd docker-compose ucode-mod-socket golang yq
          ./scripts/feeds install nikki luci-app-nikki luci-i18n-nikki-zh-cn
          ./scripts/feeds install -a
          
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('openwrt/feeds.conf.default') }}

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: ccache-
            
      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s
          
      - name: Fix Toolchain Compilation
        run: |
          export CFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export CXXFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -lssp"
          echo "工具链修复完成"
          
      - name: Stage1 - Base + Strongswan/WolfSSL/swanctl + Docker + DDNS + UDPXY
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=700
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_DEVEL=y
          CONFIG_BROKEN=y
          # StrongSwan + WolfSSL + swanctl 全量组件
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-swanctl=y
          CONFIG_PACKAGE_strongswan-mod-wolfssl=y
          CONFIG_PACKAGE_wolfssl=y
          CONFIG_PACKAGE_libwolfssl=y
          # L2TP/IPSec 依赖
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-l2tp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          # 内核模块（IPSec/XFRM/加密）
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-nat-extra=y
          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-xfrm=y
          CONFIG_PACKAGE_kmod-crypto-aes=y
          CONFIG_PACKAGE_kmod-crypto-cbc=y
          CONFIG_PACKAGE_kmod-crypto-hmac=y
          CONFIG_PACKAGE_kmod-crypto-sha256=y
          CONFIG_PACKAGE_kmod-ip-tables=y
          CONFIG_PACKAGE_kmod-ip-nat=y
          CONFIG_PACKAGE_kmod-ip-conntrack=y
          # 转发/NAT
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_iptables-mod-ipsec=y
          # Docker 全家桶
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_ucode-mod-socket=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_yq=y
          CONFIG_PACKAGE_cfdisk=y
          # 基础组件
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-udpxy=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_wget-ssl=y
          # 禁用冲突组件
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          CONFIG_PACKAGE_openconnect=n
          CONFIG_PACKAGE_openswan=n
          EOF
          make defconfig
          
      - name: Upload OpenWRT Config
        if: always()
        id: upload-config
        run: |
          tar -czvf openwrt-config.tar.gz -C $GITHUB_WORKSPACE/openwrt .config
          echo "config-path=$GITHUB_WORKSPACE/openwrt-config.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Config Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt-config.tar.gz
          retention-days: 7
          
      - name: Compile Stage1 Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          
      - name: Package Stage1 Firmware
        if: always()
        id: stage1-package
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/stage1-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage1-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage1-firmware/config-stage1.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage1-firmware.tar.gz -C stage1-firmware .
          echo "stage1-firmware-path=$GITHUB_WORKSPACE/stage1-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage1 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage1-firmware
          path: stage1-firmware.tar.gz
          retention-days: 30

      - name: Stage2 - Add Nikki
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-swanctl=y
          CONFIG_PACKAGE_strongswan-mod-wolfssl=y
          CONFIG_PACKAGE_strongswan-minimal=n
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig
          
      - name: Compile Stage2 Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Package Stage2 Firmware
        if: always()
        id: stage2-package
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/stage2-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage2-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage2-firmware/config-stage2.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage2-firmware.tar.gz -C stage2-firmware .
          echo "stage2-firmware-path=$GITHUB_WORKSPACE/stage2-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage2 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage2-firmware
          path: stage2-firmware.tar.gz
          retention-days: 30

      - name: Stage3 - Add HomeProxy/Sing-Box
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update small
          ./scripts/feeds install homeproxy luci-app-homeproxy sing-box
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_strongswan-full=y
          CONFIG_PACKAGE_strongswan-mod-swanctl=y
          CONFIG_PACKAGE_strongswan-mod-wolfssl=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_homeproxy=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_libreswan=n
          CONFIG_PACKAGE_luci-app-libreswan=n
          EOF
          make defconfig
          
      - name: Compile Stage3 Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Package Stage3 Firmware
        if: always()
        id: stage3-package
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/stage3-firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/stage3-firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/stage3-firmware/config-stage3.txt
          cd $GITHUB_WORKSPACE
          tar -czvf stage3-firmware.tar.gz -C stage3-firmware .
          echo "stage3-firmware-path=$GITHUB_WORKSPACE/stage3-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Stage3 Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-stage3-firmware
          path: stage3-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "📦 Stage1：基础 + Strongswan/WolfSSL/swanctl + Docker/Dockerman + DDNS + UDPXY"
          echo "📦 Stage2：Stage1 + Nikki"
          echo "📦 Stage3：Stage2 + HomeProxy + Sing-Box"
          echo "=========================================="
