name: FanchmWrt
on: workflow_dispatch
permissions:
  contents: read
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build_time.outputs.time }}
    steps:
      - name: Set build time
        id: build_time
        run: echo "time=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

  build-firmware:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: fanchmwrt-25.12.2

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git subversion libssl-dev gettext zlib1g-dev swig unzip rsync python3 wget file jq xxd quilt bison flex pkgconf libelf-dev

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add third-party feeds
        run: |
          cat >> feeds.conf.default << EOF
          src-git unblockneteasemusic https://github.com/UnblockNeteaseMusic/luci-app-unblockneteasemusic.git
          src-git openclash https://github.com/vernesong/OpenClash.git
          src-git dockerlib https://github.com/lisaac/luci-lib-docker.git
          EOF
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install nodejs ruby
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt install -y nodejs ruby ruby-dev

      - name: Auto fix 5 dependencies + golang
        run: |
          mkdir -p package/libs package/system package/network/utils
          git clone --depth 1 -b openwrt-25.12 https://github.com/openwrt/packages tmp/packages
          cp -rf tmp/packages/libs/libdevmapper package/libs/ 2>/dev/null || true
          cp -rf tmp/packages/utils/cgroupfs-mount package/system/ 2>/dev/null || true
          cp -rf tmp/packages/base/ca-bundle package/system/ 2>/dev/null || true
          cp -rf tmp/packages/network/iptables package/network/utils/ 2>/dev/null || true
          cp -rf tmp/packages/lang/golang package/libs/ 2>/dev/null || true
          rm -rf tmp/packages

      # 👇 👇 👇 你要的【完美第三方插件依赖检测】在这里 👇 👇 👇
      - name: Check third-party plugin dependencies (Makefile +LUCI_DEPENDS)
        run: |
          echo "================================================================"
          echo "🔍 第三方插件依赖检测（仅检查 feeds 拉取的插件）"
          echo "================================================================"

          FEEDS_LIST=$(./scripts/feeds list | awk '{print $1}')
          check_package() {
            local pkg="$1"
            if echo "$FEEDS_LIST" | grep -qx "$pkg"; then return 0; else return 1; fi
          }

          for feed in unblockneteasemusic openclash dockerlib; do
            for plugin_dir in feeds/$feed/luci-app-*; do
              [ -d "$plugin_dir" ] || continue
              plugin_name=$(basename "$plugin_dir")
              makefile="$plugin_dir/Makefile"

              echo -e "\n========================================================================"
              echo "📦 插件：$plugin_name"
              echo "📂 来源：feeds/$feed"
              echo "========================================================================"

              if [ ! -f "$makefile" ]; then echo "❌ 缺失 Makefile"; continue; fi

              # 👇 修复版：精准提取 DEPENDS:=+xxx 依赖
              depends=$(sed -n '/^DEPENDS:=/,/^$/p' "$makefile" | tr -d '\\' | tr -s ' ' '\n' | grep '^+' | sed 's/^+//g' | sort -u)

              if [ -z "$depends" ]; then
                echo "📌 未提取到依赖"
                continue
              fi

              echo "🧩 依赖组件检查结果："
              for pkg in $depends; do
                if check_package "$pkg"; then
                  echo "  ✅ $pkg"
                else
                  echo "  ❌ $pkg"
                fi
              done
            done
          done

          echo -e "\n================================================================"
          echo "✅ 所有第三方插件依赖检测完成"
          echo "================================================================"

      - name: Download packages
        run: make download -j$(nproc) || true

      - name: Build config
        run: |
          cat > .config << EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          CONFIG_PACKAGE_node=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_golang=y
          EOF
          make defconfig

      - name: Build (auto retry single thread on failure)
        run: |
          echo "🚀 开始多线程编译..."
          if ! make -j$(nproc); then
            echo -e "\n❌ 编译失败，切换单线程输出完整错误日志..."
            make clean
            make -j1 V=s
          fi

      - name: Collect firmware
        run: |
          mkdir -p firmware
          [ -d "bin/targets/x86_64" ] && cp -rf bin/targets/x86_64/* firmware/ 2>/dev/null

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-${{ needs.prepare.outputs.build_time }}
          path: firmware/

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
