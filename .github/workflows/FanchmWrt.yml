name: FanchmWrt

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 6'

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_URL2: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: openwrt-24.10
  FIRMWARE_NAME: immortalwrt-x86-64
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: 5G
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  FIRMWARE_OUTPUT_PATH: ${{ github.workspace }}/openwrt/bin/targets/x86/64

jobs:
  # ========== 构建 Homeproxy + Nikki + sing-box 固件 ==========
  build_homeproxy:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep 'physical id' | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
          
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils curl git subversion libelf-dev autoconf automake libtool autopoint device-tree-compiler swig pkg-config libmnl-dev libidn2-0-dev libcap-dev libseccomp-dev libnftnl-dev ccache libpam0g-dev liblzma-dev libev-dev golang-go
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"
          
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Clone fanchmwrt Source
        run: |
          git clone --depth 1 $REPO_URL2 openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          
      - name: Configure Feeds and Fix Dependencies (Homeproxy + Nikki)
        run: |
          cd $OPENWRT_PATH
          cp $FEEDS_CONF $FEEDS_CONF.bak
          cat >> $FEEDS_CONF << 'EOF'
          src-git immortalwrt_luci https://github.com/immortalwrt/luci.git;openwrt-24.10 priority=100
          src-git immortalwrt_pkgs https://github.com/immortalwrt/packages.git;openwrt-24.10 priority=99
          src-git kenzo https://github.com/kenzok8/openwrt-packages priority=98
          src-git small https://github.com/kenzok8/small priority=97
          src-git Music https://github.com/UnblockNeteaseMusic/luci-app-unblockneteasemusic.git
          src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git
          EOF
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds uninstall luci-base docker ttyd dockerd docker-compose ucode-mod-socket luci-app-dockerman luci-lib-docker golang yq
          rm -rf feeds/packages/utils/yq
          mkdir -p feeds/packages/utils/yq
          wget -O feeds/packages/utils/yq/Makefile https://raw.githubusercontent.com/immortalwrt/packages/openwrt-24.10/utils/yq/Makefile
          ./scripts/feeds install -p immortalwrt_luci luci-base luci-app-dockerman luci-lib-docker
          ./scripts/feeds install -p immortalwrt_pkgs docker ttyd dockerd docker-compose ucode-mod-socket golang yq
          ./scripts/feeds install luci-app-homeproxy sing-box nikki luci-app-nikki luci-i18n-nikki-zh-cn luci-theme-argon
          ./scripts/feeds install -a
          
      - name: Cache DL
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-homeproxy-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: dl-homeproxy-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-homeproxy-${{ github.run_id }}
          restore-keys: ccache-homeproxy-
            
      - name: Setup CCache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE -o compression=true
          ccache -s
          
      - name: Fix Toolchain Compilation
        run: |
          export CFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export CXXFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -lssp"
          echo "工具链修复完成"
          
      - name: Configure Firmware (Docker + Nikki)
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          CONFIG_PACKAGE_omcproxy=n
          CONFIG_PACKAGE_igmpproxy=y
          # 基础工具（移除默认自带的ping/iputils-ping）
          CONFIG_PACKAGE_cfdisk=y
          CONFIG_PACKAGE_which=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_sudo=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_zip=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_vim-full=y
          CONFIG_PACKAGE_net-tools=y
          CONFIG_PACKAGE_iproute2=y
          CONFIG_PACKAGE_traceroute=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_mtr=y
          CONFIG_PACKAGE_nmap=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_bind-dig=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_bridge-utils=y
          CONFIG_PACKAGE_strace=y
          CONFIG_PACKAGE_lsof=y
          CONFIG_PACKAGE_iftop=y
          CONFIG_PACKAGE_arping=y
          CONFIG_PACKAGE_psmisc=y
          CONFIG_PACKAGE_procps-ng=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_tree=y
          # LuCI基础
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-lib-nixio=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-lib-ip=y
          CONFIG_PACKAGE_rpcd=y
          CONFIG_PACKAGE_rpcd-mod-luci=y
          CONFIG_PACKAGE_lua=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-firewall=y
          CONFIG_PACKAGE_luci-mod-system=y
          CONFIG_PACKAGE_luci-mod-status=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-argon=y
          # Docker相关
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_libnetwork=y
          CONFIG_PACKAGE_kmod-nft-fib=y
          CONFIG_PACKAGE_kmod-nf-flow=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          CONFIG_PACKAGE_kmod-ipt-raw=y
          CONFIG_PACKAGE_kmod-ipt-udp=y
          CONFIG_PACKAGE_kmod-ipt-conntrack=y
          CONFIG_PACKAGE_kmod-ipt-nat=y
          CONFIG_PACKAGE_kmod-libcgroup=y
          CONFIG_PACKAGE_kmod-overlay=y
          CONFIG_PACKAGE_kmod-veth=y
          # IPsec VPN基础
          CONFIG_PACKAGE_luci-app-ipsec-vpn=y
          CONFIG_PACKAGE_luci-i18n-ipsec-vpn-zh-cn=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-proto-l2tp=y
          CONFIG_PACKAGE_kmod-ipsec=y
          CONFIG_PACKAGE_kmod-ipsec4=y
          CONFIG_PACKAGE_kmod-ipsec6=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_KERNEL_CRYPTO_AES=y
          CONFIG_KERNEL_CRYPTO_SHA1=y
          CONFIG_KERNEL_CRYPTO_HMAC=y
          CONFIG_KERNEL_CRYPTO_XFRM=y
          CONFIG_KERNEL_XFRM_USER=y
          CONFIG_KERNEL_XFRM_IPCOMP=y
          CONFIG_KERNEL_NET_KEY=y
          CONFIG_KERNEL_INET_AH=y
          CONFIG_KERNEL_INET_ESP=y
          CONFIG_KERNEL_INET_IPCOMP=y
          CONFIG_KERNEL_INET_XFRM_MODE_TRANSPORT=y
          CONFIG_KERNEL_INET_XFRM_MODE_TUNNEL=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_iptables-mod-ipopt=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_ipip=y
          CONFIG_PACKAGE_vxlan=y
          CONFIG_PACKAGE_luci-proto-ipip=y
          CONFIG_PACKAGE_luci-proto-vxlan=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          # 其他基础
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_ucode-mod-socket=y
          # DDNS
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          # UDPXY
          CONFIG_PACKAGE_luci-app-udpxy=y
          # 防火墙
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          # Homeproxy & Nikki
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          EOF
          make defconfig
          
      - name: Upload OpenWRT Config
        if: always()
        id: upload-config
        run: |
          tar -czvf openwrt-config-homeproxy.tar.gz -C $GITHUB_WORKSPACE/openwrt .config
          echo "config-path=$GITHUB_WORKSPACE/openwrt-config-homeproxy.tar.gz" >> $GITHUB_OUTPUT

      - name: Copy ImmortalWrt x86 base-files
        run: |
         cd $OPENWRT_PATH
         git clone --depth 1 --filter=blob:none --sparse https://github.com/immortalwrt/immortalwrt.git immortalwrt-tmp
         cd immortalwrt-tmp
         git sparse-checkout set target/linux/x86/base-files
         cd ..
         cp -r immortalwrt-tmp/target/linux/x86/base-files/* target/linux/x86/base-files/
         rm -rf immortalwrt-tmp
          
      - name: Upload Config Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config-homeproxy
          path: openwrt-config-homeproxy.tar.gz
          retention-days: 7
          
      - name: Compile Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          
      - name: Package Firmware
        if: always()
        id: package-firmware
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/firmware/config.txt
          cd $GITHUB_WORKSPACE
          tar -czvf FanchmWrt-homeproxy-firmware.tar.gz -C firmware .
          echo "firmware-path=$GITHUB_WORKSPACE/FanchmWrt-homeproxy-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FanchmWrt-homeproxy
          path: FanchmWrt-homeproxy-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ Homeproxy 固件编译完成！"
          echo "📦 固件包含：基础功能 + Dockerman + Homeproxy + Nikki"
          echo "=========================================="

  # ========== 构建 OpenClash 固件 ==========
