name: FanchmWrt

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: build-firmware-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build_time.outputs.time }}
    
    steps:
      - name: Set build time
        id: build_time
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

  build-firmware:
    name: Build OpenWrt Firmware (x86_64 with LuCI Apps)
    runs-on: ubuntu-latest
    needs: prepare
    
    steps:
      - name: Checkout fanchmwrt source
        uses: actions/checkout@v4
        with:
          repository: fanchmwrt/fanchmwrt
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: fanchmwrt-25.12.2
      
      - name: Display repository info
        run: |
          echo "📦 Build Info:"
          echo "Repository: fanchmwrt/fanchmwrt"
          echo "Branch: fanchmwrt-25.12.2"
          echo "Target: x86/64"
          git log --oneline -5
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext zlib1g-dev swig unzip time rsync \
            python3 python3-dev wget file jq xxd \
            quilt autoconf automake bison flex pkgconf libelf-dev

      - name: Update & install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add third-party feeds
        run: |
          cat >> feeds.conf.default << 'EOF'
          src-git unblockneteasemusic https://github.com/UnblockNeteaseMusic/luci-app-unblockneteasemusic.git
          src-git openclash https://github.com/vernesong/OpenClash.git
          src-git dockerlib https://github.com/lisaac/luci-lib-docker.git
          EOF

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install yq ruby
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs ruby ruby-dev

      - name: Auto fix missing dependencies + install golang
        run: |
          mkdir -p package/libs package/system package/network/utils
          git clone --depth 1 -b openwrt-25.12 https://github.com/openwrt/packages tmp/packages
          cp -rf tmp/packages/libs/libdevmapper package/libs/ 2>/dev/null || true
          cp -rf tmp/packages/utils/cgroupfs-mount package/system/ 2>/dev/null || true
          cp -rf tmp/packages/base/ca-bundle package/system/ 2>/dev/null || true
          cp -rf tmp/packages/network/iptables package/network/utils/ 2>/dev/null || true
          cp -rf tmp/packages/lang/golang package/libs/ 2>/dev/null || true
          rm -rf tmp/packages

      # 👇 只检测这里添加的第三方插件，自动解析 LUCI_DEPENDS / DEPENDS
      - name: Check third-party plugin dependencies from Makefile
        run: |
          echo "================================================================"
          echo "🔍 第三方插件依赖检测（仅扫描 feeds 中拉取的插件）"
          echo "================================================================"
          for plugin in feeds/unblockneteasemusic/luci-app-* feeds/openclash/luci-app-* feeds/dockerlib/luci-app-*; do
            [ -d "$plugin" ] || continue
            name=$(basename "$plugin")
            makefile="$plugin/Makefile"
            [ -f "$makefile" ] || continue

            echo -e "\n📦 插件：$name"
            echo "✅ 插件目录：$plugin"
            echo "✅ Makefile 已存在"

            # 提取依赖（支持 LUCI_DEPENDS + DEPENDS）
            depends=$(grep -E "^LUCI_DEPENDS|^DEPENDS" "$makefile" | head -n1 | sed -E 's/.*:=//g; s/[+@()]//g; s/[[:space:]]+/\n/g' | sort -u)
            echo "📄 提取依赖："
            for pkg in $depends; do
              [ -z "$pkg" ] && continue
              if grep -q "$pkg" <<< "$(./scripts/feeds list)"; then
                echo "  ✅ $pkg"
              else
                echo "  ⚠️ $pkg (将在编译时自动构建)"
              fi
            done
          done

          echo -e "\n================================================================"
          echo "✅ 第三方插件依赖检测完成"
          echo "================================================================"

      - name: Download package source
        run: |
          make download -j$(nproc) || true
      
      - name: Setup build configuration
        run: |
          cat > .config << 'EOF'
          # Target
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_KERNEL_PARTSIZE=100
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_PERSIST_VAR=y

          # Luci
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_uhttpd=y

          # 网易云解锁
          CONFIG_PACKAGE_lci-app-unblockneteasemusic=y
          CONFIG_PACKAGE_node=y

          # OpenClash
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y

          # Docker 相关
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_containerd=y
          CONFIG_PACKAGE_runc=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-compat=y

          # dockerman
          CONFIG_PACKAGE_luci-lib-docker=y
          CONFIG_PACKAGE_luci-app-dockerman=y

          # Golang
          CONFIG_PACKAGE_golang=y

          # 基础工具
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_sudo=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_vim-full=y
          CONFIG_PACKAGE_htop=y

          # Docker 内核模块
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-ipt-nat=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          EOF
          
          make defconfig
      
      # 👇 编译优化：先多线程简洁编译，失败自动单线程重编获取详细日志
      - name: Build firmware
        run: |
          echo "🚀 开始多线程编译..."
          if ! make -j$(nproc) ; then
            echo "❌ 多线程编译失败，自动切换单线程获取详细错误日志..."
            make clean
            make -j1 V=s
          fi
      
      - name: Collect firmware
        run: |
          mkdir -p firmware
          [ -d "bin/targets/x86_64" ] && cp -rf bin/targets/x86_64/* firmware/ 2>/dev/null
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-${{ needs.prepare.outputs.build_time }}
          path: firmware/
      
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-firmware]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 📦 FanchmWrt x86_64 构建完成
          **状态**: success
          **版本**: fanchmwrt-25.12.2

          ## 已包含第三方插件
          ✅ luci-app-unblockneteasemusic
          ✅ luci-app-openclash
          ✅ luci-app-dockerman

          ## 已自动修复依赖
          ✅ libdevmapper ✅ cgroupfs-mount ✅ ca-bundle ✅ iptables ✅ golang

          ## 构建环境
          ✅ nodejs 18.x ✅ ruby
          EOF
