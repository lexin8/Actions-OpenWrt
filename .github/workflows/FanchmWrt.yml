          mkdir -p $GITHUB_WORKSPACE/firmware-openclash
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/firmware-openclash/ 2>/dev/null || true
          cp -v $OPENWRT_PATH/.config $GITHUB_WORKSPACE/firmware-openclash/config.txt
          cd $GITHUB_WORKSPACE
          tar -czvf FanchmWrt-openclash.tar.gz -C firmware-openclash .

      - name: Upload OpenClash
        uses: actions/upload-artifact@v4
        with:
          name: FanchmWrt-openclash
          path: FanchmWrt-openclash.tar.gz
          retention-days: 30
