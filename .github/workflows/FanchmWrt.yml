        with:
          name: openwrt-config-openclash
          path: openwrt-config-openclash.tar.gz
          retention-days: 7

      - name: Compile rust
        run: |
          cd openwrt
          sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' feeds/packages/lang/rust/Makefile
          
      - name: Compile Firmware
        run: |
          cd openwrt
          make download -j$(nproc)
          export CCACHE_DIR=$CCACHE_DIR USE_CCACHE=1 PATH="/usr/lib/ccache:$PATH"
          ccache -s
          make -j$(nproc) V=s || make -j1 V=s
          ccache -s
          
      - name: Package Firmware
        if: always()
        id: package-firmware
        run: |
          cd $FIRMWARE_OUTPUT_PATH
          mkdir -p $GITHUB_WORKSPACE/firmware
          cp -v *.img.gz *.manifest config.buildinfo sha256sums $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
          cp -v $GITHUB_WORKSPACE/openwrt/.config $GITHUB_WORKSPACE/firmware/config.txt
          cd $GITHUB_WORKSPACE
          tar -czvf FanchmWrt-openclash-firmware.tar.gz -C firmware .
          echo "firmware-path=$GITHUB_WORKSPACE/FanchmWrt-openclash-firmware.tar.gz" >> $GITHUB_OUTPUT
          
      - name: Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FanchmWrt-openclash
          path: FanchmWrt-openclash-firmware.tar.gz
          retention-days: 30

      - name: Completion
        run: |
          echo "=========================================="
          echo "✅ OpenClash 固件编译完成！"
          echo "📦 固件包含：基础功能 + Dockerman + OpenClash"
          echo "=========================================="
