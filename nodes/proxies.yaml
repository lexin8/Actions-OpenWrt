name: Update Subscription Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 克隆 AutoMergePublicNodes 仓库
        run: git clone https://github.com/chengaopan/AutoMergePublicNodes.git --depth=1

      - name: 修复 requirements.txt 依赖
        run: |
          cd AutoMergePublicNodes
          sed -i 's|requests-file @ git+https://github.com/peasoft/requests-file.git@.*|requests-file==1.5.1|' requirements.txt

      - name: 安装依赖库
        run: |
          cd AutoMergePublicNodes
          pip install -r requirements.txt

      - name: 运行 fetch.py（忽略错误）
        run: |
          cd AutoMergePublicNodes
          python fetch.py 2>&1 | tee output.log || true

      - name: 安装 yq（YAML 处理工具）
        run: sudo snap install yq

      - name: 提取 proxies 部分并生成订阅文件
        run: |
          mkdir -p nodes
          cd AutoMergePublicNodes
          if [ ! -f config.yml ]; then
            echo "错误：未找到 config.yml"
            exit 1
          fi
          # 提取 proxies 数组（不包含根键）
          yq eval '.proxies' config.yml > ../nodes/proxies.yml
          # 在文件开头添加 "proxies:" 根键
          sed -i '1i proxies:' ../nodes/proxies.yml
          echo "已生成 nodes/proxies.yml"
          echo "文件大小: $(wc -c < ../nodes/proxies.yml) 字节"

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/proxies.yml
          git diff --cached --quiet || git commit -m "Auto update proxies.yml [skip ci]"
          git push
